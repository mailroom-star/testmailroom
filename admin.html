function _esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Plan table sort state. Default: newest-created first (created_at desc). Click
// the Price or Created header to toggle asc/desc via setPlanSort(). Rows with no
// created_at always sink to the bottom (pre-migration rows / un-stamped plans).
window._planSort = window._planSort || { col: 'created', dir: 'desc' };
function setPlanSort(col) {
  const s = window._planSort;
  if (s.col === col) { s.dir = (s.dir === 'asc') ? 'desc' : 'asc'; }
  else { s.col = col; s.dir = (col === 'created') ? 'desc' : 'asc'; }
  loadPlans();
}
function _planPriceNum(p) {
  // Numeric value from price_display (e.g. "$25.00/mo" -> 25). Unsynced/no price -> -1.
  const raw = (p.price_display || '').replace(/[^0-9.]/g, '');
  const n = parseFloat(raw);
  return isFinite(n) ? n : -1;
}
function _sortPlans(arr) {
  const s = window._planSort;
  const sign = (s.dir === 'asc') ? 1 : -1;
  return arr.slice().sort((a, b) => {
    if (s.col === 'price') {
      return (_planPriceNum(a) - _planPriceNum(b)) * sign;
    }
    // created: null/blank dates always sink to the bottom regardless of direction
    const ta = a.created_at ? new Date(a.created_at).getTime() : null;
    const tb = b.created_at ? new Date(b.created_at).getTime() : null;
    if (ta == null && tb == null) return 0;
    if (ta == null) return 1;
    if (tb == null) return -1;
    return (ta - tb) * sign;
  });
}
async function loadPlans(){

  const all=data||[];
  const active=_sortPlans(all.filter(p=>!p.archived));
  const archived=_sortPlans(all.filter(p=>p.archived));
  const showArch=!!window._showArchivedPlans;
  // Archived always grouped AFTER active, each group internally sorted.

  const total=active.length;

  // Sort-arrow indicator for a header column.

  const rowHtml=p=>{

// Wizard navigation (create mode only)
function planWizNav(dir){
  const step=(window._planStep||1)+dir;
  if(step<1||step>4) return;
  // Validate step 1 before advancing past it
  if(dir>0 && window._planStep===1){
    const name=qs('pl-name')?.value.trim();
    const price=parseFloat(qs('pl-price')?.value);
    if(!name){toast('Plan name is required','error');return;}
    if(!price||price<=0||!isFinite(price)){toast('Price must be greater than $0','error');return;}
    if(Math.round(price*100)!==price*100){toast('Price can have at most 2 decimal places','error');return;}
    const setupRaw=qs('pl-setup')?.value;
    if(setupRaw!==''&&setupRaw!=null){const sv=parseFloat(setupRaw);if(!isFinite(sv)||sv<0){toast('Setup fee cannot be negative','error');return;}if(Math.round(sv*100)!==sv*100){toast('Setup fee can have at most 2 decimal places','error');return;}}
    const _vm=_plValidMemo(); if(!_vm.ok){toast(_vm.msg,'error');return;}
  }
  if(dir>0 && window._planStep===2){
    const numv=id=>parseFloat(qs(id)?.value);
    const ml=numv('pl-mail'); if(!(ml>=1)||!Number.isInteger(ml)||ml>1000){toast('Mail limit must be a whole number from 1 to 1000','error');return;}
    const pc=numv('pl-parcels'); if(!(pc>=0)||!Number.isInteger(pc)||pc>1000){toast('Parcels must be a whole number from 0 to 1000','error');return;}
    const rc=numv('pl-recip'); if(!(rc>=1)||!Number.isInteger(rc)||rc>100){toast('Max recipients must be a whole number from 1 to 100','error');return;}
    const mf=numv('pl-mailfee'); if(mf<0){toast('Mail overage cannot be negative','error');return;} if(isFinite(mf)&&Math.round(mf*100)!==mf*100){toast('Mail overage can have at most 2 decimal places','error');return;} if(mf>=100){toast('Mail overage must be less than $100','error');return;}
    const pf=numv('pl-parcelfee'); if(pf<0){toast('Parcel overage cannot be negative','error');return;} if(isFinite(pf)&&Math.round(pf*100)!==pf*100){toast('Parcel overage can have at most 2 decimal places','error');return;} if(pf>=100){toast('Parcel overage must be less than $100','error');return;}
    const ms=numv('pl-mstore'); if(!(ms>=1)||!Number.isInteger(ms)||ms>120){toast('Mail storage must be a whole number from 1 to 120 days','error');return;}
    if(pc>0){const ps=numv('pl-pstore'); if(!(ps>=1)||!Number.isInteger(ps)||ps>120){toast('Parcel storage must be a whole number from 1 to 120 days','error');return;}}
  }
  window._planStep=step;
  document.querySelectorAll('.pl-wiz').forEach(el=>{el.style.display=(+el.dataset.step===step)?'':'none';});
  document.querySelectorAll('.pl-bar').forEach(el=>{el.style.background=(+el.dataset.bar<=step)?'var(--ink)':'var(--border)';});
  const labels={1:'Plan & price',2:'Plan card template',3:'Display & marketing',4:'Review'};
  const lbl=qs('pl-step-label'); if(lbl) lbl.textContent='Step '+step+' of 4 \u00b7 '+labels[step];
  const back=qs('pl-back'); if(back) back.style.visibility=step===1?'hidden':'visible';
  const next=qs('pl-next'); const save=qs('pl-save-btn');
  if(next) next.style.display=step===4?'none':'';
  if(save) save.style.display=step===4?'':'none';
  if(step===4) renderPlanReview();
}

// Mirrors signup.html planFeatures()+storageLine()+feeLine(): allowance line, features
// (custom replaces derived defaults), then derived storage line, then setup/overage fine print.
function renderPlanSignupPreview(){
  const el=qs('pl-feat-signup-preview'); if(!el) return;
  const yearly=(qs('pl-cycle')?.value==='yearly');
  const per=yearly?'yr':'mo';
  const intv=id=>{const v=parseInt(qs(id)?.value,10);return (Number.isFinite(v)&&v>0)?v:0;};
  // signup.html money(): $56 when whole, $56.50 otherwise; null when <=0/NaN
  const money=raw=>{const v=Number(raw);if(!isFinite(v)||v<=0)return null;return '$'+(v%1===0?v.toFixed(0):v.toFixed(2));};
  const mail=intv('pl-mail'), parcels=intv('pl-parcels'), recip=intv('pl-recip');
  const items=[];
  const a=[];
  if(mail)    a.push(mail+' mail / '+per);
  if(parcels) a.push(parcels+' parcel'+(parcels>1?'s':'')+' / '+per);
  if(recip)   a.push(recip+' recipient'+(recip>1?'s':''));
  if(a.length) items.push(a.join(' + '));
  // featuresOf: custom features if any, else derived defaults
  const custom=window._planFeats||[];
  if(custom.length){ custom.forEach(f=>items.push(f)); }
  else{
    const af=qs('pl-feature')?.value||'none';
    if(af==='ship') items.push('Worldwide mail forwarding');
    if(af==='scan') items.push('Auto mail scanning');
    items.push('Same-day notifications');
  }
  const rows=items.map(t=>'<div style="display:flex;gap:7px;align-items:flex-start;font-size:11.5px;color:var(--ink-2);line-height:1.45;margin-bottom:5px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green,#16a34a)" stroke-width="3" style="flex-shrink:0;margin-top:1px"><path d="M20 6L9 17l-5-5"/></svg><span>'+_esc(t)+'</span></div>').join('');
  // storageLine(p): "Mail held N days" + " · parcels held N days" (only if parcels); omit if no mail days
  const mstore=intv('pl-mstore'), pstore=intv('pl-pstore');
  const _dys=n=>n+(n===1?' day':' days');
  let storageHtml='';
  if(mstore){
    let st='Mail held '+_dys(mstore);
    if(parcels&&pstore) st+=' \u00b7 '+(parcels===1?'parcel':'parcels')+' held '+_dys(pstore);
    storageHtml='<div style="display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3);line-height:1.35;margin-top:8px"><svg width="12.5" height="12.5" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.9" style="flex-shrink:0"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg><span>'+_esc(st)+'</span></div>';
  }
  // feeLine(p): setup sentence + overages
  const bits=[]; const mo=money(qs('pl-mailfee')?.value), po=money(qs('pl-parcelfee')?.value);
  if(mo) bits.push('<b>'+mo+'</b> per extra mail item');
  if(po) bits.push('<b>'+po+'</b> per extra parcel');
  const setupMoney=money(qs('pl-setup')?.value);
  let setup='';
  if(setupMoney) setup='One-time setup fee: <b>'+setupMoney+'</b>. ';
  let feeHtml='';
  if(bits.length||setup){
    feeHtml='<div style="margin-top:10px;padding-top:9px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-3);line-height:1.5">'+setup+(bits.length?'Overages: '+bits.join(' \u00b7 ')+'.':'')+'</div>';
  }
  el.innerHTML='<div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;background:var(--bg)"><div style="font-size:11px;font-weight:600;color:var(--ink-3);margin-bottom:8px;display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg>How this shows on signup</div>'+rows+storageHtml+feeHtml+'</div>';
}

// Plan summary (tagline) must be present and a single sentence.
// Returns {ok:true,value} or {ok:false,msg}. One sentence = no sentence-ending
// punctuation (. ! ?) that is followed by more words.
function _plValidMemo(){
  const raw=(qs('pl-memo')?.value||'').trim();
  if(!raw) return {ok:false,msg:'Plan summary is required'};
  // reject a sentence break (. ! ?) followed by further text
  if(/[.!?]\s+\S/.test(raw)) return {ok:false,msg:'Plan summary must be a single sentence'};
  // reject internal line breaks (a one-liner)
  if(/[\r\n]/.test(raw)) return {ok:false,msg:'Plan summary must be a single sentence'};
  return {ok:true,value:raw};
}

async function savePlan(id){
  if(_noCompanyAbort('savePlan',true))return;
  const featured=qs('pl-featured').checked;
  const btn=qs('pl-save-btn'); if(btn){btn.disabled=true;btn.textContent='Saving\u2026';}
  const restoreBtn=()=>{if(btn){btn.disabled=false;btn.textContent=id?'Save changes':'Create product';}};

  if(id){
    try{
      const _vm=_plValidMemo(); if(!_vm.ok){toast(_vm.msg,'error');restoreBtn();return;}
      const d={
        plan_memo:_vm.value,
        declarations:window._planDecls||[],
        features:window._planFeats||[],
        show_on_signup:qs('pl-signup').checked,
        show_on_products:qs('pl-products').checked,
        is_featured:featured

  const cy=qs('pl-cycle').value;

  const _pc=parseFloat(qs('pl-parcels').value); if(!(_pc>=0)||!Number.isInteger(_pc)||_pc>1000){toast('Parcels must be a whole number from 0 to 1000','error');restoreBtn();return;}
  const _rc=parseFloat(qs('pl-recip').value); if(!(_rc>=1)||!Number.isInteger(_rc)||_rc>100){toast('Max recipients must be a whole number from 1 to 100','error');restoreBtn();return;}
  const _mf=parseFloat(qs('pl-mailfee').value)||0; if(_mf<0){toast('Mail overage cannot be negative','error');restoreBtn();return;} if(Math.round(_mf*100)!==_mf*100){toast('Mail overage can have at most 2 decimal places','error');restoreBtn();return;} if(_mf>=100){toast('Mail overage must be less than $100','error');restoreBtn();return;}
  const _pf=parseFloat(qs('pl-parcelfee').value)||0; if(_pf<0){toast('Parcel overage cannot be negative','error');restoreBtn();return;} if(Math.round(_pf*100)!==_pf*100){toast('Parcel overage can have at most 2 decimal places','error');restoreBtn();return;} if(_pf>=100){toast('Parcel overage must be less than $100','error');restoreBtn();return;}
  const _ms=parseInt(qs('pl-mstore').value,10); if(!(_ms>=1)||_ms>120){toast('Mail storage must be a whole number from 1 to 120 days','error');restoreBtn();return;}
  if(_pc>0){const _ps=parseInt(qs('pl-pstore').value,10); if(!(_ps>=1)||_ps>120){toast('Parcel storage must be a whole number from 1 to 120 days','error');restoreBtn();return;}}
  const _vmemo=_plValidMemo(); if(!_vmemo.ok){toast(_vmemo.msg,'error');restoreBtn();return;}
  try{
    const authToken=localStorage.getItem('sb_admin_access_token');
    const res=await fetch(SUPABASE_URL+'/functions/v1/create-stripe-product',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
      body:JSON.stringify({action:'create',planName,billingCycle:cy,priceAmount,setupAmount})
    });
    const sr=await res.json();
    if(!res.ok||sr.error){toast(sr.error||'Stripe error','error');restoreBtn();return;}

    const d={
      plan_name:planName, billing_cycle:cy, limit_type:cy,
      max_recipients:parseInt(qs('pl-recip').value)||0,
      mail_limit:parseInt(qs('pl-mail').value)||0,
      mail_overage_fee:parseFloat(qs('pl-mailfee').value)||0,
      parcels_included:parseInt(qs('pl-parcels').value)||0,
      parcel_overage_fee:(parseInt(qs('pl-parcels').value)||0)>0?(parseFloat(qs('pl-parcelfee').value)||0):0,
      auto_feature:qs('pl-feature').value,
      mail_storage_days:parseInt(qs('pl-mstore').value)||30,
      parcel_storage_days:(parseInt(qs('pl-parcels').value)||0)>0?(parseInt(qs('pl-pstore').value)||7):0,
      locations:sl,
      plan_memo:_vmemo.value,
      declarations:window._planDecls||[],
      features:window._planFeats||[],
      stripe_product_id:sr.stripeProductId,
      stripe_price_id:sr.stripePriceId,
      stripe_setup_price_id:sr.stripeSetupPriceId||null,
      setup_fee_display:sr.setupDisplay||null,
      price_display:sr.priceDisplay,
      show_on_signup:qs('pl-signup').checked,
      show_on_products:qs('pl-products').checked,
      is_featured:featured,
      archived:false,
      product_id:crypto.randomUUID(),
      company_id:STATE.companyId
    };
    const{error}=await sb.from('plans').insert(d);
    if(error){toast(error.message,'error');restoreBtn();return;}

    if(featured){
      await sb.from('plans').update({is_featured:false}).eq('company_id',STATE.companyId).neq('product_id',d.product_id);
    }

// Archive / unarchive a plan: toggle DB flag + Stripe price.active via edge fn
async function togglePlanArchive(id, archive){
  const verb=archive?'Archive':'Unarchive';
  const ok=await appConfirmModal(verb+' plan',
    archive?'This hides the plan from signup &amp; client products and deactivates its price with the payment processor. Existing subscribers are unaffected.':'This restores the plan and reactivates its price with the payment processor.',
    verb, archive);
  if(!ok) return;
  try{
    const{data:p}=await sb.from('plans').select('stripe_product_id,stripe_price_id,stripe_setup_price_id').eq('product_id',id).maybeSingle();
    const authToken=localStorage.getItem('sb_admin_access_token');
    const res=await fetch(SUPABASE_URL+'/functions/v1/create-stripe-product',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
      body:JSON.stringify({
        action:archive?'archive':'unarchive',
        stripeProductId:p?.stripe_product_id||null,
        stripePriceId:p?.stripe_price_id||null,
        stripeSetupPriceId:p?.stripe_setup_price_id||null
      })
    });
    const sr=await res.json();
    if(!res.ok||sr.error){toast(sr.error||'Stripe error','error');return;}
    const upd={archived:archive, archived_at:archive?new Date().toISOString():null};
    if(archive) upd.is_featured=false; // archived plans can't be featured
    const{error}=await sb.from('plans').update(upd).eq('product_id',id).eq('company_id',STATE.companyId);
    if(error){toast(error.message,'error');return;}
    toast(archive?'Archived':'Unarchived');
    loadPlans();
  }catch(e){toast(e.message||'Failed','error');}
}

async function resetStaffPassword(staffId) {
  const pwEl = document.getElementById('st-new-password');
  const pw = pwEl ? pwEl.value.trim() : '';
  if (!pw) { toast('Enter a new password first', 'error'); return; }
  if (pw.length < 8) { toast('Password must be at least 8 characters', 'error'); return; }
  const btn = document.querySelector('.modal-overlay .btn-secondary[onclick*="resetStaffPassword"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Resetting...'; }
  try {
    const result = await apiPost({ action: 'resetStaffPassword', uuid: STATE.uuid, staffId, newPassword: pw });
    if (result.status !== 'ok') throw new Error(result.message || 'Failed');
    toast('Password reset successfully', 'success');
    if (pwEl) pwEl.value = '';
    if (btn) { btn.disabled = false; btn.textContent = 'Reset Password'; }
  } catch(e) {
    toast(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Reset Password'; }
  }
}


function generatePassword() {
  const upper  = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const lower  = 'abcdefghjkmnpqrstuvwxyz';
  const nums   = '23456789';
  const syms   = '!@#$%^&*';
  const all    = upper + lower + nums + syms;
  let pw = '';
  // Guarantee at least one of each type
  pw += upper[Math.floor(Math.random() * upper.length)];
  pw += lower[Math.floor(Math.random() * lower.length)];
  pw += nums[Math.floor(Math.random() * nums.length)];
  pw += syms[Math.floor(Math.random() * syms.length)];
  // Fill remaining 8 chars
  for (let i = 0; i < 8; i++) pw += all[Math.floor(Math.random() * all.length)];
  // Shuffle
  return pw.split('').sort(() => Math.random() - 0.5).join('');
}

function fillGeneratedPassword(fieldId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  const pw = generatePassword();
  el.value = pw;
  el.type = 'text'; // show it so admin can copy
  el.focus();
  // Auto-copy to clipboard for convenience
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(pw)
      .then(() => toast('Password generated & copied to clipboard'))
      .catch(() => toast('Password generated \u2014 copy it from the field'));
  } else {
    el.select();
    try { document.execCommand('copy'); toast('Password generated & copied'); }
    catch(e) { toast('Password generated \u2014 copy it from the field'); }
  }
}

function copyPassword(fieldId) {
  const el = document.getElementById(fieldId);
  if (!el || !el.value) { toast('No password to copy', 'error'); return; }
  navigator.clipboard.writeText(el.value).then(() => toast('Password copied')).catch(() => {
    // Fallback
    el.select();
    document.execCommand('copy');
    toast('Password copied');
  });
}

// Title-case a full name the same way client signup does (_capName), but per word:
// each space-separated word gets first letter up, rest down. "jane DOE" -> "Jane Doe".
function _stCapName(s){ return (s||'').trim().replace(/\s+/g,' ').split(' ').map(function(w){ return w ? w.charAt(0).toUpperCase()+w.slice(1).toLowerCase() : w; }).join(' '); }
// On-blur tidy for the staff name input (mirrors signup blur behaviour so the cursor never jumps mid-type).
function stTidyName(el){ if(el) el.value = _stCapName(el.value); }

// On-blur formatters for the location modal: title-case for address/city/province, ALL-CAPS for postal.
function locTidyTitle(el){ if(el) el.value = _stCapName(el.value); }
// Postal/zip: uppercase, strip ALL whitespace.
function locTidyUpper(el){ if(el) el.value = (el.value||'').replace(/\s+/g,'').toUpperCase(); }
// Email: lowercase, strip ALL whitespace.
function locTidyEmail(el){ if(el) el.value = (el.value||'').replace(/\s+/g,'').toLowerCase(); }
// Phone: format clean NANP (10 digits, or 11 starting with 1) as (XXX) XXX-XXXX; leave anything else untouched.
function locTidyPhone(el){
  if(!el) return;
  const raw=(el.value||'').trim();
  let d=raw.replace(/\D/g,'');
  if(d.length===11 && d.charAt(0)==='1') d=d.slice(1);
  if(d.length===10){ el.value='('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6); }
}

async function saveStaff(id){
  const name     = _stCapName(qs('st-name')?.value || '');
  const email    = qs('st-email')?.value?.trim();
  let role     = qs('st-role')?.value;
  const locId    = qs('st-loc')?.value || null;
  const canExtend  = qs('st-extend')?.checked || false;
  const canVerify  = qs('st-verify-id')?.checked !== false;
  const canTerm    = qs('st-terminate')?.checked || false;
  const canCharge  = qs('st-create-charge')?.checked || false;
  const canResetPw = qs('st-reset-password')?.checked || false;
  const notes    = qs('st-notes')?.value || null;
  if (!name)  { toast('Name is required', 'error'); qs('st-name')?.focus(); return; }
  if (name.split(' ').filter(Boolean).length < 2) {
    toast('Please enter both first and last name.', 'error');
    const _ne = qs('st-name'); if (_ne) { _ne.value = name; _ne.focus(); }
    return;
  }
  { const _ne = qs('st-name'); if (_ne) _ne.value = name; }
  if (!locId) { toast('Select a location', 'error'); return; }

  if (id) {
    // Existing staff \u2014 direct DB update (no auth changes). Role is intentionally
    // NOT written on edit \u2014 role is immutable after creation (defense-in-depth).
    const { error } = await sb.from('staff').update({
      name,
      default_location_id: locId,
      can_extend_storage: canExtend,
      can_verify_id: canVerify,
      can_terminate: canTerm,
      can_create_charge: canCharge,
      can_reset_password: canResetPw,
      notes
    }).eq('staff_id', id).eq('company_id', STATE.companyId);
    if (error) { toast(error.message, 'error'); return; }
    document.querySelector('.modal-overlay')?.remove();
    toast('Staff updated');
    loadStaff();
  } else {
    // New account \u2014 must create Supabase Auth user + staff row atomically.
    // Admin creation is intentionally disabled: force role to 'staff' regardless of
    // form value (defense-in-depth vs. a re-enabled/devtools option). To allow a 2nd
    // admin/owner later, remove this line AND restore the Admin <option> in the create form.
    role = 'staff';
    if (!email) { toast('Email is required', 'error'); return; }
    const password = qs('st-password')?.value?.trim();
    if (!password || password.length < 8) { toast('Password must be at least 8 characters', 'error'); return; }
    const btn = document.querySelector('.modal-overlay .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Creating...'; }
    try {
      const result = await apiPost({
        action: 'createStaffAccount',
        uuid: STATE.uuid,
        name, email, password, role,
        locationId: locId,
        canVerifyId: canVerify,
        canExtendStorage: canExtend,
        canTerminate: canTerm,
        canCreateCharge: canCharge,

}
async function updateSettingNum(k, v, minV, maxV) {

}

  ].join('\n');
  document.head.appendChild(st);
}
function _tzpClockTick() {
  document.querySelectorAll('.tzp-clk').forEach(function(el){
    const tz = el.dataset.tz; if (!tz) return;
    try {
      const t = new Date().toLocaleTimeString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit' });
      const city = tz.split('/').pop().replace(/_/g,' ');
      el.textContent = el.classList.contains('tzp-curclk') ? (city + ' \u00b7 ' + t) : t;
    } catch(e) {}
  });
}
let _tzpTimer = null;
function _tzpStartClock() {
  _tzpInjectCss();
  if (_tzpTimer) clearInterval(_tzpTimer);
  _tzpClockTick();
  _tzpTimer = setInterval(function(){
    // Self-cleanup: if the picker is no longer in the DOM (navigated away), stop ticking.
    if (!document.querySelector('.tzp-clk')) { clearInterval(_tzpTimer); _tzpTimer = null; return; }
    _tzpClockTick();
  }, 1000);
}
function _tzpPosition(btn, panel) {
  const r = btn.getBoundingClientRect();
  const pw = 280;
  let left = r.right - pw;
  if (left < 8) left = 8;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - 8 - pw;
  panel.style.left = left + 'px';
  const spaceBelow = window.innerHeight - r.bottom;
  if (spaceBelow < 300 && r.top > spaceBelow) {
    panel.style.top = ''; panel.style.bottom = (window.innerHeight - r.top + 6) + 'px';
  } else {
    panel.style.bottom = ''; panel.style.top = (r.bottom + 6) + 'px';
  }
}
function tzpToggle(btn) {
  const panel = btn.parentElement.querySelector('.tzp-panel');
  if (!panel) return;
  const open = panel.style.display !== 'none';
  // Close everything (and tear down any reposition listeners) first.
  document.querySelectorAll('.tzp-panel').forEach(function(p){ p.style.display = 'none'; if (p._tzpCleanup) { p._tzpCleanup(); p._tzpCleanup = null; } });
  if (!open) {
    panel.style.display = 'block';
    _tzpPosition(btn, panel);
    const s = panel.querySelector('.tzp-search'); if (s) { s.value = ''; tzpFilter(s); setTimeout(function(){ s.focus(); }, 0); }
    // Keep the panel anchored to the trigger on resize/scroll; close if the trigger leaves the DOM.
    const reflow = function(){
      if (!document.body.contains(btn)) { panel.style.display = 'none'; if (panel._tzpCleanup) { panel._tzpCleanup(); panel._tzpCleanup = null; } return; }
      _tzpPosition(btn, panel);
    };
    const closer = function(e){ if (!btn.parentElement.contains(e.target)) { panel.style.display = 'none'; if (panel._tzpCleanup) { panel._tzpCleanup(); panel._tzpCleanup = null; } } };
    window.addEventListener('resize', reflow);
    window.addEventListener('scroll', reflow, true);
    setTimeout(function(){ document.addEventListener('mousedown', closer); }, 0);
    panel._tzpCleanup = function(){ window.removeEventListener('resize', reflow); window.removeEventListener('scroll', reflow, true); document.removeEventListener('mousedown', closer); };
  }
}
function tzpFilter(input) {
  const q = (input.value||'').toLowerCase().trim();
  const list = input.closest('.tzp-panel').querySelector('.tzp-list');
  list.querySelectorAll('.tzp-opt').forEach(function(o){ o.style.display = (!q || (o.dataset.search||'').includes(q)) ? '' : 'none'; });
  list.querySelectorAll('.tzp-grp').forEach(function(g){
    let n = g.nextElementSibling, any = false;
    while (n && n.classList.contains('tzp-opt')) { if (n.style.display !== 'none') any = true; n = n.nextElementSibling; }
    g.style.display = any ? '' : 'none';
  });
}
function tzpPick(key, tz) {
  updateSetting(key, tz);
  setTimeout(loadSettings, 200);
}

async function toggleNotifPref(key, currentlyOn) {
  if (_noCompanyAbort('toggleNotifPref', true)) return;
  const prefs = window._notifPrefs || {};
  if (currentlyOn) {
    prefs[key] = false;
  } else {
    delete prefs[key]; // removing = default on
  }
  window._notifPrefs = prefs;

  // Save to DB
  const json = JSON.stringify(prefs);
  const { data: existing } = await cfgq('key').eq('key', 'notification_preferences').maybeSingle();
  if (existing) {
    await sb.from('config').update({ value: json }).eq('key', 'notification_preferences').eq('company_id', STATE.companyId);
  } else {
    await sb.from('config').insert({ company_id: STATE.companyId, key: 'notification_preferences', value: json, description: 'Notification toggle preferences per type/role/channel' });
  }

  // Invalidate admin cache
  _adminNotifPrefsCacheTime = 0;

  renderNotifMatrix();
  toast(currentlyOn ? 'Notification disabled' : 'Notification enabled');
}

async function saveTemplateModal(type) {
  if (_noCompanyAbort('saveTemplateModal', true)) return;
  const subject = document.getElementById('tpl-subject')?.value || '';
  const body = document.getElementById('tpl-body')?.value || '';
  const ctaEnabled = document.getElementById('tpl-cta-enabled')?.checked || false;
  const ctaLabel = document.getElementById('tpl-cta-label')?.value || '';
  const ctaUrl = document.getElementById('tpl-cta-url')?.value || '';
  const configKey = 'email_template_' + type;
  const value = JSON.stringify({ subject, body, cta_enabled: ctaEnabled, cta_label: ctaLabel, cta_url: ctaUrl });
  const { data: existing } = await cfgq('key').eq('key', configKey).maybeSingle();
  if (existing) {
    await sb.from('config').update({ value }).eq('key', configKey).eq('company_id', STATE.companyId);
  } else {
    await sb.from('config').insert({ company_id: STATE.companyId, key: configKey, value, description: 'Email template for ' + type });
  }
  document.querySelector('.modal-overlay')?.remove();
  toast('Template saved');
}

async function resetTemplateModal(type) {
  const def = _TEMPLATE_DEFAULTS[type] || { subject: '', body: '' };
  document.getElementById('tpl-subject').value = def.subject;
  document.getElementById('tpl-body').value = def.body;
  updateTemplatePreview();
  // Delete saved template from DB
  if (_noCompanyAbort('resetTemplateModal', true)) return;
  await sb.from('config').delete().eq('key', 'email_template_' + type).eq('company_id', STATE.companyId);
  toast('Reset to default');
}

async function exportAuditCSV() {
  toast('Exporting...');
  try {
    const { data } = await cq('audit_log').order('created_at', { ascending: false }).limit(5000);
    if (!data || !data.length) { toast('No audit records to export', 'error'); return; }
    const headers = ['Timestamp','Action','Staff ID','Staff Name','Client ID','Client Name','Entity Type','Entity ID','Plan Card ID','Mail ID','Summary','Details'];
    const rows = data.map(r => [
      r.created_at ? fmtDateTime(r.created_at, COMPANY_DEFAULT_TZ) + ' ' + tzLabel(COMPANY_DEFAULT_TZ) : '',
      r.action || '',
      r.staff_id || '',
      r.staff_name || '',
      r.client_id || '',
      r.client_name || '',
      r.entity_type || '',
      r.entity_id || '',
      r.plan_card_id || '',
      r.mail_id || '',
      (r.summary || '').replace(/"/g, '""'),
      r.details ? JSON.stringify(r.details).replace(/"/g, '""') : ''
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.map(c => '"' + c + '"').join(','))].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'audit-log-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported ' + data.length + ' records');
  } catch(e) { toast(e.message, 'error'); }
}

// Server-side pagination: 50/page. Search + filter run as fresh queries so they
// cover ALL rows (within the 12-month retention window), not just one loaded page.
let _loginEvPage = 0;
const LOGINEV_PS = 50;
let _loginEvFilter = '';
let _loginEvSearchTimer = null;

// Applies the active filter + search to a Supabase query (used by both the
// list loader and the CSV export so they stay consistent).
function _loginEvApplyFilters(q) {
  const typeF = _loginEvFilter;
  if (typeF === 'admin')      q = q.eq('role', 'admin');
  else if (typeF === 'staff') q = q.eq('subject_type', 'staff').not('role', 'eq', 'admin'); // staff incl. legacy NULL-role rows; excludes admins
  else if (typeF === 'client') q = q.eq('subject_type', 'client');
  else if (typeF === 'unknown') q = q.eq('subject_type', 'unknown');

  const term = (document.getElementById('loginev-search')?.value || '').trim();
  if (term) {
    const safe = term.replace(/[%,()]/g, ' ');
    q = q.or(`email.ilike.%${safe}%,ip.ilike.%${safe}%,user_agent.ilike.%${safe}%,subject_id.ilike.%${safe}%,role.ilike.%${safe}%`);
  }
  return q;
}

async function loadLoginEvents(pg) {
  if (pg !== undefined) _loginEvPage = pg;
  const from = _loginEvPage * LOGINEV_PS;
  const listEl = document.getElementById('loginev-list');
  try {
    let q = sb.from('login_events').select('*', { count: 'exact' }).order('created_at', { ascending: false }).range(from, from + LOGINEV_PS - 1);
    if (STATE.companyId) q = q.eq('company_id', STATE.companyId);
    else { console.warn('loadLoginEvents(): no STATE.companyId \u2014 scoping to no-company (zero rows).'); q = q.eq('company_id', _NO_COMPANY); }
    q = _loginEvApplyFilters(q);
    const { data, count, error } = await q;
    if (error) throw error;
    renderLoginEvents(data || [], count || 0);
  } catch(e) {
    if (listEl) listEl.innerHTML = '<div style="color:var(--required);padding:20px">Error: '+e.message+'</div>';
  }
}

function setLoginEvFilter(btn, val) {
  _loginEvFilter = val;
  document.querySelectorAll('#loginev-filters .chip-filter').forEach(b => b.classList.toggle('active', b.dataset.val === val));
  loadLoginEvents(0);
}

function onLoginEvSearch() {
  clearTimeout(_loginEvSearchTimer);
  _loginEvSearchTimer = setTimeout(() => loadLoginEvents(0), 300);
}

function renderLoginEvents(logs, total) {
  const fDT = d => d ? formatTorontoTime(d) : '\u2014';
  const cleanIp = ip => (ip||'').replace(/\/(32|128)$/, '');
  const subjBadge = (t, role) => role === 'admin'
    ? '<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:#F3E5F5;color:#7B1FA2;font-weight:600">Admin</span>'
    : t === 'client'
    ? '<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:#E3F2FD;color:#1565C0;font-weight:600">Client</span>'
    : t === 'staff'
    ? '<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:#FFF3E0;color:#E65100;font-weight:600">Staff</span>'
    : '<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:var(--bg);color:var(--ink-3);font-weight:600">Unknown</span>';
  const deviceLabel = ua => {
    if (!ua) return '\u2014';
    let os = /Windows/.test(ua) ? 'Windows' : /iPhone|iPad|iOS/.test(ua) ? 'iOS' : /Mac OS X|Macintosh/.test(ua) ? 'macOS' : /Android/.test(ua) ? 'Android' : /Linux/.test(ua) ? 'Linux' : 'Other';
    let br = /Edg\//.test(ua) ? 'Edge' : /OPR\/|Opera/.test(ua) ? 'Opera' : /Chrome\//.test(ua) ? 'Chrome' : /Firefox\//.test(ua) ? 'Firefox' : /Safari\//.test(ua) ? 'Safari' : 'Browser';
    return br + ' \u00B7 ' + os;
  };

  const ce = document.getElementById('loginev-count');
  if (ce) ce.textContent = total + ' login' + (total === 1 ? '' : 's');

  const el = document.getElementById('loginev-list');
  if (el) {
    if (!logs.length) {
      el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-4)">No login activity matches filters</div>';
    } else {
      el.innerHTML = logs.map(l => {
        const ip = cleanIp(l.ip);
        return '<div class="card" style="margin-bottom:6px;padding:12px 14px">' +
          '<div style="display:flex;align-items:flex-start;gap:10px">' +
            '<div style="flex:1;min-width:0">' +
              '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">' +
                '<span style="font-weight:600;font-size:12px">' + (l.email || '(no email)') + '</span>' +
                subjBadge(l.subject_type, l.role) +
              '</div>' +
              '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:10px;color:var(--ink-4)">' +
                (ip ? '<span title="IP address" style="font-family:monospace;cursor:pointer" onclick="navigator.clipboard.writeText(\'' + ip + '\');this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'' + ip + '\',1500)">' + ip + '</span>' : '') +
                '<span>\u00B7 ' + deviceLabel(l.user_agent) + '</span>' +
                (l.subject_id ? '<span>\u00B7 <span style="font-family:monospace;cursor:pointer" onclick="navigator.clipboard.writeText(\'' + l.subject_id + '\');this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'' + l.subject_id.slice(0,16) + ((l.subject_id||'').length>16?'...':'') + '\',1500)">' + l.subject_id.slice(0,16) + ((l.subject_id||'').length>16?'...':'') + '</span></span>' : '') +
              '</div>' +
              (l.user_agent ? '<div style="font-size:9px;color:var(--ink-4);margin-top:4px;word-break:break-all;opacity:.7">' + l.user_agent + '</div>' : '') +
            '</div>' +
            '<div style="flex-shrink:0;font-size:10px;color:var(--ink-4);white-space:nowrap;text-align:right">' + fDT(l.created_at) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  }

  const pager = document.getElementById('loginev-pager');
  if (pager) {
    const tp = Math.ceil(total / LOGINEV_PS);
    pager.innerHTML = tp > 1
      ? '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px"><button class="btn btn-secondary btn-sm" ' + (_loginEvPage === 0 ? 'disabled' : '') + ' onclick="loadLoginEvents(' + (_loginEvPage - 1) + ')">\u2190</button><span style="font-size:12px;color:var(--ink-3)">Page ' + (_loginEvPage + 1) + '/' + tp + '</span><button class="btn btn-secondary btn-sm" ' + (_loginEvPage >= tp - 1 ? 'disabled' : '') + ' onclick="loadLoginEvents(' + (_loginEvPage + 1) + ')">\u2192</button></div>'
      : '';
  }
}

async function exportLoginEventsCSV() {
  toast('Exporting...');
  try {
    let q = sb.from('login_events').select('*').order('created_at', { ascending: false }).limit(5000);
    if (STATE.companyId) q = q.eq('company_id', STATE.companyId);
    else { console.warn('exportLoginEventsCSV(): no STATE.companyId \u2014 scoping to no-company (zero rows).'); q = q.eq('company_id', _NO_COMPANY); }
    q = _loginEvApplyFilters(q);
    const { data } = await q;
    if (!data || !data.length) { toast('No login activity to export', 'error'); return; }
    const headers = ['Timestamp','Subject Type','Role','Subject ID','Email','IP','User Agent','Event Type','Auth ID'];
    const rows = data.map(r => [
      r.created_at ? fmtDateTime(r.created_at, COMPANY_DEFAULT_TZ) + ' ' + tzLabel(COMPANY_DEFAULT_TZ) : '',
      r.subject_type || '',
      r.role || '',
      r.subject_id || '',
      r.email || '',
      (r.ip || '').replace(/\/(32|128)$/, ''),
      (r.user_agent || '').replace(/"/g, '""'),
      r.event_type || '',
      r.auth_id || ''
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.map(c => '"' + c + '"').join(','))].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'login-activity-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported ' + data.length + ' records');
  } catch(e) { toast(e.message, 'error'); }
}

function adminPasswordGate(title, message) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:360px;padding:28px 24px 24px">
      <div style="display:flex;justify-content:center;margin-bottom:18px">
        <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:#FFF3E0">
          <div style="width:6px;height:6px;border-radius:50%;background:#E65100"></div>
          <span style="font-size:10px;font-weight:700;color:#E65100;letter-spacing:.5px;text-transform:uppercase">Protected Action</span>
        </div>
      </div>
      <div style="font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.4px;margin-bottom:4px">${title}</div>
      <div style="font-size:12px;color:var(--ink-4);line-height:1.5;margin-bottom:20px">${message}</div>
      <label style="font-size:10px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Admin Password</label>
      <div style="position:relative;margin-bottom:6px">
        <input id="pg-password" type="password" placeholder="Enter your password" autocomplete="current-password"
          style="width:100%;padding:10px 40px 10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s;background:var(--white)">
        <button id="pg-eye" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-4);padding:0;display:flex">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="pg-error" style="font-size:11px;color:#C62828;min-height:16px;margin-bottom:14px;display:flex;align-items:center;gap:4px"></div>
      <button id="pg-verify" type="button" class="btn btn-primary" style="width:100%;padding:11px;font-size:13px;font-weight:600;margin-bottom:8px">Verify Identity</button>
      <button id="pg-cancel" type="button" class="btn btn-secondary" style="width:100%;padding:9px;font-size:12px">Cancel</button>
    </div>`;

    function close(val) { overlay.remove(); resolve(val); }

    async function verifyPw() {
      const inp = overlay.querySelector('#pg-password');
      const err = overlay.querySelector('#pg-error');
      const btn = overlay.querySelector('#pg-verify');
      const pw = inp?.value?.trim();
      if (!pw) { if(err) err.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Enter your password'; return; }
      if (btn) { btn.disabled = true; btn.textContent = 'Verifying\u2026'; }
      if (err) err.innerHTML = '';
      try {
        // Use throwaway client so the main sb session is never replaced
        const _sbChk = window.supabase.createClient(
          SUPABASE_URL, SUPABASE_KEY,
          { auth: { persistSession: false, autoRefreshToken: false } }
        );
        const { error } = await _sbChk.auth.signInWithPassword({ email: STATE.staffEmail, password: pw });
        if (error) {
          if (err) err.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Incorrect password \u2014 try again';
          if (inp) { inp.style.borderColor = '#C62828'; inp.value = ''; inp.focus(); setTimeout(() => { if(inp) inp.style.borderColor = ''; }, 1500); }
          if (btn) { btn.disabled = false; btn.textContent = 'Verify Identity'; }
        } else {
          close(true);
        }
      } catch(e) {
        if (err) err.textContent = e.message;
        if (btn) { btn.disabled = false; btn.textContent = 'Verify Identity'; }
      }
    }

    overlay.querySelector('#pg-verify').addEventListener('click', verifyPw);
    overlay.querySelector('#pg-cancel').addEventListener('click', () => close(false));
    overlay.querySelector('#pg-password').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); verifyPw(); } });
    overlay.querySelector('#pg-eye').addEventListener('click', () => { const i = overlay.querySelector('#pg-password'); if(i) i.type = i.type === 'password' ? 'text' : 'password'; });
    overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
  overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) close(false); });
    document.body.appendChild(overlay);
    setTimeout(() => overlay.querySelector('#pg-password')?.focus(), 80);
  });
}

async function loadAuditLog(pg){
  if(pg!==undefined)_auditPage=pg;
  const from=_auditPage*APS;
  const af=_auditFilters.action;
  let q=sb.from('audit_log').select('*',{count:'exact'}).order('created_at',{ascending:false}).range(from,from+APS-1);
  if(STATE.companyId)q=q.eq('company_id',STATE.companyId);
  else{console.warn('loadAuditLog(): no STATE.companyId \u2014 scoping to no-company (zero rows).');q=q.eq('company_id',_NO_COMPANY);}
  if(af)q=q.eq('action',af);
  const{data,count}=await q;
  _auditData=data||[];
  _auditTotal=count||0;
  const ce=qs('audit-count');if(ce)ce.textContent=_auditTotal+' entries';
  renderAuditTable();
}

function renderAuditTable(){
  const el=qs('audit-results');if(!el)return;
  const qf=(_auditFilters.search||'').toLowerCase();
  let fl=_auditData;
  if(qf)fl=fl.filter(function(row){return [row.staff_name,row.summary,row.action,row.mail_id,row.client_name,row.staff_id,row.client_id,row.entity_id,row.plan_card_id].join(' ').toLowerCase().includes(qf);});
  const fD=function(d){try{return formatTorontoTime(d);}catch(e){return d;}};
  const ac=function(a){return a.includes('deleted')?'badge-red':a.includes('billed')?'badge-green':a.includes('released')?'badge-blue':'badge-amber';};
  const tp=Math.ceil(_auditTotal/APS);
  let h='<div class="table-wrap"><table class="data-table"><thead><tr><th>Time</th><th>Staff / Client</th><th>Action</th><th>Summary</th><th>IDs</th><th></th></tr></thead><tbody>';
  const cpId=function(id){return '<span style="font-family:monospace;cursor:pointer;font-size:10px;color:var(--blue)" onclick="event.stopPropagation();navigator.clipboard.writeText(\''+id+'\');this.style.color=\'var(--green)\';setTimeout(()=>this.style.color=\'var(--blue)\',600)" title="Click to copy">'+id+'</span>';};
  if(fl.length){fl.forEach(function(row){const actorName=row.staff_name||row.client_name||'\u2014';const actorId=row.staff_id||row.client_id||'';const ids=[];if(row.mail_id)ids.push('Mail: '+cpId(row.mail_id));if(row.plan_card_id)ids.push('PC: '+cpId(row.plan_card_id));if(row.entity_id)ids.push('ID: '+cpId(row.entity_id));if(row.client_id&&row.staff_id)ids.push('Client: '+cpId(row.client_id));h+='<tr style="cursor:pointer" onclick="showAuditSummary(this)" data-s="'+(encodeURIComponent(row.summary||''+(row.details?' | '+JSON.stringify(row.details):'')))+'" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'"><td style="white-space:nowrap;font-size:12px">'+fD(row.created_at)+'</td><td style="font-size:12px"><div style="font-weight:500">'+actorName+'</div>'+(actorId?'<div style="font-size:10px;color:var(--ink-4)">'+cpId(actorId)+'</div>':'')+'</td><td><span class="badge '+ac(row.action)+'">'+row.action.replace(/_/g,' ')+'</span></td><td style="font-size:12px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(row.summary||'\u2014')+'</td><td style="font-size:11px">'+(ids.length?ids.join('<br>'):'\u2014')+'</td><td>'+(row.details?'<button class="btn btn-sm btn-secondary" style="padding:2px 6px;font-size:10px" onclick=\'event.stopPropagation();showD('+JSON.stringify(JSON.stringify(row.details))+')\'>View</button>':'')+'</td></tr>';});}else{h+='<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--ink-4)">No entries</td></tr>';}
  h+='</tbody></table></div>';
  if(tp>1)h+='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px"><button class="btn btn-secondary btn-sm" '+(_auditPage===0?'disabled':'')+' onclick="loadAuditLog('+(_auditPage-1)+')">\u2190</button><span style="font-size:12px;color:var(--ink-3)">Page '+(_auditPage+1)+'/'+tp+'</span><button class="btn btn-secondary btn-sm" '+(_auditPage>=tp-1?'disabled':'')+' onclick="loadAuditLog('+(_auditPage+1)+')">\u2192</button></div>';
  el.innerHTML=h;
}

      '<div class="bcz-tcell"><span class="bcz-tdot '+tt+'">'+BIC[tt]+'</span><div class="bcz-tm"><div class="tt">'+(b.title||'')+'</div><div class="ts">'+(b.message||'')+'</div></div></div>'+
      '<div class="bcz-tgt" title="'+sl.t.replace(/"/g,'&quot;')+'">'+sl.ic+'<span>'+sl.t+'</span></div>'+

      '<div class="bcz-acts"><span class="bcz-sw" title="Active \u2014 click to archive" onclick="event.stopPropagation();archiveBroadcast(\''+b.broadcast_id+'\',this)"></span></div>'+

  };

  if (live.length) {
    html += '<div class="bcz-grp"><div class="bcz-gh live"><span class="bcz-gd"></span><h2>Live</h2><span class="bcz-cnt">'+live.length+'</span></div>'+
      '<div class="bcz-rows">'+colhdr+live.map(rowHTML).join('')+'</div></div>';

    html += '<div class="bcz-grp"><div class="bcz-gh sched"><span class="bcz-gd"></span><h2>Scheduled</h2><span class="bcz-cnt">'+sched.length+'</span></div>'+
      '<div class="bcz-rows">'+colhdr+sched.map(rowHTML).join('')+'</div></div>';
  }
  if (archived.length) {
    html += '<div class="bcz-grp"><div class="bcz-gh arch bcz-archhead" onclick="bcToggleArchived()">'+
        '<svg class="bcz-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>'+
        '<span class="bcz-gd"></span><h2>Archived</h2><span class="bcz-cnt">'+archived.length+'</span><span class="bcz-note">Bulk-select to delete permanently</span></div>'+
      '<div id="bc-archived-body" style="display:none">'+
      '<div class="bcz-bulk"><span class="sel" id="bc-sel-count">0 selected</span>'+
        '<button class="bcz-del" id="bc-del-btn" style="display:none" onclick="deleteSelectedBroadcasts()">'+BIC.trash+'Delete Selected</button></div>'+
      '<div class="bcz-rows arched">'+ archived.map(b => {
        const tt = ['info','warning','urgent','success'].includes(b.banner_type) ? b.banner_type : 'info';
        const sl = scopeLabel(b);
        const isExpired = b.expires_at && b.expires_at<=N && b.active;
        const tail = (b.expires_at?fD(b.expires_at):fD(b.starts_at)) || '';
        return '<div class="bcz-row arch">'+
          '<span class="bcz-cbx" data-id="'+b.broadcast_id+'" onclick="bcToggleSel(this)"></span>'+
          '<div class="bcz-tcell"><span class="bcz-tdot '+tt+'" style="width:30px;height:30px">'+BIC[tt]+'</span><div class="bcz-tm"><div class="tt">'+(b.title||'')+'</div></div></div>'+
          '<div class="bcz-tgt" title="'+sl.t.replace(/"/g,'&quot;')+'">'+sl.ic+'<span>'+sl.t+'</span></div>'+
          '<div class="bcz-dates"><span class="bcz-badge">'+(isExpired?'Expired':'Archived')+'</span> '+tail+'</div>'+
          '<div class="bcz-acts"><button class="bcz-react" onclick="reactivateBroadcast(\''+b.broadcast_id+'\')">'+BIC.react+'Reactivate</button></div>'+
        '</div>';
      }).join('') +'</div></div></div>';
  }

  html += '</div>'; // close .bcz-wrap
  if (typeof navIsStale === 'function' && navIsStale(navGen)) return;
  c.innerHTML = html;
}

// toggle archived-row checkbox selection + bulk-delete button state
function bcToggleSel(el) {
  el.classList.toggle('on');
  el.innerHTML = el.classList.contains('on')
    ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
    : '';
  const n = document.querySelectorAll('.bcz-cbx.on').length;
  const cnt = document.getElementById('bc-sel-count');
  const btn = document.getElementById('bc-del-btn');
  if (cnt) cnt.textContent = n + ' selected';
  if (btn) btn.style.display = n ? '' : 'none';
}

function bcToggleArchived() {
  const body = document.getElementById('bc-archived-body');
  const chev = document.querySelector('.bcz-archhead .bcz-chev');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  if (chev) chev.style.transform = open ? '' : 'rotate(90deg)';
}

async function archiveBroadcast(id, swEl) {
  // animate: flip the switch off, then collapse/fade the row, then persist + reload
  const row = swEl ? swEl.closest('.bcz-row') : null;
  if (swEl) swEl.classList.add('off');
  if (row) { row.style.transition = 'opacity .25s, transform .25s'; row.style.opacity = '0'; row.style.transform = 'translateX(8px)'; }
  await new Promise(r => setTimeout(r, 240));
  await sb.from('broadcasts').update({ active: false }).eq('broadcast_id', id).eq('company_id', STATE.companyId);
  toast('Broadcast archived');
  loadBroadcasts();
}

async function reactivateBroadcast(id) {
  // If the broadcast is expired (expires_at in the past), reactivating with
  // active:true alone would leave it expired and it would fall straight back
  // into Archived. Clear a past expiry so it returns to Live (manual expiry).
  const { data: row } = await cq('broadcasts').eq('broadcast_id', id).maybeSingle();
  const patch = { active: true };
  if (row && row.expires_at && row.expires_at <= new Date().toISOString()) {
    patch.expires_at = null;
  }
  await sb.from('broadcasts').update(patch).eq('broadcast_id', id).eq('company_id', STATE.companyId);
  toast(patch.expires_at === null ? 'Reactivated \u2014 expiry cleared' : 'Broadcast reactivated');
  loadBroadcasts();
}

async function deleteSelectedBroadcasts() {
  const ids = Array.from(document.querySelectorAll('.bcz-cbx.on')).map(cb => cb.dataset.id);
  if (!ids.length) return;
  const pinOk = await adminPasswordGate('Delete Broadcasts', 'Permanently delete ' + ids.length + ' broadcast' + (ids.length > 1 ? 's' : '') + '. This cannot be undone.');
  if (!pinOk) return;
  for (const id of ids) {
    await sb.from('broadcasts').delete().eq('broadcast_id', id).eq('company_id', STATE.companyId);
  }
  toast(ids.length + ' broadcast' + (ids.length > 1 ? 's' : '') + ' deleted');
  loadBroadcasts();
}

async function editBroadcast(id) {
  let b = { title:'', message:'', banner_type:'info', target_scope:'all', target_value:null, starts_at: toLocalDatetime(new Date().toISOString()), expires_at:'', active:true };
  if (id) {
    const { data } = await cq('broadcasts').eq('broadcast_id', id).maybeSingle();
    if (data) {
      b = data;
      b.starts_at = b.starts_at ? toLocalDatetime(b.starts_at) : '';
      b.expires_at = b.expires_at ? toLocalDatetime(b.expires_at) : '';
    }
  }
  const isNew = !id;

  const { data: locs } = await sb.from('locations').select('location_id, name').eq('active', true).eq('company_id', STATE.companyId);
  // Include ARCHIVED plans too: archiving a product only stops NEW signups — existing
  // clients keep their plan_card with that plan_name, and the adapter matches broadcasts by
  // the client's plan_card.plan_name. So an archived plan can still have live recipients and
  // must remain targetable. (We tag archived ones in the dropdown so they're recognizable.)
  const { data: plans } = await sb.from('plans').select('plan_name, locations, archived').eq('company_id', STATE.companyId).order('plan_name');
  // Build location_id -> { name -> archived }. plans.locations is a comma-separated text list
  // (a plan can serve multiple locations). By convention (editPlan: "none selected = global"),
  // an EMPTY locations field means GLOBAL and applies to ALL of the company's locations.
  const allLocIds = (locs || []).map(l => l.location_id);
  const plansByLoc = {};
  (plans || []).forEach(p => {
    const planLocs = (p.locations || '').split(',').map(s => s.trim()).filter(Boolean);
    const targets = planLocs.length ? planLocs : allLocIds; // empty = global = all locations
    targets.forEach(lid => {
      if (!plansByLoc[lid]) plansByLoc[lid] = {};
      // if a plan name appears as both active and archived across rows, prefer active (false)
      if (!(p.plan_name in plansByLoc[lid]) || !p.archived) plansByLoc[lid][p.plan_name] = !!p.archived;
    });

  // pre-split target for edit
  let preLoc = '', prePlan = '';
  if (b.target_scope==='location_plan') { const p=(b.target_value||'').split('|'); preLoc=p[0]||''; prePlan=p[1]||''; }
  else if (b.target_scope==='location' || b.target_scope==='staff_location') { preLoc = b.target_value || ''; }

  const uiScope = (b.target_scope==='location_plan') ? 'location' : b.target_scope;

  window._bcLocs = locs || [];
  window._bcPlansByLoc = plansByLoc;
  window._bcPre = { loc: preLoc, plan: prePlan };

  const types = ['info','warning','urgent','success'];
  const typeIc = {
    info:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
    warning:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
    urgent:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
    success:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
  };
  const typeDismiss = { info:true, success:true, warning:false, urgent:false };
  const typeGrid = types.map(t => {
    const canDismiss = typeDismiss[t];
    const sub = canDismiss ? 'Dismissible' : 'Stays visible';
    return '<div class="bcz-type-opt '+t+(b.banner_type===t?' sel':'')+'" data-type="'+t+'" onclick="bcPickType(this)">'+
      '<span class="ic">'+typeIc[t]+'</span><span class="lbl">'+t[0].toUpperCase()+t.slice(1)+'</span>'+
      '<span class="dm '+(canDismiss?'yes':'no')+'">'+sub+'</span></div>';
  }).join('');
  const plusIc = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
  const editIc = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>';
  const sendIc = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>';
  const esc = s => (s||'').replace(/"/g,'&quot;');
  const qd = [[30,'30m'],[60,'1h'],[240,'4h'],[480,'8h'],[1440,'24h'],[10080,'7d']];

  const modal = document.createElement('div'); modal.className = 'modal-overlay';
  modal.innerHTML = '<div class="modal">'+
    '<div class="modal-title" style="display:flex;align-items:center;gap:9px"><span style="width:26px;height:26px;border-radius:7px;background:var(--bg-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center">'+(isNew?plusIc:editIc)+'</span>'+(isNew?'New Broadcast':'Edit Broadcast')+'</div>'+
    '<div style="font-size:12px;color:var(--ink-3);margin-bottom:18px">Post a banner shown to clients or staff across your locations.</div>'+
    '<div class="form-group"><label class="form-label">Title</label><input class="form-input" id="bc-title" value="'+esc(b.title)+'" placeholder="e.g. Office Closed for Renovation"></div>'+
    '<div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="bc-msg" rows="3" style="resize:vertical" placeholder="Add the full details\u2026">'+(b.message||'')+'</textarea></div>'+
    '<div class="form-group"><label class="form-label">Banner Type</label><div class="bcz-type-grid" id="bc-typegrid">'+typeGrid+'</div>'+
      '<div class="bcz-typehint">Info & Success banners can be dismissed by the recipient. Warning & Urgent stay visible until they expire or are archived.</div></div>'+
    '<div class="form-group"><label class="form-label">Audience</label>'+
      '<select class="form-input" id="bc-scope" onchange="bcOnScopeChange()">'+
        '<optgroup label="Clients">'+
          '<option value="all"'+(uiScope==='all'?' selected':'')+'>All Clients</option>'+
          '<option value="location"'+(uiScope==='location'?' selected':'')+'>Clients at Location</option>'+
        '</optgroup>'+
        '<optgroup label="Staff">'+
          '<option value="staff_all"'+(uiScope==='staff_all'?' selected':'')+'>All Staff</option>'+
          '<option value="staff_location"'+(uiScope==='staff_location'?' selected':'')+'>Staff at Location</option>'+
        '</optgroup>'+
      '</select></div>'+
    '<div id="bc-picker-wrap"></div>'+
    '<div class="form-row">'+
      '<div class="form-group"><label class="form-label">Starts At ('+tzLabel(COMPANY_DEFAULT_TZ)+')</label><input class="form-input" id="bc-start" type="datetime-local" value="'+(b.starts_at||'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Expires At ('+tzLabel(COMPANY_DEFAULT_TZ)+', empty = manual)</label><input class="form-input" id="bc-end" type="datetime-local" value="'+(b.expires_at||'')+'"></div>'+
    '</div>'+
    '<div class="bcz-qd"><span class="lbl">Quick duration</span>'+ qd.map(q=>'<button class="bcz-chip" onclick="setBcDuration('+q[0]+',this)">'+q[1]+'</button>').join('') +'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'+
      '<button class="btn btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'+
      '<button class="btn btn-primary" style="white-space:nowrap" onclick="saveBroadcast(\''+(id||'')+'\')">'+sendIc+(isNew?'Publish':'Save')+'</button>'+
    '</div>'+
  '</div>';
  modal.addEventListener('mousedown',e=>{modal._downSelf=(e.target===modal);});
  modal.addEventListener('click',e=>{if(e.target===modal&&modal._downSelf)modal.remove();});
  document.querySelector('.modal-overlay')?.remove();
  document.body.appendChild(modal);
  bcRenderPicker();

// Two-step target picker: scope -> (location) -> optional plan-within-location.
function bcRenderPicker() {
  const scope = qs('bc-scope').value;
  const wrap = document.getElementById('bc-picker-wrap');
  const pre = window._bcPre || { loc:'', plan:'' };
  const locs = window._bcLocs || [];
  const plansByLoc = window._bcPlansByLoc || {};
  const pinIc = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
  const planIc = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20.6 8.4 12 4 3.4 8.4 12 12.8z"/><path d="M3.4 8.4V15L12 19.4 20.6 15V8.4"/></svg>';
  const iIc = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>';

  if (scope==='all' || scope==='staff_all') { wrap.innerHTML=''; return; }

  const locOpts = '<option value="">\u2014 Select location \u2014</option>' + locs.map(l=>'<option value="'+l.location_id+'"'+(pre.loc===l.location_id?' selected':'')+'>'+l.name+'</option>').join('');
  let html = '<div class="bcz-picker">'+
    '<div class="form-group"><label class="form-label bcz-plab">'+pinIc+'Which location?</label>'+
      '<select class="form-input" id="bc-loc" onchange="bcOnLocChange()">'+locOpts+'</select></div>';

  if (scope==='location' && pre.loc) {
    // plans serving the selected location (incl. archived — clients may still hold them).
    // map is { planName: isArchived }
    const locPlanMap = plansByLoc[pre.loc] || {};
    // make sure a previously-saved plan that's no longer offered here still shows (selected)
    if (pre.plan && !(pre.plan in locPlanMap)) locPlanMap[pre.plan] = false;
    const planNames = Object.keys(locPlanMap).sort();
    if (planNames.length) {
      const planOpts = '<option value="">All plans at this location</option>' + planNames.map(p=>{
        const tag = locPlanMap[p] ? ' (archived)' : '';
        return '<option value="'+p.replace(/"/g,'&quot;')+'"'+(pre.plan===p?' selected':'')+'>'+p+tag+'</option>';
      }).join('');
      html += '<div class="form-group"><label class="form-label bcz-plab">'+planIc+'Narrow to a plan?<span class="bcz-opt-tag">optional</span></label>'+
        '<select class="form-input" id="bc-plan">'+planOpts+'</select></div>'+
        '<div class="bcz-phint">'+iIc+'<span>Clients are matched by their plan cards \u2014 anyone with a plan card at this location will see it, even if they also have mailboxes elsewhere. Archived plans are still listed since existing clients may remain on them.</span></div>';
    } else {
      html += '<div class="bcz-phint">'+iIc+'<span>No plans are assigned to this location yet \u2014 the broadcast will reach all clients at this location.</span></div>';
    }
  } else if (scope==='location') {
    html += '<div class="bcz-phint">'+iIc+'<span>Pick a location first. You can then optionally narrow to a single plan within it.</span></div>';
  } else if (scope==='staff_location') {
    html += '<div class="bcz-phint">'+iIc+'<span>Only staff assigned to this location will see the banner.</span></div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function bcOnLocChange() {
  window._bcPre = { loc: qs('bc-loc').value, plan:'' };
  bcRenderPicker();
}

function setBcDuration(mins, el) {

  qs('bc-end').value = toLocalDatetime(end.toISOString());

}

async function saveBroadcast(id) {
  if (_noCompanyAbort('saveBroadcast', true)) return;
  const uiScope = qs('bc-scope').value;
  const title = qs('bc-title').value.trim();
  const message = qs('bc-msg').value.trim();
  if (!title) { toast('Title is required','error'); return; }
  if (!message) { toast('Message is required','error'); return; }
  const typeEl = document.querySelector('#bc-typegrid .bcz-type-opt.sel');
  const banner_type = typeEl ? typeEl.dataset.type : 'info';

  // resolve scope + value from the two-step picker
  let target_scope = uiScope, target_value = null;
  if (uiScope==='location') {
    const loc = qs('bc-loc') ? qs('bc-loc').value : '';
    const plan = qs('bc-plan') ? qs('bc-plan').value : '';
    if (!loc) { toast('Select a location','error'); return; }
    if (plan) { target_scope='location_plan'; target_value = loc+'|'+plan; }
    else { target_scope='location'; target_value = loc; }
  } else if (uiScope==='staff_location') {
    const loc = qs('bc-loc') ? qs('bc-loc').value : '';
    if (!loc) { toast('Select a location','error'); return; }
    target_value = loc;
  }

  const data = {
    title, message, banner_type, target_scope, target_value,
    starts_at: qs('bc-start').value ? localToUTC(qs('bc-start').value) : new Date().toISOString(),
    expires_at: qs('bc-end').value ? localToUTC(qs('bc-end').value) : null,
    active: true
  };

  let error;
  if (id) {
    ({ error } = await sb.from('broadcasts').update(data).eq('broadcast_id', id).eq('company_id', STATE.companyId));
  } else {
    data.created_by = STATE.uuid;
    data.company_id = STATE.companyId;
    ({ error } = await sb.from('broadcasts').insert(data));
  }
  if (error) { toast(error.message,'error'); return; }
  document.querySelector('.modal-overlay')?.remove();
  toast(id ? 'Broadcast updated' : 'Broadcast published'); loadBroadcasts();
  // Notify staff about the broadcast. Recipients are driven by the broadcast's
  // AUDIENCE (target_scope/target_value), not the admin's own location, and are
  // company-scoped. Runs on both create and edit (re-notify with the post-edit
  // scope). Client scopes ('all'/'location') notify no staff.
  let _bcStaff = null;
  if (data.target_scope === 'staff_all') {
    // company-wide: every active staffer at every location
    ({ data: _bcStaff } = await sb.from('staff').select('staff_id')
      .eq('company_id', STATE.companyId).eq('active', true).eq('role', 'staff'));
  } else if (data.target_scope === 'staff_location' && data.target_value) {
    // only the targeted location's active staff (still company-scoped)
    ({ data: _bcStaff } = await sb.from('staff').select('staff_id')
      .eq('company_id', STATE.companyId).eq('default_location_id', data.target_value)
      .eq('active', true).eq('role', 'staff'));
  }
  if (_bcStaff) {
    const _bcTitle = id ? 'Broadcast updated' : 'New broadcast from office';
    for (const s of _bcStaff) {
      await _adminNotify('staff', s.staff_id, 'broadcast', _bcTitle, data.title, null, null);
    }
  }
}
// \u2550\u2550\u2550 ID VERIFY (ADMIN) \u2550\u2550\u2550
let _adminIdTab = 'verify';

async function loadAdminIdVerify() {
  var navGen = window._navGen;

  try {

      apiPost({ action: 'getPendingVerifications', uuid: STATE.uuid }),

    ]);

    const pending = verResult.pending || [];
    const history = verResult.history || [];
    const notSubmitted = (setupResult.setups || []).filter(s => s.idStatus === 'not_submitted');

function filterAdminIdTab() { renderAdminIdTab(); }

function renderAdminIdTab() {
  const content = qs('admin-id-content');
  if (!content || !STATE._adminIdData) return;
  const { pending, history, uniqueNotSubmitted } = STATE._adminIdData;
  const search = (qs('admin-id-search')?.value || '').toLowerCase();

  // Update active tab styling
  document.querySelectorAll('#admin-id-tabs .nav-tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0&&_adminIdTab==='verify') || (i===1&&_adminIdTab==='notsub') || (i===2&&_adminIdTab==='history'));
  });

  const fDT = d => d ? formatTorontoTime(d) : '\u2014';
  const fD = d => d ? formatTorontoTime(d) : '\u2014';
  const typeLabel = t => t==='drivers_license'?"Driver's License":t==='passport'?'Passport':t==='national_id'?'National ID':t==='pr_card'?'PR Card':t||'\u2014';
  function idCard(c, showActions) { return _idvBuildCard(c, showActions, fD, typeLabel); }

  if (_adminIdTab === 'verify') {
    let items = pending;
    if (search) items = items.filter(c => (c.name||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search) || (c.clientId||'').toLowerCase().includes(search));
    if (!items.length) { content.innerHTML = search ? _noMatchSlate('No matching clients', 'No clients match your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>','All caught up','No client IDs are waiting for review.'); return; }
    content.innerHTML = items.map(c => idCard(c, true)).join('');

  } else if (_adminIdTab === 'notsub') {
    let items = uniqueNotSubmitted;
    if (search) items = items.filter(c => (c.name||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search) || (c.clientId||'').toLowerCase().includes(search));
    if (!items.length) { content.innerHTML = search ? _noMatchSlate('No matching clients', 'No clients match your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>','All clients submitted','Every client at your locations has uploaded their ID.'); return; }
    content.innerHTML = items.map(c => idCard(c, false)).join('');

  } else if (_adminIdTab === 'history') {
    let items = history;
    if (search) items = items.filter(c => (c.name||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search) || (c.clientId||'').toLowerCase().includes(search) || (c.reviewedBy||'').toLowerCase().includes(search) || (c.reviewedByName||'').toLowerCase().includes(search));
    if (!items.length) { content.innerHTML = search ? _noMatchSlate('No matching history', 'No verification history matches your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="12 8 12 12 14 13"></polyline></svg>','No verification history','Reviewed IDs will be listed here.'); return; }
    content.innerHTML = items.map(c => idCard(c, false)).join('');
  }
}

async function adminReviewId(clientId, decision, idType) {
  try {
    const result = await apiPost({ action: 'reviewIdVerification', uuid: STATE.uuid, clientId, decision, idType });
    if (result.status === 'ok') { toast('ID ' + decision); loadAdminIdVerify(); loadAdminIdVerifyBadge(); }
    else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

async function adminRejectId(clientId, idType) {
  const reason = await appPromptModal('Reject ID', 'Reason for rejection:', 'e.g. Photo too blurry, name mismatch', true);
  if (!reason) return;
  try {
    const result = await apiPost({ action: 'reviewIdVerification', uuid: STATE.uuid, clientId, decision: 'rejected', reason, idType });
    if (result.status === 'ok') { toast('ID rejected'); loadAdminIdVerify(); loadAdminIdVerifyBadge(); }
    else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

// ═══ NOTIFICATIONS (ADMIN) ═══
let _adminNotifLastCount = -1;

async function loadAdminNotifCount() {
  try {
    const result = await apiPost({ action: 'getUnreadCount', recipientType: 'admin', recipientId: STATE.uuid });
    const count = result.count || 0;
    const badge = qs('nav-notif-badge');
    if (badge) { badge.textContent = count; badge.style.display = count > 0 ? '' : 'none'; }
    if (_adminNotifLastCount >= 0 && count > _adminNotifLastCount) {
      toast('' + (count - _adminNotifLastCount) + ' new notification' + (count - _adminNotifLastCount > 1 ? 's' : ''));
    }
    _adminNotifLastCount = count;
  } catch(e) {}
}

async function loadAdminNotifications() {
  var navGen = window._navGen;
  const c = qs('admin-content');
  c.innerHTML = _pageLoader();
  try {

async function handleAdminNotifClick(notifId, action, linkId) {
  await apiPost({ action: 'markNotificationRead', notificationId: notifId });
  loadAdminNotifCount();
  if (action === 'idverify') switchSection('idverify');
  else if (action === 'tasks') {
    // Relax the task filter BEFORE the section loads so the target task is
    // present on first render even if filtered out of the default view.
    if (linkId) _adminTaskFilter = 'all';
    // Switch to the Tasks section first so it's visible AND its nav item is
    // marked active (switchSection sets STATE.section, toggles .nav-item active,
    // kicks loadAdminTasks, and replaces the Notifications view).
    switchSection('tasks');
    if (linkId) {
      // Deterministically wait for the target card to render (after the async
      // load inside switchSection completes), then open + scroll it.
      // adminViewTask still self-heals (filter='all') if needed, and
      // _adminRenderOpenBody scrolls it into view.
      _waitForAdminTaskCard(linkId, () => adminViewTask(linkId));
    }
  }
  else if (action === 'plancards' || action === 'payment') { STATE.section='plancards'; document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); document.querySelector('.nav-item[onclick*="plancards"]')?.classList.add('active'); await loadAdminPlanCards(); if (linkId) { const s = document.getElementById('apc-search'); if (s) { s.value = linkId; filterAdminPlanCards(); } } }
  else if (action === 'reports') {
    await switchSection('reports');
    if (linkId) setTimeout(async () => {
      // Ensure data is loaded before opening detail
      if (!window._reportsData || !window._reportsData.find(r => r.report_id === linkId)) {
        await loadAdminReports();
      }
      openAdminReportDetail(linkId);
    }, 400);
  }
  else loadAdminNotifications();
}

      ? _atlCopyChipNamed(_resolverName, task.resolved_by, 'user ID')
      : '\u2014';
    resolvedHtml = '<div style="padding:12px 14px;background:var(--green-bg);border-radius:13px;font-size:13px;color:var(--green);margin-bottom:4px">'
      + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:5px"><polyline points="20 6 9 17 4 12"/></svg>'
      + 'Resolved by ' + _resolverChip + (task.resolved_at ? ' \u00b7 ' + formatTorontoTime(task.resolved_at) : '')
      + '<br><span style="color:var(--ink-3);font-weight:500">' + task.resolution_note.replace(/^\[PROCESSED\] /,'').replace(/^\[KEPT_PLAN\] /,'') + '</span></div>';
  }

  // ── Checklist ──
  let checklistHtml = '';
  if (task.checklist && task.checklist.length) {
    checklistHtml = '<div style="margin:14px 0;border:1px solid var(--border);border-radius:13px;overflow:hidden">'
      + '<div style="padding:10px 14px;background:var(--bg);font-size:11px;font-weight:700;color:var(--ink-3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em">'
      + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Checklist</div>'
      + task.checklist.map(function(item, i){
          return '<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:' + (isResolved ? 'default' : 'pointer') + '">'
            + '<input type="checkbox" data-idx="' + i + '" ' + (item.checked ? 'checked' : '') + ' ' + (isResolved ? 'disabled' : 'onchange="adminToggleChecklistItem(\'' + taskId + '\',' + i + ',this.checked)"') + ' style="width:16px;height:16px;accent-color:var(--red);margin-top:1px;flex-shrink:0">'
            + '<span style="font-size:13px;color:var(--ink-2);line-height:1.4;' + (item.checked ? 'text-decoration:line-through;opacity:.5' : '') + '">' + item.label + '</span>'
            + '</label>';
        }).join('')
      + '</div>';
  }

  // ── Actions (all admin-only features preserved, no permission gates) ──
  const esc = "'" + taskId + "'";
  let actionRows = [];

  if (task.type === 'payment_failed' && !isResolved) {
    actionRows.push('<div class="atl-info-banner atl-ib-amber"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg><span>This task auto-resolves when the payment succeeds.</span></div>');
  }
  if (task.type === 'id_verification' && !isResolved) {
    actionRows.push('<div class="atl-info-banner atl-ib-amber"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Resolve this by approving or rejecting the ID in the ID Verify screen.</span></div>');
  }

  let btns = '';
  // Claim (unassigned, not resolved)
  if (!isResolved && !task.assigned_to) {
    btns += '<button class="btn btn-sm" style="background:var(--blue-bg);color:var(--blue);border-color:var(--blue)" onclick="adminClaimTask(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Claim Task</button>';
  }
  // Open ID Verify (id_verification, not resolved) — green, focuses the client
  if (task.type === 'id_verification' && !isResolved && task.client_id) {
    const _cnIdvA = (clientName || '').replace(/'/g, "\\'");
    btns += '<button class="btn btn-sm" style="background:var(--green);color:#fff;border:none" onclick="openAdminIdVerifyForClient(\'' + _cnIdvA + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Open ID Verify Tab \u2192</button>';
  }
  // Cancellation resolve (claimed by me)
  if (task.type === 'cancellation_request' && !isResolved && task.assigned_to === STATE.uuid) {
    btns += '<button class="btn btn-sm btn-danger" onclick="adminResolveCancellation(' + esc + ',\'processed\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Cancellation Processed</button>'
      + '<button class="btn btn-sm" style="background:var(--green);color:#fff;border:none" onclick="adminResolveCancellation(' + esc + ',\'kept_plan\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg> Client Kept Plan</button>';
  }
  if (task.type === 'cancellation_request' && !isResolved && task.assigned_to && task.assigned_to !== STATE.uuid) {
    actionRows.push('<div style="font-size:12px;color:var(--ink-4);padding:2px 0">Assigned to ' + (staffMap[task.assigned_to] || task.assigned_to) + ' \u2014 claim to take action.</div>');
  }
  // Reverse cancellation (resolved + processed)
  if (task.type === 'cancellation_request' && isResolved && task.resolution_note && task.resolution_note.startsWith('[PROCESSED]')) {
    btns += '<button class="btn btn-sm" style="background:#FFF3E0;color:#E65100;border-color:#FFE0B2" onclick="adminReverseCancellation(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Reverse Cancellation</button>';
  }
  // Snoozed controls
  if (isSnoozed) {
    btns += '<button class="btn btn-sm" style="background:#E8EAF6;color:#3949AB;border-color:#C5CAE9" onclick="adminUnsnooze(' + esc + ')">Wake Now</button>';
    if (task.type !== 'cancellation_request' && task.type !== 'id_verification' && task.type !== 'payment_failed') {
      btns += '<button class="btn btn-sm" style="background:var(--green-bg);color:#2E7D4F;border-color:#C8E6C9" onclick="adminResolveTask(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Resolve</button>';
    }
  }
  // Stop recurring
  if (task.type === 'recurring' && task.recurring_config && task.recurring_config.active !== false) {
    btns += '<button class="btn btn-sm" style="background:#FFF3E0;color:#E65100;border-color:#FFE0B2" onclick="adminStopRecurring(' + esc + ')">Stop Recurring</button>';
  }
  // Payment termination
  if (task.type === 'payment_failed' && !isResolved && task.client_id) {
    btns += '<button class="btn btn-sm" style="background:#7B1C1C;border-color:#7B1C1C;color:#fff" onclick="openPaymentTerminationModal(\'' + clId + '\',' + esc + ')" title="Cancel this subscription due to non-payment">Cancel Subscription</button>';
  }
  // Mark Done — assigned to me, open, non-snoozed, manually-resolved types (others resolve via their own path)
  if (!isResolved && !isSnoozed && task.assigned_to === STATE.uuid && task.type !== 'payment_failed' && task.type !== 'id_verification' && task.type !== 'cancellation_request') {
    btns += '<button class="btn btn-sm" style="background:var(--green-bg);color:#2E7D4F;border-color:#C8E6C9" onclick="adminResolveTask(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mark Done</button>';
    btns += '<button class="btn btn-secondary btn-sm" onclick="adminSnoozePrompt(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 16 14"/></svg> Snooze</button>';
  }
  // Edit + Delete — trailing pair, side by side
  if (!isResolved && task.type !== 'cancellation_request') {
    btns += '<button class="btn btn-secondary btn-sm" onclick="adminEditTask(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg> Edit</button>';
  }
  btns += '<button class="btn btn-sm" style="background:#FFEBEE;color:#C62828;border-color:#FFCDD2" onclick="adminDeleteTask(' + esc + ')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Delete</button>';

  let actionsHtml = '';
  if (actionRows.length) actionsHtml += actionRows.join('');
  // Resolution-note field — shown on the manual-resolve path (same gate as Mark Done)
  // so admins can capture a note before resolving. adminResolveTask reads it if present.
  if (!isResolved && !isSnoozed && task.assigned_to === STATE.uuid && task.type !== 'payment_failed' && task.type !== 'id_verification' && task.type !== 'cancellation_request') {
    actionsHtml += '<div style="margin-bottom:10px">'
      + '<div style="font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Resolve task</div>'
      + '<textarea id="admin-resolve-note" placeholder="Add a resolution note (optional)\u2026" style="width:100%;padding:13px 15px;border:1px solid var(--border);border-radius:12px;background:var(--white);color:var(--ink);font-size:13px;font-weight:500;resize:vertical;min-height:72px;font-family:inherit;line-height:1.5;transition:all .2s;box-sizing:border-box" onfocus="this.style.borderColor=\'var(--red-border)\';this.style.boxShadow=\'0 0 0 4px var(--red-dim)\'" onblur="this.style.borderColor=\'var(--border)\';this.style.boxShadow=\'\'"></textarea>'
      + '</div>';
  }
  actionsHtml += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' + btns + '</div>';

  // ── Comments composer ──
  const composer = !isResolved
    ? '<div style="display:flex;gap:6px;margin-top:10px"><input class="form-input" id="admin-tc-input" placeholder="Add a comment\u2026" style="flex:1;font-size:12px;padding:9px 12px;border-radius:10px" onkeydown="if(event.key===\'Enter\')adminAddComment(' + esc + ')"><button class="btn btn-primary btn-sm" style="padding:8px 16px;border-radius:10px" onclick="adminAddComment(' + esc + ')">Send</button></div>'
    : '<div style="font-size:11px;color:var(--ink-4);padding:6px 0;font-style:italic">Task completed \u2014 comments closed.</div>';

  return '<div>'
    + (descHtml || '')
    + detailGrid
    + (resolvedHtml || '')
    + (checklistHtml || '')
    + '<div class="atl-section-label">Actions</div>'
    + actionsHtml
    + '<div class="atl-section-label">Comments &amp; Notes</div>'
    + '<div id="admin-task-comments"><div style="font-size:12px;color:var(--ink-4)">Loading\u2026</div></div>'
    + composer
    + '<div class="atl-section-label">Activity Trail</div>'
    + '<div id="admin-task-trail"><div style="font-size:12px;color:var(--ink-4)">Loading\u2026</div></div>'
    + '</div>';
}

async function adminToggleChecklistItem(taskId, idx, checked) {
  try {
    const { data: task } = await sb.from('tasks').select('checklist').eq('task_id', taskId).maybeSingle();
    const list = task?.checklist || [];
    if (!list[idx]) return;
    list[idx].checked = checked;
    await sb.from('tasks').update({ checklist: list }).eq('task_id', taskId).eq('company_id', STATE.companyId);
  } catch(e) { toast(e.message, 'error'); }
}

async function adminLoadTaskComments(taskId) {
  const el = qs('admin-task-comments');
  if (!el) return;
  try {
    const { data: comments } = await sb.from('task_comments').select('*').eq('task_id', taskId).order('created_at');
    if (qs('admin-task-comments') !== el) return;
    const fDT = d => d ? formatTorontoTime(d) : '\u2014';
    el.innerHTML = (comments||[]).map(c => '<div style="padding:11px 0;border-bottom:1px solid var(--border)">'
      + '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
      + '<span style="font-size:12.5px;font-weight:600;color:var(--ink-2)">' + (c.staff_name || _adminStaffMap[c.staff_id] || c.staff_id) + '</span>'
      + '<span style="font-size:10px;color:var(--ink-4)">' + fDT(c.created_at) + '</span></div>'
      + '<div style="font-size:13px;color:var(--ink-3);line-height:1.5">' + c.content + '</div></div>').join('')
      || '<div style="font-size:12.5px;color:var(--ink-4);padding:8px 0">No comments yet</div>';
  } catch(e) { el.innerHTML = '<div style="font-size:12px;color:var(--required)">Error loading comments</div>'; }
}

// Waits (via requestAnimationFrame) until the tasks timeline shell has rendered
// (either the target card exists, or the chips/feed shell is present meaning the
// async load finished), then runs cb. Replaces fragile fixed setTimeouts when
// opening a task from a notification.
function _waitForAdminTaskCard(taskId, cb, attempt) {
  attempt = attempt || 0;
  if (document.querySelector('[data-atl-taskid="' + taskId + '"]')
      || document.getElementById('admin-task-chips')) { cb(); return; }
  if (attempt >= 90) { cb(); return; } // ~1.5s budget
  requestAnimationFrame(function(){ _waitForAdminTaskCard(taskId, cb, attempt + 1); });
}

// Thin wrapper so existing deep-links (?link=tasks) still open the task.
function adminViewTask(taskId) {
  if (_adminOpenTaskId === taskId) return;
  if (!document.querySelector('[data-atl-taskid="' + taskId + '"]')) {
    // ensure the task is visible: switch to "all" then open
    _adminTaskFilter = 'all';
    renderAdminTasksTimeline();
  }
  // Deterministically wait for the card (the re-render is synchronous, but this
  // also covers the case where it's still being painted) then open + scroll.
  _waitForAdminTaskCardThenSelect(taskId);
}

// Polls for the specific task card, then opens it. Replaces a fixed 60ms guess.
function _waitForAdminTaskCardThenSelect(taskId, attempt) {
  attempt = attempt || 0;
  if (document.querySelector('[data-atl-taskid="' + taskId + '"]')) { adminSelectTask(taskId); return; }
  if (attempt >= 60) return; // ~1s budget; task genuinely absent
  requestAnimationFrame(function(){ _waitForAdminTaskCardThenSelect(taskId, attempt + 1); });
}

async function loadAdminTaskTrail(taskId) {
  const el = qs('admin-task-trail');
  if (!el) return;
  try {
    const { data } = await sb.from('audit_log').select('action, staff_name, staff_id, summary, details, created_at')
      .eq('entity_id', taskId).order('created_at', { ascending: true });
    if (!data || !data.length) { el.innerHTML = '<div style="font-size:11px;color:var(--ink-4)">No activity recorded yet.</div>'; return; }
    const fDT = d => d ? formatTorontoTime(d) : '\u2014';
    const actionLabel = a => a.replace(/^task_/, '').replace(/_/g, ' ').replace(/^./, c => c.toUpperCase());
    const actionColor = a => a.includes('resolved') ? 'var(--green)' : a.includes('created') ? '#1565C0' : a.includes('snoozed') ? '#3949AB' : a.includes('deleted') ? 'var(--red)' : 'var(--ink-3)';
    const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const FIELD_LABEL = { assignee:'Assignee', location:'Location', priority:'Priority', due:'Due date', mail:'Mail link', planCard:'Plan card' };
    // A name with an optional small click-to-copy ID icon (only when an ID exists).
    const nameWithCopy = (name, id, blank) => {
      const shown = name || id || blank;
      if (!id) return '<span>'+esc(shown)+'</span>';
      return '<span>'+esc(shown)+'</span><span onclick="_auditCopyId(this,\''+esc(id)+'\')" title="Copy '+esc(id)+'" style="cursor:pointer;color:var(--ink-4);margin-left:3px;vertical-align:middle;display:inline-flex" onmouseover="this.style.color=\'var(--theme)\'" onmouseout="this.style.color=\'var(--ink-4)\'"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>';
    };
    const renderDetails = (det) => {
      const changes = det && Array.isArray(det.changes) ? det.changes : null;
      if (!changes || !changes.length) return null;
      return '<div style="margin-top:3px;display:flex;flex-direction:column;gap:2px">' + changes.map(c => {
        const lbl = FIELD_LABEL[c.field] || c.field;
        const isId = (c.field==='assignee'||c.field==='location'||c.field==='mail'||c.field==='planCard');
        const blankFrom = c.field==='assignee' ? 'unassigned' : 'none';
        const fromHtml = isId ? nameWithCopy(c.fromName, c.fromId, blankFrom) : '<span>'+esc(c.fromName||'none')+'</span>';
        const toHtml   = isId ? nameWithCopy(c.toName, c.toId, blankFrom) : '<span>'+esc(c.toName||'none')+'</span>';
        return '<div style="font-size:10px;color:var(--ink-4);display:flex;flex-wrap:wrap;align-items:center;gap:4px"><span style="font-weight:600;color:var(--ink-3)">'+esc(lbl)+'</span>'+fromHtml+'<span style="color:var(--ink-4)">\u2192</span>'+toHtml+'</div>';
      }).join('') + '</div>';
    };
    el.innerHTML = data.map(r => {
      const detHtml = renderDetails(r.details);
      const body = detHtml || (r.summary ? '<div style="color:var(--ink-4);margin-top:1px;font-size:10px">'+esc(r.summary)+'</div>' : '');
      return '<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:flex-start"><div style="color:var(--ink-4);white-space:nowrap;min-width:110px">'+fDT(r.created_at)+'</div><div style="flex:1"><span style="font-weight:600;color:'+actionColor(r.action)+'">'+actionLabel(r.action)+'</span> <span style="color:var(--ink-4)">by '+esc(r.staff_name||r.staff_id||'System')+'</span>'+body+'</div></div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div style="font-size:11px;color:var(--required)">Error loading trail</div>'; }
}

function _auditCopyId(elm, id) {
  try { navigator.clipboard.writeText(id); } catch(e) {}
  if (typeof toast === 'function') toast('Copied ' + id);
}

async function batchDeleteResolved() {
  if (_noCompanyAbort('batchDeleteResolved', true)) return;
  const ok = await appConfirmModal('Clear Resolved Tasks', 'Delete <strong>all resolved tasks</strong> and their comments? This action cannot be undone.', 'Delete All', true);
  if (!ok) return;
  try {
    const { data: resolved } = await sb.from('tasks').select('task_id').eq('status', 'resolved').eq('company_id', STATE.companyId);
    if (!resolved || !resolved.length) { toast('No resolved tasks to delete'); return; }
    const ids = resolved.map(t => t.task_id);
    await sb.from('task_comments').delete().in('task_id', ids);
    const { error } = await sb.from('tasks').delete().in('task_id', ids);
    if (error) throw error;
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: STATE.staffName, action: 'tasks_batch_deleted', entity_type: 'task', summary: 'Admin batch deleted ' + ids.length + ' resolved tasks' });
    toast(ids.length + ' resolved task' + (ids.length > 1 ? 's' : '') + ' deleted');
    if (Array.isArray(_adminTasksCache)) {
      const del = new Set(ids);
      _adminTasksCache = _adminTasksCache.filter(t => !del.has(t.taskId));
      if (_adminOpenTaskId && del.has(_adminOpenTaskId)) _adminOpenTaskId = null;
    }
    renderAdminTasksTimeline();
    _adminQuietResync();
  } catch(e) { toast(e.message, 'error'); }
}

async function adminDeleteTask(taskId) {
  if (_noCompanyAbort('adminDeleteTask', true)) return;
  const ok = await appConfirmModal('Delete Task', 'Delete this task permanently? This action cannot be undone.', 'Delete', true);
  if (!ok) return;
  try {
    await sb.from('task_comments').delete().eq('task_id', taskId);
    const { error } = await sb.from('tasks').delete().eq('task_id', taskId).eq('company_id', STATE.companyId);
    if (error) throw error;
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: STATE.staffName, action: 'task_deleted', entity_type: 'task', entity_id: taskId, summary: 'Admin deleted task: ' + taskId });
    toast('Task deleted');
    _adminInlineUpdate(taskId, null);
  } catch(e) { toast(e.message, 'error'); }
}

async function adminUnsnooze(taskId) {
  if (_noCompanyAbort('adminUnsnooze', true)) return;
  try {
    await sb.from('tasks').update({ status: 'open', snoozed_until: null }).eq('task_id', taskId).eq('company_id', STATE.companyId);
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: STATE.staffName, action: 'task_unsnoozed', entity_type: 'task', entity_id: taskId, summary: 'Admin unsnoozed task' });
    toast('Task woken up');
    _adminInlineUpdate(taskId, { status: 'open', snoozedUntil: null });
  } catch(e) { toast(e.message, 'error'); }
}

// Snooze picker — mirrors the staff portal's hour/day chip modal. Writes
// directly to `sb` with explicit company_id scoping (same style as adminUnsnooze).
function adminSnoozePrompt(taskId) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal" style="max-width:380px;padding:0;border-radius:16px;overflow:hidden">'
    + '<div style="padding:18px 22px 14px;border-bottom:1px solid var(--border)">'
    +   '<div style="font-size:15px;font-weight:700;color:var(--ink)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 16 14"/></svg> Snooze Task</div>'
    +   '<div style="font-size:11px;color:var(--ink-4);margin-top:2px">Task will reappear after the selected time</div>'
    + '</div>'
    + '<div style="padding:16px 22px">'
    +   '<div style="font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Hours</div>'
    +   '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'
    +     '<button class="nt-chip" onclick="adminSnoozeFor(\'' + taskId + '\',1,\'1 hour\')">1h</button>'
    +     '<button class="nt-chip" onclick="adminSnoozeFor(\'' + taskId + '\',4,\'4 hours\')">4h</button>'
    +     '<button class="nt-chip" onclick="adminSnoozeFor(\'' + taskId + '\',8,\'8 hours\')">8h</button>'

async function adminSnoozeFor(taskId, hours, label) {
  if (_noCompanyAbort('adminSnoozeFor', true)) return;
  document.querySelectorAll('.modal-overlay .nt-chip').forEach(function(b){ b.disabled = true; b.style.opacity = '0.5'; });
  const until = new Date(Date.now() + hours * 3600000).toISOString();
  try {
    await sb.from('tasks').update({ status: 'snoozed', snoozed_until: until }).eq('task_id', taskId).eq('company_id', STATE.companyId);
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: STATE.staffName, action: 'task_snoozed', entity_type: 'task', entity_id: taskId, summary: 'Admin snoozed task for ' + label });
    const _ov = document.querySelector('.modal-overlay'); if (_ov) _ov.remove();
    toast('Snoozed for ' + label);
    _adminInlineUpdate(taskId, { status: 'snoozed', snoozedUntil: until });
  } catch(e) {
    const _ov = document.querySelector('.modal-overlay'); if (_ov) _ov.remove();
    toast(e.message, 'error');
  }
}

async function adminResolveCancellation(taskId, outcome) {
  const label = outcome === 'processed' ? 'Mark as Cancellation Processed?' : 'Mark as Client Kept Plan?';
  const ok = await appConfirmModal('Resolve Cancellation', label, outcome === 'processed' ? 'Confirm' : 'Confirm', outcome === 'processed');
  if (!ok) return;
  // In-flight guard: prevent a double-confirm from firing resolveCancellation
  // twice (which previously produced duplicate audit-trail entries).
  if (!window._resolvingCancellation) window._resolvingCancellation = {};
  if (window._resolvingCancellation[taskId]) return;
  window._resolvingCancellation[taskId] = true;
  try {
    const result = await apiPost({ action: 'resolveCancellation', uuid: STATE.uuid, taskId, outcome });
    if (result.status !== 'ok') throw new Error(result.message);
    toast(outcome === 'processed' ? 'Cancellation processed' : 'Client kept plan', 'success');
    _adminInlineUpdate(taskId, { status: 'resolved', resolvedAt: new Date().toISOString(), resolvedBy: STATE.uuid, resolutionNote: (outcome === 'processed' ? '[PROCESSED] ' : '[KEPT_PLAN] ') + 'Resolved' });
  } catch(e) { toast(e.message, 'error'); }
  finally { delete window._resolvingCancellation[taskId]; }
}

async function adminResolveTask(taskId) {
  try {
    const { data: _t } = await sb.from('tasks').select('type').eq('task_id', taskId).maybeSingle();
    if (_t && _t.type === 'id_verification') { toast('ID verification tasks resolve automatically when you approve or reject the ID in the ID Verify screen.', 'error'); return; }
    // Use the typed resolution note if the textarea is present and non-empty;
    // otherwise keep the existing default. The textarea only renders on the
    // manual-resolve path, so other callers (e.g. snoozed Resolve) fall back safely.
    const _noteEl = document.getElementById('admin-resolve-note');
    const _note = (_noteEl && _noteEl.value.trim()) ? _noteEl.value.trim() : 'Resolved by admin';
    await sb.from('tasks').update({ status: 'resolved', resolved_at: new Date().toISOString(), resolved_by: STATE.uuid, resolution_note: _note, snoozed_until: null }).eq('task_id', taskId).eq('company_id', STATE.companyId);
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: STATE.staffName, action: 'task_resolved', entity_type: 'task', entity_id: taskId, summary: 'Admin marked task done' });
    toast('Task resolved');
    _adminInlineUpdate(taskId, { status: 'resolved', resolvedAt: new Date().toISOString(), resolvedBy: STATE.uuid, resolutionNote: _note, snoozedUntil: null });
  } catch(e) { toast(e.message, 'error'); }
}

async function adminAddComment(taskId) {
  if (_noCompanyAbort('adminAddComment', true)) return;
  const input = qs('admin-tc-input');
  const content = input?.value?.trim();
  if (!content) return;
  input.value = '';
  try {
    const { data: staff } = await sb.from('staff').select('name').eq('staff_id', STATE.uuid).maybeSingle();
    await sb.from('task_comments').insert({
      company_id: STATE.companyId,
      comment_id: 'TC' + Date.now().toString(36).toUpperCase(),
      task_id: taskId,
      staff_id: STATE.uuid,
      staff_name: staff?.name || STATE.uuid,
      content,
      created_at: new Date().toISOString()
    });
    await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: STATE.uuid, staff_name: staff?.name, action: 'task_comment', entity_type: 'task', entity_id: taskId, summary: 'Admin comment: ' + content.slice(0, 60) });
    // Notify assigned staff + task creator
    const { data: task } = await sb.from('tasks').select('assigned_to, created_by, notes').eq('task_id', taskId).maybeSingle();
    const notified = new Set();
    const commentMsg = (staff?.name || 'Admin') + ': ' + content.slice(0, 80);
    if (task?.assigned_to && task.assigned_to !== STATE.uuid && !notified.has(task.assigned_to)) {
      await _adminNotify('staff', task.assigned_to, 'task_comment', 'New comment on your task', commentMsg, 'tasks', taskId);
      notified.add(task.assigned_to);
    }
    if (task?.created_by && task.created_by !== STATE.uuid && !notified.has(task.created_by)) {
      const { data: creator } = await sb.from('staff').select('role').eq('staff_id', task.created_by).maybeSingle();
      const rType = creator?.role === 'admin' ? 'admin' : 'staff';
      await _adminNotify(rType, task.created_by, 'task_comment', 'New comment on task', commentMsg, 'tasks', taskId);
    }
    // Reload comments
    const { data: comments } = await sb.from('task_comments').select('*').eq('task_id', taskId).order('created_at');
    const fDT = d => d ? formatTorontoTime(d) : '\u2014';
    const el = qs('admin-task-comments');
    if (el) {
      el.innerHTML = (comments||[]).map(c => `
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:12px;font-weight:600;color:var(--ink-2)">${c.staff_name || c.staff_id}</span>
            <span style="font-size:10px;color:var(--ink-4)">${fDT(c.created_at)}</span>
          </div>
          <div style="font-size:12px;color:var(--ink-3);line-height:1.5">${c.content}</div>
        </div>`).join('');
    }
    toast('Comment added');
  } catch(e) { toast(e.message, 'error'); }
}

const REPORT_CATEGORIES = {
  bug:             { label: 'Bug',             short: 'Bug',    color: '#C62828', bg: '#FFEBEE', border: '#FFCDD2' },
  feature_request: { label: 'Feature Request', short: 'Feature', color: '#1565C0', bg: '#E3F2FD', border: '#BBDEFB' },

  other:           { label: 'Other',           short: 'Other',  color: '#37474F', bg: '#ECEFF1', border: '#CFD8DC' },
};
const REPORT_STATUSES = {
  open:         { label: 'Open',         color: '#C62828', bg: '#FFEBEE' },
  acknowledged: { label: 'Acknowledged', color: '#E65100', bg: '#FFF3E0' },
  in_progress:  { label: 'In Progress',  color: '#1565C0', bg: '#E3F2FD' },

  closed:       { label: 'Closed',       color: '#546E7A', bg: '#ECEFF1' },
};
const REPORT_PRIORITIES = {
  low:    { label: 'Low',  color: '#546E7A', bg: '#ECEFF1' },
  normal: { label: 'Med',  color: '#1565C0', bg: '#E3F2FD' },
  high:   { label: 'High', color: '#C62828', bg: '#FFEBEE' },
};
const REPORT_STATUS_ORDER = ['open','acknowledged','in_progress','resolved','closed'];

// Accent colors for the status filter chips. 'all' gets a neutral tint accent
// (instead of solid black) so it matches the tinted-accent style of the other chips.
function _arChipAccent(key) {
  if (key === 'all') return { bg: 'var(--bg-2)', color: 'var(--ink-2)' };
  const s = REPORT_STATUSES[key];
  return s ? { bg: s.bg, color: s.color } : { bg: 'var(--bg-2)', color: 'var(--ink-2)' };
}

// Report status pipeline — connected track with a green progress fill (option A).
// Returns the inner HTML for the #ard-pipeline container; used on first render and on status change.
function _arPipelineHTML(curIdx) {
  const pct = REPORT_STATUS_ORDER.length > 1 ? (curIdx / (REPORT_STATUS_ORDER.length - 1)) * 100 : 0;
  const nodes = REPORT_STATUS_ORDER.map((s, i) => {
    const si = REPORT_STATUSES[s];
    const done = i < curIdx, active = i === curIdx;
    const dot = active ? si.color : done ? 'var(--green)' : 'var(--white)';
    const bd  = active ? si.color : done ? 'var(--green)' : 'var(--border)';
    const halo = active ? `box-shadow:0 0 0 4px ${si.bg};` : '';
    const inner = done
      ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
      : active ? `<div style="width:7px;height:7px;border-radius:50%;background:#fff"></div>` : '';
    const lblColor = active ? si.color : done ? 'var(--green)' : 'var(--ink-4)';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1">
        <div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${dot};border:2px solid ${bd};${halo}transition:all .25s">${inner}</div>
        <div class="ar-pipe-lbl" style="font-size:9.5px;font-weight:${active?'700':'500'};color:${lblColor};margin-top:5px;text-align:center;white-space:nowrap">${si.label}</div>
      </div>`;
  }).join('');
  return `<div style="position:relative;display:flex;align-items:flex-start">
      <div style="position:absolute;top:10px;left:11px;right:11px;height:3px;background:var(--border);border-radius:2px"></div>
      <div style="position:absolute;top:10px;left:11px;width:calc((100% - 22px) * ${pct/100});height:3px;background:var(--green);border-radius:2px;transition:width .3s"></div>
      ${nodes}
    </div>`;
}

async function loadAdminReportsBadge() {
  try {
    if (!STATE.companyId) console.warn('loadAdminReportsBadge(): no STATE.companyId \u2014 scoping to no-company (zero rows).');
    const { count } = await sb.from('reports').select('*', { count: 'exact', head: true }).eq('company_id', STATE.companyId || _NO_COMPANY)
      .in('status', ['open', 'acknowledged']);
    const badge = qs('nav-reports-badge');
    if (badge) { if (count > 0) { badge.textContent = count; badge.style.display = ''; } else badge.style.display = 'none'; }
  } catch(e) {}
}

function _sortReports(data) {
  const mode = window._reportSort || 'newest';
  const priOrder = { high: 0, normal: 1, low: 2 };
  return [...data].sort((a, b) => {
    if (mode === 'priority') {
      const pd = (priOrder[a.priority] || 1) - (priOrder[b.priority] || 1);
      if (pd !== 0) return pd;
      return new Date(b.created_at) - new Date(a.created_at);
    }
    // 'newest' (default): most recent first
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

  var navGen = window._navGen;

  const [{ data: reports }, { data: locs }] = await Promise.all([
    cq('reports').order('created_at', { ascending: false }),

  window._reportsData = reports || [];
  window._locsMap = Object.fromEntries((locs||[]).map(l => [l.location_id, l.name]));
  window._reportFilter       = window._reportFilter       || 'all';
  window._reportStatusFilter = window._reportStatusFilter || 'all';
  window._reportSearch       = window._reportSearch       || '';
  window._reportSort         = window._reportSort         || 'newest';
  if (typeof navIsStale === 'function' && navIsStale(navGen)) return;
  _renderAdminReportsShell(c);
}

function _renderAdminReportsList() {
  const el = qs('admin-reports-list');
  if (!el) return;
  let data = _sortReports(window._reportsData || []);
  const search = (window._reportSearch||'').toLowerCase();
  const catF   = window._reportFilter || 'all';
  const statF  = window._reportStatusFilter || 'all';
  if (search) data = data.filter(r =>
    (r.title||'').toLowerCase().includes(search) ||
    (r.description||'').toLowerCase().includes(search) ||
    (r.staff_name||'').toLowerCase().includes(search)
  );
  if (catF  !== 'all') data = data.filter(r => r.category === catF);
  if (statF !== 'all') data = data.filter(r => r.status   === statF);

  if (!data.length) {
    if (search || catF !== 'all' || statF !== 'all') { el.innerHTML = _noMatchSlate('No matching feedback', 'No feedback matches your search or filters \u2014 try a different term or clear them.'); return; }
    el.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>','No feedback yet','Reports submitted by staff will appear here.');
    return;
  }

  const fDT = d => {
    if (!d) return '\u2014';
    return fmtDate(d, COMPANY_DEFAULT_TZ);
  };
  const fAge = d => {
    if (!d) return '\u2014';
    const diff = Date.now() - new Date(d).getTime();
    const hrs = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
    if (hrs < 1) return 'Just now';
    if (hrs < 24) return hrs + 'h ago';
    if (days === 1) return '1d ago';
    if (days < 30) return days + 'd ago';
    return Math.floor(days/30) + 'mo ago';
  };
  const locMap = window._locsMap || {};
  const esc = s => String(s == null ? '' : s).replace(/'/g, "\\'");

  // Single report row (markup unchanged except staff/location are now copy chips)
  const rowHTML = r => {
    const cat  = REPORT_CATEGORIES[r.category]  || REPORT_CATEGORIES.other;
    const stat = REPORT_STATUSES[r.status]       || REPORT_STATUSES.open;
    const locName = locMap[r.location_id] || '';
    const staffChip = r.staff_id
      ? `<span class="st-namechip" style="font-size:11px;padding:2px 7px 2px 6px;margin-left:-6px" title="Copy Staff ID" onclick="event.stopPropagation();_arCopyChip(this,'${esc(r.staff_id)}','Staff ID copied')"><span class="st-nm">${r.staff_name||'\u2014'}</span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`
      : `<span style="font-size:11px;color:var(--ink-3)">${r.staff_name||'\u2014'}</span>`;
    const locChip = (r.location_id && locName)
      ? `<span class="st-namechip" style="font-size:10px;padding:1px 6px 1px 5px;margin-left:-5px;color:var(--ink-4)" title="Copy Location ID" onclick="event.stopPropagation();_arCopyChip(this,'${esc(r.location_id)}','Location ID copied')"><span class="st-nm">${locName}</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`
      : '';
    return `<tr id="ar-row-${r.report_id}" style="cursor:pointer" onclick="openAdminReportDetail('${r.report_id}')" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
        <td onclick="event.stopPropagation()">
          <div style="display:flex;gap:3px">
            ${['low','normal','high'].map(p => {
              const pp = REPORT_PRIORITIES[p];
              const active = r.priority === p;
              return `<button onclick="adminSetPriority('${r.report_id}','${p}')" title="${pp.label}"
                style="padding:3px 7px;border-radius:6px;font-size:9px;font-weight:700;border:1.5px solid ${active?pp.color:'var(--border)'};background:${active?pp.bg:'var(--white)'};color:${active?pp.color:'var(--ink-4)'};cursor:pointer;transition:all .15s;font-family:inherit">${pp.label}</button>`;
            }).join('')}
          </div>
        </td>
        <td><span style="padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;background:${cat.bg};color:${cat.color};border:1px solid ${cat.border};white-space:nowrap">${cat.short}</span></td>
        <td>
          <div style="font-weight:600;font-size:13px;margin-bottom:2px">${r.title}</div>

        <td>${staffChip}${locChip?`<br>${locChip}`:''}</td>
        <td style="font-size:11px"><div style="color:var(--ink-3);font-weight:500">${fDT(r.created_at)}</div><div style="color:var(--ink-4);margin-top:1px">${fAge(r.created_at)}</div></td>
        <td style="text-align:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.5" style="vertical-align:middle"><path d="M9 18l6-6-6-6"/></svg></td>
      </tr>`;
  };

  // One table (with header row) for a set of reports
  const tableHTML = rows => `<div class="table-wrap"><table class="data-table">
    <thead><tr>
      <th style="width:110px">Priority</th>
      <th style="width:80px">Type</th>
      <th>Title</th>
      <th style="width:100px">Status</th>
      <th style="width:130px">Staff</th>
      <th style="width:100px">Date</th>
      <th style="width:50px"></th>
    </tr></thead>
    <tbody>${rows.map(rowHTML).join('')}</tbody>
  </table></div>`;

  // Group by status, in canonical pipeline order
  el.innerHTML = REPORT_STATUS_ORDER.map(stKey => {
    const group = data.filter(r => r.status === stKey);
    if (!group.length) return '';
    const st = REPORT_STATUSES[stKey] || REPORT_STATUSES.open;
    const header = `<div style="display:flex;align-items:center;gap:9px;margin:18px 2px 8px">
        <span style="width:9px;height:9px;border-radius:50%;background:${st.color};flex:0 0 auto"></span>
        <span style="font-size:13px;font-weight:700;color:var(--ink)">${st.label}</span>
        <span style="font-size:11px;font-weight:600;color:var(--ink-4);background:var(--bg-2);border-radius:10px;padding:1px 8px">${group.length}</span>
      </div>`;
    return header + tableHTML(group);
  }).join('');
}

async function adminSetPriority(reportId, priority) {
  const r = (window._reportsData||[]).find(x => x.report_id === reportId);
  if (r) r.priority = priority;
  // Re-render priority cell only
  const row = document.getElementById('ar-row-' + reportId);
  if (row) {
    const cell = row.querySelector('td:first-child div');
    if (cell) cell.innerHTML = ['low','normal','high'].map(p => {
      const pp = REPORT_PRIORITIES[p]; const active = priority === p;
      return `<button onclick="adminSetPriority('${reportId}','${p}')" title="${pp.label}"
        style="padding:3px 7px;border-radius:6px;font-size:9px;font-weight:700;border:1.5px solid ${active?pp.color:'var(--border)'};background:${active?pp.bg:'var(--white)'};color:${active?pp.color:'var(--ink-4)'};cursor:pointer;transition:all .15s;font-family:inherit">${pp.label}</button>`;

  }
  apiPost({ action: 'updateReportStatus', reportId, priority, staffName: STATE.staffName })

async function openAdminReportDetail(reportId) {
  const report = (window._reportsData||[]).find(r => r.report_id === reportId);
  if (!report) return;

  // Auto-acknowledge if open + mark any unread notifications for this report as read
  if (report.status === 'open') {
    report.status = 'acknowledged';
    apiPost({ action: 'acknowledgeReport', reportId }).then(() => {
      loadAdminReportsBadge();
      _renderAdminReportsList();
    }).catch(() => {});
  }
  // Mark related notifications read silently
  sb.from('notifications')
    .update({ read: true })
    .eq('related_id', reportId)
    .eq('recipient_id', STATE.uuid)
    .then(() => loadAdminNotifCount())
    .catch(() => {});

  const { data: comments } = await sb.from('report_comments').select('*').eq('report_id', reportId).order('created_at');
  const cat  = REPORT_CATEGORIES[report.category]  || REPORT_CATEGORIES.other;

    if (!d) return '';

  document.getElementById('admin-report-modal')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'admin-report-modal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:660px;width:96%;max-height:92vh;display:flex;flex-direction:column;padding:0;overflow:hidden;border-radius:16px">

      <!-- Header -->
      <div style="padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="flex:1;min-width:0">

              <span id="ard-status-badge" style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:${stat.bg};color:${stat.color}">${stat.label}</span>
              <span style="font-size:10px;color:var(--ink-4)">${fDT(report.created_at)}</span>
              ${report.staff_id
                ? `<span class="st-namechip" style="font-size:10px;padding:1px 6px 1px 5px;margin-left:-2px;color:var(--ink-4)" title="Copy Staff ID" onclick="_arCopyChip(this,'${String(report.staff_id).replace(/'/g,"\\'")}','Staff ID copied')"><span class="st-nm">\u00B7 ${report.staff_name||'Staff'}</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`
                : `<span style="font-size:10px;color:var(--ink-4)">\u00B7 ${report.staff_name||'Staff'}</span>`}
              ${(report.location_id && locMap[report.location_id])
                ? `<span class="st-namechip" style="font-size:10px;padding:1px 6px 1px 5px;color:var(--ink-4)" title="Copy Location ID" onclick="_arCopyChip(this,'${String(report.location_id).replace(/'/g,"\\'")}','Location ID copied')"><span class="st-nm">${locMap[report.location_id]}</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`
                : ''}
            </div>
            <div style="font-size:15px;font-weight:700;color:var(--ink);line-height:1.35">${report.title}</div>
          </div>
          <button onclick="document.getElementById('admin-report-modal').remove()" style="flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--ink-4);font-size:20px;padding:2px;line-height:1">\u2715</button>
        </div>

        <!-- Status pipeline -->
        <div style="margin-top:14px;padding:14px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px" id="ard-pipeline">
          ${_arPipelineHTML(curIdx)}
        </div>

        <!-- Admin controls -->
        <div style="display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px">
            ${['low','normal','high'].map(p => {
              const pp = REPORT_PRIORITIES[p]; const active = report.priority === p;
              return `<button id="ard-pri-${p}" onclick="ardSetPriority('${reportId}','${p}')"
                style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:none;background:${active?pp.bg:'transparent'};color:${active?pp.color:'var(--ink-4)'};cursor:pointer;transition:all .15s;font-family:inherit">${pp.label}</button>`;
            }).join('')}
          </div>
          <select id="ard-status-sel" onchange="ardSetStatus('${reportId}',this.value)" class="mod-select" style="font-size:12px">
            ${Object.entries(REPORT_STATUSES).map(([k,v]) => `<option value="${k}" ${report.status===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
          <button class="btn btn-secondary btn-sm" style="margin-left:auto;color:var(--required);border-color:#FFCDD2" onclick="ardDeleteReport('${reportId}')">Delete</button>
        </div>
      </div>

      <!-- Body -->
      <div style="flex:1;overflow-y:auto" id="ard-body">
        ${report.description ? `
        <div style="padding:14px 20px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px">Description</div>
          <div style="font-size:13px;color:var(--ink-2);line-height:1.65;white-space:pre-wrap;background:var(--bg);padding:11px 13px;border-radius:10px;border:1px solid var(--border)">${report.description}</div>
        </div>` : ''}

        <div style="padding:14px 20px">
          <div style="font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Activity</div>

          <div style="display:flex;gap:10px;margin-bottom:14px">
            <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
              </div>
              ${comments && comments.length > 0 ? `<div style="width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px"></div>` : ''}
            </div>
            <div style="flex:1;padding-top:5px;font-size:12px;color:var(--ink-3)">
              <strong style="color:var(--ink-2)">${report.staff_name||'Staff'}</strong> opened this report \u00B7 <span style="color:var(--ink-4)">${fAge(report.created_at)}</span>
            </div>
          </div>

          <div id="ard-comments">${_renderAdminComments(comments||[], reportId, fAge)}</div>

          <!-- Reply box -->
          <div style="display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="width:28px;flex-shrink:0">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${(STATE.staffName||'A').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
            </div>
            <div style="flex:1;min-width:0">
              <div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s" id="ard-reply-border">
                <textarea id="ard-reply" placeholder="Reply\u2026 (Enter to send, Shift+Enter for new line)" rows="2"
                  style="width:100%;padding:10px 12px;border:none;font-family:inherit;font-size:12px;color:var(--ink);resize:none;line-height:1.6;background:var(--white);box-sizing:border-box;outline:none"
                  onfocus="qs('ard-reply-border').style.borderColor='var(--blue)'"
                  onblur="qs('ard-reply-border').style.borderColor='var(--border)'"
                  oninput="this.style.height='auto';this.style.height=Math.max(36,this.scrollHeight)+'px'"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ardPostComment('${reportId}')}"></textarea>
                <div style="display:flex;justify-content:flex-end;align-items:center;padding:6px 10px;background:var(--bg);border-top:1px solid var(--border)">
                  <span style="font-size:10px;color:var(--ink-4);margin-right:auto">Enter to send \u00B7 Shift+Enter for new line</span>
                  <button class="btn btn-primary btn-sm" onclick="ardPostComment('${reportId}')">Send Reply</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
  overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) overlay.remove(); });
  document.body.appendChild(overlay);
}

function _renderAdminComments(comments, reportId, fAge) {
  if (!comments.length) return `<div style="text-align:center;padding:20px;color:var(--ink-4);font-size:12px;background:var(--bg);border:1px dashed var(--border);border-radius:10px">No comments yet</div>`;
  return comments.map((c, ci) => {
    const isAdmin = c.author_role === 'admin';
    const isLast  = ci === comments.length - 1;
    const initials = (c.author_name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div style="display:flex;gap:10px;margin-bottom:${isLast?'0':'14px'}">
      <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">
        <div style="width:28px;height:28px;border-radius:50%;background:${isAdmin?'var(--blue)':'var(--ink-3)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${initials}</div>
        ${!isLast?`<div style="width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px"></div>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="border:1px solid ${isAdmin?'#BBDEFB':'var(--border)'};border-radius:0 10px 10px 10px;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:${isAdmin?'#F0F4FF':'var(--bg)'};border-bottom:1px solid ${isAdmin?'#BBDEFB':'var(--border)'}">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:12px;font-weight:600;color:var(--ink-2)">${c.author_name||c.author_id}</span>
              ${isAdmin?`<span style="font-size:9px;padding:1px 6px;background:var(--blue);color:#fff;border-radius:4px;font-weight:700">Admin</span>`:`<span style="font-size:9px;padding:1px 6px;background:var(--ink-3);color:#fff;border-radius:4px">Staff</span>`}
            </div>
            <span style="font-size:10px;color:var(--ink-4)">${fAge(c.created_at)}</span>
          </div>
          <div style="padding:10px 12px;font-size:12px;color:var(--ink-2);line-height:1.65;white-space:pre-wrap">${c.content}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function ardPostComment(reportId) {
  const input = qs('ard-reply');
  const content = (input?.value || '').trim();
  if (!content) return;
  const btn = document.querySelector('#ard-reply-border .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    const result = await apiPost({
      action: 'addReportComment', reportId,
      authorId: STATE.uuid, authorName: STATE.staffName, authorRole: 'admin', content,
    });
    if (result.status !== 'ok') throw new Error(result.message);
    if (input) { input.value = ''; input.style.height = 'auto'; }
    const { data: comments } = await sb.from('report_comments').select('*').eq('report_id', reportId).order('created_at');
    const fAge = d => {
      if (!d) return '';
      const diff = Date.now()-new Date(d).getTime(), hrs=Math.floor(diff/3600000), days=Math.floor(diff/86400000);
      if(hrs<1)return 'Just now';if(hrs<24)return hrs+'h ago';if(days===1)return '1d ago';return days+'d ago';
    };
    const el = qs('ard-comments');
    if (el) el.innerHTML = _renderAdminComments(comments||[], reportId, fAge);
    const body = qs('ard-body');
    if (body) body.scrollTop = body.scrollHeight;
  } catch(e) { toast(e.message, 'error'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Send Reply'; } }
}

async function ardSetStatus(reportId, status) {
  const r = (window._reportsData||[]).find(x => x.report_id === reportId);
  if (r) r.status = status;
  const stat = REPORT_STATUSES[status] || REPORT_STATUSES.open;
  const badge = qs('ard-status-badge');
  if (badge) { badge.textContent = stat.label; badge.style.background = stat.bg; badge.style.color = stat.color; }
  // Rebuild pipeline
  const curIdx = REPORT_STATUS_ORDER.indexOf(status);
  const pipeline = qs('ard-pipeline');
  if (pipeline) {
    pipeline.innerHTML = _arPipelineHTML(curIdx);
  }
  try {
    await apiPost({ action: 'updateReportStatus', reportId, status, staffName: STATE.staffName });
    loadAdminReportsBadge();
    _renderAdminReportsList();
  } catch(e) { toast(e.message, 'error'); }
}

function ardSetPriority(reportId, priority) {
  const r = (window._reportsData||[]).find(x => x.report_id === reportId);
  if (r) r.priority = priority;
  ['low','normal','high'].forEach(p => {
    const btn = document.getElementById('ard-pri-'+p);
    if (!btn) return;
    const pp = REPORT_PRIORITIES[p]; const active = p === priority;
    btn.style.background = active ? pp.bg : 'transparent';
    btn.style.color = active ? pp.color : 'var(--ink-4)';
  });
  apiPost({ action: 'updateReportStatus', reportId, priority, staffName: STATE.staffName })
    .then(() => _renderAdminReportsList()).catch(() => {});
}

async function ardDeleteReport(reportId) {
  const ok = await appConfirmModal('Delete Report', 'Permanently delete this report and all its comments?', 'Delete', true);
  if (!ok) return;
  try {
    await apiPost({ action: 'deleteReport', reportId });
    window._reportsData = (window._reportsData||[]).filter(r => r.report_id !== reportId);
    document.getElementById('admin-report-modal')?.remove();
    _renderAdminReportsList();
    loadAdminReportsBadge();
    toast('Report deleted');
  } catch(e) { toast(e.message, 'error'); }
}

function openNewReportModal() {
  document.getElementById('admin-new-report-modal')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'admin-new-report-modal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:500px;width:96%">
      <div class="modal-title">New Report</div>
      <div style="display:flex;flex-direction:column;gap:14px">

        <div>
          <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:6px">Type</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap" id="nr-type-pills">
            ${Object.entries(REPORT_CATEGORIES).map(([k,v], i) =>
              `<button type="button" data-val="${k}"
                onclick="document.querySelectorAll('#nr-type-pills button').forEach(b=>{b.style.background=b.dataset.val==='${k}'?'${v.bg}':'var(--bg)';b.style.color=b.dataset.val==='${k}'?'${v.color}':'var(--ink-3)';b.style.borderColor=b.dataset.val==='${k}'?'${v.border}':'var(--border)'});document.getElementById('nr-category').value='${k}'"
                style="padding:7px 16px;border:1.5px solid ${i===0?v.border:'var(--border)'};border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:${i===0?v.bg:'var(--bg)'};color:${i===0?v.color:'var(--ink-3)'};transition:all .15s;font-family:inherit;white-space:nowrap">${v.label}</button>`
            ).join('')}
          </div>
          <input type="hidden" id="nr-category" value="bug">
        </div>

        <div>
          <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:6px">Priority</label>
          <div style="display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px">
            ${['low','normal','high'].map((p,i) => {
              const pp = REPORT_PRIORITIES[p];
              return `<button id="nr-pri-${p}" onclick="document.querySelectorAll('.nr-pri-btn').forEach(b=>{b.style.background='transparent';b.style.color='var(--ink-4)'});this.style.background='${pp.bg}';this.style.color='${pp.color}';document.getElementById('nr-priority').value='${p}'"
                class="nr-pri-btn"
                style="flex:1;padding:6px 0;border-radius:6px;font-size:11px;font-weight:600;border:none;background:${i===1?pp.bg:'transparent'};color:${i===1?pp.color:'var(--ink-4)'};cursor:pointer;font-family:inherit;transition:all .15s">${pp.label}</button>`;
            }).join('')}
          </div>
          <input type="hidden" id="nr-priority" value="normal">
        </div>

        <div>
          <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px">Title <span style="color:var(--required)">*</span></label>
          <input class="form-input" id="nr-title" placeholder="Brief summary..." style="font-size:14px;padding:11px 13px;height:auto"
            onkeydown="if(event.key==='Enter'){event.preventDefault();qs('nr-desc')?.focus()}">
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:5px">Description</label>
          <textarea class="form-input" id="nr-desc" rows="4" placeholder="Details, steps to reproduce, context..." style="resize:vertical;line-height:1.6;font-size:13px;padding:11px 13px"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-secondary" onclick="document.getElementById('admin-new-report-modal').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="submitNewReport()">Create Report</button>
        </div>
      </div>
    </div>
  `;
  overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
  overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) overlay.remove(); });
  document.body.appendChild(overlay);
  qs('nr-title')?.focus();
}

async function submitNewReport() {
  if (_noCompanyAbort('submitNewReport', true)) return;
  const category    = qs('nr-category')?.value;
  const priority    = qs('nr-priority')?.value || 'normal';
  const title       = (qs('nr-title')?.value || '').trim();
  const description = (qs('nr-desc')?.value  || '').trim();
  if (!title) { toast('Title required', 'error'); return; }
  try {
    const { data: staffRow } = await sb.from('staff').select('default_location_id').eq('staff_id', STATE.uuid).maybeSingle();
    const reportId = 'RPT'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();
    const { error } = await sb.from('reports').insert({
      company_id: STATE.companyId,
      report_id: reportId, staff_id: STATE.uuid, staff_name: STATE.staffName,
      location_id: staffRow?.default_location_id||null,
      category, priority, title, description: description||null, status: 'acknowledged',
    });
    if (error) throw new Error(error.message);
    document.getElementById('admin-new-report-modal')?.remove();
    toast('Report created');
    const newReport = { report_id: reportId, staff_id: STATE.uuid, staff_name: STATE.staffName,
      location_id: staffRow?.default_location_id||null, category, priority, title,
      description: description||null, status: 'acknowledged', created_at: new Date().toISOString() };
    window._reportsData = [newReport, ...(window._reportsData||[])];
    _renderAdminReportsList();
    loadAdminReportsBadge();
    setTimeout(() => {
      const row = document.getElementById('ar-row-'+reportId);
      if (row) {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        row.style.transition = 'background .3s';
        row.style.background = '#FFF9C4';
        setTimeout(() => { row.style.background=''; }, 2000);
      }
    }, 100);
  } catch(e) { toast(e.message, 'error'); }
}


</script>
</body>
</html>

    + '<div style="padding:14px 20px 18px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--border);background-color:var(--bg)">'
      + '<button type="button" id="cc-back" class="cc-btn-ghost" onclick="_ccBack()">\u2190 Back</button>'
      + '<button type="button" class="cc-btn-go" id="cc-charge" onclick="_ccDoCharge()">Charge '+_ccMoney(t.tot)+'</button>'
    + '</div>'
  + '</div>';
}

function _ccBack(){ if(_CC && _CC.busy) return; _CC.step=1; _ccRender(); }

async function _ccDoCharge(){
  if(_CC && _CC.busy) return;            // guard against double-submit
  _CC.busy = true;                        // lock: no back / no exit while charging
  var btn=document.getElementById('cc-charge');
  var backBtn=document.getElementById('cc-back');
  var xBtn=document.getElementById('cc-x');
  if(btn){ btn.disabled=true; btn.textContent='Charging\u2026'; }
  if(backBtn){ backBtn.disabled=true; backBtn.style.opacity='.45'; backBtn.style.cursor='not-allowed'; }
  if(xBtn){ xBtn.disabled=true; xBtn.style.opacity='.45'; xBtn.style.cursor='not-allowed'; }
  var t=_ccCalc();
  var items=_ccValidRows().map(function(r){ return { desc:r.desc.trim(), qty:parseFloat(r.qty)||0, unit:parseFloat(r.unit)||0 }; });
  var _unlock=function(){
    _CC.busy=false;
    if(btn){ btn.disabled=false; btn.textContent='Charge '+_ccMoney(t.tot); }
    if(backBtn){ backBtn.disabled=false; backBtn.style.opacity=''; backBtn.style.cursor=''; }
    if(xBtn){ xBtn.disabled=false; xBtn.style.opacity=''; xBtn.style.cursor=''; }
  };
  try{
    var res=await apiPost({
      action:'createCharge', uuid:STATE.uuid,
      clientId:_CC.clientId, planCardId:_CC.planCardId, locationId:_CC.locationId,
      items:items,
    });
    if(res && res.status==='ok'){
      var paid=(res.outcome==='paid');
      _CC.busy=false;                     // allow close now that we're done
      _ccClose();
      if(paid){
        var _cardTxt='';
        if(res.card && res.card.last4){
          var _b=(res.card.brand||'card'); _b=_b.charAt(0).toUpperCase()+_b.slice(1);
          _cardTxt=' to '+_b+' \u00B7\u00B7\u00B7\u00B7 '+res.card.last4;
        }
        toast('Charge paid \u2014 '+_ccMoney(res.total||t.tot)+_cardTxt);
      } else {
        // Card declined \u2014 invoice was created for the client to pay. They're notified.
        toast('Payment failed \u2014 open invoice created for '+_ccMoney(res.total||t.tot)+'. The client has been notified to pay it.');
      }
      // Refresh the view we're actually in. If billing is open, stay there
      // (and re-open the client drill-in if one was active) instead of jumping
      // to the plan-cards section.
      try {
        if (STATE && STATE.section === 'billing') {
          _abCacheBust();  // a new charge/invoice exists — refresh fresh, not from cache
          if (_AB.view === 'client' && _AB.clientId) { _abOpenClient(_AB.clientId, _AB.openInv, true); }
          else if (_AB.tab === 'subscriptions') { _abLoadSubs(true); }
          else { _abLoadRollup(true); }
        } else if (typeof loadAdminPlanCards === 'function') {
          loadAdminPlanCards();
        }
      } catch(_e){}
    } else {
      _unlock();
      toast((res && res.message) ? res.message : 'Charge failed','error');
    }
  }catch(e){
    _unlock();
    toast('Charge failed','error');
  }
}

function _ccEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════════════════════════
// Account credit — Add / Remove modal (Stripe customer balance; no DB table).
// Balance & history are source-of-truth from Stripe via get-admin-billing.
// ══════════════════════════════════════════════════════════════════════════
var _CR = null;

function _crMoneyCents(c){ return '$' + (Math.round(c)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function _crParseAmt(v){ var n = parseFloat(String(v).replace(/[^0-9.]/g,'')); return isNaN(n)?0:Math.round(n*100); }

// Click a history row's staff name to copy that staff member's ID.
function _crCopyStaff(ev, el){
  if(ev && ev.stopPropagation) ev.stopPropagation();
  var staffId = el.getAttribute('data-sid') || '';
  if(!staffId) return;
  try { navigator.clipboard.writeText(staffId); } catch(e){}
  if(typeof toast==='function') toast('Staff ID copied');
  var label = el.querySelector('.ab-cr-byname');
  if(!label) return;
  var orig = label.getAttribute('data-nm') || label.textContent;
  label.setAttribute('data-nm', orig);
  el.classList.add('copied');
  label.textContent = 'Copied';
  setTimeout(function(){ label.textContent = orig; el.classList.remove('copied'); }, 1100);
}

// Open the modal for a client. balanceCents = current available credit.
function _crOpen(cl, balanceCents){
  if(_CR && _CR.busy) return;
  _CR = { clientId: cl.id, name: cl.name || 'Client', balance: balanceCents||0, mode:'add', step:1, busy:false };
  var ov = document.createElement('div');
  ov.className = 'crm-ov'; ov.id = 'crm-ov';
  ov.onclick = function(e){ if(e.target===ov) _crClose(); };
  document.body.appendChild(ov);
  _crRenderForm();
}
function _crClose(){ if(_CR && _CR.busy) return; var ov=document.getElementById('crm-ov'); if(ov) ov.remove(); _CR=null; }

function _crRenderForm(){
  var ov = document.getElementById('crm-ov'); if(!ov) return;
  var add = _CR.mode==='add';
  var plusIco = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>';
  var minusIco = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>';
  var warnIco = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>';
  ov.innerHTML = '<div class="crm">'
    + '<div class="crm-head"><div class="crm-ico'+(add?'':' rm')+'" id="crm-ico">'+(add?plusIco:minusIco)+'</div>'
    +   '<div><div class="crm-title">Adjust credit</div><div class="crm-sub">'+_ccEsc(_CR.name)+' \u00B7 '+_crMoneyCents(_CR.balance)+' on account</div></div></div>'
    + '<div class="crm-body">'
    +   '<div class="crm-seg" id="crm-seg" data-mode="'+_CR.mode+'"><button id="crm-tab-add">Add</button><button id="crm-tab-rm">Remove</button></div>'
    +   '<div class="crm-lbl" id="crm-amtlbl">'+(add?'Amount to add':'Amount to remove')+'</div>'
    +   '<input class="crm-inp amt" id="crm-amt" placeholder="$0.00" inputmode="decimal" autocomplete="off">'
    +   '<div class="crm-warn" id="crm-guard">'+warnIco+'<span id="crm-guardmsg"></span></div>'
    +   '<div class="crm-lbl">Reason (required)</div>'
    +   '<input class="crm-inp" id="crm-reason" placeholder="e.g. goodwill, refund for delay" autocomplete="off" maxlength="200">'
    + '</div>'
    + '<div class="crm-foot"><button class="crm-ghost" id="crm-cancel">Cancel</button>'
    +   '<button class="crm-go'+(add?'':' rm')+'" id="crm-continue" disabled>Continue</button></div>'
    + '</div>';
  document.getElementById('crm-tab-add').onclick = function(){ _crSetMode('add'); };
  document.getElementById('crm-tab-rm').onclick = function(){ _crSetMode('remove'); };
  document.getElementById('crm-cancel').onclick = _crClose;
  document.getElementById('crm-continue').onclick = _crToConfirm;
  document.getElementById('crm-amt').addEventListener('input', _crValidate);
  document.getElementById('crm-amt').addEventListener('blur', _crFormatAmt);
  document.getElementById('crm-reason').addEventListener('input', _crValidate);
  _crValidate();
}

function _crSetMode(m){
  _CR.mode = m;
  var add = m==='add';
  var seg = document.getElementById('crm-seg'); if(seg) seg.setAttribute('data-mode', m);
  var ico = document.getElementById('crm-ico'); if(ico) ico.classList.toggle('rm', !add);
  var lbl = document.getElementById('crm-amtlbl'); if(lbl) lbl.textContent = add?'Amount to add':'Amount to remove';
  _crValidate();
}

function _crFormatAmt(){
  var el = document.getElementById('crm-amt'); if(!el) return;
  var c = _crParseAmt(el.value);
  el.value = c>0 ? _crMoneyCents(c) : '';
  _crValidate();
}

function _crValidate(){
  var amtEl=document.getElementById('crm-amt'), rEl=document.getElementById('crm-reason');
  var btn=document.getElementById('crm-continue'), guard=document.getElementById('crm-guard');
  if(!amtEl||!rEl||!btn) return;
  var amt=_crParseAmt(amtEl.value), reason=rEl.value.trim();
  var over = (_CR.mode==='remove' && amt>_CR.balance);
  if(over){
    document.getElementById('crm-guardmsg').textContent = "Can't remove more than the "+_crMoneyCents(_CR.balance)+' on account.';
    guard.classList.add('show'); amtEl.classList.add('err');
  } else { guard.classList.remove('show'); amtEl.classList.remove('err'); }
  var ok = amt>0 && reason.length>0 && !over;
  btn.disabled = !ok;
  btn.classList.toggle('rm', _CR.mode==='remove');
}

function _crToConfirm(){
  var amt=_crParseAmt(document.getElementById('crm-amt').value);
  var reason=document.getElementById('crm-reason').value.trim();
  if(amt<=0 || !reason) return;
  if(_CR.mode==='remove' && amt>_CR.balance) return;
  _CR.amt=amt; _CR.reason=reason; _CR.step=2;
  var add=_CR.mode==='add';
  var newBal = add ? _CR.balance+amt : _CR.balance-amt;
  var checkIco='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"></path></svg>';
  var ov=document.getElementById('crm-ov'); if(!ov) return;
  ov.innerHTML = '<div class="crm">'
    + '<div class="crm-head"><div class="crm-ico'+(add?'':' rm')+'">'+checkIco+'</div>'
    +   '<div><div class="crm-title">'+(add?'Confirm credit':'Confirm removal')+'</div></div></div>'
    + '<div class="crm-body">'
    +   '<div class="crm-cbox"><div class="crm-cbig'+(add?'':' rm')+'">'+(add?'+':'\u2212')+_crMoneyCents(amt)+'</div>'
    +     '<div class="crm-cto">'+(add?'added to ':'removed from ')+_ccEsc(_CR.name)+'\u2019s account</div>'
    +     '<div class="crm-creason">\u201C'+_ccEsc(reason)+'\u201D</div></div>'
    +   '<div class="crm-newbal">New balance will be '+_crMoneyCents(newBal)+'</div>'
    + '</div>'
    + '<div class="crm-foot"><button class="crm-ghost" id="crm-back">Back</button>'
    +   '<button class="crm-go'+(add?'':' rm')+'" id="crm-commit">'+(add?'Add ':'Remove ')+_crMoneyCents(amt)+'</button></div>'
    + '</div>';
  document.getElementById('crm-back').onclick = function(){ _CR.step=1; _crRenderForm(); var a=document.getElementById('crm-amt'); if(a){ a.value=_crMoneyCents(_CR.amt); } var r=document.getElementById('crm-reason'); if(r){ r.value=_CR.reason; } _crValidate(); };
  document.getElementById('crm-commit').onclick = _crCommit;
}

async function _crCommit(){
  if(!_CR || _CR.busy) return;
  _CR.busy = true;
  var add=_CR.mode==='add';
  var btn=document.getElementById('crm-commit'), back=document.getElementById('crm-back');
  if(btn){ btn.disabled=true; btn.textContent=add?'Adding\u2026':'Removing\u2026'; }
  if(back){ back.disabled=true; back.style.opacity='.5'; back.style.cursor='not-allowed'; }
  try{
    var res = await apiPost({
      action:'adjustCredit', uuid:STATE.uuid,
      clientId:_CR.clientId, direction:_CR.mode, amount:(_CR.amt/100), reason:_CR.reason,
    });
    if(res && res.status==='ok'){
      _CR.busy=false;
      var _amt=_CR.amt;
      _crClose();
      toast((add?'Added ':'Removed ')+_crMoneyCents(_amt)+' in account credit');
      // Money moved — refresh this client's drill-in fresh (balance + log).
      try {
        if (STATE && STATE.section==='billing' && _AB.view==='client' && _AB.clientId){
          _abCacheBust();
          _abOpenClient(_AB.clientId, _AB.openInv, true);
        }
      } catch(_e){}
    } else {
      _CR.busy=false;
      if(btn){ btn.disabled=false; btn.textContent=(add?'Add ':'Remove ')+_crMoneyCents(_CR.amt); }
      if(back){ back.disabled=false; back.style.opacity=''; back.style.cursor=''; }
      toast((res && res.message) ? res.message : 'Credit adjustment failed','error');
    }
  }catch(e){
    _CR.busy=false;
    if(btn){ btn.disabled=false; btn.textContent=(add?'Add ':'Remove ')+_crMoneyCents(_CR.amt); }
    if(back){ back.disabled=false; back.style.opacity=''; back.style.cursor=''; }
    toast('Credit adjustment failed','error');
  }
}


// ─── ID viewer (admin: no password gate) ───
async function _adminVcid(el) { _viewAdminClientId(el.dataset.cid, el.dataset.cname); }

async function _viewAdminClientId(clientId, clientName) {
  const overlay = document.createElement('div');
  overlay.className = 'id-modal-overlay';
  overlay.innerHTML = '<div class="id-modal-box"><div class="id-modal-body" style="text-align:center;padding:40px;color:var(--ink-4)">Loading ID\u2026</div></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
  overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) overlay.remove(); });
  try {
    const result = await apiPost({ action: 'getIdVerification', uuid: STATE.uuid, clientId });
    if (result.status !== 'ok') throw new Error(result.message || 'Could not load ID');
    const v = result.verification;
    // Resolve the reviewer's staff_id -> name (client-side; no adapter change needed).
    if (v && v.reviewedBy) {
      try {
        const { data: rb } = await sb.from('staff').select('name, role').eq('staff_id', v.reviewedBy).maybeSingle();
        if (rb) v.reviewedByName = rb.name + (rb.role ? ' (' + rb.role + ')' : '');
      } catch(_) { /* leave name unresolved; UUID still shown */ }
    }
    _renderAdminIdModal(overlay, v, clientName, clientId);
  } catch(e) {
    overlay.remove();
    toast(e.message, 'error');
  }
}

  if (v.submittedAt) body += `<div style="background:var(--bg-2);border-radius:6px;padding:7px 12px"><div style="font-size:10px;color:var(--ink-4);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em">Submitted</div><div style="font-size:12px;font-weight:600;color:var(--ink)">${fmtDate(v.submittedAt)}</div></div>`;

  // Approver line (approved/rejected): "Approved/Reviewed by <name>" — name click copies CLIENT ID
  if ((v.verificationStatus === 'approved' || v.verificationStatus === 'rejected') && (v.reviewedByName || v.reviewedBy)) {

    body += `<div style="margin-top:11px;padding-top:10px;border-top:1px solid var(--border);font-size:11.5px;color:var(--ink-4);display:flex;align-items:center;gap:5px;flex-wrap:wrap">${_revVerb} <span class="cl-cpid" title="Copy Client ID" style="font-size:11px" onclick="event.stopPropagation();_idvCopy(this,'${_idvEsc(clientId||'')}')">${_revCopyIco}<span>${_revName}</span></span></div>`;

    </div>

}

// ─── Plan / Account lock (admin: always available, uses admin modal helpers) ───
async function adminTogglePlanLock(planCardId, isCurrentlyLocked) {
  let reason = '';
  if (!isCurrentlyLocked) {
    reason = await appPromptModal('<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Suspend Plan</span>', 'The client will lose access to this plan. Mail logging will continue normally.', 'Reason (optional)', false);
    if (reason === null) return;
  } else {
    const ok = await appConfirmModal('<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Unlock Plan</span>', 'The client will regain access to this plan immediately.', 'Unlock Plan', false);
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action: 'togglePlanLock', uuid: STATE.uuid, planCardId, reason: reason || null });
    if (result.status === 'ok') {
      toast(result.locked ? 'Plan suspended' : 'Plan unlocked');
      const pc = _adminAllPlanCards.find(p => p.planCardId === planCardId);
      const cid = pc ? pc.clientId : window._currentOpenClientId;
      if (pc) {
        // Update cache to mirror adapter, so the pane re-renders accurately without a re-fetch.
        if (result.locked) {
          pc.accessOverride = 'suspended';
          pc.overrideReason = _buildLockReason(reason);
          pc.overrideBy     = STATE.uuid;
          pc.overrideAt     = new Date().toISOString();
        } else {
          pc.accessOverride = null;
          pc.overrideReason = null;
          pc.overrideBy     = null;
          pc.overrideAt     = null;
        }
      }
      _refreshAdminClientRows();
      if (cid) openAdminClientPane(cid);  // re-render pane contents; pane stays open
    } else toast(result.message, 'error');
  } catch(err) { toast(err.message, 'error'); }
}

async function adminToggleAccountLock(clientId, clientName, isCurrentlyLocked) {
  let reason = '';
  if (!isCurrentlyLocked) {
    reason = await appPromptModal('<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock Account</span>', 'This will block <strong>ALL plans</strong> for <strong>' + (clientName || clientId) + '</strong>. The client cannot access their portal. Mail logging will continue normally.', 'Reason (optional)', false);
    if (reason === null) return;
  } else {
    const ok = await appConfirmModal('<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Unlock Account</span>', 'Unlock the entire account for <strong>' + (clientName || clientId) + '</strong>? All plans will be accessible again.', 'Unlock Account', false);
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action: 'toggleAccountLock', uuid: STATE.uuid, clientId, reason: reason || null });
    if (result.status === 'ok') {
      toast(result.locked ? 'Account suspended' : 'Account unlocked');
      // Account override lives on every plan card for this client in the cache.
      const newReason = result.locked ? _buildLockReason(reason) : null;
      _adminAllPlanCards.forEach(p => {
        if (p.clientId === clientId) {
          p.clientAccessOverride = result.locked ? 'suspended' : null;
          p.clientOverrideReason = newReason;
          p.clientOverrideBy     = result.locked ? STATE.uuid : null;
        }
      });
      _refreshAdminClientRows();
      if (clientId) openAdminClientPane(clientId);  // re-render pane contents; pane stays open
    } else toast(result.message, 'error');
  } catch(err) { toast(err.message, 'error'); }
}

// Mirror the adapter's reason-stamping so cached display matches the DB without a re-fetch.
function _buildLockReason(reason) {
  const byLabel = 'admin' + (STATE.staffName ? ' (' + STATE.staffName + ')' : '');
  return reason ? (reason + ' \u2014 by ' + byLabel) : ('Suspended by ' + byLabel);
}

// Re-render the client list (behind the open pane) without wiping the whole section.
function _refreshAdminClientRows() {
  if (document.getElementById('apc-list')) filterAdminPlanCards();
}

    }
  });
}

async function submitAddTempRecipient(planCardId, i) {
  const fnameEl = document.getElementById('tmp-fname-' + i);
  const lnameEl = document.getElementById('tmp-lname-' + i);
  const typeEl  = document.getElementById('tmp-type-'  + i);
  const langEl  = document.getElementById('tmp-lang-'  + i);
  const notesEl = document.getElementById('tmp-notes-' + i);
  const hintEl  = document.getElementById('tmp-hint-'  + i);
  const type    = typeEl ? typeEl.value : 'individual';
  const fname   = fnameEl ? fnameEl.value.trim() : '';
  const lname   = lnameEl ? lnameEl.value.trim() : '';
  const name    = type === 'company' ? fname : [fname, lname].filter(Boolean).join(' ');

  if (!fname) { toast('First name is required.', 'error'); if (fnameEl) fnameEl.focus(); return; }
  if (type === 'individual' && !lname) {
    if (hintEl) hintEl.style.display = 'block';
    toast('Please enter both first and last name.', 'error');
    if (lnameEl) lnameEl.focus();
    return;
  }
  if (hintEl) hintEl.style.display = 'none';

  try {
    const result = await apiPost({
      action:     'addTempRecipient',
      uuid:       STATE.uuid,
      planCardId,
      name,
      type,
      language:   langEl ? langEl.value : 'en',
      notes:      notesEl ? notesEl.value.trim() : ''
    });
    if (result.status === 'ok') {
      toast('Temporary recipient added', 'success');
      const newRid   = result.recipientId;
      const newNm    = name;
      const newType  = type;
      const newNotes = notesEl ? notesEl.value.trim() : '';
      const enc      = encodeURIComponent(newNm).replace(/'/g,'%27');
      const bodyId   = 'clpcb' + planCardId.replace(/[^a-z0-9]/gi,'');
      const body     = document.getElementById(bodyId);
      if (body) {
        let tdiv = body.querySelector('.cl-tdiv');
        if (!tdiv) {
          tdiv = document.createElement('div');
          tdiv.className = 'cl-tdiv';
          tdiv.innerHTML = '<div class="cl-tdivl"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-1px;margin-right:3px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Temporary</div>';
          body.appendChild(tdiv);
        }
        const noteDisp = newNotes ? '  \u00B7 ' + newNotes : '';
        tdiv.insertAdjacentHTML('beforeend',
          '<div class="cl-recr" data-rid="' + newRid + '">' +
          '<div class="cl-recav tmp">T</div>' +
          '<div class="cl-recinfo">' +
            '<div class="cl-recnm">' + newNm +
              '&nbsp;<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:5px;font-weight:600">TEMP</span>' +
            '</div>' +
            '<div class="cl-recst">' + newType.charAt(0).toUpperCase() + newType.slice(1) + noteDisp + '</div>' +
          '</div>' +
          '<span class="cl-rst on">active</span>' +
          '<button class="btn btn-secondary btn-xs" style="color:#C62828;flex-shrink:0" ' +
            'onclick="deactivateRecipient(\'' + newRid + '\',\'' + enc + '\')">Deactivate</button>' +
          '</div>'
        );
        const pc = _adminAllPlanCards.find(p => p.planCardId === planCardId);
        if (pc) {
          pc.recipients = (pc.recipients || []).concat([{
            recipientId: newRid, id: newRid, name: newNm,
            recipientType: newType, status: 'active',
            notes: 'TEMP: ' + newNotes, isTempRecipient: true
          }]);
        }
        qs('add-temp-' + i).style.display = 'none';
        tmpReset(i);
      } else {
        qs('add-temp-' + i).style.display = 'none';
        tmpReset(i);
        await loadAdminPlanCards();
      }
    } else throw new Error(result.message || 'Failed');
  } catch(err) { toast(err.message, 'error'); }
}

function tmpTypeChange(i) {

function tmpCheckName(i) {
  const typeEl  = document.getElementById('tmp-type-' + i);
  const fnEl    = document.getElementById('tmp-fname-' + i);
  const lnEl    = document.getElementById('tmp-lname-' + i);
  const hintEl  = document.getElementById('tmp-hint-'  + i);

function tmpReset(i) {
  ['tmp-fname-','tmp-lname-','tmp-notes-'].forEach(p => {
    const el = document.getElementById(p + i);
    if (el) el.value = '';
  });
  const typeEl = document.getElementById('tmp-type-' + i);
  if (typeEl) typeEl.value = 'individual';
  const langEl = document.getElementById('tmp-lang-' + i);
  if (langEl) langEl.value = 'en';
  const hintEl = document.getElementById('tmp-hint-' + i);
  if (hintEl) hintEl.style.display = 'none';
  const lWrap = document.getElementById('tmp-lname-wrap-' + i);
  if (lWrap) lWrap.style.display = '';
  const fLabel = document.getElementById('tmp-fname-label-' + i);
  if (fLabel) fLabel.textContent = 'First Name *';
  const fEl = document.getElementById('tmp-fname-' + i);
  if (fEl) fEl.placeholder = 'Jane';
}

// ─── Recipient activate/deactivate (in-place DOM update) ───
async function deactivateRecipient(recipientId, name) {
  const ok = await appConfirmModal('Deactivate Recipient', 'Deactivate <strong>' + decodeURIComponent(name) + '</strong>? They will be marked inactive and cannot be selected when logging mail.', 'Deactivate', true);
  if (!ok) return;
  await _setRecipientStatus(recipientId, 'inactive');
}

async function reactivateRecipient(recipientId, name) {
  const ok = await appConfirmModal('Re-activate Recipient', 'Re-activate <strong>' + decodeURIComponent(name) + '</strong>?', 'Re-activate', false);
  if (!ok) return;
  await _setRecipientStatus(recipientId, 'active');
}

async function _setRecipientStatus(recipientId, status) {
  try {
    const result = await apiPost({ action:'updateRecipientStatus', uuid:STATE.uuid, recipientId, status });
    if (result.status==='ok') {
      toast(status === 'active' ? 'Recipient re-activated' : 'Recipient deactivated', 'success');
      const row = document.querySelector('[data-rid="' + recipientId + '"]');
      if (row) {
        const isNowActive = status === 'active';
        const badge = row.querySelector('.cl-rst');
        if (badge) { badge.textContent = isNowActive ? 'active' : 'inactive'; badge.className = 'cl-rst ' + (isNowActive ? 'on' : 'off'); }
        const av  = row.querySelector('.cl-recav');  if (av)  av.style.opacity = isNowActive ? '1' : '0.45';
        const nm  = row.querySelector('.cl-recnm');  if (nm)  nm.classList.toggle('off', !isNowActive);
        const btn = row.querySelector('.btn-xs');
        if (btn) {
          const curOnclick = btn.getAttribute('onclick') || '';
          const nameMatch  = curOnclick.match(/,'([^']+)'\)/);
          const encodedName = nameMatch ? nameMatch[1] : '';
          const fn = isNowActive ? 'deactivateRecipient' : 'reactivateRecipient';
          btn.textContent = isNowActive ? 'Deactivate' : 'Re-activate';
          btn.style.color = isNowActive ? '#C62828' : 'var(--green)';
          btn.setAttribute('onclick', fn + "('" + recipientId + "','" + encodedName + "')");
        }
        const pc = _adminAllPlanCards.find(p => (p.recipients||[]).some(r => (r.recipientId||r.id) === recipientId));
        if (pc) { const r = pc.recipients.find(r => (r.recipientId||r.id) === recipientId); if (r) r.status = status; }
      } else {
        await loadAdminPlanCards();

    } else throw new Error(result.message||'Failed');

}

// \u2550\u2550\u2550 NOTIFICATION LOG \u2550\u2550\u2550
async function loadNotificationLog(pg) {
  var navGen = window._navGen;
  if (pg !== undefined) _notifLogPage = pg;
  const c = qs('admin-content');
  c.innerHTML = _pageLoader();
  try {
    const from = _notifLogPage * NOTIFLOG_PS;
    // cq() hard-codes .select('*') with no count option, so mirror the Audit Log:
    // raw sb + count:'exact' + the same company_id scope guard cq() applies.
    let q = sb.from('notification_log').select('*', { count: 'exact' }).order('created_at', { ascending: false });
    if (STATE.companyId) { q = q.eq('company_id', STATE.companyId); }
    else { console.warn('loadNotificationLog(): no STATE.companyId \u2014 scoping to no-company (zero rows).'); q = q.eq('company_id', _NO_COMPANY); }
    // Server-side type filter (active chip) so it spans ALL rows + the count/pager
    // reflect the filtered set, not the whole table.
    if (_nlogTypeFilter && NLOG_TYPE_GROUPS[_nlogTypeFilter]) { q = q.in('type', NLOG_TYPE_GROUPS[_nlogTypeFilter]); }
    else if (_nlogTypeFilter) { q = q.eq('type', _nlogTypeFilter); }
    // Server-side text search (on Enter) across stored columns so it spans ALL
    // rows. Mirrors the Login Events pattern: sanitize wildcard/delimiter chars,
    // then .or(ilike). Note: person NAMES aren't stored on the log (only IDs), so
    // name matching stays page-local in filterNotifLog as a bonus.
    const _nlSearch = (window._nlogSearch || '').trim();
    // Remember the term the SERVER searched with. The page-local pass in
    // filterNotifLog must NOT re-filter a committed server result (its field list
    // differs from the server's — e.g. it omits `id` — so it would wrongly drop
    // valid matches). It only narrows when the user is live-typing a NEW term.
    window._nlogServerSearch = _nlSearch;
    if (_nlSearch) {
      const _safe = _nlSearch.replace(/[%,()]/g, ' ');
      q = q.or(`recipient_id.ilike.%${_safe}%,related_id.ilike.%${_safe}%,notification_id.ilike.%${_safe}%,id.ilike.%${_safe}%,recipient_email.ilike.%${_safe}%,subject.ilike.%${_safe}%,message.ilike.%${_safe}%`);
    }
    q = q.range(from, from + NOTIFLOG_PS - 1);
    const { data, error, count } = await q;
    if (error) throw error;
    const logs = data || [];
    _nlogTotal = count || 0;

    // Resolve client names for display
    const clientIds = [...new Set(logs.filter(l => l.recipient_type === 'client').map(l => l.recipient_id).filter(Boolean))];
    const clientMap = {};
    if (clientIds.length) {
      const { data: clients } = await cqSel('clients','id, given_name, family_name, email').in('id', clientIds);
      (clients||[]).forEach(cl => { clientMap[cl.id] = { name: [cl.given_name, cl.family_name].filter(Boolean).join(' ') || cl.email, email: cl.email }; });
    }
    // Resolve staff names (staff table is keyed by staff_id; only staff/admin
    // recipients have one. 'email' rows carry an address in recipient_id, not a
    // staff_id, so exclude them — otherwise we'd run a guaranteed-empty lookup.)
    const staffIds = [...new Set(logs.filter(l => l.recipient_type === 'staff' || l.recipient_type === 'admin').map(l => l.recipient_id).filter(Boolean))];
    const staffMap = {};
    if (staffIds.length) {
      const { data: staff } = await cqSel('staff','staff_id, name, email').in('staff_id', staffIds);
      (staff||[]).forEach(s => { staffMap[s.staff_id] = { name: s.name, email: s.email }; });
    }

    // Attach resolved names
    logs.forEach(l => {
      if (l.recipient_type === 'client') {
        l._name = clientMap[l.recipient_id]?.name || null;
        l._email = clientMap[l.recipient_id]?.email || l.recipient_email || null;
      } else if (l.recipient_type === 'email') {
        // Email rows have no person to resolve — recipient_id IS the address.
        l._name = null;
        l._email = l.recipient_email || l.recipient_id || null;
      } else {
        l._name = staffMap[l.recipient_id]?.name || null;
        l._email = staffMap[l.recipient_id]?.email || l.recipient_email || null;
      }
    });

    const _nlTp = Math.ceil(_nlogTotal / NOTIFLOG_PS) || 1;
    const _nlFrom = _nlogTotal ? (_notifLogPage * NOTIFLOG_PS + 1) : 0;
    const _nlTo = Math.min(_nlogTotal, (_notifLogPage + 1) * NOTIFLOG_PS);
    const _nlPager = _nlTp > 1
      ? '<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px"><button class="btn btn-secondary btn-sm" ' + (_notifLogPage === 0 ? 'disabled' : '') + ' onclick="loadNotificationLog(' + (_notifLogPage - 1) + ')">\u2190</button><span style="font-size:12px;color:var(--ink-3)">Page ' + (_notifLogPage + 1) + '/' + _nlTp + '</span><button class="btn btn-secondary btn-sm" ' + (_notifLogPage >= _nlTp - 1 ? 'disabled' : '') + ' onclick="loadNotificationLog(' + (_notifLogPage + 1) + ')">\u2192</button></div>'
      : '';

    if (typeof navIsStale === 'function' && navIsStale(navGen)) return;
    c.innerHTML = `
      <div style="max-width:960px;margin:0 auto;padding-bottom:36px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div class="section-title" style="margin:0">Notification Log</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:11px;color:var(--ink-4)">${_nlogTotal ? _nlFrom + '\u2013' + _nlTo + ' of ' + _nlogTotal : '0 entries'}</span>
          <button class="refresh-btn" id="notiflog-refresh-btn" onclick="refreshNotificationLog()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="notiflog-refresh-icon" style="transition:transform .35s"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Refresh</button>
        </div>
      </div>
      <div style="position:relative;margin-bottom:10px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" style="position:absolute;left:14px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="nlog-search" placeholder="Search by ID, email, subject, message \u2014 press Enter" value="${(window._nlogSearch||'').replace(/"/g,'&quot;')}"
          style="width:100%;padding:10px 14px 10px 42px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-family:inherit;background:var(--white)"
          oninput="window._nlogSearch=this.value"
          onkeydown="if(event.key==='Enter'){event.preventDefault();window._nlogSearch=this.value;_nlogSearchNow();}">
        ${(window._nlogSearch||'').trim() ? '<button onclick="window._nlogSearch=\'\';loadNotificationLog(0)" title="Clear search" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-4);display:flex;padding:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' : ''}
        ${(window._nlogSearch||'').trim() ? '<button onclick="window._nlogSearch=\'\';loadNotificationLog(0)" title="Clear search" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-4);display:flex;padding:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' : ''}

      </div>
      <div id="nlog-list"></div>
      ${_nlPager}
      </div>`;

    window._nlogData = logs;
    filterNotifLog();
    // Typing triggered this fetch -> the whole view (incl. the input) re-rendered,
    // so refocus the search box and drop the caret at the end to keep typing.
    if (window._nlogWantFocus) {
      window._nlogWantFocus = false;
      const _si = document.getElementById('nlog-search');
      if (_si) { _si.focus(); const _v = _si.value; _si.setSelectionRange(_v.length, _v.length); }

let _nlogTypeFilter = '';
// Chip value -> notification_log `type` values. Module scope so both the server
// fetch (loadNotificationLog) and the page render share one source of truth.
const NLOG_TYPE_GROUPS = {
  mail: ['mail_received','mail_picked_up','mail_reassigned','forwarding_batch'],
  expiry: ['expiry_warning','due_today'],
  payment: ['payment_failed','payment_issue'],
  id: ['id_submitted','id_reviewed','id_approved','id_rejected'],
  task: ['task_assigned','task_comment','task_created'],
  recipient: ['recipient_added','recipient_status_changed'],

function setNlogFilter(btn, val) {

  // Type filtering is server-side now (so it spans ALL rows, not just the loaded

  loadNotificationLog(0);
}

// Search is server-side (spans ALL rows). Typing fires a debounced fetch so it
// searches the whole table, not just the loaded page; Enter fires immediately.
// _nlogWantFocus tells loadNotificationLog to restore focus/caret to the search
// box after it re-renders (otherwise typing would lose focus on each fetch).
let _nlogSearchTimer = null;
function _nlogSearchNow() {
  clearTimeout(_nlogSearchTimer);

}
function _nlogSearchDebounced() {
  clearTimeout(_nlogSearchTimer);
  _nlogSearchTimer = setTimeout(_nlogSearchNow, 350);
}

let _dangerZoneOpen = false;
async function toggleDangerZone() {
  if (!_dangerZoneOpen) {
    const ok = await adminPasswordGate('Danger Zone', 'Verify your identity to access protected data reset actions.');
    if (!ok) return;
  }
  _dangerZoneOpen = !_dangerZoneOpen;
  const body = document.getElementById('danger-zone-body');
  const chevron = document.getElementById('danger-zone-chevron');
  if (body) body.style.display = _dangerZoneOpen ? 'block' : 'none';
  if (chevron) chevron.style.transform = _dangerZoneOpen ? 'rotate(90deg)' : '';
  if (_dangerZoneOpen) loadDangerZoneCounts();
}

async function dangerDelete(key, label, count) {
  if (count === 0) return;
  const ok = await appConfirmModal('Delete ' + label, 'Permanently delete <strong>' + count.toLocaleString() + ' ' + label.toLowerCase() + ' records</strong>?<br><br>This action cannot be undone.', 'Delete ' + label, true);
  if (!ok) return;

  try {
    const _cid = STATE.companyId;
    if (!_cid) { toast('No company context — aborting', 'error'); return; }
    if (key === 'tasks') {
      // Delete comments + views first (foreign key). Scope children via this
      // company's task_ids; task_views also carries company_id directly.
      const { data: _tk } = await sb.from('tasks').select('task_id').eq('company_id', _cid);
      const _tids = (_tk || []).map(t => t.task_id);
      if (_tids.length) await sb.from('task_comments').delete().in('task_id', _tids);
      try { await sb.from('task_views').delete().eq('company_id', _cid); } catch(e) {}
      await sb.from('tasks').delete().eq('company_id', _cid);
    } else if (key === 'task_comments') {
      const { data: _tk } = await sb.from('tasks').select('task_id').eq('company_id', _cid);
      const _tids = (_tk || []).map(t => t.task_id);
      if (_tids.length) await sb.from('task_comments').delete().in('task_id', _tids);
    } else if (key === 'audit_log') {
      await sb.from('audit_log').delete().eq('company_id', _cid);
    } else if (key === 'notification_log') {
      await sb.from('notification_log').delete().eq('company_id', _cid);
    } else if (key === 'notifications') {
      await sb.from('notifications').delete().eq('company_id', _cid);
    } else if (key === 'mail_log') {
      await sb.from('mail_log').delete().eq('company_id', _cid);
    } else if (key === 'forwarding_batches') {
      // forwarding_batches has NO company_id column — scope via client_id.
      const { data: _cl } = await sb.from('clients').select('id').eq('company_id', _cid);
      const _cids = (_cl || []).map(c => c.id);
      if (_cids.length) await sb.from('forwarding_batches').delete().in('client_id', _cids);
    } else if (key === 'document_declarations') {
      await sb.from('document_declarations').delete().eq('company_id', _cid);
    }

    // Log this action (will be the only entry after clearing audit)
    await sb.from('audit_log').insert({
      company_id: STATE.companyId,
      staff_id: STATE.uuid, staff_name: STATE.staffName,
      action: 'data_reset', entity_type: key,
      summary: 'Admin cleared ' + count + ' records from ' + label
    });

    toast(label + ' cleared (' + count + ' records)', 'success');
    loadDangerZoneCounts();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function dangerNuclear() {
  const ok1 = await appConfirmModal('Nuclear Reset', 'This will permanently delete <strong>ALL</strong> of the following:<br><br>\u2022 Audit log<br>\u2022 Notification log<br>\u2022 All notifications<br>\u2022 All task comments<br>\u2022 All tasks<br>\u2022 All mail log entries<br>\u2022 All forwarding batches<br><br><span style="color:#C62828;font-weight:700">This cannot be undone.</span>', '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:5px"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Yes, Delete Everything', true);
  if (!ok1) return;

  const ok2 = await appConfirmModal('Final Confirmation', 'Type <strong>RESET</strong> in your mind and click confirm. Are you absolutely sure?', '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:5px"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> CONFIRM NUCLEAR RESET', true);
  if (!ok2) return;

  try {
    const _cid = STATE.companyId;
    if (!_cid) { toast('No company context — aborting', 'error'); return; }
    toast('Clearing all data...', 'info');
    // Order matters \u2014 foreign keys. All scoped to THIS company only.
    const { data: _tk } = await sb.from('tasks').select('task_id').eq('company_id', _cid);
    const _tids = (_tk || []).map(t => t.task_id);
    if (_tids.length) await sb.from('task_comments').delete().in('task_id', _tids);
    try { await sb.from('task_views').delete().eq('company_id', _cid); } catch(e) {}
    await sb.from('tasks').delete().eq('company_id', _cid);
    await sb.from('notification_log').delete().eq('company_id', _cid);
    await sb.from('notifications').delete().eq('company_id', _cid);
    try {
      // forwarding_batches has NO company_id — scope via client_id.
      const { data: _cl } = await sb.from('clients').select('id').eq('company_id', _cid);
      const _cids = (_cl || []).map(c => c.id);
      if (_cids.length) await sb.from('forwarding_batches').delete().in('client_id', _cids);
    } catch(e) {}
    await sb.from('mail_log').delete().eq('company_id', _cid);
    await sb.from('audit_log').delete().eq('company_id', _cid);

    // Log the nuclear reset as the only audit entry
    await sb.from('audit_log').insert({
      company_id: STATE.companyId,
      staff_id: STATE.uuid, staff_name: STATE.staffName,
      action: 'nuclear_reset', entity_type: 'system',
      summary: 'Admin performed nuclear reset \u2014 all data cleared'
    });

    toast('Nuclear reset complete. All data cleared.', 'success');
    loadDangerZoneCounts();
  } catch(e) { toast('Error during reset: ' + e.message, 'error'); }
}

async function dangerClearExpiredScans(count) {

    'Clear Expired Scan Files',

  );
  if (!ok) return;
  try {

function openConnector(name) {
  const cfg = window._intCfg || {};
  const mount = document.getElementById('int-panel-mount');
  if (!mount) return;
  let html = '';
  if (name === 'resend') html = intPanelResend(cfg);
  else if (name === 'stripe') html = intPanelStripe(cfg, window._intStripeMode || 'live');
  else if (name === 'ai') html = intPanelAi();
  else if (name === 'repair') html = intPanelRepair();
  mount.innerHTML = html;
  document.querySelectorAll('#int-grid .int-tile').forEach(function(t){
    t.classList.toggle('is-open', t.getAttribute('data-conn') === name);
  });
  mount.scrollIntoView({behavior:'smooth', block:'start'});
}

function closeConnector() {
  const mount = document.getElementById('int-panel-mount');
  if (mount) mount.innerHTML = '';
  document.querySelectorAll('#int-grid .int-tile').forEach(function(t){ t.classList.remove('is-open'); });
}

function generateRepairKey() {
  var bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  var hex = Array.from(bytes).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  var fingerprint = hex.slice(0,4) + ':' + hex.slice(4,8) + ':' + hex.slice(-4);
  var keyEl = document.getElementById('int-repair-key');
  var copyBtn = document.getElementById('int-repair-copy');
  var statusEl = document.getElementById('int-repair-status');
  var log = document.getElementById('int-repair-log');
  var led = document.getElementById('int-repair-led');
  var ledTxt = document.getElementById('int-repair-led-txt');
  var meta = document.getElementById('int-repair-meta');
  var fp = document.getElementById('int-repair-fp');

  if (led) led.style.background = '#FEBC2E';
  if (ledTxt) ledTxt.textContent = 'generating';
  if (log) log.innerHTML = '<div><span style="color:#4ADE80">$</span> repair-key --generate --bits 256</div><div style="color:#6E6E7A">collecting entropy<span id="int-repair-dots"></span></div>';
  if (keyEl) { keyEl.textContent = 'generating\u2026'; keyEl.style.color = '#6E6E7A'; }
  if (copyBtn) { copyBtn.disabled = true; copyBtn.style.opacity = '.55'; }

  }
}

function _initDeclDrag() {
  const listEl = document.getElementById('decl-list');
  if (!listEl) return;

  let draggingEl = null;
  let ghost = null;

  function makeGhost(h) {
    const g = document.createElement('div');
    g.style.cssText = 'height:' + h + 'px;border:1.5px dashed var(--border);background:var(--bg);box-sizing:border-box;flex-shrink:0;';
    return g;
  }

  // Dragstart — attach to each row
  listEl.querySelectorAll('.decl-row').forEach(function(row) {
    row.addEventListener('dragstart', function(e) {
      draggingEl = row;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.id);
      const h = row.getBoundingClientRect().height;
      ghost = makeGhost(h);
      setTimeout(function() {
        if (!draggingEl) return;
        draggingEl.style.opacity = '0.5';
        draggingEl.style.outline = '2px solid #1D9E75';
        draggingEl.style.outlineOffset = '-2px';
        listEl.insertBefore(ghost, draggingEl);
      }, 0);
    });

    row.addEventListener('dragend', function() {
      row.style.opacity = '';
      row.style.outline = '';
      row.style.outlineOffset = '';
      if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
      ghost = null;
      draggingEl = null;
    });
  });

  // Container-level dragover — moves ghost to show drop position
  listEl.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (!ghost || !draggingEl) return;
    const rows = Array.from(listEl.querySelectorAll('.decl-row')).filter(function(r) { return r !== draggingEl; });
    if (!rows.length) return;
    let placed = false;
    for (let i = 0; i < rows.length; i++) {
      const rect = rows[i].getBoundingClientRect();
      if (e.clientY <= rect.top + rect.height / 2) {
        if (ghost.nextSibling !== rows[i]) listEl.insertBefore(ghost, rows[i]);
        placed = true;
        break;
      }
    }
    if (!placed) {
      const last = rows[rows.length - 1];
      if (ghost.previousSibling !== last) listEl.insertBefore(ghost, last.nextSibling);
    }
  });

  // Container-level drop
  listEl.addEventListener('drop', function(e) {
    e.preventDefault();
    if (!draggingEl || !ghost || !ghost.parentNode) return;
    listEl.insertBefore(draggingEl, ghost);
    ghost.parentNode.removeChild(ghost);
    ghost = null;
    draggingEl.style.opacity = '';
    draggingEl.style.outline = '';
    draggingEl.style.outlineOffset = '';
    // Build new order from current DOM positions
    const newOrder = Array.from(listEl.querySelectorAll('.decl-row')).map(function(r, i) {
      return { id: r.dataset.id, sort_order: i * 10 };
    });
    const el = draggingEl;
    draggingEl = null;
    apiPost({ action: 'reorderDeclarations', uuid: STATE.uuid, order: newOrder })
      .then(function(res) {
        if (res.status === 'ok') loadDeclarations();
        else toast(res.message, 'error');
      })
      .catch(function() { toast('Reorder failed', 'error'); });
  });
}

async function addDeclaration() {

  if (!text) { toast('Enter declaration text', 'error'); return; }
  try {
    const _next = ((window._declData || []).reduce((m, d) => Math.max(m, d.sort_order || 0), 0)) + 10;

async function toggleBrandingSetting(key, value) {
  if (_noCompanyAbort('toggleBrandingSetting', true)) return;
  // Insert-or-update: if no row exists yet for this company (the default
  // "logo shown" state has no branding_logo_enabled row), a bare UPDATE
  // matches zero rows and silently saves nothing — making the toggle snap
  // back on reload. Upsert the same way saveBrandingSetting does.
  const { data: existing } = await cfgq('key').eq('key', key).maybeSingle();
  let error;
  if (existing) {
    ({ error } = await sb.from('config').update({ value: String(value) }).eq('key', key).eq('company_id', STATE.companyId));
  } else {
    ({ error } = await sb.from('config').insert({ company_id: STATE.companyId, key, value: String(value), description: 'Branding setting' }));
  }
  if (error) { toast(error.message, 'error'); return; }
  toast(value === '0' || value === 0 ? 'Logo disabled' : 'Logo enabled');
  loadBranding();
  // Re-apply the header logo show/hide instantly so the toggle reflects with no reload.
  try {
    const _br = await getBranding(localStorage.getItem('sb_admin_staff_id'), false);
    applyHeaderLogo(_br);
  } catch(e) {}
}

async function saveBrandingSetting(key, value) {
  if (_noCompanyAbort('saveBrandingSetting', true)) return;
  const { data: existing } = await cfgq('key').eq('key', key).maybeSingle();
  let error;
  if (existing) {
    ({ error } = await sb.from('config').update({ value }).eq('key', key).eq('company_id', STATE.companyId));
  } else {
    ({ error } = await sb.from('config').insert({ company_id: STATE.companyId, key, value, description: 'Branding setting' }));
  }
  if (error) toast(error.message, 'error');
  else { toast('Saved'); loadBranding(); }
}

async function loadAdminTasks(skipFullRebuild) {
  var navGen = window._navGen;
  const c = qs('admin-content');
  if (!skipFullRebuild) { c.innerHTML = _pageLoader(); _adminOpenTaskId = null; }
  try {
    const _t0 = performance.now();
    const result = await apiPost({ action: 'getAllTasks', uuid: STATE.uuid });
    _adminTasksCache = result.tasks || [];
    const _t1 = performance.now();
    const { data: staffList } = await cqSel('staff','staff_id, name').eq('active', true);
    _adminStaffMap = {};
    (staffList||[]).forEach(s => { _adminStaffMap[s.staff_id] = s.name; });

    _adminTaskLocs = [];
    _adminTaskLocMap = {};
    if (STATE.role === 'admin') {
      try { const { data: _locs } = await cqSel('locations','location_id,name').eq('active', true); _adminTaskLocs = _locs || []; } catch(e) { _adminTaskLocs = []; }
      _adminTaskLocs.forEach(l => { _adminTaskLocMap[l.location_id] = l.name; });
    }

    if (typeof navIsStale === 'function' && navIsStale(navGen)) return;
    if (!skipFullRebuild) renderAdminTasksFull();
    else renderAdminTasksTimeline();
  } catch(e) { if (typeof navIsStale === 'function' && navIsStale(navGen)) return; c.innerHTML = '<div style="color:var(--required);padding:20px">Error: '+e.message+'</div>'; }
}

// displays an arbitrary label (e.g. a staff name) while copying a different value

function _atlCopyChipNamed(displayText, copyVal, label) {

// Navigate from a task to the Clients (plan cards) view, open the client's pane,
// and expand + scroll to the exact plan card that was clicked. Mirrors the staff
// portal behavior, adapted to admin's openAdminClientPane / _clPcToggle / _adminAllPlanCards.
function _atlOpenPlanCard(clientId, planCardId) {
  if (!clientId && !planCardId) { switchSection('plancards'); return; }
  let cid = clientId || null;
  if (cid) window._currentOpenClientId = cid;
  switchSection('plancards');

  const san    = (planCardId || '').replace(/[^a-z0-9]/gi, '');
  const bodyId = 'clpcb' + san;
  const chevId = 'clpch' + san;
  let elapsed = 0;
  const STEP = 60, BUDGET = 6000;
  let stableOpen = 0, didScroll = false;

  const timer = setInterval(function(){
    elapsed += STEP;
    const dataLoaded = Array.isArray(_adminAllPlanCards);

    if (!cid && dataLoaded && planCardId) {
      const _match = _adminAllPlanCards.find(function(pc){ return pc.planCardId === planCardId; });
      if (_match && _match.clientId) { cid = _match.clientId; window._currentOpenClientId = cid; }
    }

    const pane = document.getElementById('cl-detail-pane');
    const paneOpen = pane && pane.classList.contains('open');
    const rightClient = cid && window._currentOpenPaneClientId === cid;
    const dataReady = dataLoaded && cid && _adminAllPlanCards.some(function(pc){ return pc.clientId === cid; });

    if (dataReady && (!paneOpen || !rightClient) && typeof openAdminClientPane === 'function') {
      openAdminClientPane(cid);
      if (elapsed < BUDGET) return;
    }

    if (!san) {
      if (paneOpen && rightClient) clearInterval(timer);
      else if (elapsed >= BUDGET) clearInterval(timer);
      return;
    }

    const body = document.getElementById(bodyId);
    const hdr  = document.getElementById('clpch-wrap-' + bodyId);
    if (body && hdr) {
      if (!body.classList.contains('open')) { _clPcToggle(bodyId, chevId); stableOpen = 0; }
      else { stableOpen++; }
      if (!didScroll) { didScroll = true; setTimeout(function(){ try { hdr.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e){} }, 90); }
      if (stableOpen >= 3) { clearInterval(timer); return; }
    }

    if (elapsed >= BUDGET) clearInterval(timer);
  }, STEP);
}

function _renderAtlStats() {
  const stats = qs('atl-stats');
  if (!stats) return;
  let tasks = _adminTasksCache || [];
  if (_adminTaskLocFilter) tasks = tasks.filter(t => t.locationId === _adminTaskLocFilter);
  const todayTor = new Date().toLocaleDateString('en-CA', { timeZone: COMPANY_DEFAULT_TZ || 'America/Toronto' });
  const open = tasks.filter(t => (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup');
  const overdue = open.filter(t => t.dueDate && t.dueDate.split('T')[0] < todayTor);
  const unclaimed = open.filter(t => !t.assignedTo);
  const resolved = tasks.filter(t => t.status === 'resolved');
  const doneToday = resolved.filter(t => {
    if (!t.resolvedAt) return false;
    return new Date(t.resolvedAt).toLocaleDateString('en-CA', { timeZone: COMPANY_DEFAULT_TZ || 'America/Toronto' }) === todayTor;
  });
  stats.innerHTML =
      '<div class="atl-stat"><div class="atl-stat-num" style="color:var(--required)">' + open.length + '</div><div class="atl-stat-lbl">Open</div></div>'
    + '<div class="atl-stat"><div class="atl-stat-num" style="color:#B8690A">' + overdue.length + '</div><div class="atl-stat-lbl">Overdue</div></div>'
    + '<div class="atl-stat"><div class="atl-stat-num" style="color:var(--blue)">' + unclaimed.length + '</div><div class="atl-stat-lbl">Unclaimed</div></div>'
    + '<div class="atl-stat"><div class="atl-stat-num" style="color:var(--green)">' + resolved.length + '</div><div class="atl-stat-lbl">Done <span style="font-weight:700;color:var(--ink-4)">\u00b7 ' + doneToday.length + ' today</span></div></div>';
}

function _atlTaskCard(task, nodeClass) {
  const meta = _ATL_TASK_META[task.type] || { label: task.type };
  const pm = _ATL_PRI_META[task.priority] || _ATL_PRI_META.medium;
  const isOpen = _adminOpenTaskId === task.taskId;
  const todayTor = new Date().toLocaleDateString('en-CA', { timeZone: COMPANY_DEFAULT_TZ || 'America/Toronto' });
  const isOverdue = task.dueDate && task.dueDate.split('T')[0] < todayTor
    && task.status !== 'resolved' && task.status !== 'snoozed';

  let badges = '';
  if (isOverdue)                          badges += '<span class="atl-badge overdue">Overdue</span>';
  else if (task.status === 'in_progress') badges += '<span class="atl-badge inprog">Active</span>';
  else if (!task.assignedTo && (task.status === 'open' || task.status === 'in_progress'))
                                          badges += '<span class="atl-badge unclaimed">Unclaimed</span>';
  else if (task.status === 'resolved')    badges += '<span class="atl-badge done">Done</span>';
  else if (task.status === 'snoozed')     badges += '<span class="atl-badge snoozed">Snoozed</span>';
  if (task.hasUnread && task.commentCount) badges += '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--blue);color:#fff;padding:3px 8px;border-radius:100px;font-weight:700"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' + task.commentCount + '</span>';

  const label  = meta.label || task.type;
  const dueStr = task.dueDate ? 'Due ' + new Date(task.dueDate.split('T')[0] + 'T12:00:00').toLocaleDateString('en-CA', { month:'short', day:'numeric' }) : '';
  const assignedName = task.assignedTo ? (_adminStaffMap[task.assignedTo] || task.assignedTo) : '';
  const sub    = [label, task.clientName || (task.clientId ? task.clientId.slice(0,10) + '\u2026' : '') || assignedName, dueStr].filter(Boolean).join(' \u00b7 ');
  const priPulse = pm.pulse ? ';animation:urgPulse 1s ease-in-out infinite' : '';
  let locTag = '';
  if (_adminTaskLocFilter === '' && STATE.role === 'admin') {
    const _locName = task.locationId ? (_adminTaskLocMap[task.locationId] || task.locationId) : 'All locations';

// ── Timeline render (replaces renderAdminTaskTable) ──────────────
function renderAdminTasksTimeline() {
  // Type-filter chips are rebuilt each render so alert counts stay live.
  _renderAtlTypeChips();
  document.querySelectorAll('#admin-task-date-filters button').forEach(function(b){
    const isActive = b.dataset.datefilter === _adminTaskDateRange;
    b.style.background = isActive ? 'var(--white)' : 'transparent';
    b.style.color = isActive ? 'var(--ink)' : 'var(--ink-4)';
    b.style.boxShadow = isActive ? '0 1px 2px rgba(0,0,0,0.08)' : 'none';
  });
  _renderAtlStats();
  _renderAtlChips();

  const feed = qs('admin-tl-feed');
  if (!feed || !_adminTasksCache) return;
  const tasks = _adminTasksCache;
  const todayTor = new Date().toLocaleDateString('en-CA', { timeZone: COMPANY_DEFAULT_TZ || 'America/Toronto' });

  const open = tasks.filter(t => (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup');
  const resolved = tasks.filter(t => t.status === 'resolved');
  const snoozed = tasks.filter(t => t.status === 'snoozed');
  const overdue = open.filter(t => t.dueDate && t.dueDate.split('T')[0] < todayTor);

  let filterTasks =
      _adminTaskFilter === 'open'       ? [...open]
    : _adminTaskFilter === 'unclaimed'  ? open.filter(t => !t.assignedTo)
    : _adminTaskFilter === 'overdue'    ? [...overdue]
    : _adminTaskFilter === 'snoozed'    ? [...snoozed]
    : _adminTaskFilter === 'resolved'   ? [...resolved]
    : _adminTaskFilter === 'mine'       ? tasks.filter(t => t.assignedTo === STATE.uuid && (t.status === 'open' || t.status === 'in_progress'))
    : _adminTaskFilter === 'cancellation' ? tasks.filter(t => t.type === 'cancellation_request')
    : [...tasks];

  if (_adminTaskTypeFilter) filterTasks = filterTasks.filter(t => t.type === _adminTaskTypeFilter);

  if (_adminTaskSearch) {
    const s = _adminTaskSearch.toLowerCase();
    filterTasks = filterTasks.filter(t =>
      (t.title||t.notes||'').toLowerCase().includes(s) ||
      (t.description||'').toLowerCase().includes(s) ||
      (t.type||'').toLowerCase().includes(s) ||
      (t.taskId||'').toLowerCase().includes(s) ||
      (t.clientId||'').toLowerCase().includes(s) ||
      (t.clientName||'').toLowerCase().includes(s) ||
      (_adminStaffMap[t.assignedTo]||'').toLowerCase().includes(s));
  }

  if (_adminTaskDateRange) {
    // Case I: build the window AND compare createdAt on the company calendar, so the
    // range and the rows being filtered use the same zone (not browser + UTC mixed).
    const _tz = COMPANY_DEFAULT_TZ || 'America/Toronto';
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: _tz });
    const [_ty, _tm, _td] = todayStr.split('-').map(Number);
    // Day-of-week of company-today (0=Sun) via a noon-UTC anchor on that calendar date.
    const _anchor = new Date(Date.UTC(_ty, _tm - 1, _td, 12, 0, 0));
    const _dow = _anchor.getUTCDay();
    const _iso = (y, m0, d) => new Date(Date.UTC(y, m0, d, 12, 0, 0)).toISOString().split('T')[0];
    let startDate = '', endDate = '';
    if (_adminTaskDateRange === 'today') { startDate = todayStr; endDate = todayStr; }
    else if (_adminTaskDateRange === 'this_week') { const diff = _td - _dow + (_dow === 0 ? -6 : 1); startDate = _iso(_ty, _tm - 1, diff); }
    else if (_adminTaskDateRange === 'last_week') { const diff = _td - _dow + (_dow === 0 ? -6 : 1); startDate = _iso(_ty, _tm - 1, diff - 7); endDate = _iso(_ty, _tm - 1, diff - 1); }
    else if (_adminTaskDateRange === 'this_month') { startDate = _ty + '-' + String(_tm).padStart(2,'0') + '-01'; }
    else if (_adminTaskDateRange === 'ytd') { startDate = _ty + '-01-01'; }
    filterTasks = filterTasks.filter(t => { const d = t.createdAt ? new Date(t.createdAt).toLocaleDateString('en-CA', { timeZone: _tz }) : ''; return (!startDate || d >= startDate) && (!endDate || d <= endDate); });
  }

  if (_adminTaskLocFilter) filterTasks = filterTasks.filter(t => t.locationId === _adminTaskLocFilter);

  if (!filterTasks.length) {
    const _emptyMsgs = { open:'All clear!', mine:'No tasks assigned to you', overdue:'No overdue tasks', unclaimed:'No unclaimed tasks', snoozed:'No snoozed tasks', resolved:'No completed tasks', all:'No tasks', cancellation:'No open cancellation requests' };
    const _emptyTitle = _emptyMsgs[_adminTaskFilter] || 'No tasks found';
    feed.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>', _emptyTitle, 'Nothing to show for this filter.');
    return;
  }

  const pOrd = {urgent:0,high:1,medium:2,low:3};
  const applySort = arr => {
    if (_adminTaskSort === 'oldest') arr.sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));
    else if (_adminTaskSort === 'due_asc') arr.sort((a,b) => (a.dueDate||'9').localeCompare(b.dueDate||'9'));
    else if (_adminTaskSort === 'due_desc') arr.sort((a,b) => (b.dueDate||'').localeCompare(a.dueDate||''));
    else if (_adminTaskSort === 'priority') arr.sort((a,b) => (pOrd[a.priority]??2) - (pOrd[b.priority]??2));
    else arr.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    return arr;
  };

  let html = '';
  // Grouped timeline only for the broad views; specific filters render flat.
  if (_adminTaskFilter === 'open' || _adminTaskFilter === 'all') {
    const done   = (_adminTaskFilter === 'all') ? filterTasks.filter(t => t.status === 'resolved') : [];
    const active = (_adminTaskFilter === 'all') ? filterTasks.filter(t => t.status !== 'resolved') : filterTasks;
    done.sort((a,b) => { const ad = a.resolvedAt || a.createdAt || ''; const bd = b.resolvedAt || b.createdAt || ''; return ad < bd ? 1 : (ad > bd ? -1 : 0); });
    const unclaimed = applySort(active.filter(t => !t.assignedTo));
    const claimed   = active.filter(t => !!t.assignedTo);
    const dueNow   = applySort(claimed.filter(t => t.dueDate && t.dueDate.split('T')[0] <= todayTor));
    const upcoming = applySort(claimed.filter(t => t.dueDate && t.dueDate.split('T')[0] > todayTor));
    const noDue    = applySort(claimed.filter(t => !t.dueDate));
    if (unclaimed.length) html += _atlSection('Unclaimed',   unclaimed, 'uc',   'var(--amber)', '#92520A');
    if (dueNow.length)    html += _atlSection('Due now',      dueNow,    'due',  '#9E2A1E', 'var(--required)');
    if (upcoming.length)  html += _atlSection('Upcoming',     upcoming,  'up',   'var(--blue)', '#2E7AC7');
    if (noDue.length)     html += _atlSection('No due date',  noDue,     'nd',   'var(--ink-3)', 'var(--ink-4)');
    if (done.length)      html += _atlSection('Done',         done,      'done', 'var(--green)', '#1A6B3C');
  } else {
    html = _atlSection(null, applySort(filterTasks), null, null, null);
  }
  feed.innerHTML = html;
}

    const _self = (STATE.role === 'admin') ? '<option value="' + STATE.uuid + '">' + (STATE.staffName || 'Me') + ' (Me)</option>' : '';

async function atntSearchMail(query) {

      if (error) throw error;

    const cn = m.clientName ? ' <span style="font-weight:400;color:var(--ink-4)">\u00b7 '+m.clientName+'</span>' : '';
    const dateStr = m.loggedAt ? fmtDateLocAdmin(m.loggedAt, m.locationId, {year:undefined}) : '';

      + '<div style="min-width:0"><div style="font-size:13px;font-weight:600;color:var(--ink)">'+typeLabel+fromStr+cn+'</div>'

async function saveAdminTask() {
  const title = qs('at-title')?.value?.trim();
  if (!title) { toast('Title required','error'); return; }
  const locId = qs('at-loc')?.value || '';
  if (STATE.role === 'admin' && !locId) { toast('Location required','error'); return; }
  const assignedTo = qs('at-assign')?.value || null;
  const type = qs('at-type').value;
  const body = {
    action: 'createTask', uuid: STATE.uuid,
    title, description: qs('at-desc').value||null,
    type, priority: qs('at-pri').value,
    assignedTo,
    locationId: locId || null,
    dueDate: qs('at-due').value||null,
    mailId: qs('at-mail')?.value?.trim()||null,
    planCardId: qs('at-plancard')?.value?.trim()||null
  };
  if (type === 'recurring') {
    const startDate = qs('at-recur-start')?.value || new Date().toISOString().split('T')[0];
    const endDate = qs('at-recur-end')?.value || null;
    body.recurringConfig = { frequency: qs('at-freq').value, active: true, next_run: startDate, end_date: endDate };
    body.dueDate = startDate; // First instance due on start date
  }
  if (type === 'post_termination_audit') {
    body.checklist = [
      { key: 'google_maps', label: 'Google Maps listing removed', checked: false },
      { key: 'website', label: 'Website address references removed', checked: false },
      { key: 'mail_disposed', label: 'All remaining mail disposed/returned', checked: false },
      { key: 'forwarding_cleared', label: 'Forwarding address cleared', checked: false },
      { key: 'recipients_removed', label: 'No active recipients remaining', checked: false }
    ];
  }
  try {
    const result = await apiPost(body);
    if (result.status === 'ok') { document.querySelector('.modal-overlay')?.remove(); toast('Task created'); _adminQuietResync(); }
    else throw new Error(result.message);
  } catch(e) { toast(e.message,'error'); }
}

  if (task.plan_card_id) {

      try {
        const { data: pc } = await cqSel('plan_cards','plan_card_id, plan_name, friendly_name, client_id').eq('plan_card_id', task.plan_card_id).maybeSingle();

      atntSelectPlanCard(task.plan_card_id, task.plan_card_id, cardData);
    })();
  }
}

async function saveEditTask(taskId) {
  const title = qs('at-title')?.value?.trim();
  if (!title) { toast('Title required','error'); return; }
  const locId = qs('at-loc')?.value || '';
  if (STATE.role === 'admin' && !locId) { toast('Location required','error'); return; }
  const body = { action: 'updateTask', uuid: STATE.uuid, taskId,
    title, description: qs('at-desc').value||null,
    priority: qs('at-pri').value, assignedTo: qs('at-assign').value||null,
    dueDate: qs('at-due').value||null,
    mailId: qs('at-mail')?.value?.trim()||null,
    planCardId: qs('at-plancard')?.value?.trim()||null };
  if (STATE.role === 'admin') body.locationId = locId || null;
  try {
    const result = await apiPost(body);
    if (result.status === 'ok') {
      document.querySelector('.modal-overlay')?.remove();
      toast('Task updated');
      _adminInlineUpdate(taskId, {
        title, notes: title, description: body.description,
        priority: body.priority, assignedTo: body.assignedTo,
        dueDate: body.dueDate, mailId: body.mailId, planCardId: body.planCardId,
        ...(STATE.role === 'admin' ? { locationId: body.locationId } : {})
      });
    }
    else throw new Error(result.message);
  } catch(e) { toast(e.message,'error'); }
}

// ── Accordion task detail (staff-style inline expand) ────────────
async function adminSelectTask(taskId) {
  const wasOpen = _adminOpenTaskId === taskId;

  // Close previously open card
  if (_adminOpenTaskId) {
    const prev = document.querySelector('[data-atl-taskid="' + _adminOpenTaskId + '"]');
    if (prev) {
      prev.classList.remove('atl-open');
      const pb = prev.querySelector('.atl-frow-body');
      if (pb) pb.remove();
      const pch = prev.querySelector('.atl-chevron');
      if (pch) pch.style.transform = '';
    }
  }

  _adminOpenTaskId = wasOpen ? null : taskId;
  if (wasOpen) return;

  await _adminRenderOpenBody(taskId, { scroll: true });
}

// Builds/refreshes the expanded detail body for the currently-open task card.
// Used both on first expand (adminSelectTask) and after inline updates so the
// open card reflects new state without collapsing or refreshing the page.
async function _adminRenderOpenBody(taskId, opts) {
  opts = opts || {};
  const card = document.querySelector('[data-atl-taskid="' + taskId + '"]');
  if (!card) return;
  card.classList.add('atl-open');
  const chev = card.querySelector('.atl-chevron');
  if (chev) chev.style.transform = 'rotate(180deg)';

  // Replace any existing body with a loading shell
  let body = card.querySelector('.atl-frow-body');
  if (body) body.remove();
  body = document.createElement('div');
  body.className = 'atl-frow-body';
  body.innerHTML = '<div style="padding:8px 0;color:var(--ink-4);font-size:13px"><span style="display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--ink-4);border-radius:50%;animation:atlSpin .6s linear infinite;vertical-align:-2px;margin-right:8px"></span>Loading\u2026</div>';
  card.appendChild(body);

  try {
    const { data: task } = await sb.from('tasks').select('*').eq('task_id', taskId).maybeSingle();
    if (!task) { body.innerHTML = '<div style="padding:8px 0;color:var(--required);font-size:13px">Task not found.</div>'; return; }
    if (_adminOpenTaskId !== taskId) return; // user collapsed/switched while loading

    // Resolve client info
    let clientInfo = null;
    if (task.client_id) {
      const { data: c } = await cqSel('clients','given_name, family_name, email, phone').eq('id', task.client_id).maybeSingle();
      if (c) clientInfo = { name: [c.given_name, c.family_name].filter(Boolean).join(' '), email: c.email, phone: c.phone || '' };
    }
    if (_adminOpenTaskId !== taskId) return;

    body.innerHTML = renderAdminTaskDetailBody(task, clientInfo);

    // Async sub-content
    loadAdminTaskTrail(taskId);
    adminLoadTaskComments(taskId);

    // Resolve plan card name into the nav link label (best-effort)
    if (task.plan_card_id) {
      const cachedPc = Array.isArray(_adminAllPlanCards)
        ? _adminAllPlanCards.find(pc => pc.planCardId === task.plan_card_id) : null;
      if (cachedPc && cachedPc.planName) {
        const el = document.getElementById('atl-pn-' + taskId);
        if (el) el.textContent = cachedPc.planName + (cachedPc.friendlyName ? ' (' + cachedPc.friendlyName + ')' : '');
      } else {
        sb.from('plan_cards').select('plan_name, friendly_name').eq('plan_card_id', task.plan_card_id).maybeSingle().then(res => {
          if (res.data && res.data.plan_name) {
            const el = document.getElementById('atl-pn-' + taskId);
            if (el) el.textContent = res.data.plan_name + (res.data.friendly_name ? ' (' + res.data.friendly_name + ')' : '');
          }
        });
      }
    }

    // Mark viewed
    sb.from('task_views').upsert({ staff_id: STATE.uuid, task_id: taskId, viewed_at: new Date().toISOString() }, { onConflict: 'staff_id,task_id' });
    const cached = (_adminTasksCache || []).find(t => t.taskId === taskId);
    if (cached) cached.hasUnread = false;

    if (opts.scroll) setTimeout(function(){ try { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e){} }, 60);
  } catch(e) {
    body.innerHTML = '<div style="padding:8px 0;color:var(--required);font-size:13px">Error: ' + e.message + '</div>';
  }
}

// Patch a task in the local cache (camelCase fields). patch === null removes it.
function _adminApplyTaskPatch(taskId, patch) {
  if (!Array.isArray(_adminTasksCache)) return;
  const i = _adminTasksCache.findIndex(t => t.taskId === taskId);
  if (i < 0) return;
  if (patch === null) { _adminTasksCache.splice(i, 1); return; }
  Object.assign(_adminTasksCache[i], patch);
}

// Apply a local patch (or removal), re-render the timeline in place (no shell
// teardown, no spinner), keep the open card open + refresh its body, then quietly
// re-sync with the server in the background.
function _adminInlineUpdate(taskId, patch, opts) {
  opts = opts || {};
  const removed = (patch === null);
  _adminApplyTaskPatch(taskId, patch);
  if (removed && _adminOpenTaskId === taskId) _adminOpenTaskId = null;
  // Re-render feed/stats/chips from the local cache (preserves filters + scroll position).
  renderAdminTasksTimeline();
  // Refresh the open card's detail body so its status pill + actions reflect the change.
  if (!removed && _adminOpenTaskId === taskId && opts.keepOpen !== false) {
    _adminRenderOpenBody(taskId, { scroll: false });
  }
  // Quiet background re-sync (no visible refresh) to reconcile derived data
  // (comment counts, recurring auto-spawns, server-side status transitions, etc.).
  _adminQuietResync();
}

let _adminResyncTimer = null;
function _adminQuietResync() {
  if (_adminResyncTimer) clearTimeout(_adminResyncTimer);
  _adminResyncTimer = setTimeout(async () => {
    try {
      const result = await apiPost({ action: 'getAllTasks', uuid: STATE.uuid });
      _adminTasksCache = result.tasks || [];
      // Only re-render if still on the tasks view and the feed exists.
      if (qs('admin-tl-feed')) {
        renderAdminTasksTimeline();
        if (_adminOpenTaskId && document.querySelector('[data-atl-taskid="' + _adminOpenTaskId + '"]')) {
          _adminRenderOpenBody(_adminOpenTaskId, { scroll: false });
        }
      }
    } catch(e) { /* silent — local state stands until next action/refresh */ }
  }, 1200);
}

function renderAdminTaskDetailBody(task, clientInfo) {
  const taskId = task.task_id;

  let descHtml = '';

    const lines = task.description.split('\n');
    const pick = p => { const l = lines.find(x => x.indexOf(p) === 0); return l ? l.replace(p + ' ', '') : ''; };
    const reason = pick('Reason:'), details = pick('Details:'), plan = pick('Plan:'), pcid = pick('Plan Card ID:');
    descHtml += '<div class="atl-accent-block atl-ab-reason"><div class="atl-ab-lbl">Reason</div><div class="atl-ab-val">' + (reason || 'Not specified') + '</div></div>';
    if (details) descHtml += '<div class="atl-accent-block atl-ab-notes"><div class="atl-ab-lbl">Client notes</div><div class="atl-ab-val">' + details + '</div></div>';
    descHtml += '<div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px">';
    if (plan) descHtml += '<span style="padding:5px 11px;background:var(--bg);border:1px solid var(--border);border-radius:100px;font-size:11.5px;font-weight:600;color:var(--ink-2)">' + plan + '</span>';
    descHtml += '<span id="admin-cancel-live-counts" style="padding:5px 11px;background:var(--bg);border:1px solid var(--border);border-radius:100px;font-size:11.5px;font-weight:600;color:var(--ink-2)">Loading\u2026</span>';
    if (pcid) descHtml += _atlCopyChip(pcid, 'plan card ID');
    descHtml += '</div>';
    if (pcid) setTimeout(function(){ adminLoadLiveCancelCounts(pcid); }, 80);
  } else if (task.description) {
    descHtml = '<div style="font-size:13.5px;color:var(--ink-2);line-height:1.6;font-weight:500;margin-bottom:4px">' + task.description + '</div>';
  }

  // ── Detail grid ──
  const clId = (task.client_id || '').replace(/'/g, "\\'");
  const pcId = (task.plan_card_id || '').replace(/'/g, "\\'");
  const assignedVal = task.assigned_to
    ? '<span style="display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap">'

    : '<span style="color:var(--ink-4)">All Staff</span>';

  const clientVal = task.client_id
    ? '<span style="display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap">'
      + '<span id="atl-av-' + task.task_id + '" style="width:22px;height:22px;border-radius:50%;background:var(--ink-3);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">' + _atlInitials(clientName) + '</span>'

  // Plan card name resolves async (id 'atl-pn-<taskId>'); whole thing is a nav link to the Clients tab.

  // ── Resolution note ──
  let resolvedHtml = '';
  if (task.resolution_note) {

let _adminAllPlanCards = [];
// ═══════════════════════════════════════════════════════════════════════════
// ADMIN BILLING — company-wide invoice roll-up + per-client drill-in
// Hybrid: fast company-wide list from the billing account (one server call),
// live per-client history on drill-in. Data is fetched by the get-admin-billing
// edge fn, which is admin-only and company-scoped. Reuses the existing Create
// Charge modal (_ccClick) for charges. No persisted invoices table.
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// ADMIN BILLING — company-wide roll-up, subscriptions, per-client drill-in.
// Hybrid: fast company-wide list from the billing account (one server call),
// live per-client history on drill-in. Reuses the Create Charge modal (_ccClick).
// Nothing is persisted; the get-admin-billing edge fn is admin-only + company-scoped.
// ═══════════════════════════════════════════════════════════════════════════
var _AB = {
  tab: 'invoices',     // 'invoices' | 'subscriptions'
  view: 'list',        // 'list' | 'client'
  period: 'month',
  typeFilter: 'all',
  statusFilter: 'all',
  locationFilter: 'all',
  subLocFilter: 'all',
  subSearch: '',
  subSort: 'bill_desc',
  clientTypeFilter: 'all',
  clientStatusFilter: 'all',
  clientSearch: '',
  _gen: 0,
  search: '',
  sortKey: 'attention',
  sortDir: -1,
  clientId: null,
  openInv: null,
  rollup: null,
  subs: null,
  client: null,
  // Rollup paging ("Load more" past the first 500). nextCursor/hasMore come from
  // the edge; appended is true once we've paged beyond the first batch (so the
  // background refresher won't clobber the accumulated list back to 500);
  // pagingBusy guards the in-flight load-more fetch.
  nextCursor: null,
  hasMore: false,
  appended: false,
  pagingBusy: false,
  // In-memory cache so re-clicking a tab / reopening a client paints instantly
  // from memory, then quietly refreshes in the background. Keyed by period
  // (rollup) and clientId (client); subs is a single slot. Mutations
  // (pay/void/refund/create-charge) invalidate via _abCacheBust() + force-reload.
  _cache: { rollup: {}, subs: null, client: {} },
};

// Wipe cached billing data after any money-moving action so the next view
// fetches fresh. Clears everything because a payment shifts rollup totals and
// subscription state too, not just the one client.
function _abCacheBust(){
  _AB._cache.rollup = {};
  _AB._cache.subs = null;
  _AB._cache.client = {};
}

// Reset "Load more" paging. Called whenever the underlying invoice set changes
// out from under the accumulated list — a period switch, or any client-side
// filter change (which re-derives from _AB.rollup.invoices). Clears the appended
// flag so the background refresher is free to repaint the first batch again.
function _abResetPaging(){
  _AB.nextCursor = null;
  _AB.hasMore = false;
  _AB.appended = false;
  _AB.pagingBusy = false;
}

// Return a working copy of a rollup response whose `invoices` array (and the
// totals/locationRevenue we recompute) can be mutated by "Load more" WITHOUT
// touching the cached first-batch object. The cache must stay pristine so an
// instant-paint from cache always shows the true first 500, never an
// accumulated list. Shallow clone + fresh invoices array is enough — we only
// ever push to invoices and reassign totals/locationRevenue, never deep-edit
// an individual invoice.
function _abCloneRollup(res){
  if(!res) return res;
  var copy = {};
  for(var kk in res){ if(Object.prototype.hasOwnProperty.call(res,kk)) copy[kk]=res[kk]; }
  copy.invoices = (res.invoices||[]).slice();
  return copy;
}

// Recompute the KPI totals from the FULL accumulated invoice list. Mirrors the
// edge's rollup math (get-admin-billing.ts) so appended "Load more" rows are
// reflected in Collected / Overdue / Open. MRR + activePlans are subscription-
// derived (not invoice-derived), so they're preserved from the edge as-is.
function _abRecomputeTotals(){
  if(!_AB.rollup || !_AB.rollup.invoices) return;
  var invs = _AB.rollup.invoices;
  var collectedCents=0, overdueCents=0, overdueCount=0, openCents=0, openCount=0;
  for(var i=0;i<invs.length;i++){
    var inv=invs[i], s=inv.status;
    if(s==='paid'||s==='partial_refund'||s==='refunded'){
      collectedCents += (inv.amountCents - (inv.refundedCents||0));
    } else if(s==='overdue'){
      overdueCents += inv.amountCents; overdueCount++;
    } else if(s==='open'){
      openCents += inv.amountCents; openCount++;
    }
  }
  var t = _AB.rollup.totals || {};
  _AB.rollup.totals = {
    collectedCents: collectedCents,
    overdueCents: overdueCents, overdueCount: overdueCount,
    openCents: openCents, openCount: openCount,
    mrrCents: t.mrrCents||0, activePlans: t.activePlans||0,
  };
  // Rebuild revenue-by-location (paid only) over the accumulated list too.
  var byLoc = {};
  for(var j=0;j<invs.length;j++){
    var iv=invs[j];
    if(iv.status!=='paid') continue;
    var key = iv.locationId || '__none__';
    if(!byLoc[key]) byLoc[key] = { locationId: iv.locationId||'', name: iv.locationName||'Unassigned', collectedCents:0, count:0 };
    byLoc[key].collectedCents += iv.amountCents;
    byLoc[key].count++;
  }
  var arr = Object.keys(byLoc).map(function(k){ return byLoc[k]; });
  arr.sort(function(a,b){ return b.collectedCents - a.collectedCents; });
  _AB.rollup.locationRevenue = arr;
}

// Entry point (called by switchSection).
async function loadAdminBilling(){
  // Capture the section-navigation generation at entry. If the admin clicks a
  // DIFFERENT left-nav section while billing's (slow) Stripe fetch is in flight,
  // window._navGen advances; we then bail before painting so billing can't
  // overwrite the newer section's content. (Billing's own _AB._gen only tracks
  // in-billing navigation, so it can't catch a cross-section switch on its own.)
  var _navGen = window._navGen;
  _abInjectCss();
  if(window._abPendingClient){
    var _pc=window._abPendingClient; window._abPendingClient=null;
    await _abOpenClient(_pc, null, false, _navGen);
    return;
  }
  _AB.tab='invoices'; _AB.view='list'; _AB.clientId=null; _AB.openInv=null; _AB.client=null;
  await _abLoadRollup(false, _navGen);
}

// Jump to Billing section and drill straight into a client's profile.
function goToClientBilling(clientId){
  window._abPendingClient = clientId;
  switchSection('billing');
}

function _abTabsHtml(){
  return '<div class="ab-tabs">'
    + '<button class="ab-tab '+(_AB.tab==='invoices'?'on':'')+'" data-tab="invoices">Invoices</button>'
    + '<button class="ab-tab '+(_AB.tab==='subscriptions'?'on':'')+'" data-tab="subscriptions">Subscriptions</button>'
    + '</div>';
}
function _abWireTabs(c){
  c.querySelectorAll('[data-tab]').forEach(function(b){ b.onclick=function(){
    var t=b.dataset.tab;
    // Only a true no-op when we're ALREADY on that tab's list. From a client
    // drill-in (view==='client') the tab still reads as active, so an equality-
    // only guard would wrongly bail and leave you stuck on the client pane.
    if(t===_AB.tab && _AB.view==='list') return;
    _AB.tab=t; _AB.view='list'; _AB.openInv=null;
    if(t==='subscriptions') _abLoadSubs(); else _abLoadRollup();
  }; });
}

async function _abLoadRollup(force, navGen){

  // navGen (optional): the section-nav generation captured by the caller. When
  // provided, we bail before any paint if the admin has since switched to a
  // different left-nav section. Absent (e.g. tab clicks within billing) = treat
  // as current. _abNavOk() centralizes the check.

  if(!_navOk()) return;
  var myGen = ++_AB._gen;

  _abResetPaging();
  var cached = (!force && _AB._cache.rollup) ? _AB._cache.rollup[_AB.period] : null;

    // Instant paint from memory — no skeleton flash — then quietly refresh.
    // The cache holds only the FIRST batch, so paging state stays reset here.
    if(!_navOk()) return;
    _AB.rollup = _abCloneRollup(cached); _AB.hasMore = !!cached.hasMore; _AB.nextCursor = cached.nextCursor || null;
    _abRenderList();
    _abBgRefreshRollup(myGen, _AB.period);
    return;
  }

  c.innerHTML = _pageLoader();
  var res = await apiPost({ action:'getAdminBilling', mode:'rollup', period:_AB.period });
  if(myGen !== _AB._gen) return;         // a newer in-billing request superseded this one
  if(!_navOk()) return;                  // admin switched to another section mid-fetch
  if(!res || res.status!=='ok'){
    c.innerHTML = '<div class="ab-wrap">'+_abTabsHtml()+'<div class="ab-empty">Could not load billing'
      + (res && res.message ? ' \u2014 ' + _esc(res.message) : '') + '.</div></div>';
    _abWireTabs(c); return;
  }
  // Cache only the first batch (paging appends are session-live, never cached).
  // Cache the pristine response; give _AB.rollup a mutable clone so later
  // "Load more" appends can't corrupt the cached first batch.
  _AB._cache.rollup[_AB.period] = res;
  _AB.rollup = _abCloneRollup(res);
  _AB.hasMore = !!res.hasMore;
  _AB.nextCursor = res.nextCursor || null;
  _AB.appended = false;
  _abRenderList();
}

// "Load more": fetch the next batch of invoices from nextCursor and APPEND them
// to the accumulated list (never replace). Recompute totals over the full list.
// Guarded by pagingBusy against double-clicks; the button shows an inline spinner.
async function _abLoadMore(){
  if(_AB.pagingBusy || !_AB.hasMore || !_AB.nextCursor) return;
  if(!_AB.rollup || !_AB.rollup.invoices) return;
  _AB.pagingBusy = true;
  var myGen = _AB._gen;                    // don't bump — same view, just extending
  // Reflect busy state on the button without a full re-render.
  var btn = qs('ab-loadmore');
  if(btn){ btn.disabled = true; btn.innerHTML = _AB_SVG.spin + 'Loading\u2026'; }

  var res = await apiPost({ action:'getAdminBilling', mode:'rollup', period:_AB.period, after:_AB.nextCursor });
  if(myGen !== _AB._gen){ return; }        // user navigated/filtered away mid-fetch
  _AB.pagingBusy = false;

  if(!res || res.status!=='ok'){
    // Leave the accumulated list intact; just re-enable the button to retry.
    if(btn){ btn.disabled=false; btn.innerHTML = _AB_SVG.chev + 'Load more'; }
    return;
  }
  var more = (res.invoices || []);
  // Append, de-duped by id in case a batch boundary overlaps.
  var seen = {};
  for(var k=0;k<_AB.rollup.invoices.length;k++){ seen[_AB.rollup.invoices[k].id]=1; }
  for(var m=0;m<more.length;m++){ if(!seen[more[m].id]) _AB.rollup.invoices.push(more[m]); }

  _AB.appended = true;
  _AB.hasMore = !!res.hasMore;
  _AB.nextCursor = res.nextCursor || null;
  _abRecomputeTotals();                    // KPIs + by-location over the full list
  _abRenderList();                         // re-sorts the full accumulated list
}

// Silent background refresh for a cached rollup: fetch fresh, and only repaint
// if the user is still on this exact view (same _gen, same period, list view)
// and the data actually changed. On failure, keep the cached view untouched.
// Skipped once the admin has paged past the first batch — a first-page fetch
// can't be safely diffed against an accumulated (appended) list, and repainting
// would clobber the extra rows back to 500.
async function _abBgRefreshRollup(gen, period){
  if(_AB.appended) return;                               // don't clobber paged rows
  var res = await apiPost({ action:'getAdminBilling', mode:'rollup', period:period });
  if(!res || res.status!=='ok') return;                 // keep cached data on failure
  var prevCached = _AB._cache.rollup[period];            // pristine copy for the diff
  _AB._cache.rollup[period] = res;
  if(gen !== _AB._gen) return;                           // user navigated away
  if(_AB.view!=='list' || _AB.tab!=='invoices' || _AB.period!==period) return;
  if(_AB.appended) return;                               // re-check: paged during fetch
  if(prevCached && JSON.stringify(res)===JSON.stringify(prevCached)) return;  // nothing changed
  _AB.rollup = _abCloneRollup(res);
  _AB.hasMore = !!res.hasMore;
  _AB.nextCursor = res.nextCursor || null;
  _abRenderList();
}

async function _abLoadSubs(force){
  var c = qs('admin-content'); if(!c) return;
  var myGen = ++_AB._gen;
  var cached = (!force) ? _AB._cache.subs : null;

  if(cached){
    _AB.subs = cached; _abRenderSubs();
    _abBgRefreshSubs(myGen);
    return;
  }

  c.innerHTML = _pageLoader();
  var res = await apiPost({ action:'getAdminBilling', mode:'subscriptions' });
  if(myGen !== _AB._gen) return;
  if(!res || res.status!=='ok'){
    c.innerHTML = '<div class="ab-wrap">'+_abTabsHtml()+'<div class="ab-empty">Could not load subscriptions'
      + (res && res.message ? ' \u2014 ' + _esc(res.message) : '') + '.</div></div>';
    _abWireTabs(c); return;
  }
  _AB._cache.subs = res;
  _AB.subs=res; _abRenderSubs();
}

async function _abBgRefreshSubs(gen){
  var res = await apiPost({ action:'getAdminBilling', mode:'subscriptions' });
  if(!res || res.status!=='ok') return;
  _AB._cache.subs = res;
  if(gen !== _AB._gen) return;
  if(_AB.view!=='list' || _AB.tab!=='subscriptions') return;
  if(JSON.stringify(res)===JSON.stringify(_AB.subs)) return;
  _AB.subs = res; _abRenderSubs();
}

function _abFilteredInvoices(){
  var invs = (_AB.rollup && _AB.rollup.invoices) ? _AB.rollup.invoices.slice() : [];
  invs = invs.filter(function(i){
    if(_AB.typeFilter!=='all' && i.type!==_AB.typeFilter) return false;
    if(_AB.statusFilter!=='all' && i.status!==_AB.statusFilter) return false;
    if(_AB.locationFilter!=='all'){
      if(_AB.locationFilter==='__none__'){ if(i.locationId) return false; }
      else if(i.locationId!==_AB.locationFilter) return false;
    }
    if(_AB.search){
      var q=_AB.search.toLowerCase();
      var nm=(i.customerName||'').toLowerCase();
      var no=(i.number||'').toLowerCase();
      var cid=(i.clientId||'').toLowerCase();
      if(nm.indexOf(q)<0 && no.indexOf(q)<0 && cid.indexOf(q)<0) return false;
    }
    return true;
  });
  invs.sort(function(a,b){
    if(_AB.sortKey==='attention'){
      // Attention first: overdue, then open, then everything else — newest within each.
      var rank=function(s){ return s==='overdue'?0:(s==='open'?1:2); };
      var ra=rank(a.status), rb=rank(b.status);
      if(ra!==rb) return ra-rb;
      return (b.created||0)-(a.created||0);
    }
    var av,bv;
    if(_AB.sortKey==='amount'){av=a.amountCents;bv=b.amountCents;}
    else if(_AB.sortKey==='client'){av=(a.customerName||'');bv=(b.customerName||'');}
    else if(_AB.sortKey==='status'){av=a.status;bv=b.status;}
    else {av=a.created;bv=b.created;}
    if(av<bv) return -_AB.sortDir; if(av>bv) return _AB.sortDir; return 0;
  });
  return invs;
}

  var invs = _abFilteredInvoices();

    + '<div class="ab-acts">'

    + '<div class="ab-kpi"><div class="ab-kpi-l"><span class="ab-dot ab-dot-b"></span>Recurring (MRR)</div><div class="ab-kpi-n">'+_abMoney0(t.mrrCents)+'</div><div class="ab-kpi-d">'+(t.activePlans||0)+' active plans</div></div>'
    + '<div class="ab-kpi '+(t.overdueCents?'warn':'')+'"><div class="ab-kpi-l"><span class="ab-dot ab-dot-r"></span>Overdue</div><div class="ab-kpi-n">'+_abMoney0(t.overdueCents)+'</div><div class="ab-kpi-d">'+(t.overdueCount||0)+' invoice'+((t.overdueCount===1)?'':'s')+'</div></div>'
    + '<div class="ab-kpi"><div class="ab-kpi-l"><span class="ab-dot ab-dot-a"></span>Open / unpaid</div><div class="ab-kpi-n">'+_abMoney0(t.openCents)+'</div><div class="ab-kpi-d">'+(t.openCount||0)+' invoice'+((t.openCount===1)?'':'s')+'</div></div>'
    + '</div>';

  // Revenue by location (paid only) — only render if there's more than one location bucket.
  var locBlock = '';
  if(locRev.length > 1){
    var maxLoc = Math.max.apply(null, locRev.map(function(l){ return l.collectedCents; }).concat([1]));
    locBlock = '<div class="ab-loccard"><h4>Revenue by location \u00B7 collected this '+(_AB.period==='all'?'period':_AB.period)+'</h4>'
      + locRev.map(function(l){
          var pct = Math.max(3, Math.round(l.collectedCents/maxLoc*100));

            + '<span class="ab-locbar"><i style="width:'+pct+'%"></i></span>'

  }

  var locSelect = '';
  if(locOpts.length > 0){
    locSelect = '<select class="ab-locsel" id="ab-locfilter"><option value="all">All locations</option>'
      + locOpts.map(function(o){ return '<option value="'+_esc(o.locationId)+'"'+(_AB.locationFilter===o.locationId?' selected':'')+'>'+_esc(o.name)+'</option>'; }).join('')
      + '<option value="__none__"'+(_AB.locationFilter==='__none__'?' selected':'')+'>Unassigned</option></select>';
  }

  var filters = '<div class="ab-filters">'
    + '<div class="ab-seg">' + ['all','sub','one'].map(function(x){
        return '<button data-tf="'+x+'" class="'+(_AB.typeFilter===x?'on':'')+'">'+(x==='all'?'All types':_AB_TYPE_LABEL[x])+'</button>';
      }).join('') + '</div>'
    + '<div class="ab-seg">' + ['all','overdue','open','paid','refunded'].map(function(x){
        return '<button data-sf="'+x+'" class="'+(_AB.statusFilter===x?'on':'')+'">'+(x==='all'?'Any status':x.charAt(0).toUpperCase()+x.slice(1))+'</button>';
      }).join('') + '</div>'
    + locSelect
    + '<input class="ab-search" id="ab-search" placeholder="Search client, client ID, or invoice #\u2026" value="'+_esc(_AB.search)+'"></div>';

  var arrow = function(k){ return _AB.sortKey===k ? (_AB.sortDir===1?' \u25B2':' \u25BC') : ''; };
  var rows = invs.length ? invs.map(function(i){
    var locSub = i.locationName ? (' \u00B7 '+_esc(i.locationName)) : '';
    var attn = (i.status==='open' || i.status==='overdue');
    var hl = attn ? ' class="ab-attn"' : '';
    return '<tr data-client="'+_esc(i.clientId||'')+'" data-inv="'+_esc(i.id||'')+'"'+hl+'>'
      + '<td><div class="ab-cname">'+_esc(i.customerName||'\u2014')+'</div><div class="ab-csub">'+_esc(i.number||'')+locSub+'</div></td>'
      + '<td class="ab-mcell">'+_abTypeTag(i.type)+'</td>'
      + '<td class="ab-amt">'+_abMoney(i.amountCents)+'</td>'
      + '<td class="ab-mcell">'+_abBadge(i.status)+'</td>'
      + '<td class="ab-mcell">'+_abFmtShort(i.created)+'</td>'
      + '<td class="ab-hide-phone">'+(i.hostedUrl?('<button class="ab-link" data-open="'+_esc(i.hostedUrl)+'">Open '+_AB_SVG.open+'</button>'):'\u2014')+'</td>'
      + '</tr>';
  }).join('') : '<tr><td colspan="6" class="ab-empty">No invoices match these filters.</td></tr>';

  var table;
  if(invs.length){
    table = '<div class="ab-tablecard"><table class="ab-table"><thead><tr>'
      + '<th data-sort="client">Client'+arrow('client')+'</th><th>Type</th>'
      + '<th data-sort="amount">Amount'+arrow('amount')+'</th><th data-sort="status">Status'+arrow('status')+'</th>'
      + '<th data-sort="date">Date'+arrow('date')+'</th><th></th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table></div>';
  } else {
    var anyFilter = (_AB.typeFilter!=='all' || _AB.statusFilter!=='all' || _AB.locationFilter!=='all' || (_AB.search && _AB.search.length));
    if(anyFilter){
      table = _noMatchSlate('No matching invoices', 'No invoices match your search or filters \u2014 try a different term, period, or clear them.');
    } else {
      table = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>', 'No invoices this '+(_AB.period==='all'?'period':_AB.period), 'Invoices appear here once clients are billed. Try a wider period like All.');
    }
  }

  // "Load more" past the first 500 — shown only when the edge reported more
  // invoices remain. The count reflects invoices LOADED so far (pre-filter),
  // not a claimed grand total (which we can't know without paging to the end).
  var loadMore = '';
  if(_AB.hasMore){
    var loadedN = (_AB.rollup && _AB.rollup.invoices) ? _AB.rollup.invoices.length : 0;
    loadMore = '<div class="ab-loadmore">'
      + '<div class="ab-loadmore-count">Showing '+loadedN.toLocaleString('en-US')+' invoice'+(loadedN===1?'':'s')+'</div>'
      + '<button class="ab-btn" id="ab-loadmore">'+_AB_SVG.chev+'Load more</button>'
      + '</div>';
  }

  c.innerHTML = '<div class="ab-wrap">'+_abTabsHtml()+top+kpis+locBlock+filters+table+loadMore+'</div>';

  _abWireTabs(c);
  c.querySelectorAll('.ab-period').forEach(function(b){ b.onclick=function(){ _AB.period=b.dataset.p; _abLoadRollup(); }; });
  qs('ab-export').onclick = _abExportList;
  var lmb=qs('ab-loadmore'); if(lmb) lmb.onclick=function(){ _abLoadMore(); };
  c.querySelectorAll('[data-tf]').forEach(function(b){ b.onclick=function(){ _AB.typeFilter=b.dataset.tf; _abRenderList(); }; });
  c.querySelectorAll('[data-sf]').forEach(function(b){ b.onclick=function(){ _AB.statusFilter=b.dataset.sf; _abRenderList(); }; });
  var lf=qs('ab-locfilter'); if(lf) lf.onchange=function(){ _AB.locationFilter=lf.value; _abRenderList(); };
  c.querySelectorAll('[data-sort]').forEach(function(th){ th.onclick=function(){
    var k=th.dataset.sort;
    if(_AB.sortKey===k) _AB.sortDir*=-1; else { _AB.sortKey=k; _AB.sortDir=(k==='date'||k==='amount')?-1:1; }
    _abRenderList();
  }; });
  var sb=qs('ab-search');
  if(sb) sb.oninput=function(){ _AB.search=sb.value; var p=sb.selectionStart; _abRenderList(); var ns=qs('ab-search'); if(ns){ ns.focus(); ns.setSelectionRange(p,p); } };
  c.querySelectorAll('tbody tr[data-client]').forEach(function(tr){ tr.onclick=function(e){
    if(e.target.closest('[data-open]')) return;
    var cid=tr.getAttribute('data-client');
    var iid=tr.getAttribute('data-inv')||null;
    if(cid) _abOpenClient(cid, iid);

  c.querySelectorAll('[data-open]').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); window.open(b.getAttribute('data-open'), '_blank', 'noopener'); }; });
}

function _abRenderSubs(){
  var c = qs('admin-content'); if(!c) return;
  var allSubs = (_AB.subs && _AB.subs.subscriptions) ? _AB.subs.subscriptions : [];

  // Location filter options (built from the subs we have).
  var locMap = {};
  allSubs.forEach(function(s){ if(s.locationId) locMap[s.locationId] = s.locationName || s.locationId; });
  var locOpts = Object.keys(locMap).map(function(id){ return { id:id, name:locMap[id] }; });
  var hasUnassigned = allSubs.some(function(s){ return !s.locationId; });

  // Apply the location filter.
  var subs = allSubs.filter(function(s){
    if(_AB.subLocFilter==='all') return true;
    if(_AB.subLocFilter==='__none__') return !s.locationId;
    return s.locationId===_AB.subLocFilter;
  });
  // Apply search (client name or client id).
  if(_AB.subSearch){
    var sq=_AB.subSearch.toLowerCase();
    subs = subs.filter(function(s){
      return (s.clientName||'').toLowerCase().indexOf(sq)>=0 || (s.clientId||'').toLowerCase().indexOf(sq)>=0;
    });
  }
  // Sort per selected order. Subscriptions without a next-bill date sort last
  // for date orders.
  subs.sort(function(a,b){
    var an=a.nextBill, bn=b.nextBill;
    if(_AB.subSort==='bill_desc' || _AB.subSort==='bill_asc'){
      if(!an && !bn) return 0;
      if(!an) return 1;
      if(!bn) return -1;
      var cmp = an < bn ? -1 : (an > bn ? 1 : 0);
      return _AB.subSort==='bill_desc' ? -cmp : cmp;
    }
    if(_AB.subSort==='amount_desc') return (b.amountCents||0)-(a.amountCents||0);
    if(_AB.subSort==='amount_asc')  return (a.amountCents||0)-(b.amountCents||0);
    if(_AB.subSort==='client_az')   return (a.clientName||'').localeCompare(b.clientName||'');
    return 0;
  });

  // Totals — count active + past due (both are non-terminated; terminated subs
  // aren't returned at all). Split monthly vs yearly recurring.
  var monthlyCents = 0, yearlyCents = 0;
  subs.forEach(function(s){
    if(s.interval==='year') yearlyCents += s.amountCents;
    else monthlyCents += s.amountCents;
  });
  var normalizedMrr = monthlyCents + Math.round(yearlyCents/12);

  var locSelect = '';
  if(locOpts.length > 0){
    locSelect = '<select class="ab-locsel" id="ab-subloc"><option value="all">All locations</option>'
      + locOpts.map(function(o){ return '<option value="'+_esc(o.id)+'"'+(_AB.subLocFilter===o.id?' selected':'')+'>'+_esc(o.name)+'</option>'; }).join('')
      + (hasUnassigned ? '<option value="__none__"'+(_AB.subLocFilter==='__none__'?' selected':'')+'>Unassigned</option>' : '')
      + '</select>';
  }

  var summary = '<div style="font-size:13px;color:var(--ink-3)">'
    + subs.length+' subscription'+(subs.length===1?'':'s')
    + ' \u00B7 <b style="color:var(--ink)">'+_abMoney(monthlyCents)+'</b>/mo'
    + (yearlyCents>0 ? (' + <b style="color:var(--ink)">'+_abMoney(yearlyCents)+'</b>/yr') : '')
    + (yearlyCents>0 ? (' <span style="color:var(--ink-4)">(\u2248'+_abMoney(normalizedMrr)+'/mo normalized)</span>') : '')
    + '</div>';

  var sortSelect = '<select class="ab-locsel" id="ab-subsort" style="min-width:150px">'
    + [['bill_desc','Next bill: latest'],['bill_asc','Next bill: soonest'],['amount_desc','Amount: high\u2192low'],['amount_asc','Amount: low\u2192high'],['client_az','Client A\u2013Z']]
        .map(function(o){ return '<option value="'+o[0]+'"'+(_AB.subSort===o[0]?' selected':'')+'>'+o[1]+'</option>'; }).join('')
    + '</select>';

  var head = '<div class="ab-top">'+summary
    + '<div class="ab-acts">'+locSelect+'<button class="ab-btn" id="ab-subexport">'+_AB_SVG.down+'Export CSV</button></div></div>'
    + '<div class="ab-filters"><input class="ab-search" id="ab-subsearch" placeholder="Search client name or ID\u2026" value="'+_esc(_AB.subSearch)+'">'+sortSelect+'</div>';

  var tableOrEmpty;
  if(subs.length){
    var rows = subs.map(function(s){
      var st = s.status==='past_due'
        ? '<span class="ab-badge ab-b-overdue">Past due</span>'
        : '<span class="ab-badge ab-b-paid">Active</span>';
      var per = s.interval==='year' ? '/yr' : '/mo';
      var locCell;
      if(s.locationName){
        var ttl = s.locationAddress ? (s.locationAddress+' \u2014 click to copy ID') : 'Click to copy location ID';
        locCell = '<span title="'+_esc(ttl)+'" style="border-bottom:1px dotted var(--ink-4);cursor:pointer" data-copy="'+_esc(s.locationId||'')+'" data-copymsg="Location ID copied" data-stop="1">'+_esc(s.locationName)+'</span>';
      } else { locCell = '\u2014'; }
      return '<tr data-client="'+_esc(s.clientId||'')+'">'
        + '<td><div class="ab-cname">'+_esc(s.clientName)+'</div></td>'
        + '<td class="ab-mcell">'+_esc(s.planName)+'</td>'
        + '<td class="ab-mcell">'+locCell+'</td>'
        + '<td class="ab-amt">'+_abMoney(s.amountCents)+'<span style="font-weight:400;color:var(--ink-4)">'+per+'</span></td>'
        + '<td class="ab-mcell">'+st+'</td>'
        + '<td class="ab-mcell">'+_abFmtDate(s.nextBill)+'</td>'
        + '</tr>';
    }).join('');
    tableOrEmpty = '<div class="ab-tablecard"><table class="ab-table"><thead><tr><th>Client</th><th>Plan</th><th>Location</th><th>Amount</th><th>Status</th><th>Next bill</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  } else {
    var anyFilter = (_AB.subLocFilter!=='all' || (_AB.subSearch && _AB.subSearch.length));
    if(anyFilter){
      tableOrEmpty = _noMatchSlate('No matching subscriptions', 'No subscriptions match your search or location \u2014 try a different term or clear the filter.');
    } else {
      tableOrEmpty = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path><polyline points="21 3 21 9 15 9"></polyline></svg>', 'No active subscriptions', 'Recurring plans appear here once clients subscribe.');
    }
  }

  c.innerHTML = '<div class="ab-wrap">'+_abTabsHtml()+head+tableOrEmpty+'</div>';
  _abWireTabs(c);
  var se=qs('ab-subexport'); if(se) se.onclick=_abExportSubs;
  var lf=qs('ab-subloc'); if(lf) lf.onchange=function(){ _AB.subLocFilter=lf.value; _abRenderSubs(); };
  var sortSel=qs('ab-subsort'); if(sortSel) sortSel.onchange=function(){ _AB.subSort=sortSel.value; _abRenderSubs(); };
  var ss=qs('ab-subsearch');
  if(ss) ss.oninput=function(){ _AB.subSearch=ss.value; var p=ss.selectionStart; _abRenderSubs(); var ns=qs('ab-subsearch'); if(ns){ ns.focus(); ns.setSelectionRange(p,p); } };
  c.querySelectorAll('[data-copy]').forEach(function(el){ el.onclick=function(e){ e.stopPropagation(); _abCopy(el, el.getAttribute('data-copy'), el.getAttribute('data-copymsg')); }; });
  c.querySelectorAll('tbody tr[data-client]').forEach(function(tr){ tr.onclick=function(){
    var cid=tr.getAttribute('data-client'); if(cid) _abOpenClient(cid, null);
  }; });
}

async function _abOpenClient(clientId, openInvId, force, navGen){
  var c = qs('admin-content'); if(!c) return;
  // navGen (optional): section-nav generation from the caller. When set, bail
  // before painting if the admin switched left-nav sections mid-fetch. Absent
  // (in-billing row clicks) = current.
  var _navOk = function(){ return navGen == null || typeof navIsStale !== 'function' || !navIsStale(navGen); };
  if(!_navOk()) return;
  var myGen = ++_AB._gen;
  // Always reset the drill-in's own view state so opening a client starts clean,
  // whether painted from cache or fetched fresh.
  _AB.view='client'; _AB.clientId=clientId; _AB.openInv=openInvId||null; _AB.clientTypeFilter='all'; _AB.clientStatusFilter='all'; _AB.clientSearch='';

  var cached = (!force && _AB._cache.client) ? _AB._cache.client[clientId] : null;
  if(cached){
    if(!_navOk()) return;
    _AB.client = cached; _abRenderClient();
    _abBgRefreshClient(myGen, clientId);
    return;
  }

  c.innerHTML = _pageLoader();
  var res = await apiPost({ action:'getAdminBilling', mode:'client', clientId:clientId });
  if(myGen !== _AB._gen) return;
  if(!_navOk()) return;
  if(!res || res.status!=='ok'){
    c.innerHTML = '<div class="ab-wrap"><button class="ab-back" id="ab-back">'+_AB_SVG.back+'Back</button>'
      + '<div class="ab-empty">Could not load this client'+(res&&res.message?(' \u2014 '+_esc(res.message)):'')+'.</div></div>';
    var bb=qs('ab-back'); if(bb) bb.onclick=function(){
      _AB.view='list';
      if(_AB.tab==='subscriptions'){ if(_AB.subs) _abRenderSubs(); else _abLoadSubs(); }
      else { if(_AB.rollup) _abRenderList(); else _abLoadRollup(); }
    };
    return;
  }
  _AB._cache.client[clientId] = res;
  _AB.client=res; _abRenderClient();
}

// Silent background refresh for a cached client drill-in. Repaint only if still
// on this client's drill-in and data changed; preserve the open invoice + local
// filters by re-rendering through _abRenderClient (which reads current _AB state).
async function _abBgRefreshClient(gen, clientId){
  var res = await apiPost({ action:'getAdminBilling', mode:'client', clientId:clientId });
  if(!res || res.status!=='ok') return;
  _AB._cache.client[clientId] = res;
  if(gen !== _AB._gen) return;
  if(_AB.view!=='client' || _AB.clientId!==clientId) return;
  if(JSON.stringify(res)===JSON.stringify(_AB.client)) return;
  _AB.client = res; _abRenderClient();
}

// ── Process payment: pick a card, then attempt payment on the invoice ───────
async function _abStartPayment(clientId, invoiceId){
  var res = await apiPost({ action:'getAdminBilling', mode:'cards', clientId:clientId });
  if(!res || res.status!=='ok'){ toast('Could not load cards on file.', 'error'); return; }
  var cards = res.cards || [];
  if(cards.length===0){
    // No saved card — tell the admin rather than attempting a doomed charge.
    toast('No card on file for this client. Ask them to add a payment method, or send them the invoice to pay.', 'error');
    return;
  }
  if(cards.length===1){
    _abConfirmPay(clientId, invoiceId, cards[0].id,
      'Charge the '+_abCardLabel(cards[0])+' now for this invoice?');
    return;
  }
  _abCardPickerModal(clientId, invoiceId, cards);
}

function _abCardLabel(cd){
  var b=(cd.brand||'card'); b=b.charAt(0).toUpperCase()+b.slice(1);
  return b+' \u00B7\u00B7\u00B7\u00B7 '+cd.last4;
}

function _abCardPickerModal(clientId, invoiceId, cards){
  var sel = cards.find(function(c){ return c.isDefault; }) || cards[0];
  var selId = sel.id;
  var ov = document.createElement('div');
  ov.className='ab-modal-ov'; ov.id='ab-paymodal';
  function body(){
    return cards.map(function(cd){
      return '<div class="ab-cardopt '+(cd.id===selId?'on':'')+'" data-cardid="'+_esc(cd.id)+'">'
        + '<span class="ab-cardradio"></span>'
        + '<span class="b">'+_esc(_abCardLabel(cd))+'</span>'
        + '<span class="m">'+(cd.isDefault?'Default':'')+(cd.expMonth?(' \u00B7 '+String(cd.expMonth).padStart(2,'0')+'/'+String(cd.expYear).slice(-2)):'')+'</span>'
        + '</div>';
    }).join('');
  }
  ov.innerHTML = '<div class="ab-modal">'
    + '<div class="ab-modal-h">Choose a card to charge</div>'
    + '<div class="ab-modal-b" id="ab-cardlist">'+body()+'</div>'
    + '<div class="ab-modal-f"><button class="ab-btn" id="ab-paycancel">Cancel</button>'
    + '<button class="ab-btn ab-btn-pay-solid" id="ab-paygo">'+_AB_SVG.card+'Charge card</button></div>'
    + '</div>';
  document.body.appendChild(ov);
  function rewire(){
    ov.querySelectorAll('[data-cardid]').forEach(function(el){ el.onclick=function(){
      selId=el.getAttribute('data-cardid');
      ov.querySelectorAll('.ab-cardopt').forEach(function(x){ x.classList.toggle('on', x.getAttribute('data-cardid')===selId); });
    }; });
  }
  rewire();
  ov.onclick=function(e){ if(e.target===ov){ ov.remove(); } };
  qs('ab-paycancel').onclick=function(){ ov.remove(); };
  qs('ab-paygo').onclick=function(){ ov.remove(); _abDoPay(clientId, invoiceId, selId); };
}

function _abConfirmPay(clientId, invoiceId, pmId, msg){
  var ov = document.createElement('div');

async function _abDoPay(clientId, invoiceId, pmId){
  if(_AB._payBusy) return;               // guard against double-submit
  _AB._payBusy = true;
  toast('Processing payment\u2026', 'success');
  var res = await apiPost({ action:'getAdminBilling', mode:'pay', clientId:clientId, invoiceId:invoiceId, paymentMethodId:pmId||null });
  _AB._payBusy = false;
  if(!res || res.status!=='ok'){ toast('Payment error'+(res&&res.message?(' \u2014 '+res.message):''), 'error'); return; }
  if(res.outcome==='paid'){ toast('Payment successful \u2014 invoice paid.', 'success'); }
  else if(res.outcome==='declined'){ toast('Card declined \u2014 invoice stays open.', 'error'); }
  else { toast('Invoice still open after attempt.', 'error'); }
  // Money moved — invalidate cache and refresh this client's drill-in fresh.
  _abCacheBust();
  _abOpenClient(clientId, invoiceId, true);
}

// Reliable jump to the client in the Clients section using the real client id.
async function _abOpenClientProfile(cl){
  var id = cl && cl.id ? cl.id : '';
  // Set the target BEFORE loading: loadAdminPlanCards() auto-opens the detail pane
  // for window._currentOpenClientId once its data is ready (see the auto-reopen at
  // the end of loadAdminPlanCards). This means we do NOT filter the search box —
  // the list renders full/ungrouped exactly like a normal client click, so the top
  // layout matches the regular path and no client id is shown in the search box.
  if (id) window._currentOpenClientId = id;
  STATE.section = 'plancards';
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  var navEl = document.querySelector('.nav-item[onclick*="plancards"]');
  if(navEl) navEl.classList.add('active');
  // Coming from Billing, the invoice drill-in ran scrollIntoView on ab-invdetail,
  // which scrolls the content/document ancestors down. That offset persists across
  // the section switch, pushing the sticky .admin-header out of view so the page
  // looks like it lost its top padding. Reset scroll to top so the header shows,
  // exactly like a fresh Clients click (which always starts at scrollTop 0).
  var _ac = document.getElementById('admin-content');
  if (_ac) _ac.scrollTop = 0;
  try { window.scrollTo(0, 0); } catch(e){}
  if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
  await loadAdminPlanCards();
  if(!id) return;
  // Re-assert scroll-top after the list renders (the render can reset offsets).
  if (_ac) _ac.scrollTop = 0;
  try { window.scrollTo(0, 0); } catch(e){}
  // Fallback: if the auto-reopen inside loadAdminPlanCards didn't catch (data race),
  // poll briefly until the client's plan cards exist, then open the pane. Self-clears
  // with a BUDGET bail; no-ops if the client has no plan cards.
  var _elapsed = 0, _STEP = 60, _BUDGET = 3000;
  var _timer = setInterval(function(){
    _elapsed += _STEP;
    var paneOpen = (function(){ var p=document.getElementById('cl-detail-pane'); return p && p.classList.contains('open') && window._currentOpenPaneClientId === id; })();
    if (paneOpen) { clearInterval(_timer); return; }
    var dataReady = Array.isArray(_adminAllPlanCards) &&
      _adminAllPlanCards.some(function(pc){ return pc.clientId === id; });
    if (dataReady && typeof openAdminClientPane === 'function') openAdminClientPane(id);
    if (_elapsed >= _BUDGET) clearInterval(_timer);
  }, _STEP);
}

// ── CSV export (client-side) ────────────────────────────────────────────────
function _abCsvDownload(name, rows){
  var csv = rows.map(function(r){ return r.map(function(cell){
    var s=String(cell==null?'':cell);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Exported '+name, 'success');
}
function _abExportList(){
  var invs=_abFilteredInvoices();
  var rows=[['Invoice','Client','Location','Type','Subtotal','Tax','Total','Status','Date']];
  invs.forEach(function(i){
    rows.push([ i.number||'', i.customerName||'', i.locationName||'', _AB_TYPE_LABEL[i.type]||'Charge',
      (i.subtotalCents/100).toFixed(2), (i.taxCents/100).toFixed(2), (i.amountCents/100).toFixed(2),
      i.status||'', i.date||'' ]);
  });
  _abCsvDownload('invoices_'+_AB.period+'.csv', rows);
}
function _abExportClient(){
  var d=_AB.client; if(!d) return;
  var nm=(d.client&&d.client.name)?d.client.name:'client';
  var rows=[['Invoice','Type','Subtotal','Tax','Total','Status','Date']];
  (d.invoices||[]).forEach(function(i){
    rows.push([ i.number||'', _AB_TYPE_LABEL[i.type]||'Charge',
      (i.subtotalCents/100).toFixed(2), (i.taxCents/100).toFixed(2), (i.amountCents/100).toFixed(2),
      i.status||'', i.date||'' ]);
  });
  _abCsvDownload('invoices_'+nm.replace(/\s+/g,'_')+'.csv', rows);
}
function _abExportSubs(){
  var all=(_AB.subs&&_AB.subs.subscriptions)?_AB.subs.subscriptions:[];
  var subs=all.filter(function(s){
    if(_AB.subLocFilter==='all') return true;
    if(_AB.subLocFilter==='__none__') return !s.locationId;
    return s.locationId===_AB.subLocFilter;
  });
  var rows=[['Client','Plan','Location','Address','Amount','Interval','Status','NextBill']];
  subs.forEach(function(s){
    rows.push([ s.clientName||'', s.planName||'', s.locationName||s.locationId||'', s.locationAddress||'',
      (s.amountCents/100).toFixed(2), s.interval||'', s.status||'', s.nextBill||'' ]);
  });
  _abCsvDownload('subscriptions.csv', rows);
}

let _apcStatusFilter = '';
function setApcStatus(btn, val) {
  document.querySelectorAll('#apc-chip-row .chip-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

// Over-limit predicate: a card is over if mail OR parcel usage strictly exceeds its limit.
// (limit must be > 0 to count — a 0 limit means the feature isn't included, not "over".)
function _pcOverLimit(pc) {
  const mailOver   = (pc.mailLimit   || 0) > 0 && (pc.mailsUsed   || 0) > (pc.mailLimit   || 0);
  const parcelOver = (pc.parcelLimit || 0) > 0 && (pc.parcelsUsed || 0) > (pc.parcelLimit || 0);
  return mailOver || parcelOver;
}

function filterAdminPlanCards() {
  const q        = (qs('apc-search')?.value || '').toLowerCase();
  const status   = _apcStatusFilter;
  const planName = qs('apc-plan-filter')?.value || '';
  const custType = qs('apc-type-filter')?.value || '';
  const sort     = qs('apc-sort')?.value || 'newest';
  let filtered = _adminAllPlanCards;

  // Location filter (admin only). '' = all locations. Pending-setup clients whose
  // location can't be resolved (null) are always kept, matching prior behavior.
  if (_adminPcLocFilter) filtered = filtered.filter(pc => !pc.locationId || pc.locationId === _adminPcLocFilter);

  if (status === 'SUSPENDED') {
    filtered = filtered.filter(pc => pc.accessOverride === 'suspended' || pc.clientAccessOverride === 'suspended');
  } else if (status === 'OVER_LIMIT') {
    filtered = filtered.filter(_pcOverLimit);
  } else if (status === 'ID_VERIFIED') {
    filtered = filtered.filter(pc => pc.idVerificationStatus === 'approved');
  } else if (status === 'ID_UNVERIFIED') {
    filtered = filtered.filter(pc => pc.idVerificationStatus !== 'approved');
  } else if (status) {
    filtered = filtered.filter(pc => (pc.accessStatus||'') === status && pc.accessOverride !== 'suspended' && pc.clientAccessOverride !== 'suspended');
  }

  if (planName) filtered = filtered.filter(pc => pc.planName === planName);
  if (custType) filtered = filtered.filter(pc => (pc.customerType||'') === custType);

  if (q) filtered = filtered.filter(pc =>
    [pc.planCardId,pc.planName,pc.clientId,pc.clientName,pc.clientEmail||'',pc.clientPhone||'',...(pc.recipients||[]).map(r=>r.name+' '+(r.companyName||'')+' '+(r.email||'')+' '+(r.recipientId||r.id||'')),pc.businessDescription||'',(pc.notes||''),(pc.referralSource||''),(pc.subscriptionId||'')].join(' ').toLowerCase().includes(q)
  );

  filtered = [...filtered].sort((a, b) => {
    switch (sort) {
      case 'name-asc':  return (a.clientName||'').localeCompare(b.clientName||'');
      case 'name-desc': return (b.clientName||'').localeCompare(a.clientName||'');
      case 'plan-asc':  return (a.planName||'').localeCompare(b.planName||'');
      case 'recipients-desc': return (b.recipients||[]).filter(r=>r.status==='active').length - (a.recipients||[]).filter(r=>r.status==='active').length;
      case 'recipients-asc':  return (a.recipients||[]).filter(r=>r.status==='active').length - (b.recipients||[]).filter(r=>r.status==='active').length;
      case 'newest': return (b.memberSince||b.createdAt||'').localeCompare(a.memberSince||a.createdAt||'');
      case 'oldest': return (a.memberSince||a.createdAt||'').localeCompare(b.memberSince||b.createdAt||'');
      default: return 0;
    }
  });

  // Over-limit chip count badge (always reflects the full set, not the active filter)
  const olCountEl = qs('apc-overlimit-count');
  if (olCountEl) {
    const olN = _adminAllPlanCards.filter(_pcOverLimit).length;
    if (olN > 0) { olCountEl.textContent = ' (' + olN + ')'; olCountEl.style.display = ''; }
    else { olCountEl.textContent = ''; olCountEl.style.display = 'none'; }
  }

  const countEl = qs('apc-count');
  if (countEl) {
    const uniqueClients = new Set(filtered.map(pc => pc.clientId)).size;
    const suspended = _adminAllPlanCards.filter(pc => pc.accessOverride === 'suspended' || pc.clientAccessOverride === 'suspended').length;
    const parts = [`${uniqueClients} client${uniqueClients!==1?'s':''} \u00B7 ${filtered.length} plan card${filtered.length!==1?'s':''}`];
    if (suspended > 0) parts.push(`${suspended} suspended`);
    countEl.textContent = parts.join(' \u00B7 ');
  }

  renderAdminClientsList(filtered, !!(q || status || planName || custType || _adminPcLocFilter), status === 'OVER_LIMIT' && !q && !planName && !custType && !_adminPcLocFilter);
}

// ─────────────────────────────────────────────────────────────────────────────
// CLIENTS — group plan cards by client, render rows + slide-in detail pane
// ─────────────────────────────────────────────────────────────────────────────

function renderAdminClientsList(planCards, filterActive, overLimitOnly) {
  const el = document.querySelector('#apc-list');
  if (!el) return;
  if (!planCards.length) {
    if (overLimitOnly) { el.innerHTML = _overLimitClearSlate(); return; }
    if (filterActive) { el.innerHTML = _noMatchSlate('No matching clients', 'No clients match your search or filters \u2014 try a different term or clear them.'); return; }
    el.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>','No clients yet','Clients appear here once they sign up or are added to a location.');
    return;
  }

  const clientMap = {}, clientOrder = [];
  planCards.forEach(pc => {
    if (!clientMap[pc.clientId]) {
      clientMap[pc.clientId] = { clientId:pc.clientId, clientName:pc.clientName, clientEmail:pc.clientEmail,
        clientPhone:pc.clientPhone, memberSince:pc.memberSince, lastMailDate:pc.lastMailDate,
        idVerificationStatus:pc.idVerificationStatus, locationIds:[], planCards:[] };
      clientOrder.push(pc.clientId);
    }
    // Last mail = latest logged_at across ALL of this client's plan cards (not just the first).
    if (pc.lastMailDate && (!clientMap[pc.clientId].lastMailDate || pc.lastMailDate > clientMap[pc.clientId].lastMailDate)) {
      clientMap[pc.clientId].lastMailDate = pc.lastMailDate;
    }
    if (pc.locationId && !clientMap[pc.clientId].locationIds.includes(pc.locationId)) clientMap[pc.clientId].locationIds.push(pc.locationId);
    clientMap[pc.clientId].planCards.push(pc);
  });

  const fDS = d => { try { return fmtDate(d, COMPANY_DEFAULT_TZ).replace(/,? \d{4}$/,''); } catch(e){return '';} };
  const sp = {'ACCOUNT_LOCKED':0,'SUSPENDED':0,'PAYMENT_REQUIRED':1,'CANCELED_WITH_ACCESS':2,'ACTIVE':3,'CANCELED':4,'PENDING_SETUP':8};
  const _effStatus = pcs => pcs.some(pc=>pc.clientAccessOverride==='suspended') ? 'ACCOUNT_LOCKED'
      : pcs.some(pc=>pc.accessOverride==='suspended') ? 'SUSPENDED'
      : pcs.reduce((w,pc)=>{ const s=pc.accessStatus||'ACTIVE'; return (sp[s]??9)<(sp[w]??9)?s:w; },'ACTIVE');
  const _needsAttention = cid => ['PAYMENT_REQUIRED','ACCOUNT_LOCKED','SUSPENDED'].includes(_effStatus(clientMap[cid].planCards));
  const si = {
    'ACTIVE':{cls:'active-plan',lbl:'Active'},'CANCELED_WITH_ACCESS':{cls:'warning',lbl:'Cancelling'},
    'PAYMENT_REQUIRED':{cls:'payment_req',lbl:'Payment Required'},'CANCELED':{cls:'expired',lbl:'Cancelled'},
    'SUSPENDED':{cls:'payment_req',lbl:'Plan Suspended'},'PENDING_SETUP':{cls:'warning',lbl:'Pending Setup'},
    'ACCOUNT_LOCKED':{cls:'payment_req',lbl:'Account Locked'}
  };

  const renderRow = cid => {
    const cl = clientMap[cid], pcs = cl.planCards;
    const isPending = pcs.every(pc => pc.pendingSetup);
    if (isPending) {
      const sPend = si['PENDING_SETUP'];
      const iniP = (cl.clientName||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      const rowClsP = 'clr' + (window._currentOpenClientId===cid?' cl-sel':'');
      return `<div class="${rowClsP}" onclick="openAdminClientPane('${cid}')" id="clrow-${cid}">
        <div class="cl-av">${iniP}</div>
        <div class="cl-info">
          <div class="cl-nr">
            <span class="cl-nm">${cl.clientName||'\u2014'}</span>
            <span class="pill ${sPend.cls}" style="font-size:10px">${sPend.lbl}</span>
          </div>
          <div class="cl-sub" style="color:var(--ink-4)">Awaiting setup${(_adminPcLocFilter === '' && STATE.role === 'admin' && cl.locationIds && cl.locationIds.length) ? ' \u00B7 '+String(_adminPcLocMap[cl.locationIds[0]]||cl.locationIds[0]).replace(/</g,'&lt;') : ''}</div>
        </div>
        <div style="color:var(--ink-4);font-size:12px;flex-shrink:0">\u203A</div>
      </div>`;
    }
    const eff = pcs.some(pc=>pc.clientAccessOverride==='suspended') ? 'ACCOUNT_LOCKED'
      : pcs.some(pc=>pc.accessOverride==='suspended') ? 'SUSPENDED'
      : pcs.reduce((w,pc)=>{ const s=pc.accessStatus||'ACTIVE'; return (sp[s]??9)<(sp[w]??9)?s:w; },'ACTIVE');
    const s = si[eff]||si['ACTIVE'];
    const rowCls = 'clr' + (eff==='ACCOUNT_LOCKED'||eff==='SUSPENDED'?' cl-sus':eff==='PAYMENT_REQUIRED'||eff==='CANCELED_WITH_ACCESS'?' cl-pay':eff==='CANCELED'?' cl-can':'')
                 + (window._currentOpenClientId===cid?' cl-sel':'');
    const mail = pcs.reduce((n,pc)=>n+(pc.mailInStorage||0),0);
    const ini  = (cl.clientName||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const idPill = cl.idVerificationStatus==='approved'
      ? '<span style="display:inline-flex;align-items:center;gap:3px;color:var(--green);font-size:10px;font-weight:600"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/></svg> ID Verified</span>'
      : cl.idVerificationStatus==='submitted'
      ? '<span class="pill warning" style="font-size:9px">ID Pending</span>'
      : '';
    const multiPill = pcs.length>1?'<span class="pill" style="background:var(--blue-bg);color:var(--blue);font-size:9px">'+pcs.length+' plan cards</span>':'';
    const planLbl = pcs.length===1?(pcs[0].planName||'')+(pcs[0].friendlyName?' \u00B7 '+pcs[0].friendlyName:''):pcs.map(p=>p.planName||'').filter(Boolean).join(' + ');
    const recCount = pcs.reduce((n,pc)=>n+(pc.recipients||[]).filter(r=>r.status==='active').length,0);
    const ct = pcs[0] ? pcs[0].customerType : null;
    const hasFwd  = pcs.some(pc=>pc.autoFeature==='forwarding'||pc.autoFeature==='ship');
    const hasScan = pcs.some(pc=>pc.autoFeature==='scan');
    const _locName = (cl.locationIds && cl.locationIds.length > 1)
      ? 'Multiple locations'
      : (cl.locationIds && cl.locationIds.length === 1 ? (_adminPcLocMap[cl.locationIds[0]] || cl.locationIds[0]) : '');
    const locTag = (_adminPcLocFilter === '' && STATE.role === 'admin' && _locName)
      ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--ink-4)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>'+String(_locName).replace(/</g,'&lt;')+'</span>'
      : '';
    const tagParts = [
      `<span class="cl-tg">${recCount} recipient${recCount!==1?'s':''}</span>`,
      hasFwd  ? '<span class="cl-feat-fwd"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"/><polygon points=\"22 2 15 22 11 13 2 9 22 2\"/></svg> Forwarding</span>' : null,
      hasScan ? '<span class="cl-feat-scan"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M1 4.5A2.5 2.5 0 0 1 3.5 2h3M1 19.5A2.5 2.5 0 0 0 3.5 22h3M22.9 4.5A2.5 2.5 0 0 0 20.4 2h-3M22.9 19.5A2.5 2.5 0 0 1 20.4 22h-3M7 12h10\"/></svg> Scanning</span>' : null,
      ct==='canadian'   ? '<span class="cl-tg-ca">CA</span>'   : null,
      ct==='us'         ? '<span class="cl-tg-us">US</span>'   : null,
      ct&&ct!=='canadian'&&ct!=='us' ? '<span class="cl-tg-intl">INTL</span>' : null,
      cl.lastMailDate   ? `<span class="cl-tg">Last mail ${fDS(cl.lastMailDate)}</span>` : null
    ].filter(Boolean);

    return `<div class="${rowCls}" onclick="openAdminClientPane('${cid}')" id="clrow-${cid}">
      <div class="cl-av">${ini}</div>
      <div class="cl-info">
        <div class="cl-nr">
          <span class="cl-nm">${cl.clientName||'\u2014'}</span>
          <span class="pill ${s.cls}" style="font-size:10px">${s.lbl}</span>
          ${idPill}${multiPill?'&nbsp;'+multiPill:''}
        </div>
        <div class="cl-sub">${planLbl}</div>
        <div class="cl-tgs">${locTag}${tagParts.join('')}</div>
      </div>
      <div class="cl-st">
        <div class="cl-sv ${mail>5?'al':mail===0?'mu':''}">${mail}</div>
        <div class="cl-sl">In Storage</div>
      </div>
      <div style="color:var(--ink-4);font-size:12px;flex-shrink:0">\u203A</div>
    </div>`;
  };

  // Partition: pending-setup clients float to the top under their own heading,
  // normal clients below. Headings only render when pending clients exist.
  const pendingIds = clientOrder.filter(cid => clientMap[cid].planCards.every(pc => pc.pendingSetup));
  const nonPending = clientOrder.filter(cid => !clientMap[cid].planCards.every(pc => pc.pendingSetup));
  const attentionIds = nonPending.filter(_needsAttention);
  const normalIds    = nonPending.filter(cid => !_needsAttention(cid));
  const secLbl = (txt, count) => `<div class="cl-grp-lbl" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);padding:14px 4px 7px">${txt}${count!=null?' \u00B7 '+count:''}</div>`;
  const attnLbl = (count) => `<div class="cl-grp-lbl" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--required);padding:14px 4px 7px;display:flex;align-items:center;gap:5px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Needs Attention${count!=null?' \u00B7 '+count:''}</div>`;

  let out = '';
  if (pendingIds.length) {
    out += secLbl('Awaiting Setup', pendingIds.length);
    out += pendingIds.map(renderRow).join('');
  }
  if (attentionIds.length) {
    out += attnLbl(attentionIds.length);
    out += attentionIds.map(renderRow).join('');
  }
  if (normalIds.length) {
    if (pendingIds.length || attentionIds.length) out += secLbl('Clients', normalIds.length);
    out += normalIds.map(renderRow).join('');
  }
  el.innerHTML = out;
}

// Clients pane: client-name copy-chip — copies CLIENT ID, flips the inner label to "Copied".
function _clNameCopy(el, val){
  if(!val) return;
  navigator.clipboard.writeText(val).catch(function(){});
  var label = el.querySelector('.cl-nm-label');
  if(!label) return;
  var orig = label.textContent;
  el.classList.add('cl-namecopied');
  label.textContent = 'Copied';
  setTimeout(function(){ label.textContent = orig; el.classList.remove('cl-namecopied'); }, 1100);
}

function openAdminClientPane(clientId) {
  window._currentOpenClientId = clientId;
  window._currentOpenPaneClientId = clientId;
  document.querySelectorAll('.clr').forEach(r => r.classList.toggle('cl-sel', r.id==='clrow-'+clientId));

  const pane = document.getElementById('cl-detail-pane');
  if (!pane) return;
  pane.classList.add('open');

  const pcs = _adminAllPlanCards.filter(pc => pc.clientId === clientId);
  if (!pcs.length) return;
  const cl = pcs[0];
  // Last mail across ALL of this client's plan cards (pcs[0].lastMailDate alone
  // would only reflect one card). Kept in a separate var to avoid mutating the cache.
  const _clLastMail = pcs.reduce((mx, pc) => (pc.lastMailDate && (!mx || pc.lastMailDate > mx)) ? pc.lastMailDate : mx, null);

  const fDS = d => { if(!d)return''; try{return fmtDate(d, COMPANY_DEFAULT_TZ).replace(/,? \d{4}$/,'');}catch(e){return '';} };
  const fmtP = (s,e) => s&&e?fDS(s)+' \u2013 '+fDS(e):'\u2014';

  const dur = (() => {
    if(!cl.memberSince)return'';
    const now=new Date(),then=new Date(cl.memberSince);
    let y=now.getFullYear()-then.getFullYear(),m=now.getMonth()-then.getMonth();
    if(m<0){y--;m+=12;}
    if(y===0&&m===0)return'just joined';
    if(y===0)return m+' month'+(m!==1?'s':'');
    if(m===0)return y+' year'+(y!==1?'s':'');
    return y+' year'+(y!==1?'s':'')+' '+m+' mo';
  })();

  // Reusable "how long ago" for a date string (per-plan-card "Started" row).
  const _planDur = (ds) => {
    if(!ds) return '';
    const now=new Date(), then=new Date(ds);
    if(isNaN(then.getTime())) return '';
    let y=now.getFullYear()-then.getFullYear(), m=now.getMonth()-then.getMonth();
    if(m<0){y--;m+=12;}
    if(y===0&&m===0) return 'this month';
    if(y===0) return m+' month'+(m!==1?'s':'');
    if(m===0) return y+' year'+(y!==1?'s':'');
    return y+' year'+(y!==1?'s':'')+' '+m+' mo';
  };

  const acctLocked=cl.clientAccessOverride==='suspended';
  const inStore=pcs.reduce((n,pc)=>n+(pc.mailInStorage||0),0);
  const overdue=pcs.reduce((n,pc)=>n+(pc.mailOverdue  ||0),0);

  const ini=(cl.clientName||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const idBadge=cl.idVerificationStatus==='approved'

      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span class="cl-namechip" title="Copy Client ID" onclick="_clNameCopy(this,'${cl.clientId}')"><span class="cl-nm-label">${cl.clientName||'\u2014'}</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>

            <div style="font-size:10px;color:var(--ink-4)">${cl.memberSince?'Member since '+fDS(cl.memberSince)+(dur?' \u00B7 '+dur:''):''}${_clLastMail?(cl.memberSince?' \u00B7 ':'')+' Last mail '+fDS(_clLastMail):''}</div>

    const _uRows=[['Mail',pc.mailsUsed||0,pc.mailLimit||0],pc.parcelLimit>0?['Parcels',pc.parcelsUsed||0,pc.parcelLimit||0]:null].filter(Boolean);_uRows.forEach(function(u,ui){

    if(pc.forwardingAddress){

      </div>
      <div id="tmp-hint-${i}" style="display:none;font-size:11px;color:var(--required);margin-bottom:8px">Please enter both first and last name.</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="submitAddTempRecipient('${pc.planCardId}',${i})">Add</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('add-temp-${i}').style.display='none';tmpReset(${i})">Cancel</button>
      </div>
    </div>`;

    function clRec(r, isTmp) {
      const nm=[r.givenName||r.given_name,r.familyName||r.family_name].filter(Boolean).join(' ')||r.companyName||r.company_name||r.name||'Unknown';
      const ty=(r.recipientType||r.recipient_type||r.type||'individual');
      const on=r.status==='active';
      const used=(pc.usedRecipients||[]).includes(r.recipientId||r.id);
      const enc=encodeURIComponent(nm).replace(/'/g,'%27');
      const btn=on?`deactivateRecipient('${r.recipientId||r.id}','${enc}')`:`reactivateRecipient('${r.recipientId||r.id}','${enc}')`;
      return `<div class="cl-recr" data-rid="${r.recipientId||r.id||''}">
        <div class="cl-recav${isTmp?' tmp':''} ${on?'':'off'}">${isTmp?'T':(nm[0]||'?').toUpperCase()}</div>
        <div class="cl-recinfo">
          <div class="cl-recnm${on?'':' off'}">${nm}${(r.recipientId||r.id)?`<span class="cl-icp" title="Copy recipient ID" data-val="${r.recipientId||r.id}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`:''}${isTmp?'<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:5px;font-weight:600">TEMP</span>':''}${used?'<span style="font-size:10px;color:var(--ink-4)">\u00B7 Been used</span>':''}${r.language==='fr'?'<span class="lp-fr">FR</span>':''}</div>
          <div class="cl-recst">${(() => {
            const rawNote = r.notes||r.description||'';
            const note = rawNote.startsWith('TEMP:') ? rawNote.slice(5).trim() : rawNote;
            const typeLabel = ty.charAt(0).toUpperCase()+ty.slice(1);
            return note ? typeLabel + '  \u00B7 ' + note : typeLabel;
          })()}</div>
        </div>
        <span class="cl-rst ${on?'on':'off'}">${on?'active':'inactive'}</span>
        <button class="btn btn-secondary btn-xs" style="color:${on?'#C62828':'var(--green)'};flex-shrink:0" onclick="${btn}">${on?'Deactivate':'Re-activate'}</button>
      </div>`;
    }
    regR.concat(inactR).forEach(r=>{ h+=clRec(r,false); });
    if(tmpR.length){
      h+='<div class="cl-tdiv"><div class="cl-tdivl"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-1px;margin-right:3px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Temporary</div>';
      tmpR.forEach(r=>{ h+=clRec(r,true); });
      h+='</div>';
    }

    h += '</div></div>'; // end cl-pcb + cl-pc
  });

  h += '</div>'; // end cl-dpb

  pane.innerHTML = h;
  const body = pane.querySelector('.cl-dpb');
  if (body) body.scrollTop = 0;
}

// ─── Plan-card expand/collapse ───
function _clPcToggle(bodyId, chevId) {
  const b = document.getElementById(bodyId);
  const c = document.getElementById(chevId);
  const w = document.getElementById('clpch-wrap-' + bodyId);
  if (!b||!c) return;
  const open = b.classList.contains('open');
  if (!open) {
    const pane = document.getElementById('cl-detail-pane');
    if (pane) {
      pane.querySelectorAll('.cl-pcb.open').forEach(ob => {
        if (ob.id !== bodyId) {
          ob.classList.remove('open');
          const oc = document.getElementById(ob.id.replace('clpcb','clpch'));
          const ow = document.getElementById('clpch-wrap-' + ob.id);
          if (oc) oc.classList.remove('open');
          if (ow) ow.classList.remove('open');
        }
      });
    }
  }
  b.classList.toggle('open', !open);
  c.classList.toggle('open', !open);
  if(w) w.classList.toggle('open', !open);
}

// ─── Copy helpers ───
function _cpyFwd(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const lbl = el.querySelector('.cl-fwdl');
    const ico = el.querySelector('.cl-fwdico');
    const origLbl = lbl ? lbl.textContent : '';
    if (lbl) { lbl.textContent = 'Copied \u2713'; lbl.style.color = 'var(--green)'; }
    if (ico) { ico.style.opacity = '1'; ico.style.color = 'var(--green)'; }
    setTimeout(() => {
      if (lbl) { lbl.textContent = origLbl; lbl.style.color = ''; }
      if (ico) { ico.style.opacity = ''; ico.style.color = ''; }
    }, 1500);
  }).catch(() => {});
}

function _cpyIcon(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const svg = el.querySelector('svg');
    if (svg) svg.style.stroke = 'var(--green)';
    el.style.opacity = '1';
    setTimeout(() => {
      if (svg) svg.style.stroke = '';
      el.style.opacity = '';
    }, 1500);
  }).catch(() => {});
}

// ─── Lock attribution helpers ───
// Parses "... — by admin (Name)" / "Suspended by staff (Name)" out of an override reason.
// Returns { byLabel, comment } where byLabel is "you" (when self) or the parsed name/role.
function _lockByInfo(rawReason, byUuid) {
  const _raw = rawReason || '';
  const comment = _raw.replace(/\s*\u2014?\s*(?:Suspended\s+)?by\s+(?:staff|admin)\s*\([^)]+\)/i,'').replace(/^Suspended\s*/i,'').trim();
  const m = _raw.match(/by\s+(?:staff|admin)\s*\(([^)]+)\)/i);
  const roleM = _raw.match(/by\s+(staff|admin)\s*\(/i);
  let byLabel;
  if (byUuid && byUuid === STATE.uuid) byLabel = 'you';
  else if (m) byLabel = m[1] + (roleM ? ' (' + roleM[1] + ')' : '');
  else byLabel = (roleM ? roleM[1] : 'staff');
  return { byLabel, comment };
}
// Small copyable chip showing the locker's staff/admin UUID (admin-only convenience).
function _lockerIdChip(byUuid) {
  if (!byUuid) return '';
  return ' <span class="cl-cpid" style="margin-left:4px" title="Copy locked-by staff ID"'
    + ' onclick="event.stopPropagation();navigator.clipboard.writeText(\'' + byUuid + '\');'
    + 'var t=this;t.textContent=\'copied \u2713\';t.style.color=\'var(--green)\';t.style.borderColor=\'var(--green)\';'
    + 'setTimeout(function(){t.textContent=\'Copy locker ID\';t.style.color=\'\';t.style.borderColor=\'\';},1200)">Copy locker ID</span>';
}

// ─── Create Charge ───────────────────────────────────────────────────────────
// Admin is always allowed (no permission gate). Opens a two-step modal
// (enter items → review → charge). Tax is the plan card location's saved rate
// (display only; the server recomputes it). Caps: 5 items, $500 tax-inclusive.
function _ccHover(el) { el.style.backgroundColor='var(--required)'; el.style.color='#fff'; el.style.borderColor='var(--required)'; }
function _ccOut(el)   { el.style.backgroundColor='rgba(198,40,40,.08)'; el.style.color='var(--required)'; el.style.borderColor='rgba(198,40,40,.28)'; }

var _CC = null;
function _ccClick(el) {
  var d = (el && el.dataset) ? el.dataset : {};
  _CC = {
    clientId:   d.clientId   || '',
    planCardId: d.planCardId || '',
    locationId: d.locationId || '',
    clientName: d.clientName || 'Client',
    planName:   d.planName   || '',
    taxName:    d.taxName    || 'Tax',
    taxRate:    parseFloat(d.taxRate || '0') || 0,
    rows: [{ desc:'', qty:'1.00', unit:'' }],
    step: 1,
  };
  _ccRender();
}

var _CC_MAX_ROWS = 5, _CC_MAX_TOTAL = 500;
var _CC_PRESETS = ['Key/fob','Extra mail handling','Scan / copy','Shredding','Custom'];

function _ccMoney(n){ return '$' + (Math.round(n*100)/100).toFixed(2); }
function _ccClean(v){ return String(v).replace(/[^0-9.]/g,'').replace(/(\..*)\./g,'$1'); }
function _ccFmt2(v){ var n=parseFloat(v); return isNaN(n)?'':n.toFixed(2); }
function _ccLineAmt(r){ var q=parseFloat(r.qty)||0, u=parseFloat(r.unit)||0; return q*u; }
function _ccRowStarted(r){ return r.desc.trim()!=='' || (String(r.unit).trim()!=='' && parseFloat(r.unit)>0); }
function _ccRowComplete(r){ return r.desc.trim()!=='' && (parseFloat(r.qty)||0)>0 && (parseFloat(r.unit)||0)>0; }
function _ccValidRows(){ return _CC.rows.filter(_ccRowComplete); }
function _ccAllComplete(){ var s=_CC.rows.filter(_ccRowStarted); return s.length>0 && s.every(_ccRowComplete); }
function _ccCalc(){
  var sub=0; _ccValidRows().forEach(function(r){ sub+=_ccLineAmt(r); });
  var tax=Math.round(sub*(_CC.taxRate/100)*100)/100;
  return { sub:sub, tax:tax, tot:Math.round((sub+tax)*100)/100 };
}

function _ccClose(){ if(_CC && _CC.busy) return; var ov=document.getElementById('cc-ov'); if(ov) ov.remove(); _CC=null; }

function _ccRender(){
  var ov=document.getElementById('cc-ov');
  if(!ov){
    ov=document.createElement('div');
    ov.id='cc-ov'; ov.className='modal-overlay';
    ov.addEventListener('mousedown',function(e){ ov._d=(e.target===ov); });
    ov.addEventListener('mouseup',function(e){ if(e.target===ov && ov._d) _ccClose(); ov._d=false; });
    document.body.appendChild(ov);
  }
  ov.innerHTML = (_CC.step===1) ? _ccEntryHTML() : _ccReviewHTML();
  if(_CC.step===1){ _ccBindRows(); _ccRecalc(); }
}

function _ccBindRows(){
  var wrap=document.getElementById('cc-rows'); if(!wrap) return;
  wrap.innerHTML='';
  _CC.rows.forEach(function(r,i){
    var row=document.createElement('div'); row.className='cc-lirow';
    row.innerHTML =
      '<input class="cc-inp desc" placeholder="Description" value="'+_ccEsc(r.desc)+'">'+
      '<input class="cc-inp q" inputmode="decimal" placeholder="1.00" value="'+_ccEsc(r.qty)+'">'+
      '<input class="cc-inp u" inputmode="decimal" placeholder="0.00" value="'+_ccEsc(r.unit)+'">'+
      '<span class="cc-liamt">'+_ccMoney(_ccLineAmt(r))+'</span>'+
      '<button type="button" class="cc-lidel" title="Remove">\u00D7</button>';
    var ins=row.querySelectorAll('input');
    ins[0].oninput=function(){ r.desc=this.value; };
    ins[1].oninput=function(){ this.value=_ccClean(this.value); r.qty=this.value; _ccRecalc(); };
    ins[1].onblur =function(){ this.value=_ccFmt2(this.value); r.qty=this.value; _ccRecalc(); };
    ins[2].oninput=function(){ this.value=_ccClean(this.value); r.unit=this.value; _ccRecalc(); };
    ins[2].onblur =function(){ this.value=_ccFmt2(this.value); r.unit=this.value; _ccRecalc(); };
    row.querySelector('.cc-lidel').onclick=function(){ _ccDelRow(i); };
    wrap.appendChild(row);
  });
  var add=document.getElementById('cc-add'); if(add) add.disabled=_CC.rows.length>=_CC_MAX_ROWS;
  var cn=document.getElementById('cc-capnote'); if(cn) cn.textContent=_CC.rows.length>=_CC_MAX_ROWS?'Maximum of 5 items reached.':(_CC.rows.length+' of 5 items');
}

function _ccQuickAdd(i){
  var label=_CC_PRESETS[i], custom=(label==='Custom');
  var t=-1;
  for(var k=0;k<_CC.rows.length;k++){ if(!_CC.rows[k].desc.trim()){ t=k; break; } }
  if(t===-1){ if(_CC.rows.length>=_CC_MAX_ROWS) return; _CC.rows.push({desc:'',qty:'1.00',unit:''}); t=_CC.rows.length-1; }
  _CC.rows[t].desc = custom?'':label;
  _ccBindRows(); _ccRecalc();
  var d=document.querySelectorAll('#cc-rows .desc'); if(d[t]) d[t].focus();
}
function _ccAddRow(){
  if(_CC.rows.length>=_CC_MAX_ROWS) return;
  _CC.rows.push({desc:'',qty:'1.00',unit:''}); _ccBindRows(); _ccRecalc();
  var d=document.querySelectorAll('#cc-rows .desc'); if(d.length) d[d.length-1].focus();
}
function _ccDelRow(i){ _CC.rows.splice(i,1); if(_CC.rows.length===0) _CC.rows.push({desc:'',qty:'1.00',unit:''}); _ccBindRows(); _ccRecalc(); }

function _ccRecalc(){
  var amts=document.querySelectorAll('#cc-rows .cc-liamt');
  var rowEls=document.querySelectorAll('#cc-rows .cc-lirow');
  var inc=0;
  _CC.rows.forEach(function(r,i){
    if(amts[i]) amts[i].textContent=_ccMoney(_ccLineAmt(r));
    var bad=_ccRowStarted(r) && !_ccRowComplete(r); if(bad) inc++;
    if(rowEls[i]) rowEls[i].classList.toggle('bad',bad);
  });
  var t=_ccCalc(), over=t.tot>_CC_MAX_TOTAL, ok=_ccAllComplete();
  var g=function(id){ return document.getElementById(id); };
  if(g('cc-sub')) g('cc-sub').textContent=_ccMoney(t.sub);
  if(g('cc-tax')) g('cc-tax').textContent=_ccMoney(t.tax);
  if(g('cc-tot')) g('cc-tot').textContent=_ccMoney(t.tot);
  if(g('cc-grandrow')) g('cc-grandrow').classList.toggle('over',over);
  if(g('cc-over')) g('cc-over').classList.toggle('show',over);
  if(g('cc-inc'))  g('cc-inc').classList.toggle('show',inc>0);
  if(g('cc-review')) g('cc-review').disabled = over || !ok;
}

function _ccGoReview(){
  var t=_ccCalc();
  if(t.tot>_CC_MAX_TOTAL || !_ccAllComplete()) return;
  _CC.step=2; _ccRender();
}

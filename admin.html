<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --theme:#8B1A1A;--red:#8B1A1A;--red-light:#A52020;--red-dim:rgba(139,26,26,0.08);--required:#C62828;--danger-dim:rgba(198,40,40,0.08);--danger-border:#E0A0A0;
    --ink:#1A1A1F;--ink-2:#3D3D45;--ink-3:#72727D;--ink-4:#A8A8B0;
    --bg:#F7F6F4;--bg-2:#EFEDE9;--white:#FFFFFF;--border:#E2E0DB;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
    --radius:10px;--radius-sm:6px;
    --green:#1A6B3C;--green-bg:#E8F5EE;--amber:#92520A;--amber-bg:#FEF3E2;
    --blue:#1A4A7A;--blue-bg:#E8F0FA;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;outline:none}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .15s}
  .btn-primary{background:var(--red);color:#fff}.btn-primary:hover{filter:brightness(0.88)}
  .btn-secondary{background:var(--white);color:var(--ink-2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}
  .btn-danger{background:#C62828;color:#fff}.btn-danger:hover{background:#B71C1C}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn:disabled{opacity:0.5;cursor:not-allowed}

  /* Layout */
  .admin-header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .admin-body{display:flex;height:calc(100vh - 53px)}
  .admin-sidebar{width:240px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:53px;height:calc(100vh - 53px);overflow-y:auto}
  .admin-content{flex:1;padding:24px;height:calc(100vh - 53px);overflow-y:auto;overflow-x:hidden}

  /* ── Custom scrollbars (match staff/client portals) ─── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }
  * { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.1) transparent; }

  .nav-group{margin-bottom:20px}
  .nav-group-label{font-size:9px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:1.2px;padding:0 20px 6px;margin-top:4px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;transition:all .15s;border-left:3px solid transparent;margin:1px 0}
  .nav-item:hover{background:var(--bg);color:var(--ink-2)}
  .nav-item.active{color:var(--red);background:var(--red-dim);border-left-color:var(--red);font-weight:600}
  .nav-item .nav-badge{min-width:18px;height:18px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:700;line-height:18px;text-align:center;padding:0 5px;margin-left:auto}
  .nav-icon{width:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink-4)}
  .nav-item.active .nav-icon{color:var(--red)}
  .nav-divider{height:1px;background:var(--border);margin:8px 16px}
  .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
  .sidebar-footer a{font-size:11px;color:var(--ink-4);text-decoration:none;display:flex;align-items:center;gap:6px;padding:6px 0;transition:color .15s}
  .sidebar-footer a:hover{color:var(--ink-2)}

  /* Mobile hamburger */
  .mobile-toggle{display:none;background:none;border:none;padding:8px;cursor:pointer;color:var(--ink)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99}

  @media(max-width:768px){
    .mobile-toggle{display:block}
    /* Compact mobile header: fixed height with horizontal-only padding so the
       logo and account chip center vertically with breathing room (matches the
       client portal's mobile header), instead of being pinned tight by vertical
       padding. Height kept at 53px so the calc(100vh - 53px) layout math holds. */
    .admin-header{padding:0 12px;height:53px}
    .admin-header img#header-logo-img{height:28px}
    .admin-sidebar{position:fixed;left:-260px;top:53px;bottom:0;z-index:100;width:260px;transition:left .25s ease;box-shadow:none}
    .admin-sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.1)}
    .sidebar-overlay.open{display:block;z-index:99}
    .admin-content{padding:10px;overflow-x:hidden;overflow-y:auto}
    /* Allow table-wrap to scroll horizontally */
    .table-wrap{overflow-x:auto !important;-webkit-overflow-scrolling:touch;position:relative}
    .table-wrap::after{content:'← scroll →';position:sticky;bottom:0;left:0;right:0;text-align:center;font-size:9px;color:var(--ink-4);padding:4px;background:var(--bg)}
    .form-row,.form-row-3{grid-template-columns:1fr !important}
    .ar-pipe-lbl{font-size:8.5px !important}
    .section-title{font-size:16px}
    /* Plan cards chips */
    .chip-filter{padding:4px 8px !important;font-size:9px !important}
    .chip-filter.chip-sm{padding:3px 6px !important;font-size:8px !important}
    .mod-select{font-size:10px !important;padding:5px 22px 5px 6px !important}
    #apc-chip-row{flex-wrap:wrap !important;gap:3px !important}
    /* Temp recipient form (clients pane) */
    div[id^="tmp-grid-"]{grid-template-columns:1fr !important}
    .cl-atf div[style*="grid-template-columns:120px 1fr"]{grid-template-columns:1fr !important}
    /* Cards */
    .card{padding:10px;margin-bottom:8px}
    /* Modal */
    .modal{padding:14px;margin:8px;max-width:calc(100vw - 16px) !important;max-height:90vh}
    .modal-overlay{padding:8px}
    /* Confirm modal */
    div[style*="max-width:420px"]{max-width:calc(100vw - 16px) !important}
    /* Tasks - prevent overflow */
    .nav-tab{padding:5px 8px;font-size:10px}
    .data-table{min-width:600px}
    .data-table th,.data-table td{padding:8px 10px;font-size:11px;white-space:nowrap}
    /* Audit log chart */
    canvas{max-width:100% !important;height:auto !important}
    /* Settings - prevent overflow */
    .settings-row { flex-direction: column !important; align-items: stretch !important; }
    .settings-input { width: 100% !important; }
    /* Plan templates */
    .admin-content > div{max-width:100%}
    /* General overflow prevention */
    *{max-width:100%}
    pre,code{overflow-x:auto;white-space:pre-wrap;word-break:break-word}
    /* Task cards content */
    div[style*="display:grid"][style*="auto 1fr"]{grid-template-columns:1fr !important}
    /* Button rows */
    div[style*="display:flex"][style*="gap:8px"]{flex-wrap:wrap !important}
    div[style*="display:flex"][style*="gap:6px"]{flex-wrap:wrap !important}
  }

  .section-title{font-size:20px;font-weight:700;margin-bottom:16px;font-family:'Inter',sans-serif}
  .card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:box-shadow .15s}
  .card:hover{box-shadow:var(--shadow)}

  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
  .form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--white);transition:border-color .15s}
  .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,74,122,0.08)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
  .badge-green{background:var(--green-bg);color:var(--green)}
  .badge-red{background:var(--red-dim);color:var(--red)}
  .badge-blue{background:var(--blue-bg);color:var(--blue)}
  .badge-amber{background:var(--amber-bg);color:var(--amber)}
  /* "Show archived" ghost toggle (Products & plans header) */
  .apl-arch{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;font-size:12px;font-weight:500;font-family:inherit;color:var(--ink-2);background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
  .apl-arch:hover{background:var(--bg)}
  .apl-arch.on{color:var(--red);border-color:var(--red);background:var(--red-dim)}
  .apl-arch svg{width:14px;height:14px;flex-shrink:0}
  .apl-arch-cnt{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;background:var(--bg-2);color:var(--ink-3)}
  .apl-arch.on .apl-arch-cnt{background:var(--red);color:var(--white)}

  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--white)}
  .data-table{width:100%;border-collapse:collapse;font-size:13px}
  .data-table th{text-align:left;padding:10px 14px;background:var(--bg);font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
  .data-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
  .data-table tr:last-child td{border-bottom:none}
  .data-table tr:hover td{background:rgba(0,0,0,0.015)}

  .empty-state{text-align:center;padding:48px;color:var(--ink-4)}

  /* Blank slate (shared empty state) */
  .bcz-empty{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;margin-bottom:28px}
  .bcz-empty .ei{width:48px;height:48px;border-radius:12px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .bcz-empty .ei svg{stroke:var(--ink-4)}
  .bcz-empty h3{font-size:15px;font-weight:600;margin-bottom:5px}
  .bcz-empty p{font-size:13px;color:var(--ink-3);max-width:340px;margin:0 auto}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px}
  .modal{background:var(--white);border-radius:var(--radius);padding:24px;max-width:560px;width:100%;box-shadow:var(--shadow-md);max-height:85vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
  /* ── Create Charge modal ─────────────────────────────────────────────── */
  .cc-ico{ width:34px;height:34px;border-radius:9px;background-color:rgba(198,40,40,.08);color:var(--required);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .cc-ico.n{ background-color:var(--bg-2);color:var(--ink-2); }
  .cc-lbl{ font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600;margin-bottom:6px; }
  .cc-inp{ width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;background-color:var(--white);color:var(--ink); }
  .cc-inp:focus{ outline:none;border-color:var(--ink-3); }
  .cc-chip{ font-size:12px;padding:6px 11px;border-radius:20px;border:1px solid var(--border);background-color:var(--white);color:var(--ink-2);cursor:pointer;white-space:nowrap;font-family:inherit; }
  .cc-chip:hover{ border-color:var(--ink-3);background-color:var(--bg); }
  .cc-lihead{ display:grid;grid-template-columns:1fr 46px 78px 68px 24px;gap:7px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-4);font-weight:600;padding:0 2px 6px; }
  .cc-lirow{ display:grid;grid-template-columns:1fr 46px 78px 68px 24px;gap:7px;align-items:center;margin-bottom:7px; }
  .cc-lirow .cc-inp{ padding:8px 8px;font-size:13px; }
  .cc-lirow .cc-inp.q,.cc-lirow .cc-inp.u{ text-align:center; }
  .cc-lirow.bad .cc-inp{ border-color:rgba(198,40,40,.28);background-color:rgba(198,40,40,.08); }
  .cc-liamt{ font-size:13px;font-weight:600;color:var(--ink);text-align:right;padding-right:2px;white-space:nowrap; }
  .cc-lidel{ color:var(--ink-4);cursor:pointer;text-align:center;font-size:16px;background:none;border:none;padding:0;font-family:inherit; }
  .cc-lidel:hover{ color:var(--required); }
  .cc-addrow{ margin-top:2px;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:6px 0;background:none;border:none;font-family:inherit; }
  .cc-addrow:hover{ color:var(--ink); }
  .cc-addrow:disabled{ color:var(--ink-4);cursor:not-allowed; }
  .cc-taxbox{ background-color:var(--bg);border:1px solid var(--border);border-radius:6px;padding:11px 13px;margin-top:4px; }
  .cc-taxrow{ display:flex;justify-content:space-between;font-size:13px;color:var(--ink-2);padding:3px 0; }
  .cc-taxrow.cc-grand{ border-top:1px solid var(--border);margin-top:5px;padding-top:8px;font-weight:700;font-size:15px;color:var(--ink); }
  .cc-taxrow.cc-grand.over span:last-child{ color:var(--required); }
  .cc-warn{ display:none;align-items:center;gap:7px;background-color:rgba(198,40,40,.08);border:1px solid rgba(198,40,40,.28);border-radius:6px;padding:9px 11px;font-size:12px;color:var(--required);margin-top:9px;font-weight:500; }
  .cc-warn.show{ display:flex; }
  .cc-warn svg{ flex-shrink:0; }
  .cc-btn-ghost{ padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background-color:var(--white);color:var(--ink-2);border:1px solid var(--border); }
  .cc-btn-ghost:hover{ background-color:var(--bg-2); }
  .cc-btn-go{ padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background-color:var(--required);color:#fff;border:1px solid var(--required); }
  .cc-btn-go:hover{ filter:brightness(.94); }
  .cc-btn-go:disabled{ opacity:.45;cursor:not-allowed;filter:none; }
  .cc-rev{ background-color:var(--bg);border:1px solid var(--border);border-radius:6px;padding:13px 14px; }
  .cc-revl{ font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);margin-bottom:9px;font-weight:600; }
  .cc-revline{ display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0;color:var(--ink-2);border-bottom:1px dashed var(--border); }
  .cc-revline .d{ color:var(--ink); }
  .cc-revline .q{ color:var(--ink-4);font-size:12px; }
  .cc-revsum{ display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--ink-2); }
  .cc-revsum.grand{ font-weight:700;font-size:15px;color:var(--ink);border-top:1px solid var(--border);margin-top:6px;padding-top:8px; }
  .cc-payblock{ margin-top:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden; }
  .cc-paycard{ display:flex;align-items:center;gap:11px;padding:12px 13px;background-color:var(--white); }
  .cc-paycardico{ width:34px;height:34px;border-radius:7px;background-color:var(--bg-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .cc-payfall{ display:flex;gap:9px;padding:11px 13px;background-color:var(--amber-bg);border-top:1px solid var(--border);font-size:12px;color:var(--ink-2);line-height:1.5; }
  .cc-payfall svg{ color:var(--amber);flex-shrink:0;margin-top:1px; }
  .cc-payfall b{ color:var(--ink); }

  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:99999;animation:toastIn .3s ease}
  .toast-success{background:#1A6B3C;color:#fff}
  .toast-error{background:#C62828;color:#fff}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}


  .nav-tabs{display:flex;border-bottom:1px solid var(--border);gap:0;flex-shrink:0}
  .nav-tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--ink-4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
  .nav-tab.active{color:var(--red);border-color:var(--red)}
  .nav-tab:hover:not(.active){color:var(--ink-2)}
  .chip-filter{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;font-family:inherit;border:1.5px solid var(--border);background:var(--white);color:var(--ink-3);cursor:pointer;transition:all .15s;white-space:nowrap}
  .chip-filter.chip-sm{padding:5px 10px;font-size:10px}
  .chip-filter.active{background:var(--red);color:white;border-color:var(--red)}
  .chip-filter:hover:not(.active){border-color:var(--ink-4)}
  .mod-select{padding:7px 28px 7px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:500;font-family:inherit;background:var(--white);color:var(--ink-2);cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>');background-repeat:no-repeat;background-position:right 8px center}
  .loc-sel{-webkit-appearance:none;appearance:none;padding-right:26px;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>');background-repeat:no-repeat;background-position:right 8px center}
  .at-sel{-webkit-appearance:none;appearance:none;padding-right:30px;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>');background-repeat:no-repeat;background-position:right 10px center}


  /* ── Loading ────────────────────────────────────────── */
  #admin-loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #F7F6F4, #EFEDE9);
    overflow: hidden;
    transition: opacity 0.4s ease, background 0.35s ease;
    font-family: 'Manrope', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #admin-loading-screen.theme-ready {
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--red) 8%, white),
      color-mix(in srgb, var(--red) 15%, white));
  }
  #admin-loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .ls-blob {
    position: absolute; border-radius: 50%; filter: blur(50px); pointer-events: none;
    opacity: 0; transition: opacity .35s ease;
  }
  #admin-loading-screen.theme-ready .ls-blob { opacity: 1; }
  .ls-blob-1 {
    width: 480px; height: 480px; top: -120px; left: -80px;
    background: radial-gradient(circle, color-mix(in srgb, var(--red) 55%, transparent), transparent 70%);
    animation: ls-float1 11s ease-in-out infinite;
  }
  .ls-blob-2 {
    width: 420px; height: 420px; bottom: -120px; right: -80px;
    background: radial-gradient(circle, color-mix(in srgb, var(--red-light) 45%, transparent), transparent 70%);
    animation: ls-float2 13s ease-in-out infinite;
  }
  @keyframes ls-float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,40px) scale(1.1)} }
  @keyframes ls-float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,-50px) scale(1.15)} }
  .ls-card {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 30px;
    padding: 44px 64px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
    animation: ls-card-in 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #admin-loading-screen.theme-ready .ls-card { box-shadow: 0 20px 60px var(--red-dim), inset 0 1px 0 rgba(255,255,255,0.9); }
  @keyframes ls-card-in { from{opacity:0;transform:scale(0.7) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .ls-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 42px;
  }
  .ls-logo img { height: 42px; width: auto; }

  /* Login-style shimmer placeholder shown until the logo/name resolves
     (prevents the logoless flash). Uniquely named to avoid collisions. */
  .ls-brand-skeleton { width:120px; height:30px; border-radius:8px;
    background:linear-gradient(100deg, #eceeec 30%, #f6f7f5 50%, #eceeec 70%);
    background-size:200% 100%; animation:ls-skel-shimmer 1.3s ease-in-out infinite; }
  @keyframes ls-skel-shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
  .ls-track {
    margin-top: 22px; width: 100%; height: 3px; border-radius: 3px;
    background: rgba(120,120,128,0.12); overflow: hidden; position: relative;
  }
  #admin-loading-screen.theme-ready .ls-track { background: var(--red-dim); }
  .ls-bar {
    position: absolute; left: 0; right: 0; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, rgba(120,120,128,0.45), rgba(120,120,128,0.30), rgba(120,120,128,0.45));
    animation: ls-sweep 1.6s cubic-bezier(0.65,0,0.35,1) infinite;
  }
  #admin-loading-screen.theme-ready .ls-bar { background: linear-gradient(90deg, var(--red), var(--red-light), var(--red)); }
  @keyframes ls-sweep { 0%{transform:translateX(-100%) scaleX(0.4)} 50%{transform:translateX(0%) scaleX(0.6)} 100%{transform:translateX(100%) scaleX(0.4)} }
  /* Inter-page content loader: skeleton shimmer (reuses ls-skel-shimmer aesthetic from login).
     Fills the content frame like real pages (max-width:960px, centered); .admin-content already pads 24px. */
  .apl{max-width:960px;margin:0 auto}

  .apl-row{height:15px;border-radius:6px;margin-bottom:14px;
    background:linear-gradient(100deg,var(--bg-2) 30%,var(--white) 50%,var(--bg-2) 70%);

  .apl-row.title{height:22px;width:30%;margin-bottom:20px}

  @media (prefers-reduced-motion: reduce){ .apl-row{animation:none} }
  @keyframes spinBtn { to { transform: rotate(360deg); } }
  .spin-active { animation: spinBtn 0.7s linear infinite; display:inline-block; }
  @keyframes refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .ls-blob, .ls-card, .ls-bar, .ls-brand-skeleton { animation: none; } }

      flex-wrap:wrap!important;
      align-items:center!important;

    .st-row>*:nth-child(1){ flex:1 1 auto; min-width:0; order:1 }
    /* (6) chevron: pinned to the right of the top line */
    .st-row>*:nth-child(6){ order:2; flex:0 0 auto; margin-left:auto }

    .st-row::after{ content:''; flex-basis:100%; height:0; order:3 }

<script>
window._appPortal = 'admin';
function applyTheme(hex) {
  try {
    var r = parseInt(hex.slice(1,3),16);
    var g = parseInt(hex.slice(3,5),16);
    var b = parseInt(hex.slice(5,7),16);
    var rl = Math.min(255,r+20); var gl = Math.min(255,g+4); var bl = Math.min(255,b+4);
    document.documentElement.style.setProperty('--red', hex);
    document.documentElement.style.setProperty('--red-light', 'rgb('+rl+','+gl+','+bl+')');
    document.documentElement.style.setProperty('--red-dim', 'rgba('+r+','+g+','+b+',0.08)');
    document.documentElement.style.setProperty('--red-border', 'rgba('+r+','+g+','+b+',0.18)');
    window._themeRed = hex;
    window._themeRedDim = 'rgba('+r+','+g+','+b+',0.08)';
    window._themeRedBorder = 'rgba('+r+','+g+','+b+',0.18)';
  } catch(e) {}
}
// Cached theme is keyed per logged-in admin so switching companies/accounts on the
// same browser never inherits another company's accent color.
(function(){
  try {
    var sid = localStorage.getItem('sb_admin_staff_id') || '';
    var c = localStorage.getItem('app_theme_color_' + sid);
    if (c) { applyTheme(c); var _ls = document.getElementById('admin-loading-screen'); if (_ls) _ls.classList.add('theme-ready'); }
  } catch(e) {}
})();
// \u2550\u2550\u2550 STATE \u2550\u2550\u2550
const STATE = { uuid: null, staffName: '', role: '', section: 'tasks', companyId: null };

// Company-scoped query helper. Returns a sb query for a tenant table already
// filtered to the logged-in admin's company. Every tenant-table READ in admin
// should go through cq() so one company can never see another's rows.
// Never-matching company id: when no company is in context, scope tenant queries
// to this so they yield ZERO rows (and writes/deletes affect zero rows) instead of
// falling through to ALL-tenant. A null company here signals a bug upstream.
const _NO_COMPANY = '00000000-0000-0000-0000-000000000000';
// Write-path guard: returns true and aborts (logs + optional toast) when no company
// is in context. Use at the top of any tenant write/update/delete/config path so a
// null company never writes/deletes across tenants. Returns false when safe to proceed.
function _noCompanyAbort(op, withToast) {
  if (STATE.companyId) return false;
  console.error('No company in context \u2014 aborting ' + op);
  if (withToast) { try { toast('Could not complete: no company in context', 'error'); } catch(e) {} }
  return true;
}
function cq(table) {
  let q = sb.from(table).select('*');
  if (STATE.companyId) { q = q.eq('company_id', STATE.companyId); }
  else { console.warn('cq(): no STATE.companyId \u2014 scoping to no-company (zero rows). table=' + table); q = q.eq('company_id', _NO_COMPANY); }
  return q;
}
// Same idea but lets the caller specify the select columns.
function cqSel(table, cols) {
  let q = sb.from(table).select(cols);
  if (STATE.companyId) { q = q.eq('company_id', STATE.companyId); }
  else { console.warn('cqSel(): no STATE.companyId \u2014 scoping to no-company (zero rows). table=' + table); q = q.eq('company_id', _NO_COMPANY); }
  return q;
}
// Company-scoped config query. Use for ALL config reads/writes in admin so each
// company reads/writes only its own config rows (config PK is (company_id, key)).
// Config is secret/settings-adjacent: no company -> never read or write any config row.
function cfgq(cols) {
  let q = sb.from('config').select(cols || 'key, value');
  if (STATE.companyId) { q = q.eq('company_id', STATE.companyId); }
  else { console.error('cfgq(): no STATE.companyId \u2014 refusing to read/write config; scoping to no-company.'); q = q.eq('company_id', _NO_COMPANY); }
  return q;
}

// T8: set the shared adapter COMPANY_DEFAULT_TZ from this company's config row,
// falling back to platform default_configs, else leaving the Toronto seed. Called
// once at boot before any company-zone render.
async function _hydrateCompanyTz() {
  let tz = '';
  try {
    const { data } = await cfgq('value').eq('key', 'default_timezone').maybeSingle();
    if (data && data.value) tz = data.value;
  } catch(e) {}
  if (!tz) {
    try {
      const { data: dc } = await sb.from('default_configs').select('value').eq('key', 'default_timezone').maybeSingle();
      if (dc && dc.value) tz = dc.value;
    } catch(e) {}
  }
  if (tz) { try { COMPANY_DEFAULT_TZ = tz; } catch(e) {} }
}
const qs = id => document.getElementById(id);

// API helper \u2014 calls adapter POST functions directly
async function apiPost(body) {
  const uuid = STATE.uuid;
  body.uuid = uuid;
  const action = body.action;
  // Adapter account management \u2014 route directly, bypassing window[action] lookup
  if (action === 'createStaffAccount') return await _createStaffAccount(body);
  if (action === 'toggleStaffAuth')    return await _toggleStaffAuth(body);
  if (action === 'resetStaffPassword') return await _resetStaffPassword(body);
  if (action === 'forceSignOut')       return await _forceSignOut(body);
  // Direct Supabase RPC call via the adapter pattern
  // Declaration + document actions must go to adapter, not local JS functions
  const _adapterOnly = ['toggleDeclaration','saveDeclaration','deleteDeclaration','getDocumentDeclarations','getLocationsForDecl','reorderDeclarations','getMyDocuments'];
  if (_adapterOnly.includes(action)) return await _adapterApiPostImpl(body);
  if (typeof window[action] === 'function') return window[action](body);
  // Fallback: use fetch to a hypothetical endpoint
  // For now, route task actions through the adapter functions available globally
  switch(action) {
    case 'getAllTasks': {
      const { data: staff } = await sb.from('staff').select('default_location_id, role, company_id').eq('staff_id', uuid).maybeSingle();
      const locId = staff?.default_location_id;
      const companyId = staff?.company_id;
      const isAdmin = staff?.role === 'admin';
      // TENANT ISOLATION: no company resolved -> return empty, never read all tenants.
      if (!companyId) return { status: 'ok', tasks: [] };
      const { data } = await sb.from('tasks').select('*').eq('company_id', companyId).order('created_at', { ascending: false }).limit(500);
      const filtered = isAdmin ? (data||[]) : (data||[]).filter(t => !t.location_id || t.location_id === locId);
      const taskIds = filtered.map(t => t.task_id);
      const commentCounts = {};
      const latestCommentAt = {};
      if (taskIds.length) { const { data: cmts } = await sb.from('task_comments').select('task_id, created_at').in('task_id', taskIds); (cmts||[]).forEach(c => { commentCounts[c.task_id] = (commentCounts[c.task_id]||0)+1; if (!latestCommentAt[c.task_id]||c.created_at>latestCommentAt[c.task_id]) latestCommentAt[c.task_id]=c.created_at; }); }
      const viewedAt = {};
      if (taskIds.length) { const { data: views } = await sb.from('task_views').select('task_id, viewed_at').eq('staff_id', uuid).in('task_id', taskIds); (views||[]).forEach(v => { viewedAt[v.task_id]=v.viewed_at; }); }
      const clientNameMap = {};
      const _cids = [...new Set(filtered.map(t => t.client_id).filter(Boolean))];
      if (_cids.length) { const { data: cls } = await sb.from('clients').select('id, given_name, family_name, email').in('id', _cids); (cls||[]).forEach(c => { clientNameMap[c.id] = [c.given_name, c.family_name].filter(Boolean).join(' ') || c.email || null; }); }
      const camel = filtered.map(r => { const o={}; for(const k in r){o[k.replace(/_([a-z])/g,(_,l)=>l.toUpperCase())]=r[k];} return o; });
      camel.forEach(t => { t.commentCount = commentCounts[t.taskId]||0; const lc=latestCommentAt[t.taskId]; const lv=viewedAt[t.taskId]; t.hasUnread=!!(lc&&(!lv||lc>lv)); if(t.clientId && clientNameMap[t.clientId]) t.clientName = clientNameMap[t.clientId]; });
      return { status: 'ok', tasks: camel };
    }
    case 'createTask': {
      if (!STATE.companyId) { console.error('No company in context \u2014 aborting createTask'); return { status: 'error', message: 'No company in context' }; }
      const { data: staff } = await sb.from('staff').select('default_location_id, name').eq('staff_id', uuid).maybeSingle();
      const task = { task_id: 'TSK'+Date.now().toString(36).toUpperCase(), company_id: STATE.companyId, type: body.type||'manual', notes: body.title, description: body.description||null, priority: body.priority||'medium', status: 'open', location_id: body.locationId||staff?.default_location_id||null, client_id: body.clientId||null, plan_card_id: body.planCardId||null, mail_id: body.mailId||null, assigned_to: body.assignedTo||null, created_by: uuid, due_date: body.dueDate||null, checklist: body.checklist||null, recurring_config: body.recurringConfig||null, created_at: new Date().toISOString() };
      const { error } = await sb.from('tasks').insert(task);
      if (error) { let msg=error.message; if(msg.includes('tasks_mail_id_fkey'))msg='The Mail ID entered does not exist. Please check and try again.'; else if(msg.includes('tasks_plan_card_id_fkey'))msg='The Plan Card ID entered does not exist. Please check and try again.'; else if(msg.includes('tasks_client_id_fkey'))msg='The Client ID entered does not exist. Please check and try again.'; else if(msg.includes('foreign key'))msg='One of the linked IDs is invalid. Please verify and try again.'; return { status: 'error', message: msg }; }
      await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: uuid, staff_name: staff?.name, action: 'task_created', entity_type: 'task', entity_id: task.task_id, summary: 'Admin created task: ' + (body.title || '') });
      // Notify assigned staff
      if (body.assignedTo && body.assignedTo !== uuid) {
        await _adminNotify('staff', body.assignedTo, 'task_assigned', 'New task assigned to you', body.title || 'A new task needs your attention', 'tasks', task.task_id);
      }
      return { status: 'ok', taskId: task.task_id };
    }
    case 'updateTask': {
      const updates = {};
      if (body.title!==undefined) updates.notes=body.title;
      if (body.description!==undefined) updates.description=body.description;
      if (body.priority!==undefined) updates.priority=body.priority;
      if (body.assignedTo!==undefined) updates.assigned_to=body.assignedTo;
      if (body.dueDate!==undefined) updates.due_date=body.dueDate;
      if (body.status!==undefined) updates.status=body.status;
      if (body.checklist!==undefined) updates.checklist=body.checklist;
      if (body.mailId!==undefined) updates.mail_id=body.mailId||null;
      if (body.planCardId!==undefined) updates.plan_card_id=body.planCardId||null;
      if (body.locationId!==undefined) updates.location_id=body.locationId||null;
      // Snapshot old values once: used for both the reassign notification and the audit diff.
      const { data: oldTask } = await sb.from('tasks').select('assigned_to, notes, priority, due_date, location_id, mail_id, plan_card_id').eq('task_id', body.taskId).eq('company_id', STATE.companyId).maybeSingle();
      // Notify newly-assigned staff (reassignment only).
      if (body.assignedTo) {
        if (oldTask && body.assignedTo !== oldTask.assigned_to && body.assignedTo !== uuid) {
          await _adminNotify('staff', body.assignedTo, 'task_assigned', 'Task assigned to you', oldTask.notes || body.title || 'A task has been assigned to you', 'tasks', body.taskId);
        }
      }
      const { error } = await sb.from('tasks').update(updates).eq('task_id', body.taskId).eq('company_id', STATE.companyId);
      if (error) { let msg=error.message; if(msg.includes('tasks_mail_id_fkey'))msg='The Mail ID does not exist.'; else if(msg.includes('tasks_plan_card_id_fkey'))msg='The Plan Card ID does not exist.'; else if(msg.includes('foreign key'))msg='One of the linked IDs is invalid.'; return { status: 'error', message: msg }; }
      // Activity trail: log meaningful edits. Resolve assignee/location/mail/plan-card IDs
      // to friendly names for display; keep the IDs in `details` jsonb for click-to-copy.
      if (oldTask) {
        const _norm = v => (v === undefined || v === '' ? null : v);
        const _changed = {};
        if (body.assignedTo!==undefined && _norm(body.assignedTo)!==_norm(oldTask.assigned_to)) _changed.assignee = { fromId:_norm(oldTask.assigned_to), toId:_norm(body.assignedTo) };
        if (body.locationId!==undefined && _norm(body.locationId)!==_norm(oldTask.location_id)) _changed.location = { fromId:_norm(oldTask.location_id), toId:_norm(body.locationId) };
        if (body.mailId!==undefined && _norm(body.mailId)!==_norm(oldTask.mail_id)) _changed.mail = { fromId:_norm(oldTask.mail_id), toId:_norm(body.mailId) };
        if (body.planCardId!==undefined && _norm(body.planCardId)!==_norm(oldTask.plan_card_id)) _changed.planCard = { fromId:_norm(oldTask.plan_card_id), toId:_norm(body.planCardId) };
        const _priChanged = body.priority!==undefined && _norm(body.priority)!==_norm(oldTask.priority);
        const _dueChanged = body.dueDate!==undefined && _norm((body.dueDate||'').split('T')[0])!==_norm((oldTask.due_date||'').split('T')[0]);

        if (Object.keys(_changed).length || _priChanged || _dueChanged) {
          // Batch-resolve names only for the entity types that changed.
          const _ids = { staff:new Set(), loc:new Set(), mail:new Set(), pc:new Set() };
          if (_changed.assignee) { [_changed.assignee.fromId,_changed.assignee.toId].forEach(x=>x&&_ids.staff.add(x)); }
          if (_changed.location) { [_changed.location.fromId,_changed.location.toId].forEach(x=>x&&_ids.loc.add(x)); }
          if (_changed.mail)     { [_changed.mail.fromId,_changed.mail.toId].forEach(x=>x&&_ids.mail.add(x)); }
          if (_changed.planCard) { [_changed.planCard.fromId,_changed.planCard.toId].forEach(x=>x&&_ids.pc.add(x)); }
          const _nm = { staff:{}, loc:{}, mail:{}, pc:{} };
          const _q = [];
          if (_ids.staff.size) _q.push(sb.from('staff').select('staff_id, name').in('staff_id',[..._ids.staff]).then(r=>(r.data||[]).forEach(s=>_nm.staff[s.staff_id]=s.name)));
          if (_ids.loc.size)   _q.push(sb.from('locations').select('location_id, name').in('location_id',[..._ids.loc]).then(r=>(r.data||[]).forEach(l=>_nm.loc[l.location_id]=l.name)));
          if (_ids.mail.size)  _q.push(sb.from('mail_log').select('mail_id, sender_name, recipient_name').in('mail_id',[..._ids.mail]).then(r=>(r.data||[]).forEach(m=>_nm.mail[m.mail_id]=[m.recipient_name,m.sender_name?('from '+m.sender_name):''].filter(Boolean).join(' ')||m.mail_id)));
          if (_ids.pc.size)    _q.push(sb.from('plan_cards').select('plan_card_id, friendly_name').in('plan_card_id',[..._ids.pc]).then(r=>(r.data||[]).forEach(pc=>_nm.pc[pc.plan_card_id]=pc.friendly_name||pc.plan_card_id)));
          const { data: editor } = await sb.from('staff').select('name').eq('staff_id', uuid).maybeSingle();
          try { await Promise.all(_q); } catch(e) {}

          const _label = (id, map, blank) => id ? (map[id] || id) : blank;
          const _details = [];
          const _parts = [];
          if (_changed.assignee) { const f=_label(_changed.assignee.fromId,_nm.staff,'unassigned'), t=_label(_changed.assignee.toId,_nm.staff,'unassigned'); _parts.push('assignee '+f+' \u2192 '+t); _details.push({ field:'assignee', fromId:_changed.assignee.fromId, fromName:_changed.assignee.fromId?_nm.staff[_changed.assignee.fromId]||null:null, toId:_changed.assignee.toId, toName:_changed.assignee.toId?_nm.staff[_changed.assignee.toId]||null:null }); }
          if (_changed.location) { const f=_label(_changed.location.fromId,_nm.loc,'none'), t=_label(_changed.location.toId,_nm.loc,'none'); _parts.push('location '+f+' \u2192 '+t); _details.push({ field:'location', fromId:_changed.location.fromId, fromName:_changed.location.fromId?_nm.loc[_changed.location.fromId]||null:null, toId:_changed.location.toId, toName:_changed.location.toId?_nm.loc[_changed.location.toId]||null:null }); }
          if (_priChanged) { _parts.push('priority '+(_norm(oldTask.priority)||'none')+' \u2192 '+(_norm(body.priority)||'none')); _details.push({ field:'priority', fromName:_norm(oldTask.priority)||null, toName:_norm(body.priority)||null }); }
          if (_dueChanged) { const f=_norm((oldTask.due_date||'').split('T')[0])||'none', t=_norm((body.dueDate||'').split('T')[0])||'none'; _parts.push('due '+f+' \u2192 '+t); _details.push({ field:'due', fromName:f==='none'?null:f, toName:t==='none'?null:t }); }
          if (_changed.mail) { const f=_label(_changed.mail.fromId,_nm.mail,'none'), t=_label(_changed.mail.toId,_nm.mail,'none'); _parts.push('mail link '+f+' \u2192 '+t); _details.push({ field:'mail', fromId:_changed.mail.fromId, fromName:_changed.mail.fromId?_nm.mail[_changed.mail.fromId]||null:null, toId:_changed.mail.toId, toName:_changed.mail.toId?_nm.mail[_changed.mail.toId]||null:null }); }
          if (_changed.planCard) { const f=_label(_changed.planCard.fromId,_nm.pc,'none'), t=_label(_changed.planCard.toId,_nm.pc,'none'); _parts.push('plan card link '+f+' \u2192 '+t); _details.push({ field:'planCard', fromId:_changed.planCard.fromId, fromName:_changed.planCard.fromId?_nm.pc[_changed.planCard.fromId]||null:null, toId:_changed.planCard.toId, toName:_changed.planCard.toId?_nm.pc[_changed.planCard.toId]||null:null }); }

          await sb.from('audit_log').insert({ company_id: STATE.companyId, staff_id: uuid, staff_name: editor?.name, action: 'task_updated', entity_type: 'task', entity_id: body.taskId, location_id: _changed.location ? _changed.location.toId : (oldTask.location_id||null), summary: 'Edited task ' + body.taskId + ': ' + _parts.join('; '), details: { changes: _details } });
        }
      }
      return { status: 'ok' };
    }
    default: {
      if (typeof _adapterApiPostImpl === 'function') return await _adapterApiPostImpl(body);
      return { status: 'error', message: 'Unknown action: '+action };
    }
  }
}



function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

// Shared blank-slate (empty-state) markup: icon badge + headline + one sentence, no CTA.
function _blankSlate(iconSvg, title, desc) {
  return '<div class="bcz-empty"><div class="ei">' + iconSvg + '</div><h3>' + title + '</h3><p>' + desc + '</p></div>';
}

// Dismiss a modal overlay only when BOTH mousedown and mouseup happen on the
// overlay itself (not when a drag starts inside a field and releases outside).
function bindModalDismiss(m) {

// Broadcast datetime helpers — interpret the form's wall-clock in the COMPANY
// zone (broadcasts are company-wide). Uses COMPANY_DEFAULT_TZ (hydrated in T8;
// Toronto seed until then). Zone-aware in both directions via the zone's offset.
function _companyTzNow() { return COMPANY_DEFAULT_TZ || 'America/Toronto'; }

// Offset (minutes) of a zone at a given instant: (zone wall-clock as-if-UTC) - actual UTC.
function _zoneOffsetMinutes(date, tz) {
  const dtf = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  const p = {};
  for (const part of dtf.formatToParts(date)) if (part.type !== 'literal') p[part.type] = part.value;
  const hh = p.hour === '24' ? '00' : p.hour;
  const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, +hh, +p.minute, +p.second);
  return (asUTC - date.getTime()) / 60000;
}

// UTC instant → "YYYY-MM-DDTHH:MM" wall-clock in the company zone (for the input).
function toLocalDatetime(utcStr) {
  const d = new Date(utcStr);
  const tz = _companyTzNow();
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(d);
  const p = {};
  for (const part of parts) if (part.type !== 'literal') p[part.type] = part.value;
  const hh = p.hour === '24' ? '00' : p.hour;
  return `${p.year}-${p.month}-${p.day}T${hh}:${p.minute}`;
}

// Company-zone wall-clock "YYYY-MM-DDTHH:MM" → UTC ISO string.
function localToUTC(localStr) {
  if (!localStr) return null;
  const tz = _companyTzNow();
  // Interpret the parts as if UTC, then subtract the zone's offset at that instant.
  const [datePart, timePart] = localStr.split('T');
  const [y, mo, d] = datePart.split('-').map(Number);
  const [h, mi] = (timePart || '00:00').split(':').map(Number);
  const asIfUTC = new Date(Date.UTC(y, mo - 1, d, h, mi));
  const offMin = _zoneOffsetMinutes(asIfUTC, tz);
  return new Date(asIfUTC.getTime() - offMin * 60000).toISOString();
}

function _safeDate(str) {
  if (!str) return null;
  return new Date(str.includes('T') ? str : str + 'T12:00:00');
}

// Canonical datetime for admin. Company zone by default; pass a location_id
// for place-bound events. Delegates to the F1 adapter helper.
function formatTorontoTime(utcStr, locId) {
  if (!utcStr) return '\u2014';
  const z = locId ? locTz(locId) : (COMPANY_DEFAULT_TZ || 'America/Toronto');
  return fmtDateTime(utcStr, z);
}
// Place-date helpers for admin "all locations" views: resolve the row's zone
// and append its tag (per-row tagging, case E intentional duplicates allowed).
function fmtDateLocAdmin(d, locId, opts) {
  if (!d) return '\u2014';
  const z = locId ? locTz(locId) : (COMPANY_DEFAULT_TZ || 'America/Toronto');
  const s = _safeDate(d).toLocaleDateString('en-CA', Object.assign({ month:'short', day:'numeric', year:'numeric', timeZone: z }, opts || {}));
  const tag = tzLabel(z);
  return tag ? s + ' ' + tag : s;
}
function fmtDateTimeLocAdmin(d, locId) {
  if (!d) return '\u2014';
  const z = locId ? locTz(locId) : (COMPANY_DEFAULT_TZ || 'America/Toronto');
  const s = fmtDateTime(d, z);
  const tag = tzLabel(z);
  return tag ? s + ' ' + tag : s;
}

// \u2500\u2500 Nav Drag-to-Reorder (3 groups) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Stored in the config table (per-admin key) so the layout follows the admin
// across devices/browsers, not just one localStorage.
function _navConfigKey() { return 'nav_layout_' + (STATE.uuid || 'default'); }

async function _applyNavOrder() {
  try {
    let saved = null;
    const { data } = await sb.from('config').select('value')
      .eq('company_id', STATE.companyId).eq('key', _navConfigKey()).maybeSingle();
    if (data && data.value) { try { saved = JSON.parse(data.value); } catch(e) {} }
    // One-time migration: if no DB row yet but an old localStorage layout exists, adopt it.
    if (!saved) {
      try {
        const legacy = JSON.parse(localStorage.getItem('app_nav_layout_' + (STATE.uuid || 'default')) || 'null');
        if (legacy) { saved = legacy; _persistNavLayout(saved); }
      } catch(e) {}
    }
    if (!saved) return;
    if (saved.labels) {
      saved.labels.forEach((lbl, i) => {
        const el = document.getElementById('nav-label-' + i);
        if (el) el.textContent = lbl;
      });
    }
    if (saved.groups) {
      saved.groups.forEach((sections, i) => {
        const container = document.getElementById('nav-sortable-' + i);
        if (!container) return;
        sections.forEach(section => {
          const el = container.querySelector(`[data-section="${section}"]`) ||
                     document.querySelector(`[data-section="${section}"]`);
          if (el) container.appendChild(el);
        });
      });
    }
  } catch(e) {}
}

async function _persistNavLayout(payload) {
  if (_noCompanyAbort('_persistNavLayout', false)) return;
  try {
    await sb.from('config').upsert(
      { company_id: STATE.companyId, key: _navConfigKey(), value: JSON.stringify(payload), description: 'Admin sidebar layout (per-admin)' },
      { onConflict: 'company_id,key' }
    );
  } catch(e) {}
}

async function _saveNavLayout() {
  try {
    const labels = [0,1,2].map(i => {
      const el = document.getElementById('nav-label-' + i);
      return el ? el.textContent : '';
    });
    const groups = [0,1,2].map(i => {
      const container = document.getElementById('nav-sortable-' + i);
      if (!container) return [];
      return [...container.querySelectorAll('.nav-draggable')].map(el => el.dataset.section);
    });
    await _persistNavLayout({ labels, groups });
  } catch(e) {}
}

// Shared drag state across all three nav zones so an item can be dragged
// from one zone and dropped into another. (Save/restore already supports
// cross-zone arrangements.)
let _navDragEl = null, _navPlaceholder = null;

function _initZoneDrag(zoneIndex) {
  const container = document.getElementById('nav-sortable-' + zoneIndex);
  if (!container || container._dragInit) return;
  container._dragInit = true;

  container.addEventListener('dragstart', e => {
    const item = e.target.closest('.nav-draggable');
    if (!item) return;
    _navDragEl = item;
    _navDragEl.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
    _navPlaceholder = document.createElement('div');
    _navPlaceholder.style.cssText = 'height:' + _navDragEl.offsetHeight + 'px;background:var(--blue);opacity:.12;border-radius:8px;margin:1px 0';
    // Give every zone a minimum drop surface for the duration of the drag,
    // so a zone that's been emptied still has height to receive dragover/drop.
    [0,1,2].forEach(z => {
      const c = document.getElementById('nav-sortable-' + z);
      if (c) c.style.minHeight = _navDragEl.offsetHeight + 'px';
    });
  });

  container.addEventListener('dragover', e => {
    if (!_navDragEl || !_navPlaceholder) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.nav-draggable');
    if (item && item !== _navDragEl) {
      const mid = item.getBoundingClientRect().top + item.offsetHeight / 2;
      if (e.clientY < mid) container.insertBefore(_navPlaceholder, item);
      else container.insertBefore(_navPlaceholder, item.nextSibling);
    } else if (!item) {
      // Over the zone container but not over an item: drop into an empty
      // zone or at the end of this zone.
      if (_navPlaceholder.parentNode !== container) container.appendChild(_navPlaceholder);
    }
  });

  container.addEventListener('drop', e => {
    if (!_navDragEl) return;
    e.preventDefault();
    if (_navPlaceholder && _navPlaceholder.parentNode) {
      _navPlaceholder.parentNode.insertBefore(_navDragEl, _navPlaceholder);
      _navPlaceholder.remove();
    }
  });

  container.addEventListener('dragend', () => {
    if (_navDragEl) _navDragEl.style.opacity = '';
    if (_navPlaceholder && _navPlaceholder.parentNode) _navPlaceholder.remove();
    _navDragEl = null; _navPlaceholder = null;
    // Remove the temporary drop surfaces.
    [0,1,2].forEach(z => {
      const c = document.getElementById('nav-sortable-' + z);
      if (c) c.style.minHeight = '';
    });
  });

  container.querySelectorAll('.nav-draggable').forEach(item => {
    item.setAttribute('draggable', 'true');
  });
}

async function boot() {
  const authToken = localStorage.getItem('sb_admin_access_token');
  const staffId   = localStorage.getItem('sb_admin_staff_id');
  if (!authToken || !staffId) {
    window.location.href = 'login.html';
    return;
  }
  STATE.uuid = staffId;

  // Verify role is admin \u2014 block non-admins even if they somehow got here
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/staff?staff_id=eq.' + encodeURIComponent(staffId) + '&select=role,name,email,company_id&limit=1', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + authToken }
    });
    const rows = await res.json();
    if (!rows || !rows.length || rows[0].role !== 'admin') {
      localStorage.removeItem('sb_admin_access_token');
      localStorage.removeItem('sb_admin_refresh_token');
      localStorage.removeItem('sb_admin_staff_id');
      window.location.href = 'login.html';
      return;
    }
    STATE.staffName = rows[0].name || 'Admin';
    STATE.staffEmail = rows[0].email || '';
    STATE.companyId = rows[0].company_id || null;
    STATE.role = rows[0].role || 'admin';
  } catch(e) {
    window.location.href = 'login.html';
    return;
  }

  // T8: hydrate the shared COMPANY_DEFAULT_TZ from this company's default_timezone
  // config row (falls back to default_configs, else the Toronto seed). This makes
  // every company-zone display/conversion correct for non-Toronto companies.
  try { await _hydrateCompanyTz(); } catch(e) {}

  // Anchor for force-sign-out / deactivate detection: record when THIS tab's admin
  // session began. The 5s poll (_checkAdminStillActive) ejects the tab if the admin
  // row goes inactive OR force_logout_at is stamped later than this.
  try { if (!sessionStorage.getItem('admin_session_start')) sessionStorage.setItem('admin_session_start', new Date().toISOString()); } catch(e) {}

  const _ai = (STATE.staffName || 'Admin').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const _av = document.getElementById('user-chip-avatar'); if (_av) _av.textContent = _ai;
  const _an = document.getElementById('user-chip-name'); if (_an) _an.textContent = STATE.staffName || 'Admin';
  await _applyNavOrder();
  switchSection('notifications');
  loadAdminIdVerifyBadge();
  loadAdminNotifCount();
  loadAdminTaskBadge();
  loadAdminReportsBadge();
  setInterval(function(){ loadAdminNotifCount(); _checkAdminStillActive(); }, 5000);
  setInterval(loadAdminReportsBadge, 10000);
  hideAdminLoading();
}

// Re-validate the admin session every poll cycle. Ejects the tab (clears admin
// tokens + redirects to login) if the admin account was deactivated (no active
// row) OR an admin issued a force sign out after this tab's session began
// (force_logout_at later than admin_session_start). Mirrors staff _checkStillActive.
async function _checkAdminStillActive() {
  try {
    const authToken = localStorage.getItem('sb_admin_access_token');
    const staffId   = localStorage.getItem('sb_admin_staff_id');
    if (!authToken || !staffId) return;
    const res = await fetch(SUPABASE_URL + '/rest/v1/staff?staff_id=eq.' + encodeURIComponent(staffId) + '&select=active,role,force_logout_at&limit=1', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + authToken }
    });
    if (!res.ok) return; // transient/network/auth blip \u2014 don't eject on a single failure
    const rows = await res.json();
    const row = rows && rows[0];
    let started = null;
    try { started = sessionStorage.getItem('admin_session_start'); } catch(e) {}
    const ejected = (reason) => {
      localStorage.removeItem('sb_admin_access_token');
      localStorage.removeItem('sb_admin_refresh_token');
      localStorage.removeItem('sb_admin_staff_id');
      try { sessionStorage.removeItem('admin_session_start'); } catch(e) {}
      window.location.href = 'login.html?error=' + reason;
    };
    // Deactivated, role changed away from admin, or row gone \u2014 eject
    if (!row || row.active === false || row.role !== 'admin') { ejected('inactive'); return; }
    // Force sign out issued after this tab's session began \u2014 eject
    if (row.force_logout_at && started && new Date(row.force_logout_at) > new Date(started)) {
      ejected('inactive');
    }
  } catch(e) {}
}

// Navigation generation token. Every switchSection() bumps this; async loaders
// can compare against it (via navIsStale) to avoid painting into a pane the user
// has already navigated away from — fixes "clicked one page, saw the previous one
// load / pages jumping" when a slow fetch resolves after a newer click.
window._navGen = window._navGen || 0;
function navIsStale(gen) { return gen !== window._navGen; }
// Single source of truth for the inter-page content loader (skeleton shimmer).
function _pageLoader(){ return '<div class="apl"><div class="apl-card"><div class="apl-row title"></div><div class="apl-row w95"></div><div class="apl-row w85"></div><div class="apl-row w95"></div><div class="apl-row w70"></div><div class="apl-row last"></div></div></div>'; }
function switchSection(section) {
  const _gen = ++window._navGen;       // claim this navigation
  STATE.section = section;
  STATE._navGen = _gen;
  // Cleanup old notifications on navigation (non-blocking)
  apiPost({ action: 'cleanupNotifications' }).catch(() => {});
  // Close mobile sidebar
  qs('admin-sidebar')?.classList.remove('open');
  qs('sidebar-overlay')?.classList.remove('open');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[onclick*="${section}"]`)?.classList.add('active');
  const c = qs('admin-content');
  _installNavGuard(c);                 // one-time guarded innerHTML setter
  c._navGen = _gen;                    // the generation now owning this pane
  c.dataset.navGen = String(_gen);     // stamp the pane with its owning navigation
  c.innerHTML = _pageLoader();
  switch(section) {
    case 'locations': loadLocations(); break;
    case 'plans': loadPlans(); break;
    case 'staff': loadStaff(); break;
    case 'settings': loadSettings(); break;
    case 'audit': renderAuditShell(); break;
    case 'notiflog': loadNotificationLog(); break;
    case 'broadcasts': loadBroadcasts(); break;
    case 'branding': loadBranding(); break;
    case 'tasks': loadAdminTasks(); break;
    case 'integrations': loadIntegrations(); break;
    case 'idverify': loadAdminIdVerify(); break;
    case 'plancards': loadAdminPlanCards(); break;
    case 'billing': loadAdminBilling(); break;
    case 'notifications': loadAdminNotifications(); break;
    case 'reports': loadAdminReports(); break;
  }
}

// One-time install of a generation-guarded innerHTML setter on the #admin-content
// pane. The native setter still does the real work; we just gate it: a write is
// dropped if the pane's owning generation (c._navGen, set by switchSection) is older
// than the newest navigation (window._navGen). A slow loader that resolves after the
// user has clicked another section therefore can't overwrite the new page. The pane's
// own switchSection paint is always allowed because it sets c._navGen to the newest
// gen immediately before writing. Refresh handlers (refreshAdminX) re-fetch within the
// SAME generation, so their repaints pass the gate normally.
function _installNavGuard(el) {
  if (!el || el._navGuarded) return;
  const proto = Object.getPrototypeOf(el);
  const desc = Object.getOwnPropertyDescriptor(proto, 'innerHTML')
            || Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  if (!desc || !desc.set) { el._navGuarded = true; return; } // can't guard; fail open
  Object.defineProperty(el, 'innerHTML', {
    configurable: true,
    get() { return desc.get.call(this); },
    set(v) {
      // Drop writes from a superseded navigation generation.
      if (this._navGen != null && this._navGen !== window._navGen) return;
      desc.set.call(this, v);
    }
  });
  el._navGuarded = true;
}

function appPromptModal(title, message, placeholder, required) {
  return new Promise(resolve => {
    if (document.querySelector('.modal-overlay')) { resolve(null); return; }
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal"><div class="modal-title">${title}</div><div style="font-size:13px;color:var(--ink-2);margin-bottom:12px">${message||''}</div><input class="form-input" id="app-prompt-input" placeholder="${placeholder||''}" style="margin-bottom:16px"><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" id="app-prompt-cancel">Cancel</button><button class="btn btn-primary" id="app-prompt-ok">OK</button></div></div>`;
    overlay.querySelector('#app-prompt-cancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.querySelector('#app-prompt-ok').onclick = () => { const v = overlay.querySelector('#app-prompt-input').value; if (required && !v.trim()) { toast('Required','error'); return; } overlay.remove(); resolve(v); };
    overlay.querySelector('#app-prompt-input').addEventListener('keydown', e => { if (e.key === 'Enter') overlay.querySelector('#app-prompt-ok').click(); });
    overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
    overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) { overlay.remove(); resolve(null); } });
    document.body.appendChild(overlay); overlay.querySelector('#app-prompt-input').focus();
  });
}

function appConfirmModal(title, message, confirmLabel, destructive) {
  return new Promise(resolve => {
    if (document.querySelector('.modal-overlay')) { resolve(false); return; }
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    const btnStyle = destructive ? 'background:#C62828;color:#fff;border-color:#C62828' : '';
    overlay.innerHTML = `<div class="modal" style="max-width:400px">
      <div class="modal-title">${title}</div>
      <div style="font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:20px">${message||''}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-secondary" id="app-confirm-cancel">Cancel</button>
        <button class="btn btn-primary" id="app-confirm-ok" style="${btnStyle}">${confirmLabel||'Confirm'}</button>
      </div>
    </div>`;
    overlay.querySelector('#app-confirm-cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('#app-confirm-ok').onclick = () => { overlay.remove(); resolve(true); };
    overlay.addEventListener('mousedown', e => { overlay._downSelf = (e.target === overlay); });
    overlay.addEventListener('click', e => { if (e.target === overlay && overlay._downSelf) { overlay.remove(); resolve(false); } });
    document.body.appendChild(overlay);
  });
}

function _locEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Smart "active for" age: days -> months -> years rollup. Returns '' when no created_at.
function _locAge(created){
  if(!created) return '';
  var then=new Date(created).getTime();
  if(isNaN(then)) return '';
  var days=Math.floor((Date.now()-then)/86400000);
  if(days<0) days=0;
  if(days===0) return 'Created today';
  if(days===1) return '1 day active';
  if(days<31) return days+' days active';
  var months=Math.floor(days/30.44);
  if(months<12) return months===1?'1 month active':months+' months active';
  var years=Math.floor(days/365.25);
  var remMonths=Math.floor((days-years*365.25)/30.44);
  var yLabel=years===1?'1 year':years+' years';
  if(remMonths===0) return yLabel+' active';
  return yLabel+' '+remMonths+(remMonths===1?' month':' months')+' active';
}

function _locSetStatus(s){
  if(!window._locFilter) window._locFilter={search:'',status:''};
  window._locFilter.status=s;
  document.querySelectorAll('[data-loc-status]').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-loc-status')===s); });

// Location-specific active toggle: controls whether NEW registrations are accepted at this
// location. Existing staff/clients keep working (full lockout is shutDownLocation, TBD).
async function togLocation(id, v) {
  if (_noCompanyAbort('togLocation', true)) return;
  const { error } = await sb.from('locations').update({ active: v }).eq('location_id', id).eq('company_id', STATE.companyId);
  if (error) { toast(error.message, 'error'); return; }
  toast(v ? 'Location activated \u2014 now accepting new registrations'
          : 'Location deactivated \u2014 new registrations closed (existing staff & clients keep access)');
  loadLocations();
}

// Full soft shutdown of a location. Sets shutdown=true (gates clients' plans at
// this location, blocks non-admin staff whose default location is here) and
// active=false (closes new registrations). Admins keep full access. Reversible
// via reopenLocation. No Stripe/billing changes \u2014 visual/access gating only.
async function shutDownLocation(id, name) {
  if (_noCompanyAbort('shutDownLocation', true)) return;
  const ok = await appConfirmModal(
    'Shut Down Location',
    'Shut down <strong>' + (name || id) + '</strong>?<br><br>' +
    'Clients\u2019 plans at this location will be gated with a \u201cthis location has been shut down\u201d notice (they keep their login). ' +
    'Staff whose default location is here will be blocked \u2014 admins keep full access. ' +
    'Registration for this location will also close.<br><br>' +
    'This is fully reversible \u2014 you can reopen the location at any time.',
    'Shut Down', true
  );
  if (!ok) return;
  const { error } = await sb.from('locations').update({ shutdown: true, active: false }).eq('location_id', id).eq('company_id', STATE.companyId);
  if (error) { toast(error.message, 'error'); return; }
  toast('Location shut down \u2014 plans gated, staff blocked, registration closed (admins keep access)');
  loadLocations();
}

// Reverse a shutdown: restore client plan access + staff access and reopen
// registrations. Instantly clears the gate on next client/staff load/poll.
async function reopenLocation(id, name) {
  if (_noCompanyAbort('reopenLocation', true)) return;
  const ok = await appConfirmModal(
    'Reopen Location',
    'Reopen <strong>' + (name || id) + '</strong>?<br><br>' +
    'This restores client plan access and staff access at this location, and reopens new registrations.',
    'Reopen', false
  );
  if (!ok) return;
  const { error } = await sb.from('locations').update({ shutdown: false, active: true }).eq('location_id', id).eq('company_id', STATE.companyId);
  if (error) { toast(error.message, 'error'); return; }
  toast('Location reopened \u2014 access restored and registrations open');
  loadLocations();
}

// Validated IANA timezone allowlist for the location form — grouped, and exactly
// the set tzLabel() knows how to label (so locTz() can never receive a garbage
// zone). Locked read-only after creation (mirrors the tax-lock pattern).
const _LOC_TZ_GROUPS = [
  ['Canada', [
    ['America/Vancouver', 'Pacific (PT)'],
    ['America/Edmonton', 'Mountain (MT)'],
    ['America/Regina', 'Saskatchewan (CST)'],
    ['America/Winnipeg', 'Central (CT)'],
    ['America/Toronto', 'Eastern (ET)'],
    ['America/Halifax', 'Atlantic (AT)'],
    ['America/St_Johns', 'Newfoundland (NT)']
  ]],
  ['United States', [
    ['America/Los_Angeles', 'Pacific (PT)'],
    ['America/Phoenix', 'Arizona (MST)'],
    ['America/Denver', 'Mountain (MT)'],
    ['America/Chicago', 'Central (CT)'],
    ['America/New_York', 'Eastern (ET)'],
    ['America/Anchorage', 'Alaska (AKT)'],
    ['Pacific/Honolulu', 'Hawaii (HT)']
  ]]
];
function _locTzOptions(selected) {
  const sel = selected || 'America/Toronto';
  // If the stored value isn't in the allowlist (legacy/free-text), surface it so
  // it isn't silently lost, but every fresh pick is constrained.
  const known = _LOC_TZ_GROUPS.some(g => g[1].some(o => o[0] === sel));
  let html = '';
  if (!known) html += `<option value="${sel}" selected>${sel} (current)</option>`;
  for (const [groupLabel, zones] of _LOC_TZ_GROUPS) {
    html += `<optgroup label="${groupLabel}">`;
    for (const [tz, label] of zones) {
      html += `<option value="${tz}"${tz === sel ? ' selected' : ''}>${label}</option>`;
    }
    html += '</optgroup>';
  }
  return html;
}

// Form-mode timezone picker (same look as Settings tzpicker, but stores the
// pick in a hidden #loc-tz input instead of persisting on selection).

  _LOC_TZ_GROUPS.forEach(function(g){ g[1].forEach(function(o){ if (o[0]===cur) { curLabel = o[1]; } }); });

    return '<div class="tzp-grp">'+g[0]+'</div>' + g[1].map(function(o){

      return '<div class="tzp-opt'+(sel?' sel':'')+'" data-tz="'+o[0]+'" data-search="'+(o[1]+' '+city+' '+g[0]).toLowerCase().replace(/"/g,'')+'" onclick="tzpPickForm(\''+o[0]+'\')">'
        + '<span class="tzp-zn">'+o[1]+'</span>'

        + '</div>';

  return '<input type="hidden" id="loc-tz" value="'+cur+'">'

    +   '<button type="button" class="tzp-trig" onclick="tzpToggle(this)">'

    +     '<span style="display:flex;flex-direction:column;line-height:1.25;text-align:left">'

    +       '<span style="font-size:10px;color:var(--ink-4);font-variant-numeric:tabular-nums" class="tzp-clk tzp-curclk" data-tz="'+cur+'">'+curCity+'</span>'
    +     '</span>'
    +     '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
    +   '</button>'
    +   '<div class="tzp-panel" style="display:none;z-index:10001">'
    +     '<div class="tzp-search-wrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="tzp-search" placeholder="Search zone or city\u2026" oninput="tzpFilter(this)"></div>'
    +     '<div class="tzp-list">'+optsHtml+'</div>'

}
// Form-mode pick: update hidden input + trigger display + checkmark; no persist.
function tzpPickForm(tz) {
  const wrap = document.getElementById('loc-tz-pick'); if (!wrap) return;
  const hidden = document.getElementById('loc-tz'); if (hidden) hidden.value = tz;
  let label = tz;
  _LOC_TZ_GROUPS.forEach(function(g){ g[1].forEach(function(o){ if (o[0]===tz) { label = o[1]; } }); });
  const city = tz.split('/').pop().replace(/_/g,' ');
  const lblEl = wrap.querySelector('.tzp-curlabel'); if (lblEl) lblEl.textContent = label;
  const clkEl = wrap.querySelector('.tzp-curclk'); if (clkEl) clkEl.dataset.tz = tz;
  // Move the selected state + checkmark.
  wrap.querySelectorAll('.tzp-opt').forEach(function(o){
    const isSel = (o.dataset.tz === tz);
    o.classList.toggle('sel', isSel);
    const zt = o.querySelector('.tzp-zt'); if (!zt) return;
    const existing = zt.querySelector('svg'); if (existing) existing.remove();
    if (isSel) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width','12'); svg.setAttribute('height','12');
      svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
      svg.setAttribute('stroke','var(--red)'); svg.setAttribute('stroke-width','2.5');
      svg.setAttribute('style','vertical-align:-2px');
      svg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      zt.appendChild(svg);
    }
  });
  _tzpClockTick();
  const panel = wrap.querySelector('.tzp-panel');
  if (panel) { panel.style.display = 'none'; if (panel._tzpCleanup) { panel._tzpCleanup(); panel._tzpCleanup = null; } }
}

  const isNew = !id;

  // Time option generator
  function _tOpts(sel) {
    var opts='';
    for (var h=5;h<24;h++) { for (var mm=0;mm<60;mm+=30) {
      var val=(h<10?'0':'')+h+':'+(mm===0?'00':'30');
      var hr=h===0?12:h>12?h-12:h; var ap=h<12?'AM':'PM';
      opts+='<option value="'+val+'"'+(sel===val?' selected':'')+'>'+hr+':'+(mm===0?'00':'30')+' '+ap+'</option>';
    }}

  }

  // Parse stored hours string — returns {open, from, to, closedReason, otherText}
  function _ph(str) {
    if (!str||str==='') return {open:false,from:'09:00',to:'17:00',closedReason:'Closed',otherText:''};
    if (str.toLowerCase()==='closed') return {open:false,from:'09:00',to:'17:00',closedReason:'Closed',otherText:''};
    if (str==='By Appointment') return {open:false,from:'09:00',to:'17:00',closedReason:'By Appointment',otherText:''};

      '</div>';

function _getLocHours(day) {
  const t=document.getElementById('loc-h-'+day);
  if (!t||t.dataset.open!=='1') {
    const reason=document.getElementById('loc-h-'+day+'-reason')?.value;
    if(reason==='other') return document.getElementById('loc-h-'+day+'-other')?.value?.trim()||'Closed';
    return reason||'Closed';
  }
  return (document.getElementById('loc-h-'+day+'-from')?.value||'09:00')+'-'+(document.getElementById('loc-h-'+day+'-to')?.value||'17:00');
}

function toggleLocHours(day) {
  const t=document.getElementById('loc-h-'+day); if(!t) return;
  const op=t.dataset.open!=='1'; t.dataset.open=op?'1':'0';
  const sp=t.querySelectorAll('span');
  if(sp[0]) sp[0].style.background=op?'var(--green)':'#ddd';
  if(sp[1]){sp[1].style.right=op?'2px':'';sp[1].style.left=op?'':'2px';}
  const ti=document.getElementById('loc-h-'+day+'-times'),cl=document.getElementById('loc-h-'+day+'-closed');
  if(ti) ti.style.display=op?'flex':'none';
  if(cl) cl.style.display=op?'none':'flex';
}

function copyMonToWeekdays() {
  const mT=document.getElementById('loc-h-mon'),mF=document.getElementById('loc-h-mon-from'),mTo=document.getElementById('loc-h-mon-to');
  if(!mT||!mF||!mTo) return;
  const op=mT.dataset.open==='1';
  ['tue','wed','thu','fri'].forEach(function(day){
    const t=document.getElementById('loc-h-'+day); if(!t) return;
    t.dataset.open=op?'1':'0';
    const sp=t.querySelectorAll('span');
    if(sp[0]) sp[0].style.background=op?'var(--green)':'#ddd';
    if(sp[1]){sp[1].style.right=op?'2px':'';sp[1].style.left=op?'':'2px';}
    const ti=document.getElementById('loc-h-'+day+'-times'),cl=document.getElementById('loc-h-'+day+'-closed');
    if(ti) ti.style.display=op?'flex':'none';
    if(cl) cl.style.display=op?'none':'flex';
    if(op){const f=document.getElementById('loc-h-'+day+'-from'),tv=document.getElementById('loc-h-'+day+'-to');if(f)f.value=mF.value;if(tv)tv.value=mTo.value;}
  });
  toast('Mon hours copied to Tue\u2013Fri');
}

async function saveLocation(id) {
  if (_noCompanyAbort('saveLocation', true)) return;
  const d={
    name:qs('loc-name').value, address:qs('loc-address').value, city:qs('loc-city').value,
    postal_code:(qs('loc-postal').value||'').replace(/\s+/g,'').toUpperCase(),
    phone:qs('loc-phone').value, email:(qs('loc-email').value||'').replace(/\s+/g,'').toLowerCase(),
    mon_hours:_getLocHours('mon'), tue_hours:_getLocHours('tue'), wed_hours:_getLocHours('wed'),
    thu_hours:_getLocHours('thu'), fri_hours:_getLocHours('fri'), sat_hours:_getLocHours('sat'),
    sun_hours:_getLocHours('sun'),
    holiday_notes:document.getElementById('loc-holiday')?.value||'',
    special_notes:document.getElementById('loc-special')?.value||''
  };
  // Tax + timezone are set ONLY at creation; existing locations never re-write them (locked).
  if (!id) {
    d.province = qs('loc-province').value;
    if (!d.province || !d.province.trim()) { toast('Province / State required','error'); return; }
    d.timezone = (document.getElementById('loc-tz')?.value || 'America/Toronto');
    d.tax_name = (document.getElementById('loc-tax-name')?.value||'').trim()||'Tax';
    d.tax_rate = parseFloat(document.getElementById('loc-tax-rate')?.value)||0;
    if (d.tax_rate < 0) { toast('Tax rate can\'t be negative','error'); return; }
    if (d.tax_rate > 100) { toast('Tax rate must be between 0 and 100','error'); return; }
  }
  if (!d.name) { toast('Name required','error'); return; }
  if (!d.address || !d.address.trim()) { toast('Address required','error'); return; }
  if (!d.city || !d.city.trim()) { toast('City required','error'); return; }
  if (!d.postal_code || !d.postal_code.trim()) { toast('Postal Code / Zip Code required','error'); return; }
  if (!d.phone   || !d.phone.trim())   { toast('Phone required','error'); return; }
  if (!d.email   || !d.email.trim())   { toast('Email required','error'); return; }
  let error;
  if (id) { ({error}=await sb.from('locations').update(d).eq('location_id',id).eq('company_id',STATE.companyId)); }
  else { d.location_id='LOC'+String(Date.now()).slice(-6); d.active=true; d.company_id=STATE.companyId; ({error}=await sb.from('locations').insert(d)); }
  if (error) { toast(error.message,'error'); return; }
  document.querySelector('.modal-overlay')?.remove();
  toast(id?'Location updated':'Location created');
  loadLocations();
}

async function addLocDeclaration(locationId) {
  const inp=document.getElementById('loc-decl-input');
  const text=inp?.value?.trim(); if(!text){toast('Enter declaration text','error');return;}
  try {
    const _cur = await apiPost({action:'getDocumentDeclarations',uuid:STATE.uuid});
    const _existing = (_cur.status==='ok' ? (_cur.declarations||[]) : []).filter(d=>d.scope===locationId);
    const _next = _existing.reduce((m,d)=>Math.max(m,d.sort_order||0),0) + 10;
    const r=await apiPost({action:'saveDeclaration',uuid:STATE.uuid,text,type:'proof_of_address',scope:locationId,sort_order:_next});
    if(r.status!=='ok') throw new Error(r.message);
    inp.value=''; toast('Declaration added'); loadLocationDeclarations(locationId);
  } catch(e){toast(e.message,'error');}
}

async function toggleLocDeclaration(id,enabled,locationId) {
  try {
    const r=await apiPost({action:'toggleDeclaration',uuid:STATE.uuid,id,enabled:!enabled});
    if(r.status!=='ok') throw new Error(r.message); loadLocationDeclarations(locationId);
  } catch(e){toast(e.message,'error');}
}

async function deleteLocDeclaration(id,locationId) {
  if(!confirm('Delete this declaration?')) return;
  try {
    const r=await apiPost({action:'deleteDeclaration',uuid:STATE.uuid,id});
    if(r.status!=='ok') throw new Error(r.message); toast('Deleted'); loadLocationDeclarations(locationId);
  } catch(e){toast(e.message,'error');}
}

function _initLocDeclDrag(locationId) {
  const el=document.getElementById('loc-decl-list'); if(!el) return;
  let drag=null,ghost=null;
  function mkG(h){const g=document.createElement('div');g.style.cssText='height:'+h+'px;border:1.5px dashed var(--border);background:var(--bg);box-sizing:border-box;border-radius:9px;margin-bottom:6px;';return g;}
  el.querySelectorAll('.loc-decl-row').forEach(function(row){
    row.addEventListener('dragstart',function(e){drag=row;e.dataTransfer.effectAllowed='move';var h=row.getBoundingClientRect().height;ghost=mkG(h);setTimeout(function(){if(!drag)return;drag.style.opacity='.5';drag.style.outline='2px solid var(--green)';el.insertBefore(ghost,drag);},0);});
    row.addEventListener('dragend',function(){row.style.opacity='';row.style.outline='';if(ghost&&ghost.parentNode)ghost.parentNode.removeChild(ghost);ghost=null;drag=null;});
  });
  el.addEventListener('dragover',function(e){e.preventDefault();if(!ghost||!drag)return;var rows=Array.from(el.querySelectorAll('.loc-decl-row')).filter(r=>r!==drag);if(!rows.length)return;var placed=false;for(var i=0;i<rows.length;i++){var rect=rows[i].getBoundingClientRect();if(e.clientY<=rect.top+rect.height/2){if(ghost.nextSibling!==rows[i])el.insertBefore(ghost,rows[i]);placed=true;break;}}if(!placed){var last=rows[rows.length-1];if(ghost.previousSibling!==last)el.insertBefore(ghost,last.nextSibling);}});
  el.addEventListener('drop',function(e){e.preventDefault();if(!drag||!ghost||!ghost.parentNode)return;el.insertBefore(drag,ghost);ghost.parentNode.removeChild(ghost);ghost=null;drag.style.opacity='';drag.style.outline='';var ord=Array.from(el.querySelectorAll('.loc-decl-row')).map(function(r,i){return{id:r.dataset.id,sort_order:i*10};});var d2=drag;drag=null;apiPost({action:'reorderDeclarations',uuid:STATE.uuid,order:ord}).then(function(r){if(r.status==='ok')loadLocationDeclarations(locationId);else toast(r.message,'error');}).catch(function(){toast('Reorder failed','error');});});
}

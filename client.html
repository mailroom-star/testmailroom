}
function _ppExit() {
  // Return the client to the exact plan + tab they were on before opening this
  // page. Falls back to the default landing if that plan is no longer present.
  const ret = _PP._return || {};
  const subs = ((STATE.access && STATE.access.subscriptions) || []).filter(s => s.subscriptionId);
  const sub = ret.subId ? subs.find(s => s.subscriptionId === ret.subId) : null;
  if (sub && !sub.setupRequired && sub.canAccess) {
    STATE.activeSub = sub;
    try { renderSubscriptionSwitcher(STATE.access); } catch (e) {}
    loadAndRenderSub(sub, STATE.access);
    // Always land on the My Plan tab of the plan they came from.
    setTimeout(() => { try { switchTab('plans'); } catch (e) {} }, 0);
    return;
  }
  // If they came from a plan that is still awaiting setup, return them to that
  // setup flow rather than dropping onto their best live plan's mail log.
  if (sub && sub.canAccess && sub.setupRequired) {
    STATE.activeSub = sub;
    try { renderSubscriptionSwitcher(STATE.access); } catch (e) {}
    loadAndRenderSub(sub, STATE.access);
    return;
  }
  if ((STATE.allSubs || subs).some(s => s.canAccess && s.setupRequired)) {
    _resumePlanSetup();
    return;
  }
  _renderClientInner(STATE.access);
}

// -- Entry point - wired to the top-right dropdown "Plans & Pricing" link --
async function openPlansPricing() {
  const area = qs('content-area');
  if (!area) return;
  // Remember which plan they came from so "Back to my plan" returns to it.
  _PP._return = { subId: (STATE.activeSub && STATE.activeSub.subscriptionId) || null };
  _applyTabVisibility('CANCELED'); // hide Mail/My Plan tab bar for this standalone flow
  _PP.loc = null; _PP.plan = null; _PP.promoValid = false;
  _ppShell(0, '',
    '<div class="pp-center" style="padding-top:48px"><div class="pp-load-spin pp-reveal pp-d2"></div><p class="pp-reveal pp-d3" style="margin-top:16px">Loading plans\u2026</p></div>');

  // Fail-closed: no resolved company = show nothing rather than all-tenant data.
  const cid = STATE.companyId || _NO_COMPANY;
  try {
    const [plansRes, locsRes] = await Promise.all([
      sb.from('plans')
        .select('product_id, plan_name, plan_memo, billing_cycle, price_display, mail_limit, parcels_included, max_recipients, mail_storage_days, parcel_storage_days, mail_overage_fee, parcel_overage_fee, auto_feature, features, is_featured, locations, stripe_price_id, stripe_setup_price_id, setup_fee_display, show_on_products, archived, company_id')
        .eq('company_id', cid)
        .eq('show_on_products', true)
        .neq('archived', true),
      sb.from('locations')
        .select('location_id, name, address, city, province, postal_code, active, shutdown, company_id')
        .eq('company_id', cid)
        .neq('active', false)
    ]);
    _PP.plans = (plansRes.data || []).filter(p => p.archived !== true && p.company_id === cid);
    // A location must be active AND not shut down to be offered for a new plan
    // (a shut-down location is fully gated elsewhere in the portal - never sell it).
    _PP.locations = (locsRes.data || []).filter(l => l.active !== false && l.shutdown !== true && l.company_id === cid);
  } catch (e) {
    _PP.plans = []; _PP.locations = [];
  }

  // Only offer a location the client can actually buy at: keep it if some plan is
  // global (empty locations CSV = every location) or is scoped to that location.
  // If any global plan exists, all usable locations qualify.
  const _hasGlobalPlan = _PP.plans.some(p => _ppLocIds(p).length === 0);
  if (!_hasGlobalPlan) {
    const _locsWithPlans = new Set();
    _PP.plans.forEach(p => _ppLocIds(p).forEach(id => _locsWithPlans.add(id)));
    _PP.locations = _PP.locations.filter(l => _locsWithPlans.has(l.location_id));
  }

  // Always show the location step when there's a location to pick - even a
  // single one - so the client sees/confirms the address before choosing a plan.
  _PP.hasLocStep = _PP.locations.length >= 1;
  _PP.loc = null;
  _PP.plan = null;

  if (!_PP.plans.length) { _ppRenderEmpty(); return; }
  if (_PP.locations.length >= 1) {
    _ppRenderLocations();
  } else {
    // No active, non-shutdown location the client can buy a plan at (all locations
    // are inactive/shut down, or none is offered a plan). A mailbox plan always
    // needs a live address, so there's nothing buyable -> empty state.
    _ppRenderEmpty();
  }
}

function _ppRenderEmpty() {
  _ppShell(0, '',
    '<div class="pp-center">' +
      '<div class="pp-ico-big pp-reveal pp-d2"><span>!</span></div>' +
      '<h1 class="pp-reveal pp-d3">No plans available</h1>' +
      '<p class="pp-reveal pp-d4">There are no plans open to add right now. Please contact us and we\u2019ll help you get started.</p>' +
    '</div>');
}

// -- Step 1: choose address (multi-location only) --
function _ppLocOpt(l, i) {
  const on = _PP.loc && _PP.loc.location_id === l.location_id;
  // Eyebrow = city; headline = street; sub = province + postal. Never the name.
  const eyebrow = l.city || '';
  const headline = l.address || l.city || '';
  const sub = [l.province, l.postal_code].filter(Boolean).join(' ');
  const showSub = sub && sub !== headline;
  const copyBtn = on ? '<button class="pp-loc-copy" title="Copy address" onclick="_ppCopyLoc(event,this)" data-addr="' + _ppEsc(_ppFullAddr(l)) + '">' + _PP_COPY('currentColor') + '</button>' : '';
  return '<div class="pp-opt' + (on ? ' on' : '') + '" data-i="' + i + '">' +
    '<span class="pp-rad">' + _PP_TICK('#fff') + '</span>' +
    '<div class="pp-body-t">' +
      (eyebrow ? '<div class="pp-eyebrow">' + _ppEsc(eyebrow) + '</div>' : '') +
      '<div class="pp-t">' + _ppEsc(headline || '\u2014') + '</div>' +
      (showSub ? '<div class="pp-dd">' + _ppEsc(sub) + '</div>' : '') +
    '</div>' + copyBtn +
  '</div>';
}
function _ppRenderLocations() {
  const doScroll = _PP.locations.length > 3;
  const listInner = '<div class="pp-loc-list' + (doScroll ? ' scrollable' : '') + '" id="pp-loc-list">' + _PP.locations.map(_ppLocOpt).join('') + '</div>';
  const listHtml = doScroll
    ? '<div class="pp-scroll-wrap pp-reveal pp-d4">' + listInner + '<div class="pp-scroll-dots" id="pp-loc-dots"></div></div>' +
      '<div class="pp-scroll-hint" id="pp-loc-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>Scroll for more addresses</div>'
    : '<div class="pp-reveal pp-d4">' + listInner + '</div>';
  _ppShell(1,
    '<div class="pp-head"><h1 class="pp-reveal pp-d2">Choose your address</h1><p class="pp-reveal pp-d3">This is the business address your mail will be sent to.</p></div>',
    listHtml +
    '<button class="pp-btn pp-reveal pp-d5" id="pp-loc-next"' + (_PP.loc ? '' : ' disabled') + '><span>Continue</span><span class="pp-chip">' + _PP_ARROW + '</span></button>');
  _ppBindLocations();

// -- Checkout - reuse create-checkout-session (existing client -> same Stripe
//    customer via email; a new subscription is added alongside the existing). --
async function _ppStartCheckout() {
  const btn = qs('pp-pay');
  if (!_PP.plan) { toast('Please pick a plan', 'error'); return; }
  if (!_PP.plan.stripe_price_id) { toast('This plan isn\u2019t available to purchase right now', 'error'); return; }
  const email = (STATE.access && STATE.access.email) || '';
  if (!email) { toast('Could not read your account email \u2014 please refresh and try again', 'error'); return; }
  let authUserId = '';
  try { authUserId = localStorage.getItem('sb_auth_id') || ''; } catch (e) {}
  const promo = (qs('pp-promo') && _PP.promoValid) ? (qs('pp-promo').value || '').trim().toUpperCase() : null;

  if (btn) { btn.disabled = true; btn.innerHTML = '<span>Redirecting\u2026</span><span class="pp-chip"><span class="pp-spinner"></span></span>'; }
  try {
    if (!STATE.stripeKey) { toast('Payment isn\u2019t configured yet \u2014 please contact our team', 'error'); if (btn) { btn.disabled = false; btn.innerHTML = '<span>Continue to payment</span><span class="pp-chip">' + _PP_ARROW + '</span>'; } return; }
    const stripe = Stripe(STATE.stripeKey);
    const base = location.href.replace(/[^/]*(\?.*)?$/, '');
    const success = base + 'client.html?pp=success';
    const cancel = base + 'client.html?pp=cancel';
    const res = await fetch(SUPABASE_URL + '/functions/v1/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        priceId: _PP.plan.stripe_price_id,
        setupPriceId: _PP.plan.stripe_setup_price_id || null,
        email: email,
        firstName: (STATE.access && STATE.access.firstName) || '',
        lastName: (STATE.access && STATE.access.lastName) || '',
        authUserId: authUserId || null,
        promoCode: promo,
        locationId: _PP.loc ? _PP.loc.location_id : null,
        successUrl: success,
        cancelUrl: cancel
      })
    });
    const data = await res.json();
    if (!res.ok || !data.sessionId) throw new Error(data.error || 'Failed to start checkout');
    await stripe.redirectToCheckout({ sessionId: data.sessionId });
  } catch (err) {
    toast((err && err.message) || 'Payment redirect failed', 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '<span>Continue to payment</span><span class="pp-chip">' + _PP_ARROW + '</span>'; }
  }
}

async function goToBillingFromBlocked() {
  // Build the full dashboard shell for the active sub, then switch to billing
  const sub = STATE.activeSub || (STATE.allSubs || [])[0];
  if (!sub) return;
  // Inject pre-emptive CSS to hide tabs before dashboard renders - prevents flash
  let _styleTag = document.getElementById('_payment-gate-style');
  if (!_styleTag) {
    _styleTag = document.createElement('style');
    _styleTag.id = '_payment-gate-style';
    _styleTag.textContent = '#tabs-bar, #tab-mail, #tab-plans { display: none !important; }';
    document.head.appendChild(_styleTag);
  }
  const origCanAccess = sub.canAccess;
  sub.canAccess = true;
  // Capture gated state BEFORE the temporary canAccess override (the override
  // is only so renderDashboard builds the shell; it must not unhide the tabs).
  const _gated = _isSubGated(sub) || origCanAccess !== true || sub.setupRequired === true;
  try {
    await renderDashboard(sub, STATE.access);
    switchTab('billing');
    _applyTabVisibility(sub.accessStatus, _gated);
  } finally {
    sub.canAccess = origCanAccess;
    // Remove pre-emptive style - _applyTabVisibility now controls visibility
    if (_styleTag) { _styleTag.remove(); }
  }
}

function startPlanSetup(subscriptionId) {
  const sub = (STATE.allSubs || []).find(s => s.subscriptionId === subscriptionId);
  if (!sub) return;
  STATE.activeSub = sub;
  const switcher = qs('sub-switcher-area');
  renderSetup(sub, STATE.access);
}

// -- Setup Flow --------------------------------------------
async function renderSetup(sub, access) {
  const step = sub.setupStep;

  const switcher = qs('sub-switcher-area');

  const stepIndex = { plan_setup: 0, add_recipients: 1, pending_activation: 2 };
  const currentStep = stepIndex[step] ?? 0;


  // Back-to-plans only when 2+ plans are BOTH pending setup (plan_setup step)
  const pendingSetupCount = (STATE.allSubs || []).filter(s =>
    s.canAccess && s.setupRequired && s.setupStep === 'plan_setup'
  ).length;
  const backBtn = pendingSetupCount >= 2 ? `
    <button onclick="goBackToPlanSelection()"
      style="display:inline-flex;align-items:center;gap:5px;background:none;border:none;
             cursor:pointer;font-size:12px;color:var(--ink-4);font-family:inherit;
             padding:0;margin-bottom:12px;transition:color 0.15s"
      onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--ink-4)'">
      <- Back to plans
    </button>` : '';
  const returnBtn = '';

  const stepsHtml = [0,1,2].map((i, idx) => `
    <div class="step-dot ${i < currentStep ? 'done' : i === currentStep ? 'active' : ''}"></div>
    ${idx < 2 ? '<div class="step-line"></div>' : ''}
  `).join('');

  if (step === 'plan_setup') {
    await renderOnboardingForm(sub, access, stepsHtml, backBtn);
  } else if (step === 'add_recipients') {
    await renderAddRecipient(sub, access, stepsHtml, backBtn);
  } else if (step === 'pending_activation') {
    // Legacy step - recipients already active, show success. This path renders in
    // the normal chromed page (not the first-time takeover), so ensure fullscreen
    // is off before showing the success card.
    _obExitFullscreen();
    renderOnboardingSuccess(sub.planCardId);
  }
}

function goBackToPlanSelection() {

  renderPlanSelection(STATE.access);
}

// -- First-time setup fullscreen takeover ------------------------------
// When a client has NO live plans yet, the entire first-time setup flow
// (plan setup + recipients) runs as a chrome-free takeover so they can't
// navigate into Documents/Mail before finishing. Restored on completion.
function _obEnterFullscreen() {
  if (document.body.classList.contains('ob-fs-on')) return;
  document.body.classList.add('ob-fs-on');
  ['header','sub-switcher-area','banner-area','broadcast-banners','verification-banner'].forEach((sel, i) => {
    const el = i === 0 ? document.querySelector('header.header') : document.getElementById(sel);
    if (el) { el.dataset.obHidden = '1'; el.style.display = 'none'; }
  });
  document.body.style.overflow = 'hidden';
}
function _obExitFullscreen() {
  if (!document.body.classList.contains('ob-fs-on')) return;
  document.body.classList.remove('ob-fs-on');
  document.querySelectorAll('[data-ob-hidden="1"]').forEach(el => { el.style.display = ''; delete el.dataset.obHidden; });
  document.body.style.overflow = '';
}
function _obIsFirstTimeSetup() {
  // No accessible sub is already live -> this is their first/only setup.
  return !((STATE.allSubs || []).some(s => !s.setupRequired));
}

// Copy the address, flashing the icon to a tick (signup-style, icon only).
function obCopyAddr(box) {
  const txt = (box && box.getAttribute('data-addr')) || '';
  if (!txt) return;
  const ic = box.querySelector('.ob-copy-ic');
  const tick = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const copy = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  const flash = () => { if (ic) { ic.innerHTML = tick; setTimeout(() => { ic.innerHTML = copy; }, 1400); } toast('Address copied', 'success'); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(flash).catch(() => flash());
  } else {
    try { const t = document.createElement('textarea'); t.value = txt; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); flash(); } catch(e) {}
  }
}

async function renderOnboardingForm(sub, access, stepsHtml, backBtn = '') {
  // First-time clients (no live plans) get the chrome-free fullscreen takeover.
  if (_obIsFirstTimeSetup()) _obEnterFullscreen(); else _obExitFullscreen();
  // Show loading state while fetching plan template
  qs('content-area').innerHTML = `
    <div class="vov-stage" id="setup-section" style="padding:24px 0">
      <div class="vov-card">
        <div class="v-body" style="padding:40px 28px;text-align:center">
          <div class="shimmer-line" style="width:60%;margin:0 auto 12px"></div>
          <div class="shimmer-line med" style="width:40%;margin:0 auto"></div>
        </div>
      </div>
    </div>`;

  // Fetch plan template + resolved locations
  let tmpl = null, locations = [];
  try {
    const productId = sub.productId || '';
    const res = await apiPost({ action: 'getPlanTemplate', uuid: STATE.uuid, productId });
    if (res.status === 'ok') {
      tmpl      = res.template   || null;
      locations = res.locations  || [];
      // Stash maxRecipients so step 2 can use it even before planCard is created
      if (tmpl && tmpl.maxRecipients) {
        STATE._pendingMaxRecipients = parseInt(tmpl.maxRecipients) || 1;
      }
    }
  } catch(e) { /* fallback to blank form */ }

  // -- Plan feature flags from Plans sheet ---------------------------------
  const feature     = tmpl ? (tmpl.autoFeature || 'none').toLowerCase() : 'none';
  const isShip      = feature === 'ship';   // auto-forward letters 1st week of month
  const isScan      = feature === 'scan';   // scan + email on arrival (non-confidential)
  const isNone      = !isShip && !isScan;

  // -- Plan identity ----------------------------------------------------
  // planName from Plans sheet col A; limitType from col D ('monthly'|'yearly')
  const planLabel   = tmpl && tmpl.planName

          '<input type="text" id="ob-biz" value="' + _obEsc(STATE._obData.biz) + '" placeholder="e.g. Digital marketing agency serving SMBs" oninput="obValidate()">' +
        '</div>' +
        (isShip ? '' : fwdHiddenHtml);
    }
    if (_obFwdStep && step === _obFwdStep) {
      return '<div class="v-body-title">Forwarding address</div>' +
        '<div class="v-body-sub">Where should we ship your bundled mail each month?</div>' +
        fwdHtml;
    }
    return '<div class="v-body-title">Acknowledgements</div>' +
      '<div class="v-body-sub">Please review and confirm each statement to finish setup.</div>' +
      '<div id="ob-declarations">' + _obDeclHtml + '</div>';
  }

  function obFootFor(step) {
    const backBtnHtml = step > 1
      ? '<button class="v-btn-back" type="button" onclick="obGo(' + (step-1) + ')">\u2190 Back</button>'
      : '';
    if (step < _obTotal) {
      return '<div class="v-foot-row">' + backBtnHtml +
        '<button class="v-btn-next" id="ob-next" type="button" disabled onclick="obGo(' + (step+1) + ')"><span>Continue</span>' + _chevron + '</button></div>';
    }
    return '<div class="v-foot-row">' + backBtnHtml +
      '<button class="v-btn-next" id="ob-submit" type="button" disabled onclick="obSubmit()"><span>Submit &amp; Finish</span>' + _chevron + '</button></div>';
  }

  // Snapshot current-step inputs, then navigate (preserves values across Back/Continue).
  window.obGo = function obGo(target) {
    const d = STATE._obData;
    if (qs('ob-location'))      d.locationId  = qs('ob-location').value;
    if (qs('ob-friendly-name')) d.friendlyName = qs('ob-friendly-name').value;
    if (qs('ob-biz'))           d.biz         = qs('ob-biz').value;
    if (qs('ob-addr'))          d.addr        = qs('ob-addr').value.trim();
    if (qs('ob-city'))          d.city        = rcTitleCaseName(qs('ob-city').value);
    if (qs('ob-province'))      d.province    = rcTitleCaseName(qs('ob-province').value);
    if (qs('ob-postal'))        d.postal      = (qs('ob-postal').value||'').replace(/\s+/g,'').toUpperCase();
    if (qs('ob-country'))       d.country     = rcTitleCaseName(qs('ob-country').value);
    if (qs('ob-instructions'))  d.instructions= qs('ob-instructions').value;
    STATE._obStep = target;
    renderObStep();
  };

  // Per-step validity -> toggle the Continue/Submit button (grey-out-until-valid, like ID verify).
  window.obValidate = function obValidate() {
    const step = STATE._obStep;
    const btn = qs('ob-next') || qs('ob-submit');
    if (!btn) return;
    let ok = true;
    if (step === 1) {
      const locEl = qs('ob-location');
      const locVal = (locEl && locEl.value) || '';
      ok = !(locations.length > 0 && !locVal);
    } else if (step === 2) {
      const fn = qs('ob-friendly-name'); const bz = qs('ob-biz');
      ok = !!(fn && fn.value.trim()) && !!(bz && bz.value.trim());
    } else if (_obFwdStep && step === _obFwdStep) {
      const ad = qs('ob-addr'); const ci = qs('ob-city'); const pr = qs('ob-province'); const po = qs('ob-postal'); const co = qs('ob-country');
      ok = !!(ad && ad.value.trim()) && !!(ci && ci.value.trim()) && !!(pr && pr.value.trim()) && !!(po && po.value.trim()) && !!(co && co.value.trim());
    } else if (step === _obTotal) {
      const cbs = document.querySelectorAll('.ob-decl-cb');
      const chk = document.querySelectorAll('.ob-decl-cb:checked');
      ok = (cbs.length === 0) || (chk.length === cbs.length);
    }
    btn.disabled = !ok;
  };

  window.renderObStep = function renderObStep() {
    const step = STATE._obStep;
    const _segs = Array.from({ length: _obTotal }, (_, idx) => '<span class="' + ((idx + 1) <= step ? 'on' : '') + '"></span>').join('');
    qs('content-area').innerHTML =
      '<div class="vov-stage" id="setup-section" style="padding:24px 0">' +
        '<div class="vov-card">' +
          '<div class="vov-band"><div class="vov-lockrow">' + _obBrandHtml + '</div><div class="vov-segs">' + _segs + '</div></div>' +
          '<div class="v-body">' + obBodyFor(step) + '</div>' +
          '<div class="v-foot">' + obFootFor(step) +
            '<div class="vov-signout-row"><button class="vov-signout-link" onclick="_clientLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    // Hydrate forwarding fields (static markup) from saved data + wire validation on input.
    if (_obFwdStep && step === _obFwdStep) {
      const fwdMap = { 'ob-addr':'addr','ob-city':'city','ob-province':'province','ob-postal':'postal','ob-country':'country','ob-instructions':'instructions' };
      Object.keys(fwdMap).forEach(id => {
        const el = qs(id);
        if (el) {
          if (STATE._obData[fwdMap[id]]) el.value = STATE._obData[fwdMap[id]];
          el.addEventListener('input', obValidate);
        }
      });
    }
    obValidate();
  };

  // Submit - identical payload + transition to recipients step as before.
  window.obSubmit = async function obSubmit() {
    const btn = qs('ob-submit');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '<span>Submit &amp; Finish</span><span class="v-chip"><span class="v-spinner"></span></span>';

    const d = STATE._obData;
    const locationId = d.locationId || (qs('ob-location') && qs('ob-location').value) || '';
    // Stash the resolved Virtual Office Address so the success screen can show it.
    // Same address format used on the plan card above.
    try {
      const _selLoc = (locations || []).find(l => l.locationId === locationId) || null;
      STATE._obAddress = _selLoc
        ? [_selLoc.address, _selLoc.city, _selLoc.province, _selLoc.postalCode].filter(Boolean).join(', ')
        : '';
    } catch (e) { STATE._obAddress = ''; }

    try {
      const result = await apiPost({
        action:              'submitOnboarding',
        uuid:                STATE.uuid,
        subscriptionId:      sub.subscriptionId,
        productId:           sub.productId || extractProductId(sub),
        locationId:          locationId,
        forwardingAddress:   d.addr || '',
        forwardingCity:      d.city || '',
        forwardingProvince:  d.province || '',
        forwardingPostalCode:d.postal || '',
        forwardingCountry:   d.country || '',
        forwardingInstructions: d.instructions || '',
        clientTimezone:      Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Toronto',
        businessDescription: d.biz || '',
        friendlyName:        (d.friendlyName || '').trim()
      });

      if (result.status === 'ok') {
        toast('Plan set up successfully!', 'success');
        sub.setupStep = 'add_recipients';
        sub.planCardId = result.planCardId;
        clearCachedAuth(STATE.uuid);
        await renderSetup(sub, access);
      } else {
        throw new Error(result.message || 'Setup failed');
      }
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<span>Submit &amp; Finish</span>' + _chevron;
    }
  };

  renderObStep();
}

function extractProductId(sub) {
  // productId may not be in auth response - we get it from sub object
  // For now pass subscriptionId and let server look it up from billingDB
  return sub.productId || '';
}

// Title-case a name: each word's first letter uppercase, the rest lowercase.
// Used on blur for recipient name fields (individual + company). Preserves the
// original whitespace between words (collapses runs to single spaces, trims ends).
function rcTitleCaseName(s) {
  return String(s == null ? '' : s)
    .trim()
    .split(/\s+/)
    .map(w => w ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w)
    .join(' ');
}

// Reformat a recipient name input to title case on blur (skips locked/readOnly fields).
function rcFormatName(el) {
  if (!el || el.readOnly || el.disabled) return;
  const v = el.value;
  if (v && v.trim()) el.value = rcTitleCaseName(v);
}

// Fill Recipient 1's name with the account-holder name (from the "Is this you?"
// prompt), then run the normal format + validation and dismiss the prompt.
function rcUseHolderName() {
  const nameEl = document.getElementById('rc-name-0');
  if (!nameEl || nameEl.readOnly || nameEl.disabled) return;
  const holder = (window._rcHolderName || '').trim();
  if (!holder) return;
  nameEl.value = rcTitleCaseName(holder);
  rcCheckFullName(0);
  rcHideSuggest();
  nameEl.focus();
}

// Hide the Recipient 1 suggestion prompt (after use, on name entry, or on type switch).
function rcHideSuggest() {
  const p = document.getElementById('rc-suggest-0');
  if (p) p.style.display = 'none';
}

function rcSlotHtml(i) {
  const isFirst = i === 0;
  const reqMark = isFirst ? '<span style="color:var(--required)">*</span>' : '<span style="font-weight:400;color:var(--ink-3)">(optional)</span>';
  // Custom-chevron select styling so dropdowns look consistent (not the raw OS control).
  const selStyle = "width:100%;box-sizing:border-box;padding:9px 30px 9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--ink);font-size:13px;font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%2210%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2372727D%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22/></svg>');background-repeat:no-repeat;background-position:right 11px center";
  // "Is this you?" suggestion - Recipient 1 only, when the account-holder name is
  // known. One tap fills the name field. Hidden once a name is entered or if the
  // recipient type is switched to Company (see rcUpdateNameLabel / rcCheckFullName).
  const _rcHolder = (isFirst && window._rcHolderName) ? String(window._rcHolderName).trim() : '';
  const _rcHolderAttr = _rcHolder.replace(/"/g, '&quot;');
  const promptHtml = _rcHolder
    ? '<div id="rc-suggest-0" style="display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:11px">'
        + '<span style="flex:1;min-width:0;font-size:12px;color:var(--ink-2);line-height:1.4">Receiving mail yourself? Use <strong style="color:var(--ink);font-weight:600">' + _rcHolderAttr + '</strong>.</span>'
        + '<button type="button" onclick="rcUseHolderName()" style="flex:none;padding:5px 11px;border:1px solid var(--border);background:var(--white);border-radius:20px;font-size:11px;font-weight:600;color:var(--ink-2);cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.borderColor=\'var(--red)\';this.style.color=\'var(--red)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--ink-2)\'">Use this</button>'
      + '</div>'
    : '';
  return ''
    + '<div id="rc-slot-' + i + '" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;' + (i > 0 ? 'margin-top:12px' : '') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">'
        + '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)">Recipient ' + (i + 1) + ' ' + reqMark + '</div>'
        + (i > 0
          ? '<button type="button" onclick="rcRemoveSlot(' + i + ')" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ink-3);font-family:inherit;padding:2px 4px;border-radius:4px;transition:color .15s;display:inline-flex;align-items:center;gap:4px" onmouseover="this.style.color=\'var(--red)\'" onmouseout="this.style.color=\'var(--ink-3)\'"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>Remove</button>'
          : '')
      + '</div>'
      // "Is this you?" suggestion (first slot only; empty string otherwise)
      + promptHtml
      // Full Name
      + '<div style="margin-bottom:11px">'
        + '<label id="rc-name-label-' + i + '" style="display:block;font-size:12px;color:var(--ink-2);margin-bottom:5px">Full Name ' + reqMark + '</label>'
        + '<input type="text" id="rc-name-' + i + '" placeholder="' + (isFirst ? 'e.g. Jane Smith' : 'e.g. John Doe') + '"' + (isFirst ? ' required' : '') + ' oninput="rcCheckFullName(' + i + ')" onblur="rcFormatName(this)" style="width:100%;box-sizing:border-box;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--ink);font-size:13px;font-family:inherit">'
        + '<div id="rc-name-hint-' + i + '" style="font-size:11px;color:var(--required);margin-top:4px;display:none">Please enter both first and last name.</div>'
      + '</div>'
      // Type + Language (two columns)
      + '<div style="display:flex;gap:10px">'
        + '<div style="flex:1;min-width:0">'
          + '<label style="display:block;font-size:12px;color:var(--ink-2);margin-bottom:5px">Type</label>'
          + '<select id="rc-type-' + i + '" onchange="rcUpdateNameLabel(' + i + ');rcCheckFullName(' + i + ')" style="' + selStyle + '"><option value="individual">Individual</option><option value="company">Company / Business</option></select>'
        + '</div>'
        + '<div style="flex:1;min-width:0">'
          + '<label style="display:block;font-size:12px;color:var(--ink-2);margin-bottom:5px">Language</label>'
          + '<select id="rc-lang-' + i + '" style="' + selStyle + '"><option value="en">English</option><option value="fr">French</option></select>'
        + '</div>'
      + '</div>'
    + '</div>';
}

function rcUpdateNameLabel(i) {
  const typeEl  = document.getElementById('rc-type-' + i);
  const labelEl = document.getElementById('rc-name-label-' + i);
  const nameEl  = document.getElementById('rc-name-' + i);
  if (!typeEl || !labelEl || !nameEl) return;
  const isFirst   = i === 0;
  const isCompany = typeEl.value === 'company';
  const reqSpan   = isFirst ? '<span style="color:var(--required)">*</span>' : '<span style="font-weight:400;color:var(--ink-3)">(optional)</span>';
  // Switching type clears any previously-entered name. Prevents a leftover value
  // (e.g. a two-word company name) from silently satisfying the individual
  // first+last-name rule - the client must re-enter a name valid for the new type.
  nameEl.value = '';
  const hintEl = document.getElementById('rc-name-hint-' + i);
  if (hintEl) hintEl.style.display = 'none';
  if (isCompany) {
    labelEl.innerHTML = 'Company Name / DBA ' + reqSpan;
    nameEl.placeholder = 'e.g. Acme Corp';
  } else {
    labelEl.innerHTML = 'Full Name ' + reqSpan;
    nameEl.placeholder = i === 0 ? 'e.g. Jane Smith' : 'e.g. John Doe';
  }
  // Recipient 1 suggestion prompt: only meaningful for an individual with an
  // empty name. Hide for Company; re-show for Individual (type-switch blanks the
  // field, so it's empty again here).
  if (i === 0) {
    const suggEl = document.getElementById('rc-suggest-0');
    if (suggEl && window._rcHolderName) suggEl.style.display = isCompany ? 'none' : 'flex';
  }
}

function rcCheckFullName(i) {
  const nameEl  = document.getElementById('rc-name-' + i);
  const typeEl  = document.getElementById('rc-type-' + i);
  const hintEl  = document.getElementById('rc-name-hint-' + i);
  if (!nameEl || !hintEl) return;
  const isIndividual = !typeEl || typeEl.value === 'individual';
  const val = nameEl.value.trim();
  const twoWords = val.split(/\s+/).filter(Boolean).length >= 2;
  // Show hint only if individual, has typed something, but only one word
  hintEl.style.display = (isIndividual && val.length > 0 && !twoWords) ? 'block' : 'none';
  // Once Recipient 1 has any name typed, the "is this you?" suggestion is moot - hide it.
  if (i === 0 && val.length > 0) rcHideSuggest();
}

// Lock a filled recipient once the client moves on to add another below it.
// Fully frozen: name + both selects become read-only/disabled AND the Remove
// button is hidden, so the recipient can't be edited, blanked, or deleted.
function rcLockSlot(i) {
  const slot = document.getElementById('rc-slot-' + i);
  if (!slot || slot.getAttribute('data-locked') === '1') return;
  const nameEl = document.getElementById('rc-name-' + i);
  const typeEl = document.getElementById('rc-type-' + i);
  const langEl = document.getElementById('rc-lang-' + i);
  // Hide the Remove button - a locked recipient can't be deleted either.
  const rmBtn = slot.querySelector('button[onclick^="rcRemoveSlot"]');
  if (rmBtn) rmBtn.style.display = 'none';
  if (nameEl) { nameEl.readOnly = true; nameEl.style.backgroundColor = 'var(--bg)'; nameEl.style.color = 'var(--ink-2)'; nameEl.style.cursor = 'default'; }
  // Selects can't be readOnly; disable them but keep their value submittable via a hidden mirror.
  [typeEl, langEl].forEach(el => {
    if (!el) return;
    el.disabled = true;
    // Use backgroundColor (not the `background` shorthand) so the custom chevron
    // background-image set in selStyle isn't wiped.
    el.style.backgroundColor = 'var(--bg)';
    el.style.color = 'var(--ink-2)';
    el.style.cursor = 'default';
    // Mirror disabled select value into a hidden input so rcSubmit still reads it.
    if (!document.getElementById(el.id + '-locked')) {
      const h = document.createElement('input');
      h.type = 'hidden'; h.id = el.id + '-locked'; h.value = el.value;
      el.parentNode.appendChild(h);
    }
  });
  // Hide the "first/last name" hint (it's already valid and frozen).
  const hintEl = document.getElementById('rc-name-hint-' + i);
  if (hintEl) hintEl.style.display = 'none';
  // Small locked indicator next to the recipient label.
  const labelRow = slot.querySelector('div');
  const lbl = labelRow ? labelRow.firstElementChild : null;
  if (lbl && !slot.querySelector('.rc-lock-ic')) {
    lbl.insertAdjacentHTML('beforeend', ' <span class="rc-lock-ic" style="display:inline-flex;vertical-align:-2px;color:var(--ink-3);margin-left:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>');
  }
  slot.setAttribute('data-locked', '1');
}

// Re-enable editing on a slot (used when slots below it are removed and it
// becomes the current/last recipient again).
function rcUnlockSlot(i) {
  const slot = document.getElementById('rc-slot-' + i);
  if (!slot || slot.getAttribute('data-locked') !== '1') return;
  const nameEl = document.getElementById('rc-name-' + i);
  const typeEl = document.getElementById('rc-type-' + i);
  const langEl = document.getElementById('rc-lang-' + i);
  // Restore the Remove button (slot 0 never had one, so only un-hide if present).
  const rmBtn = slot.querySelector('button[onclick^="rcRemoveSlot"]');
  if (rmBtn) rmBtn.style.display = '';
  if (nameEl) { nameEl.readOnly = false; nameEl.style.backgroundColor = 'var(--white)'; nameEl.style.color = 'var(--ink)'; nameEl.style.cursor = ''; }
  [typeEl, langEl].forEach(el => {
    if (!el) return;
    el.disabled = false;
    // backgroundColor (not `background`) keeps the chevron background-image intact.
    el.style.backgroundColor = 'var(--white)';
    el.style.color = 'var(--ink)';
    el.style.cursor = 'pointer';
    const h = document.getElementById(el.id + '-locked');
    if (h) h.remove();
  });
  const ic = slot.querySelector('.rc-lock-ic');
  if (ic) ic.remove();
  slot.removeAttribute('data-locked');
}

function rcAddSlot() {
  const i       = window._rcCount;
  const maxR    = window._rcMaxR;
  const container = document.getElementById('rc-slots');
  if (!container || i >= maxR) return;

  // Validate the recipient we're leaving before locking it and adding another.
  // Must be non-empty, and for individuals must be a full name (first + last).
  if (i > 0) {
    const prevName = document.getElementById('rc-name-' + (i - 1));
    const prevType = document.getElementById('rc-type-' + (i - 1));
    const prevVal  = prevName ? prevName.value.trim() : '';
    const prevIsIndividual = !prevType || prevType.value === 'individual';
    if (!prevVal) {
      toast('Please fill in the previous recipient first.', 'error');
      if (prevName) prevName.focus();
      return;
    }
    if (prevIsIndividual && prevVal.split(/\s+/).filter(Boolean).length < 2) {
      toast('Please enter a full name (first and last) for recipient ' + i + '.', 'error');
      const hintEl = document.getElementById('rc-name-hint-' + (i - 1));
      if (hintEl) hintEl.style.display = 'block';
      if (prevName) prevName.focus();
      return;
    }
  }

  // Lock the recipient we're moving on from so it can't be edited/blanked while
  // a slot exists below it. Fully locked - not editable or removable. (No previous slot for the first.)
  if (i > 0) rcLockSlot(i - 1);

  container.insertAdjacentHTML('beforeend', rcSlotHtml(i));
  window._rcCount++;
  // Hide add button if at limit
  const addWrap = document.getElementById('rc-add-wrap');
  if (addWrap) addWrap.style.display = window._rcCount >= maxR ? 'none' : 'block';
  // Focus the new name field
  const nameEl = document.getElementById('rc-name-' + i);
  if (nameEl && i > 0) nameEl.focus();
}

function rcRemoveSlot(i) {
  const slot = document.getElementById('rc-slot-' + i);
  if (slot) slot.remove();
  window._rcCount--;
  // Show add button again
  const addWrap = document.getElementById('rc-add-wrap');
  if (addWrap) addWrap.style.display = 'block';
  // The slot directly above the one just removed is now the current/last
  // recipient again - unlock it so the client can edit it once more.
  if (i - 1 >= 0) rcUnlockSlot(i - 1);
}

async function rcSubmit(planCardId) {
  const btn = document.getElementById('rc-submit');
  const _rcBtnIdle = '<span>Save recipients &amp; continue</span><span class="v-chip"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';
  const _rcBtnBusy = '<span>Saving...</span><span class="v-chip"><span class="v-spinner"></span></span>';
  if (btn) { btn.disabled = true; btn.innerHTML = _rcBtnBusy; }

  // Collect filled slots (only slots still in DOM) - no gaps allowed
  const recipients = [];
  let foundGap = false;
  let gapIndex = -1;
  for (let i = 0; i < window._rcMaxR; i++) {
    const nameEl = document.getElementById('rc-name-' + i);
    if (!nameEl) continue;
    const name = nameEl.value.trim();
    const typeEl = document.getElementById('rc-type-' + i);
    const isIndividual = !typeEl || typeEl.value === 'individual';

    if (!name) {
      foundGap = true;
      if (gapIndex === -1) gapIndex = i;
      continue;
    }

    // If there's a filled slot after a gap, block submission
    if (foundGap) {
      toast('Please fill in Recipient ' + (gapIndex + 1) + ' before adding more.', 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = _rcBtnIdle; }
      const gapEl = document.getElementById('rc-name-' + gapIndex);
      if (gapEl) gapEl.focus();
      return;
    }

    // For individuals, require at least two words (first + last name)
    if (isIndividual && name.split(/\s+/).filter(Boolean).length < 2) {
      toast('Please enter a full name (first and last) for recipient ' + (i + 1) + '.', 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = _rcBtnIdle; }
      nameEl.focus();
      return;
    }
    recipients.push({
      name,
      companyName:     '',
      type:            (document.getElementById('rc-type-' + i) || {}).value    || 'individual',
      language:        (document.getElementById('rc-lang-' + i) || {}).value    || 'en',
      notifyOnArrival: true
    });
  }

  if (recipients.length === 0) {
    toast('Please enter at least one recipient name.', 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = _rcBtnIdle; }
    // Focus the first visible name field
    for (let i = 0; i < window._rcMaxR; i++) {
      const el = document.getElementById('rc-name-' + i);
      if (el) { el.focus(); break; }
    }
    return;
  }

  try {
    for (const rec of recipients) {
      const result = await apiPost({
        action:          'addRecipient',
        uuid:            STATE.uuid,
        planCardId:      planCardId,
        name:            rec.name,

        type:            rec.type,
        language:        rec.language,
        notifyOnArrival: rec.notifyOnArrival
      });
      if (result.status !== 'ok') throw new Error(result.message || 'Failed to add: ' + rec.name);
    }
    // Plan is now active - update state so switcher doesn't show setup again
    const activeSub = STATE.activeSub;
    if (activeSub) {
      activeSub.setupRequired = false;
      activeSub.setupStep = null;
      activeSub.banner = null;
      activeSub.planCardId = planCardId;
    }
    // Also update in allSubs array
    const subInAll = (STATE.allSubs || []).find(s => s.subscriptionId === activeSub?.subscriptionId);
    if (subInAll) {
      subInAll.setupRequired = false;
      subInAll.setupStep = null;
      subInAll.banner = null;
      subInAll.planCardId = planCardId;
    }
    clearCachedAuth(STATE.uuid);
    renderOnboardingSuccess(planCardId, recipients);
  } catch (err) {
    toast(err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = _rcBtnIdle; }
  }
}

// `kind` = 'accent' (recipients) or 'blue' (agents).
function _avatarStack(items, kind) {
  const dim = kind === 'blue' ? 'var(--blue-bg)' : 'var(--red-dim)';
  const fg  = kind === 'blue' ? 'var(--blue)'    : 'var(--red)';
  const shown = items.slice(0, 4);
  const extra = items.length - shown.length;
  let h = shown.map(p => {
    const off = p.status !== 'active';
    const bg = off ? '#F5F5F5' : dim;
    const col = off ? '#9E9E9E' : fg;
    const ini = (p.name || '?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return '<div style="width:34px;height:34px;border-radius:50%;background:' + bg + ';color:' + col + ';display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;border:2px solid var(--white);margin-left:-9px' + (off ? ';opacity:.7' : '') + '">' + ini + '</div>';
  }).join('');
  if (extra > 0) h += '<div style="width:34px;height:34px;border-radius:50%;background:var(--bg-2);color:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--white);margin-left:-9px">+' + extra + '</div>';
  return '<div style="display:flex;padding-left:9px">' + h + '</div>';
}

// Find the nearest scrollable ancestor (falls back to the document scroller).
function _scrollParent(el) {
  let p = el && el.parentElement;
  while (p) {
    const oy = getComputedStyle(p).overflowY;
    if ((oy === 'auto' || oy === 'scroll') && p.scrollHeight > p.clientHeight) return p;
    p = p.parentElement;
  }
  return document.scrollingElement || document.documentElement;
}

// Scroll only if the expanded block would sit below (or above) the visible area.
// If it already fits, do nothing - no jump.
function _nudgeIntoView(hdr, list) {
  if (!hdr || !list) return;
  const scroller = _scrollParent(hdr);
  const sRect = scroller.getBoundingClientRect
    ? scroller.getBoundingClientRect()
    : { top: 0, bottom: window.innerHeight };
  const viewTop = (scroller === document.scrollingElement || scroller === document.documentElement) ? 0 : sRect.top;
  const viewBottom = (scroller === document.scrollingElement || scroller === document.documentElement) ? window.innerHeight : sRect.bottom;
  const hdrRect = hdr.getBoundingClientRect();
  const listRect = list.getBoundingClientRect();
  const pad = 16;
  const blockBottom = listRect.bottom;
  const blockTop = hdrRect.top;
  let delta = 0;
  if (blockBottom > viewBottom - pad) {
    // Bottom is cut off - scroll down just enough to reveal it, but never push
    // the header above the top of the view.
    const maxUp = blockTop - (viewTop + pad); // how far we can scroll before header leaves the top
    delta = Math.min(blockBottom - (viewBottom - pad), Math.max(0, maxUp));
  } else if (blockTop < viewTop + pad) {
    // Header is above the fold - bring it back down.
    delta = blockTop - (viewTop + pad);
  }
  if (Math.abs(delta) > 2) scroller.scrollBy({ top: delta, behavior: 'smooth' });
}

// Toggle an inner collapsible (temp recipients / register agent) and nudge it
// into view when it opens, matching the Manage-block behavior.
function _toggleInner(panelId, chevId, hideBtnId, showBtnId) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const opening = panel.style.display === 'none' || panel.style.display === '';
  panel.style.display = opening ? 'block' : 'none';
  const chev = chevId ? document.getElementById(chevId) : null;
  if (chev) chev.style.transform = opening ? 'rotate(90deg)' : 'rotate(0deg)';
  // Register-agent style: hide the "+ Register" button while the form is open.
  if (hideBtnId) { const b = document.getElementById(hideBtnId); if (b) b.style.display = opening ? 'none' : 'flex'; }
  if (showBtnId) { const b = document.getElementById(showBtnId); if (b) b.style.display = opening ? 'block' : 'none'; }
  if (opening) {
    // Wait for layout, then nudge the panel's bottom into view if it's below the fold.
    requestAnimationFrame(() => _nudgeIntoView(panel, panel));
  }
}

// Style 4 expand/collapse for Recipients / Agents avatar-stack blocks.
function toggleListBlock(key) {
  // key is "<prefix>-<safeId>" (e.g. "rec-pc_1"); element IDs are
  // "<prefix>-list-<safeId>", "<prefix>-hdr-<safeId>", etc. Split on the FIRST
  // dash to recover prefix + safeId, then rebuild the real IDs.
  const dash = key.indexOf('-');
  const prefix = key.slice(0, dash);
  const safeId = key.slice(dash + 1);
  const id = (part) => prefix + '-' + part + '-' + safeId;
  const list = document.getElementById(id('list'));
  const chev = document.getElementById(id('chev'));
  const lbl  = document.getElementById(id('lbl'));
  if (!list) return;
  const opening = list.style.maxHeight === '0px' || list.style.maxHeight === '';
  if (opening) {
    list.style.maxHeight = list.scrollHeight + 'px';
    list.style.opacity = '1';
    list.style.marginTop = '12px';
    if (chev) chev.style.transform = 'rotate(90deg)';
    if (lbl)  lbl.textContent = 'Hide';
    // After the open transition, drop the fixed height so inner changes (e.g.
    // expanding the temp list) aren't clipped, then nudge into view if needed.
    setTimeout(() => {
      if (list.style.opacity === '1') list.style.maxHeight = 'none';
      _nudgeIntoView(document.getElementById(id('hdr')), list);
    }, 320);
  } else {
    // Set an explicit height first so the collapse transition has something to animate from.
    list.style.maxHeight = list.scrollHeight + 'px';
    void list.offsetHeight;
    list.style.maxHeight = '0px';
    list.style.opacity = '0';
    list.style.marginTop = '0';
    if (chev) chev.style.transform = 'rotate(0deg)';
    if (lbl)  lbl.textContent = 'Manage';
  }
}

// Slide the white tab pill under the active Mail / My Plan tab.
function _positionTabThumb(tab) {
  const thumb = document.getElementById('tab-thumb');
  const btn = document.getElementById(tab === 'plans' ? 'tab-plans' : 'tab-mail');
  if (!thumb || !btn) return;
  // Thumb and buttons share the same offsetParent (.tabs), so offsetLeft aligns
  // them directly. Thumb base is left:0 (padding-box origin) -> translate by offsetLeft.
  thumb.style.width = btn.offsetWidth + 'px';
  thumb.style.transform = 'translateX(' + btn.offsetLeft + 'px)';
}
function switchTab(tab) {
  _activeTab = tab;
  // Re-assert (or clear) the pending-ID gate for the Mail / My Documents views.
  if (window._applyIdGate) setTimeout(window._applyIdGate, 0);
  const mailC    = qs('tab-mail-content');
  const plansC   = qs('tab-plans-content');
  const billingC = qs('tab-billing-content');
  const tabM   = qs('tab-mail');
  const tabP   = qs('tab-plans');
  const mailTs  = qs('mail-refresh-ts');
  const planTs  = qs('plans-refresh-ts');
  const mailBtn  = qs('refresh-mail-btn');
  const plansBtn = qs('refresh-plans-btn');
  const _prevTab = _activeTab_prev;
  _activeTab_prev = tab;
  if (mailC)    mailC.style.display    = tab === 'mail'    ? '' : 'none';
  if (plansC)   plansC.style.display   = tab === 'plans'   ? '' : 'none';
  if (billingC) billingC.style.display = tab === 'billing' ? '' : 'none';
  // Tab bar active state - billing has no tab button so only toggle mail/plans
  if (tabM) tabM.classList.toggle('active', tab === 'mail');
  if (tabP) tabP.classList.toggle('active', tab === 'plans');
  // Slide-in animation for the incoming Mail / My Plan panel (direction by tab order).
  // Mail = left (0), My Plan = right (1): moving toward Plan slides in from the right.
  const _order = { mail: 0, plans: 1 };
  if (tab === 'mail' || tab === 'plans') {
    const incoming = tab === 'mail' ? mailC : plansC;
    if (incoming) {
      const fromRight = (_order[tab] ?? 0) >= (_order[_prevTab] ?? 0);
      incoming.classList.remove('tab-slide-l', 'tab-slide-r');
      void incoming.offsetWidth; // restart animation
      incoming.classList.add(fromRight ? 'tab-slide-r' : 'tab-slide-l');
    }
    _positionTabThumb(tab);
  }
  if (mailTs)  mailTs.style.display  = (tab === 'mail'  && _tsStore.mail)  ? '' : 'none';
  if (planTs)  planTs.style.display  = (tab === 'plans' && _tsStore.plans) ? '' : 'none';
  if (mailBtn)  mailBtn.style.display  = tab === 'mail'  ? '' : 'none';
  if (plansBtn) plansBtn.style.display = tab === 'plans' ? '' : 'none';
  if (tab === 'billing') {
    // Set skeleton immediately so it's visible before async fetch starts
    const area = qs('billing-area');
    if (area) area.innerHTML = _billSkeletonHTML();
    // Let browser paint the shimmer before starting the async fetch
    requestAnimationFrame(() => renderBillingTab());
  }
  // mydocs tab - no active button in tab bar, just show/hide content
  const mydocsC = qs('tab-mydocs-content');
  if (mydocsC) mydocsC.style.display = tab === 'mydocs' ? '' : 'none';
}

// -- Refresh helpers ---------------------------------------
function _setRefreshBtn(btnId, spinning) {
  const btn = qs(btnId);
  if (!btn) return;
  btn.disabled = spinning;
  btn.classList.toggle('spinning', spinning);
  btn.querySelector('svg') && null; // trigger reflow handled by CSS
}

function _setRefreshTs(tsId, text) {
  const key = tsId === 'mail-refresh-ts' ? 'mail' : 'plans';
  _tsStore[key] = text || '';
  const el = qs(tsId);
  if (!el) return;
  el.textContent = text ? 'Updated ' + text : '';
  // Only show if this tab is currently active
  const activeKey = _activeTab === 'mail' ? 'mail-refresh-ts' : 'plans-refresh-ts';
  el.style.display = (text && tsId === activeKey) ? '' : 'none';
}

function _restoreRefreshTs() {
  const mailEl  = qs('mail-refresh-ts');
  const plansEl = qs('plans-refresh-ts');
  if (mailEl)  { mailEl.textContent  = _tsStore.mail  ? 'Updated ' + _tsStore.mail  : ''; mailEl.style.display  = (_tsStore.mail  && _activeTab === 'mail')  ? '' : 'none'; }
  if (plansEl) { plansEl.textContent = _tsStore.plans ? 'Updated ' + _tsStore.plans : ''; plansEl.style.display = (_tsStore.plans && _activeTab === 'plans') ? '' : 'none'; }
}

async function clientRefresh(tab) {
  const sub = STATE.activeSub;
  if (!sub) return;
  // Cleanup old notifications on refresh (non-blocking)
  (function(){ let _rq = sb.from('config').select('value').eq('key', 'notification_retention_days'); _rq = _rq.eq('company_id', STATE.companyId || _NO_COMPANY); _rq.maybeSingle().then(({data}) => {
    const days = parseInt(data?.value) || 30;
    const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString();
    sb.from('notifications').delete().eq('company_id', STATE.companyId).lt('created_at', cutoff);
  }).catch(() => {}); })();
  if (tab === 'mail') {
    _setRefreshBtn('refresh-mail-btn', true);
    await _doRefreshMailLog(sub);
    _setRefreshBtn('refresh-mail-btn', false);
  } else {
    _setRefreshBtn('refresh-plans-btn', true);
    // Re-fetch planCard + recipients + billing history
    try {
      const [pcRes, recRes, billRes] = await Promise.all([
        apiPost({ action:'getPlanCard', uuid:STATE.uuid, subscriptionId:sub.subscriptionId }),
        apiPost({ action:'getRecipients', uuid:STATE.uuid, subscriptionId:sub.subscriptionId }),
        apiPost({ action:'getBillingHistory', uuid:STATE.uuid, subscriptionId:sub.subscriptionId })
      ]);
      if (pcRes.planCard) {
        STATE.planCard = pcRes.planCard;
        STATE.allPlanCards[sub.subscriptionId] = pcRes.planCard;
        renderSubscriptionSwitcher(STATE.access);
      }
      if (recRes.recipients) STATE.recipients = recRes.recipients;
      STATE.billingHistory = billRes.status === 'ok' ? billRes.periods || [] : [];
      buildPlanCard(sub, STATE.access, STATE.planCard, STATE.recipients);
      _setRefreshTs('plans-refresh-ts', new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
    } catch(e) { toast('Failed to refresh plan', 'error'); }
    _setRefreshBtn('refresh-plans-btn', false);
  }
}

async function _cmRefreshMail(btn) {
  if (btn) { btn.classList.add('cm-spinning'); btn.disabled = true; }
  try {
    await _doRefreshMailLog(STATE.activeSub);
  } finally {
    if (btn) { btn.classList.remove('cm-spinning'); btn.disabled = false; }
  }
}

async function _doRefreshMailLog(sub) {
  // Cleanup old notifications (non-blocking)
  (function(){ let _rq = sb.from('config').select('value').eq('key', 'notification_retention_days'); _rq = _rq.eq('company_id', STATE.companyId || _NO_COMPANY); _rq.maybeSingle().then(({data}) => {
    const days = parseInt(data?.value) || 30;
    sb.from('notifications').delete().eq('company_id', STATE.companyId).lt('created_at', new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString());
  }).catch(() => {}); })();
  const rowsEl = qs('client-mail-rows');
  if (rowsEl) rowsEl.innerHTML = skeletonCard(3);
  else { const area = qs('mail-log-area'); if (area) area.innerHTML = skeletonCard(3); }
  try {
    const r = await apiPost({ action:'getMailLog', uuid:STATE.uuid, subscriptionId:sub.subscriptionId });
    if (r.status === 'ok') {
      STATE.mailLog = r.mailLog || [];
      buildMailLog(sub, STATE.access, STATE.mailLog, STATE.planCard, STATE.agents, STATE.recipients);
      _setRefreshTs('mail-refresh-ts', new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}));
    }
  } catch(e) { toast('Failed to refresh mail log', 'error'); }
}

// -- getPlanFriendlyName -----------------------------------
function getPlanFriendlyName(s) {
  // First check loaded plan card data
  const pc = STATE.allPlanCards && STATE.allPlanCards[s.subscriptionId];
  const friendly = pc && pc.friendlyName ? pc.friendlyName.trim() : '';
  if (friendly && !friendly.startsWith('TEMP:')) return friendly;
  // Fallback to friendlyName from resolveAccess (boot data)
  if (s.friendlyName && !s.friendlyName.startsWith('TEMP:')) return s.friendlyName.trim();
  return (s.planName || '').split('-')[0].trim() || s.subscriptionId.slice(-8);
}

// -- buildPlanCard -----------------------------------------
function buildPlanCard(sub, access, pc, recipients) {
  document.body.style.overflow = '';  // clear any edit-modal scroll lock on re-render
  const billing  = pc ? (pc.billingCycle === 'yearly' || pc.billingCycle === 'year' || sub.interval === 'year' ? 'Annual' : 'Monthly') : (sub.interval === 'year' ? 'Annual' : 'Monthly');
  const safeId   = (sub.subscriptionId || sub.planCardId || 'plan').replace(/[^a-zA-Z0-9_-]/g, '_');

  const officialPlanName = ((pc && pc.planName) || sub.planName || '-').split('-')[0].trim();
  const friendlyPlanName = (pc && pc.friendlyName && !pc.friendlyName.startsWith('TEMP:'))
    ? pc.friendlyName.trim() : null;
  const planName = friendlyPlanName || officialPlanName;

  // Address
  const officeAddr = pc && pc.locationAddress
    ? [pc.locationAddress, pc.locationCity, pc.locationProvince, pc.locationPostal].filter(Boolean).join(', ')
    : '';

  // Usage
  const mailLimit   = pc ? (parseInt(pc.mailLimit)   || 0) : 0;
  const parcelLimit = pc ? (parseInt(pc.parcelLimit)  || 0) : 0;
  const mailsUsed   = pc ? (parseInt(pc.mailsUsed)    || 0) : 0;
  const parcelsUsed = pc ? (parseInt(pc.parcelsUsed)  || 0) : 0;
  const mailPct     = mailLimit   ? Math.min(100, Math.round(mailsUsed   / mailLimit   * 100)) : 0;
  const parcelPct   = parcelLimit ? Math.min(100, Math.round(parcelsUsed / parcelLimit * 100)) : 0;
  const barClass    = pct => pct < 60 ? 'safe' : pct < 85 ? 'warn' : 'danger';

  // Billing period
  const billingPeriodStart = pc?.currentPeriodStart || null;
  const billingPeriodEnd   = pc?.currentPeriodEnd   || null;
  const billingDaysLeft    = billingPeriodEnd ? Math.round((new Date(billingPeriodEnd + 'T00:00:00') - new Date(new Date().toLocaleDateString('en-CA',{timeZone:COMPANY_DEFAULT_TZ||'America/Toronto'})+'T00:00:00')) / 86400000) : null;
  const billingTotalDays   = (billingPeriodStart && billingPeriodEnd)
    ? Math.ceil((new Date(billingPeriodEnd + 'T00:00:00') - new Date(billingPeriodStart + 'T00:00:00')) / 86400000) + 1
    : 30;
  const billingPct         = billingDaysLeft !== null ? Math.max(0, Math.min(100, Math.round((billingTotalDays - billingDaysLeft) / billingTotalDays * 100))) : 0;
  const fmtBillingD        = d => d ? fmtDate(d).replace(/,? \d{4}$/, '') : '';

  // Forwarding

async function showPlanDeclarations(pc, subscriptionId) {
  // Fetch plan template to get declarations
  let planDecls = [];
  try {
    const tmpl = await apiPost({ action: 'getPlanTemplate', productId: pc.productId });
    if (tmpl.status === 'ok' && tmpl.template && Array.isArray(tmpl.template.declarations)) {
      planDecls = tmpl.template.declarations;
    }
  } catch(e) {}

  // Load policy URL
  let policyUrl = '#';
  try {
    let _pq = sb.from('config').select('value').eq('key', 'branding_policy_url');
    _pq = _pq.eq('company_id', STATE.companyId || _NO_COMPANY);
    const { data } = await _pq.maybeSingle();
    policyUrl = data?.value || '#';
  } catch(e) {}

  // Build declarations list: universal + plan-specific
  const allDecls = [
    { text: 'I agree to all <a href="' + policyUrl + '" target="_blank" style="color:#6B1414;font-weight:600">'+(STATE.companyName||'Our')+' Policies</a> and terms of service.', required: true }
  ];
  planDecls.forEach(d => allDecls.push({ text: d, required: true }));

  if (allDecls.length === 1 && !planDecls.length) {
    // Only universal - still show it
  }

  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999';

    const checksHtml = allDecls.map((d, i) => '<label style="display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:#FAFAF8;transition:all .15s;margin-bottom:8px" onclick="this.classList.toggle(\'decl-checked\',this.querySelector(\'input\').checked)"><input type="checkbox" class="plan-decl-cb" style="width:18px;height:18px;margin-top:1px;accent-color:#6B1414;flex-shrink:0;cursor:pointer"><div style="font-size:12px;color:#444;line-height:1.5">' + d.text + '</div></label>').join('');

    overlay.innerHTML = '<div style="background:#fff;border-radius:16px;max-width:460px;width:92%;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15)"><div style="padding:20px 24px 16px;border-bottom:1px solid var(--border)"><div style="font-size:16px;font-weight:700;color:var(--ink)">Plan Agreement</div><div style="font-size:11px;color:var(--ink-4);margin-top:2px">Please review and accept before adding recipients to <strong>' + (pc.planName || 'your plan') + '</strong></div></div><div style="padding:20px 24px;max-height:50vh;overflow-y:auto">' + checksHtml + '</div><div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg)"><button id="decl-cancel" style="padding:8px 20px;border:1px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:13px;cursor:pointer">Cancel</button><button id="decl-accept" disabled style="padding:8px 24px;border:none;border-radius:10px;background:#6B1414;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;opacity:0.4">Accept & Continue</button></div></div>';

    overlay.querySelector('#decl-cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('#decl-accept').onclick = async () => {
      // Save accepted declarations
      try {
        const accepted = { declarations: allDecls.map(d => d.text.replace(/<[^>]*>/g, '')), acceptedAt: new Date().toISOString() };
        await sb.from('plan_cards').update({ accepted_declarations: accepted }).eq('plan_card_id', pc.planCardId);
        if (pc) pc.acceptedDeclarations = accepted;
      } catch(e) {}
      overlay.remove();
      resolve(true);
    };

    // Enable accept button only when all checked
    overlay.addEventListener('change', () => {
      const all = overlay.querySelectorAll('.plan-decl-cb');
      const checked = overlay.querySelectorAll('.plan-decl-cb:checked');
      const btn = overlay.querySelector('#decl-accept');
      if (btn) {
        btn.disabled = checked.length < all.length;
        btn.style.opacity = checked.length < all.length ? '0.4' : '1';
      }
    });

    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
    document.body.appendChild(overlay);
  });
}

  const display = document.getElementById('phone-display-' + safeId);

// After a plan-card re-render on add success, re-open the list and the add
// form (empty) so the user can add another right away. If the plan just hit
// its max, the form no longer exists (replaced by the "slots in use" message),
// so we only re-open the list. `listPrefix` is 'rec' or 'ag'; `formId` is the
// form panel id (e.g. 'rc-form-<safeId>' or 'agt-form-<safeId>'); `toggleId`
// is the dashed reveal button id.
function _reopenAddAfterRender(listPrefix, safeId, formId, toggleId) {
  requestAnimationFrame(() => {
    const list = document.getElementById(listPrefix + '-list-' + safeId);
    if (list && (list.style.maxHeight === '0px' || list.style.maxHeight === '' || list.style.opacity === '0')) {
      toggleListBlock(listPrefix + '-' + safeId);
    }
    const form = document.getElementById(formId);
    if (form && form.style.display === 'none') {
      _toggleInner(formId, null, toggleId);
    }
  });
}

async function submitAddRecipient(e, subscriptionId, safeId) {
  e.preventDefault ? e.preventDefault() : null;

  const pc = STATE.allPlanCards && STATE.allPlanCards[subscriptionId];
  const nameEl = document.getElementById('ar-name-' + safeId);
  const typeEl = document.getElementById('ar-type-' + safeId);
  const langEl = document.getElementById('ar-lang-' + safeId);
  const btnEl  = document.getElementById('ar-btn-' + safeId);
  const name   = nameEl ? nameEl.value.trim() : '';
  const type   = typeEl ? typeEl.value : 'individual';
  const lang   = langEl ? langEl.value : 'en';

  if (!name) { toast('Please enter a name.', 'error'); return; }

  // Validate full name for individuals
  if (type === 'individual' && name.split(/\s+/).filter(Boolean).length < 2) {
    toast('Please enter both first and last name.', 'error');
    if (nameEl) nameEl.focus();
    return;
  }

  const planCardId = pc ? pc.planCardId : (STATE.planCard ? STATE.planCard.planCardId : '');

  if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '<span class="btn-spinner"></span> Adding...'; }

  try {
    const result = await apiPost({
      action:          'addRecipient',
      uuid:            STATE.uuid,
      planCardId:      planCardId,
      name:            name,
      type:            type,
      language:        lang,
      notifyOnArrival: true
    });
    if (result.status !== 'ok') throw new Error(result.message || 'Failed');
    toast('Recipient added!', 'success');

    // Reset form fields but stay on plan card
    if (nameEl) nameEl.value = '';
    if (typeEl) typeEl.value = 'individual';
    if (langEl) langEl.value = 'en';
    if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '+ Add Recipient'; }
    const hintEl = document.getElementById('ar-name-hint-' + safeId);
    if (hintEl) hintEl.style.display = 'none';

    // Refresh recipients and re-render plan card (will preserve scroll)
    const rRes = await apiPost({ action:'getRecipients', uuid:STATE.uuid, subscriptionId });
    if (rRes.status === 'ok') {
      STATE.recipients = rRes.recipients || [];
      // Also refresh plan card data to get updated recipients_added count
      const pcRes = await apiPost({ action:'getPlanCard', uuid:STATE.uuid, subscriptionId });
      if (pcRes.status === 'ok' && pcRes.planCard) {
        STATE.planCard = pcRes.planCard;
        if (STATE.allPlanCards) STATE.allPlanCards[subscriptionId] = pcRes.planCard;
      }
      const sub = (STATE.allSubs||[]).find(s=>s.subscriptionId===subscriptionId) || STATE.activeSub;
      const updatedPc = STATE.allPlanCards ? STATE.allPlanCards[subscriptionId] : STATE.planCard;
      buildPlanCard(sub, STATE.access, updatedPc, STATE.recipients);
      _reopenAddAfterRender('rec', safeId, 'rc-form-' + safeId, 'rc-toggle-' + safeId);
    }
  } catch(err) {
    toast(err.message, 'error');
    if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '+ Add Recipient'; }
  }
}

async function saveFwdAddress(safePcId) {
  const planCardId = decodeURIComponent(safePcId);
  const addr = (document.getElementById('fwd-addr-' + safePcId)?.value || '').trim();
  const city = rcTitleCaseName(document.getElementById('fwd-city-' + safePcId)?.value || '');
  const prov = rcTitleCaseName(document.getElementById('fwd-prov-' + safePcId)?.value || '');
  const postal = (document.getElementById('fwd-postal-' + safePcId)?.value || '').replace(/\s+/g,'').toUpperCase();
  const country = rcTitleCaseName(document.getElementById('fwd-country-' + safePcId)?.value || '');
  const instructions = (document.getElementById('fwd-instructions-' + safePcId)?.value || '').trim();

  if (!addr || !city || !prov || !postal || !country) {
    toast('Please fill in address, city, province, postal code, and country.', 'error');
    return;
  }

  // Immediate feedback: disable the Save button + spinner so the click feels responsive.
  const saveBtn = document.querySelector('#fwd-modal-' + safePcId + ' .btn-primary');
  let _btnHtml = '';
  if (saveBtn) { _btnHtml = saveBtn.innerHTML; saveBtn.disabled = true; saveBtn.innerHTML = '<span class="btn-spinner"></span>Saving...'; }

  try {
    const result = await apiPost({
      action: 'updateForwardingAddress',
      uuid: STATE.uuid,
      planCardId,
      forwardingAddress: addr,
      forwardingCity: city,
      forwardingProvince: prov,
      forwardingPostalCode: postal,
      forwardingCountry: country,
      forwardingInstructions: instructions
    });
    if (result.status === 'ok') {
      // Optimistic local update - we know exactly what was saved, so apply it and
      // re-render immediately instead of blocking on extra round-trips.
      if (STATE.planCard) {
        STATE.planCard.forwardingAddress = addr;
        STATE.planCard.forwardingCity = city;
        STATE.planCard.forwardingProvince = prov;
        STATE.planCard.forwardingPostalCode = postal;
        STATE.planCard.forwardingCountry = country;
        STATE.planCard.forwardingInstructions = instructions;
      }
      const sub = STATE.activeSub;
      if (STATE.allPlanCards && sub) STATE.allPlanCards[sub.subscriptionId] = STATE.planCard;
      // Close modal + re-render from local state right away (feels instant).
      const modal = document.getElementById('fwd-modal-' + safePcId);
      if (modal) modal.classList.remove('open');
      document.body.style.overflow = '';
      if (sub) buildPlanCard(sub, sub, STATE.planCard, STATE.recipients || []);
      toast('Forwarding address updated!', 'success');
      // Best-effort background sync so any server-side normalization catches up,
      // without making the user wait for it.
      if (sub) {
        (async () => {
          try {
            const recData = await apiPost({ action: 'getRecipients', uuid: STATE.uuid, subscriptionId: sub.subscriptionId });
            if (recData && recData.recipients) { STATE.recipients = recData.recipients; buildPlanCard(sub, sub, STATE.planCard, recData.recipients); }
          } catch(_) {}
        })();
      }
    } else {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = _btnHtml; }
      toast(result.message || 'Error updating address', 'error');
    }
  } catch(e) {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = _btnHtml; }
    toast('Error: ' + e.message, 'error');
  }
}

              <option value="drivers_license">Driver's License</option>
              <option value="passport">Passport</option>

          <div id="agt-id4-wrap-${safeId}" style="flex:1;min-width:0;display:none">

  return `

      </div>
      <div class="card" style="padding:14px 16px;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 8px 24px rgba(0,0,0,.04)">

            ${allAgents.length ? _avatarStack(activeAgents.concat(inactiveAgents), 'blue') : '<div style="font-size:12.5px;color:var(--ink-4)">No agents yet</div>'}
            ${allAgents.length ? '<div style="font-size:12.5px;color:var(--ink-3);font-weight:500"><b style="color:var(--ink);font-weight:700">' + allAgents.length + '</b> agent' + (allAgents.length === 1 ? '' : 's') + '</div>' : ''}
          </div>
          <button onclick="event.stopPropagation();toggleListBlock('ag-${safeId}')" style="display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--ink-3);background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:8px;transition:background .15s" onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background='none'">
            <span id="ag-lbl-${safeId}">Manage</span>
            <svg id="ag-chev-${safeId}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="transition:transform .25s cubic-bezier(.4,0,.2,1)"><polyline points="9 18 15 12 9 6"/></svg>
          </button>

// Fade-tail "Show more" overlay - only when more invoices remain than shown.
// Soft gradient over the card's bottom edge with a floating link on top of it.
function _billInvoiceMore() {
  const inv   = window._BILL_INV || [];
  const shown = window._BILL_INV_SHOWN || 0;
  // Show the button when there are more locally-held rows to reveal, OR when
  // the local list is exhausted but the server still has more to fetch.
  if (inv.length <= shown && !window._BILL_INV_HASMORE) return '';
  return '<div id="bill-invoice-fade" style="position:absolute;left:0;right:0;bottom:0;height:58px;background:linear-gradient(rgba(255,255,255,0),var(--white) 78%);border-radius:0 0 14px 14px;pointer-events:none"></div>' +
    '<div id="bill-invoice-morebtn" style="position:absolute;left:0;right:0;bottom:10px;text-align:center">' +
      '<button onclick="_billShowMoreInvoices()" style="background:none;border:none;font-family:inherit;cursor:pointer;font-size:12px;font-weight:700;color:var(--green);display:inline-flex;align-items:center;gap:6px">' +
        'Show more' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</button>' +
    '</div>';
}

// "Show more" entry point. Two cases:
//  * Local list still has un-revealed rows -> reveal the next 10 (no server).
//  * Local list is exhausted but the server has more -> fetch the next batch
//    from the server (inline spinner on the button, disabled during fetch),
//    APPEND it to _BILL_INV de-duped by id (never replace), then reveal 10.
// Guarded by _BILL_INV_BUSY so a double-click can't double-fetch.
async function _billShowMoreInvoices() {
  const inv = window._BILL_INV || [];
  const prevShown = window._BILL_INV_SHOWN || 0;

  // Local rows remain -> reveal without any server call (unchanged behavior).
  if (inv.length > prevShown) { _billRevealMoreLocal(prevShown); return; }

  // Local exhausted. If the server has no more, or a fetch is already in
  // flight, there is nothing to do.
  if (!window._BILL_INV_HASMORE || window._BILL_INV_BUSY) return;
  if (!window._BILL_INV_CURSOR) return;

  window._BILL_INV_BUSY = true;
  // Inline spinner on the button - no full re-render. Disable so a second tap
  // can't fire a second fetch.
  const btnEl = qs('bill-invoice-morebtn');
  const innerBtn = btnEl ? btnEl.querySelector('button') : null;
  if (innerBtn) {
    innerBtn.disabled = true;
    innerBtn.style.cursor = 'default';
    innerBtn.innerHTML = '<svg class="bill-spin-active" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Loading\u2026';
  }

  let batch = null;
  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/get-billing-data', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ after: window._BILL_INV_CURSOR })
    });
    batch = await res.json();
    if (!res.ok) throw new Error((batch && batch.error) || 'Failed to load more invoices');
  } catch (e) {
    batch = null;
  }

  window._BILL_INV_BUSY = false;

  if (!batch || !Array.isArray(batch.invoices)) {
    // Fetch failed - restore the button so the client can retry. Leave the
    // accumulated list untouched.
    const fade = qs('bill-invoice-fade'); if (fade) fade.remove();
    const oldBtn = qs('bill-invoice-morebtn'); if (oldBtn) oldBtn.remove();
    const card = qs('bill-invoice-card');
    if (card) card.insertAdjacentHTML('beforeend', _billInvoiceMore());
    return;
  }

  // Append de-duped by id (a batch boundary can overlap the cursor row).
  const seen = {};
  for (let k = 0; k < inv.length; k++) seen[inv[k].id] = 1;
  for (let m = 0; m < batch.invoices.length; m++) {
    if (!seen[batch.invoices[m].id]) inv.push(batch.invoices[m]);
  }
  window._BILL_INV = inv;
  window._BILL_INV_HASMORE = !!batch.hasMore;
  window._BILL_INV_CURSOR = batch.nextCursor || null;

  // Now reveal the next 10 from the freshly-extended local list.
  _billRevealMoreLocal(prevShown);
}

// Reveal the next 10 invoices from the local list; re-render just the rows +
// fade, no server call. Shared by the local-reveal case and the post-fetch
// reveal so the two never drift.
function _billRevealMoreLocal(prevShown) {
  const inv = window._BILL_INV || [];
  window._BILL_INV_SHOWN = Math.min(prevShown + 10, inv.length);
  const rowsEl = qs('bill-invoice-rows');
  if (rowsEl) rowsEl.innerHTML = inv.slice(0, window._BILL_INV_SHOWN).map(_billRenderInvoiceRow).join('');
  const fade = qs('bill-invoice-fade'); if (fade) fade.remove();
  const btn  = qs('bill-invoice-morebtn'); if (btn) btn.remove();
  // Re-add the fade-tail overlay when more remain - either locally, or on the
  // server (hasMore). When truly nothing is left, the button stays gone.
  if (inv.length > window._BILL_INV_SHOWN || window._BILL_INV_HASMORE) {
    const card = qs('bill-invoice-card');
    if (card) card.insertAdjacentHTML('beforeend', _billInvoiceMore());
  }
  // Scroll so the first newly-revealed row moves up near the top of the
  // billing scroll area, so the user clearly follows the reveal. Done as an
  // explicit container scroll (scrollIntoView block:'nearest' no-ops when the
  // row is already partly visible, which is why the earlier attempt did nothing).
  if (rowsEl) {
    requestAnimationFrame(function() {
      const newRow = rowsEl.children[prevShown];
      if (!newRow) return;
      const scroller = (typeof _scrollParent === 'function') ? _scrollParent(newRow) : null;
      if (!scroller) { newRow.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }
      const isDoc = (scroller === document.scrollingElement || scroller === document.documentElement);
      const rowRect = newRow.getBoundingClientRect();
      const viewTop = isDoc ? 0 : scroller.getBoundingClientRect().top;
      const pad = 16;
      const delta = rowRect.top - (viewTop + pad);
      if (Math.abs(delta) < 2) return;
      if (isDoc) window.scrollBy({ top: delta, behavior: 'smooth' });
      else scroller.scrollBy({ top: delta, behavior: 'smooth' });
    });
  }
}

// Toggle the account-credit history panel open/closed.
function _billToggleCreditHist() {
  const panel = qs('bill-credit-hist');
  const chev  = qs('bill-credit-chev');
  const label = qs('bill-credit-histlabel');
  if (!panel) return;
  const open = panel.style.display === 'none' || !panel.style.display;
  panel.style.display = open ? 'block' : 'none';

}

// Account-credit banner. Renders only when creditBalanceCents > 0. History is
// date + amount only (green added / red removed) - no reason, no staff. The
// list shows ~3 rows then scrolls, matching the admin credit panel.
function _billCreditBanner(creditBalanceCents, creditLog) {
  const cents = Number(creditBalanceCents || 0);
  if (cents <= 0) return '';
  const log = Array.isArray(creditLog) ? creditLog : [];
  const cardIco = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>';
  const chevIco = '<svg id="bill-credit-chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" style="transition:transform .18s"><polyline points="6 9 12 15 18 9"></polyline></svg>';

  const histRows = log.map(function(h) {
    const add = !!h.add;
    const amt = (add ? '+' : '\u2212') + _billMoney(h.amountCents || 0);
    const col = add ? 'var(--green)' : 'var(--required)';
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:0.5px solid rgba(0,0,0,0.06)">' +
      '<span style="font-size:12px;color:var(--ink-2)">' + (h.at || '-') + '</span>' +
      '<span style="font-size:12px;font-weight:600;color:' + col + '">' + amt + '</span>' +
    '</div>';
  }).join('');
  // First row shouldn't carry a top divider.
  const histRowsClean = histRows.replace('border-top:0.5px solid rgba(0,0,0,0.06)', 'border-top:none');

  // "View history" affordance shown on the right of the banner. The whole
  // banner is the click target, so this is just a visual cue (no own handler).
  const viewCue = log.length
    ? '<span style="margin-left:auto;font-size:11px;font-weight:600;color:var(--green);display:inline-flex;align-items:center;gap:3px;white-space:nowrap"><span id="bill-credit-histlabel">View history</span>' + chevIco + '</span>'
    : '';

  // History is a separate, fully-rounded card that drops below the banner when
  // expanded (with a small gap), so every box keeps all four corners curved.
  const histPanel = log.length
    ? '<div id="bill-credit-hist" style="display:none;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:2px 14px;margin-top:-8px;margin-bottom:16px;max-height:132px;overflow-y:auto">' + histRowsClean + '</div>'
    : '';

  // Banner is always fully rounded. When there's history it's clickable to
  // toggle the panel; with no history it's a static info pill.
  const clickAttrs = log.length
    ? ' onclick="_billToggleCreditHist()" style="cursor:pointer;'
    : ' style="';

  return '<div' + clickAttrs + 'display:flex;align-items:center;gap:10px;background:var(--green-bg);border:1px solid rgba(26,107,60,0.18);border-radius:12px;padding:11px 14px;margin-bottom:16px">' +
      '<div style="width:26px;height:26px;border-radius:7px;background:var(--white);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0">' + cardIco + '</div>' +
      '<div style="font-size:13px;color:var(--ink-2)">You have <strong style="color:var(--green);font-weight:700">' + _billMoney(cents) + '</strong> in account credit</div>' +
      viewCue +
    '</div>' +
    histPanel;
}

// -- Payment-method section (hero card + Other cards list + Add button) ----
// Pure render: given the cards[] array (and pm fallback), returns the section
// markup. Used both by the full billing render and by the targeted cards-only
// refresh (_billRefreshCards), so both paths produce byte-identical markup.
function _billPaymentMethodHTML(cards, pm) {
  const brandColors = { visa: '#1A1A6C', mastercard: '#EB001B', amex: '#2E77BC', discover: '#FF6600' };

  cards = Array.isArray(cards) ? cards : [];
  const defaultCard = cards.find(function(c){ return c.isDefault; })
                   || (cards.length ? cards[0] : null)
                   || pm;   // fallback: single default from legacy response
  // Exclude the default from the "Other cards" list. Prefer id match (survives
  // a refresh where object identity differs); fall back to identity when the
  // default came from the pm fallback (no id). This is what stops the default
  // card from appearing twice.
  const defId = defaultCard && defaultCard.id;
  const otherCards = cards.filter(function(c){
    return defId ? (c.id !== defId) : (c !== defaultCard);
  });

  const brandLabel = defaultCard ? (String(defaultCard.brand).charAt(0).toUpperCase() + String(defaultCard.brand).slice(1)) : 'Card';

  // Compact brand mark for the wallet-list rows.
  const brandMark = function(b){
    var m = { visa:'VISA', mastercard:'MC', amex:'AMEX', discover:'DISC' };
    return m[String(b || '').toLowerCase()] || String(b || 'CARD').toUpperCase();
  };
  // Escape a card id for safe embedding inside a single-quoted onclick string.
  const esc = function(s){ return String(s == null ? '' : s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); };

  // -- Piece: marble hero (the default card) --
  const heroHTML = defaultCard
    ? '<div class="bill-hero">' +
        '<div class="bh-top">' +
          '<div class="bill-chip"></div>' +
          '<span class="bill-inbadge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Default</span>' +
        '</div>' +
        '<div class="bh-num">**** **** **** ' + defaultCard.last4 + '</div>' +
        '<div class="bh-drow">' +
          '<div><div class="bh-cap">Card holder</div><div class="bh-val">' + (defaultCard.name || STATE.access?.name || '') + '</div></div>' +
          '<div style="text-align:right"><div class="bh-cap">Expires</div><div class="bh-val">' + defaultCard.expMonth + ' / ' + defaultCard.expYear + '</div></div>' +
          '<div class="bh-brand">' + brandLabel.toUpperCase() + '</div>' +
        '</div>' +
      '</div>'
    : '<div style="background:var(--white);border-radius:14px;padding:20px;text-align:center;color:var(--ink-4);font-size:13px;border:1px solid var(--border)">No payment method on file</div>';

  // -- Piece: "Other cards" list (empty string when none) --
  // Each row: brand - number - expiry, with per-card Set default / Remove
  // (pill hover via .bill-cbtn). The default is the hero, so it's never here.
  // The "Other cards" label lives in the aligned title row below, not here.
  // .fixed gives the 2.5-row window (so the card can match its height); .scroll
  // turns on once there are more rows than the window shows.
  const listHTML = otherCards.length
    ? '<div class="bill-cardshell fixed' + (otherCards.length > 2 ? ' scroll' : '') + '">' +
      otherCards.map(function(c){
        return '<div style="display:flex;align-items:center;gap:10px;padding:13px 16px">' +
          '<span style="font-size:11px;font-weight:800;font-style:italic;letter-spacing:-.5px;color:' + (brandColors[String(c.brand).toLowerCase()] || '#1A1A1F') + ';min-width:38px">' + brandMark(c.brand) + '</span>' +
          '<div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;color:var(--ink)">**** ' + c.last4 + '</div>' +
          '<div style="font-size:11px;color:var(--ink-4);margin-top:2px">Exp ' + c.expMonth + ' / ' + c.expYear + '</div></div>' +
          '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">' +
            '<button class="bill-cbtn def" onclick="setDefaultCard(\'' + esc(c.id) + '\', this)">Set default</button>' +
            '<button class="bill-cbtn rem" onclick="removeCard(\'' + esc(c.id) + '\',\'' + esc(c.last4) + '\', this)">Remove</button>' +
          '</div>' +
        '</div>';
      }).join('<div style="height:0.5px;background:rgba(0,0,0,0.06);margin:0 16px"></div>') +
      '</div>'
    : '';

  // -- Piece: Add-a-card button --
  const addHTML =
    '<button onclick="openUpdateCardPortal()" onmouseover="this.style.backgroundColor=\'var(--bg-2)\';this.style.borderColor=\'rgba(0,0,0,0.16)\'" onmouseout="this.style.backgroundColor=\'var(--white)\';this.style.borderColor=\'rgba(0,0,0,0.09)\'" style="width:100%;padding:12px;background-color:var(--white);border-radius:10px;border:0.5px solid rgba(0,0,0,0.09);font-size:13px;font-weight:500;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;font-family:inherit;transition:background-color .15s,border-color .15s">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
      (defaultCard ? 'Add a card' : 'Add payment method') +
    '</button>';

  // -- Assemble: aligned titles + equal-height two-column grid --
  // Row 1: "Payment method" (left) and "Other cards" (right) on the same line.
  // Row 2: marble hero (left, stretches to match) | list + Add (right).
  // The "Other cards" title only appears when there are other cards. On narrow
  // screens the grid collapses to a stacked single column (see CSS media query).
  const microLabel = function(text){
    return '<div class="micro-lbl" style="font-size:10px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.09em;padding:0 2px">' + text + '</div>';
  };
  return (
    '<div class="bill-pm-grid" style="margin-bottom:24px">' +
      '<div class="bill-pm-titleL">' + microLabel('Payment method') + '</div>' +
      '<div class="bill-pm-titleR">' + (otherCards.length ? microLabel('Other cards') : '') + '</div>' +
      '<div class="bill-pm-left">' + heroHTML + '</div>' +
      '<div class="bill-pm-right">' + listHTML + addHTML + '</div>' +
    '</div>'
  );
}

// -- Targeted refresh: repaint ONLY the payment-method section -------------
// After set-default / remove / add, re-fetch billing data and swap just the
// #bill-pm-section markup. Credit, subscriptions, and invoices don't repaint.
// The server is still the source of truth - this only narrows what re-renders.
async function _billRefreshCards() {
  const host = document.getElementById('bill-pm-section');
  if (!host) { renderBillingTab(); return; }   // section not mounted - full render
  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/get-billing-data', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to refresh cards');
    host.innerHTML = _billPaymentMethodHTML(data.cards, data.paymentMethod);
  } catch(e) {
    // On failure, fall back to a full render so nothing is left stale.
    renderBillingTab();
  }
}

// -- Billing Tab ------------------------------------------
// Loading skeleton that mirrors the real billing layout (hero card + Other
// cards two-column block, credit banner, Subscriptions, Invoice history) and
// reuses .bill-pm-grid so it stacks the same way on phone. Shared by both the
// tab-switch paint and renderBillingTab so the two never drift.
function _billSkeletonHTML() {
  var cardRow = '<div class="sk-cardrow"><div class="sk sk-brand"></div><div style="flex:1"><div class="sk" style="width:90px;height:12px;margin-bottom:6px"></div><div class="sk" style="width:60px;height:10px"></div></div><div class="sk" style="width:64px;height:12px"></div></div>';
  var listRow = '<div class="sk-row"><div class="sk sk-ico"></div><div style="flex:1"><div class="sk" style="width:120px;height:12px;margin-bottom:6px"></div><div class="sk" style="width:80px;height:10px"></div></div><div class="sk" style="width:52px;height:13px"></div><div class="sk sk-badge"></div></div>';
  return '<div style="padding:20px 16px">' +
      '<div class="sk" style="width:110px;height:12px;margin-bottom:20px"></div>' +
      '<div class="bill-pm-grid" style="margin-bottom:24px">' +
        '<div class="bill-pm-titleL"><div class="sk sk-title"></div></div>' +
        '<div class="bill-pm-titleR"><div class="sk sk-title"></div></div>' +
        '<div class="bill-pm-left"><div class="sk sk-hero"></div></div>' +
        '<div class="bill-pm-right">' +
          '<div class="sk-cardshell">' + cardRow + cardRow + cardRow + '</div>' +
          '<div class="sk-add"><div class="sk" style="width:90px;height:13px"></div></div>' +
        '</div>' +
      '</div>' +
      '<div class="sk sk-banner"></div>' +
      '<div class="sk sk-section-title"></div>' +
      '<div class="sk-list">' + listRow + listRow + '</div>' +
      '<div class="sk sk-section-title"></div>' +
      '<div class="sk-list">' + listRow + listRow + listRow + '</div>' +
    '</div>';
}

async function renderBillingTab() {
  const area = qs('billing-area');
  if (!area) return;

  // Show skeleton while loading (shared helper - matches the tab-switch paint).
  area.innerHTML = _billSkeletonHTML();

  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/get-billing-data', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load billing data');

    const pm   = data.paymentMethod;
    const inv  = data.invoices || [];
    const creditBalanceCents = Number(data.creditBalanceCents || 0);
    const creditLog = Array.isArray(data.creditLog) ? data.creditLog : [];

    // Stash invoices + paging state for the "Show more" reveal. Rows render 10
    // at a time client-side; each tap adds 10 more. When the local list runs
    // out AND the server still has more (hasMore), the next tap fetches the
    // next 100 from the server, appends them, then keeps revealing 10 at a time.
    window._BILL_INV = inv;
    window._BILL_INV_SHOWN = Math.min(10, inv.length);
    window._BILL_INV_HASMORE = !!data.hasMore;
    window._BILL_INV_CURSOR = data.nextCursor || null;
    window._BILL_INV_BUSY = false;


    // Invoice rows HTML - paged: only the first _BILL_INV_SHOWN render now, and
    // "Show more" reveals 10 more each tap via _billShowMoreInvoices().
    const invoiceRows = inv.length
      ? inv.slice(0, window._BILL_INV_SHOWN).map(_billRenderInvoiceRow).join('')
      : '<div style="padding:32px 20px;text-align:center;color:var(--ink-4);font-size:13px">No invoices yet</div>';

    area.innerHTML =
      '<div style="padding:20px 16px">' +

        // Back button - shown ONLY when the active sub is usable (accessible
        // AND setup finished). Missing sub or any gated state hides it, so it
        // can never route into a half-rendered/blocked plan view.
        // Back button:
        //  * usable plan  -> "Back to My Plan"
        //  * setup pending -> "Back to setup" (re-runs the setup router)
        //  * otherwise (payment/cancel/no sub) -> no button
        ((STATE.activeSub && !_isSubGated(STATE.activeSub)) ?
        '<button onclick="switchTab(\'plans\')" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-size:12px;font-weight:500;color:var(--ink-4);cursor:pointer;font-family:inherit;padding:0;margin-bottom:20px;transition:color .15s" onmouseover="this.style.color=\'var(--ink)\'" onmouseout="this.style.color=\'var(--ink-4)\'">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>' +
          'Back to My Plan' +
        '</button>'
        : ((STATE.allSubs || []).some(s => s.canAccess && s.setupRequired) ?
        '<button onclick="_resumePlanSetup()" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-size:12px;font-weight:600;color:var(--ink-4);cursor:pointer;font-family:inherit;padding:0;margin-bottom:20px;transition:color .15s" onmouseover="this.style.color=\'var(--ink)\'" onmouseout="this.style.color=\'var(--ink-4)\'">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>' +
          'Back to setup' +
        '</button>' : '')) +

        // Payment method section - wrapped in a targetable host so set-default /
        // remove / add can repaint ONLY this block (see _billRefreshCards)
        // instead of reloading the entire billing tab.
        '<div id="bill-pm-section">' + _billPaymentMethodHTML(data.cards, pm) + '</div>' +

        // Section: Account credit (only when the client has credit available).
        // Slim banner + expandable date/amount history (no reason, no staff).
        _billCreditBanner(creditBalanceCents, creditLog) +

        // Section: Subscriptions
        (STATE.allSubs && STATE.allSubs.filter(function(s){ return s.canAccess || s.accessStatus === 'ACTIVE' || s.accessStatus === 'PAYMENT_REQUIRED'; }).length ? (function(){
          var _subList = STATE.allSubs.filter(function(s){ return s.canAccess || s.accessStatus === 'ACTIVE' || s.accessStatus === 'PAYMENT_REQUIRED'; });
          // Cap the visible list at ~3 rows, the rest on internal scroll -
          // same fixed-height + overflow-y:auto pattern as the credit history list.
          var _capScroll = _subList.length > 3 ? 'max-height:189px;overflow-y:auto;' : '';
          return '<div style="font-size:10px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;padding:0 2px">Subscriptions</div>' +
          '<div style="' + _capScroll + 'background-color:var(--white);border-radius:14px;overflow-x:hidden;box-shadow:0 1px 0 rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.06);margin-bottom:24px">' +
          _subList.map(function(s) {
            var isActive  = s.accessStatus === 'ACTIVE';
            var isPastDue = s.accessStatus === 'PAYMENT_REQUIRED';
            var isCanceling = s.accessStatus === 'CANCELED_WITH_ACCESS';
            var statusColor = isActive && !isCanceling ? 'var(--green)' : isPastDue ? 'var(--amber)' : isCanceling ? 'var(--ink-3)' : 'var(--ink-4)';
            var statusBg    = isActive && !isCanceling ? 'var(--green-bg)' : isPastDue ? 'var(--amber-bg)' : 'var(--bg-2)';
            var statusLabel = isActive && !isCanceling ? 'Active' : isPastDue ? 'Payment required' : isCanceling ? 'Cancelling' : (s.accessStatus || '-');
            // Official plan name first, then the friendly/display name after a
            // middle dot when one genuinely exists (and differs from the plan
            // name). Falls back to the plan name alone - never blank.
            var _pcSub      = STATE.allPlanCards && STATE.allPlanCards[s.subscriptionId];
            var _friendly   = (_pcSub && _pcSub.friendlyName && !_pcSub.friendlyName.startsWith('TEMP:'))
              ? _pcSub.friendlyName.trim()
              : (s.friendlyName && !s.friendlyName.startsWith('TEMP:') ? s.friendlyName.trim() : '');
            var _officialNm = (s.planName || 'Plan').split('-')[0].trim() || 'Plan';
            var planLabel   = (_friendly && _friendly !== _officialNm)
              ? _officialNm + ' \u00b7 ' + _friendly
              : _officialNm;
            var billing     = s.interval === 'year' ? 'Yearly' : 'Monthly';
            var renewStr    = s.currentPeriodEnd
              ? ' \u00b7 ' + (isCanceling ? 'Ends ' : 'Renews ') + fmtDate(s.currentPeriodEnd)
              : '';
            return '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px">' +
              '<div>' +
                '<div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px">' + planLabel + '</div>' +
                '<div style="font-size:11px;color:var(--ink-4)">' + (s.planAmountFormatted || '') + (s.interval ? ' \u00b7 ' + billing : '') + renewStr + '</div>' +
              '</div>' +
              '<span style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background-color:' + statusBg + ';color:' + statusColor + ';white-space:nowrap;margin-left:12px">' + statusLabel + '</span>' +
            '</div>';
          }).join('<div style="height:0.5px;background-color:rgba(0,0,0,0.06);margin:0 16px"></div>') +
          '</div>';
        })() : '') +

                // Section: Invoices - paged 10 at a time with a fade-tail
        // "Show more" that reveals the next 10. The card is position:relative
        // so the fade/button overlay sits inside its bottom edge.
        '<div style="font-size:10px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;padding:0 2px">Invoice history</div>' +
        '<div id="bill-invoice-card" style="position:relative;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.06)">' +
          '<div id="bill-invoice-rows">' + invoiceRows + '</div>' +
          _billInvoiceMore() +
        '</div>' +

      '</div>';

  } catch(e) {
    const area2 = qs('billing-area');
    if (area2) area2.innerHTML = '<div style="padding:32px 20px;text-align:center;color:var(--ink-3);font-size:13px">' + e.message + '</div>';
  }
}

async function openUpdateCardPortal() {
  // Guard against rapid repeat clicks (race) and an already-open sheet:
  // the SetupIntent fetch is async, so without this a second click before it
  // resolves would create a second overlay. Bail if opening or already open.
  if (window._updateCardOpening) return;
  if (document.getElementById('card-sheet-overlay')) return;
  window._updateCardOpening = true;

  if (!STATE.stripeKey) {
    window._updateCardOpening = false;
    toast('Payment system is loading. Please refresh the page and try again.', 'error');
    return;
  }

  // Create a SetupIntent via edge function
  let clientSecret = null;
  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/create-setup-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ action: 'create' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not initialize card update');
    clientSecret = data.clientSecret;
  } catch(e) {
    window._updateCardOpening = false;
    toast(e.message, 'error');
    return;
  }

  // Build bottom sheet
  const overlay = document.createElement('div');
  overlay.className = 'card-sheet-overlay';
  overlay.id = 'card-sheet-overlay';
  overlay.innerHTML =
    '<div class="card-sheet" id="card-sheet">' +
      '<div class="card-sheet-handle"></div>' +
      '<div class="card-sheet-header">' +
        '<div class="card-sheet-title">Update payment method</div>' +
        '<button class="card-sheet-close" onclick="closeCardSheet()">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="card-sheet-body">' +
        '<div class="card-preview">' +
          '<div class="card-preview-left">' +
            '<div class="card-preview-chip"></div>' +
            '<div class="card-preview-number" id="preview-number">**** **** **** ****</div>' +
          '</div>' +
          '<div class="card-preview-brand" id="preview-brand"></div>' +
        '</div>' +
        '<div class="stripe-field-label">Card details</div>' +
        '<div class="stripe-element-wrap" id="stripe-card-wrap">' +
          '<div id="stripe-card-element"></div>' +
        '</div>' +
        '<div class="stripe-secure">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>' +
          '<a href="https://stripe.com/docs/security" target="_blank">Secured by Stripe</a>' +
        '</div>' +
      '</div>' +
      '<div class="card-sheet-footer">' +
        '<div id="card-error" style="color:#C62828;font-size:12px;margin-bottom:10px;display:none"></div>' +
        '<button class="card-save-btn" id="card-save-btn" onclick="saveNewCard()">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>' +
          'Save new card' +
        '</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  window._updateCardOpening = false;   // sheet is now open; allow future opens after close

  // Close on overlay click
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeCardSheet();
  });

  // Mount Stripe Card Element
  const stripe = Stripe(STATE.stripeKey);
  const elements = stripe.elements();
  const cardElement = elements.create('card', {
    style: {
      base: {
        fontFamily: '-apple-system, Inter, sans-serif',
        fontSize: '14px',
        color: '#1A1A1F',
        '::placeholder': { color: '#A8A8B0' }
      }
    },
    hidePostalCode: true
  });
  cardElement.mount('#stripe-card-element');

  // Focus border effect
  cardElement.on('focus', () => {
    const wrap = document.getElementById('stripe-card-wrap');
    if (wrap) { wrap.style.borderColor = 'var(--required)'; wrap.style.background = 'var(--white)'; }
  });
  cardElement.on('blur', () => {
    const wrap = document.getElementById('stripe-card-wrap');
    if (wrap) { wrap.style.borderColor = ''; wrap.style.background = ''; }
  });

  // Live card preview
  cardElement.on('change', (e) => {
    const num = document.getElementById('preview-number');
    const brand = document.getElementById('preview-brand');
    if (num && e.value?.postalCode !== undefined) {}
    if (brand) {
      const brandNames = { visa:'VISA', mastercard:'MC', amex:'AMEX', discover:'DISC', unknown:'' };
      brand.textContent = brandNames[e.brand] || (e.brand ? e.brand.toUpperCase() : '');
    }
    // Show error
    const errEl = document.getElementById('card-error');
    if (errEl) { errEl.textContent = e.error?.message || ''; errEl.style.display = e.error ? '' : 'none'; }
  });

  // Store refs for saveNewCard
  window._stripeInstance = stripe;
  window._stripeElements = elements;
  window._cardElement = cardElement;
  window._setupClientSecret = clientSecret;
}

function closeCardSheet() {
  const overlay = document.getElementById('card-sheet-overlay');
  if (overlay) overlay.remove();
  window._stripeInstance = null;
  window._cardElement = null;
  window._updateCardOpening = false;
}

async function saveNewCard() {
  const btn = document.getElementById('card-save-btn');
  const errEl = document.getElementById('card-error');
  if (!btn || !window._stripeInstance || !window._cardElement) return;

  btn.disabled = true;
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite"></div> Saving...';

  try {
    const { setupIntent, error } = await window._stripeInstance.confirmCardSetup(
      window._setupClientSecret,
      { payment_method: { card: window._cardElement } }
    );

    if (error) {
      if (errEl) { errEl.textContent = error.message; errEl.style.display = ''; }
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Save new card';
      return;
    }

    // Confirming the SetupIntent already attached the card to this customer.
    // A newly added card ALWAYS becomes the default - it's the card the client
    // just entered, so it's the one we charge going forward.
    const token = localStorage.getItem('sb_access_token');
    try {
      const putRes = await fetch(SUPABASE_URL + '/functions/v1/create-setup-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ action: 'setDefault', paymentMethodId: setupIntent.payment_method })
      });
      const putData = await putRes.json();
      if (!putRes.ok) {
        console.error('Set default failed:', putData);
        toast('Card saved but could not set as default: ' + (putData.error || 'unknown'), 'error');
        return;
      }
      console.log('Set default result:', putData);
    } catch(putErr) {
      console.error('PUT error:', putErr);
    }

    closeCardSheet();
    toast('Payment method updated!', 'success');
    // Repaint only the cards section (no full-tab reload).
    _billRefreshCards();

  } catch(e) {
    if (errEl) { errEl.textContent = e.message; errEl.style.display = ''; }
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Save new card';
  }
}

// -- Set a stored card as the default -------------------------------------
// Server verifies the card belongs to this customer, sets it as the customer
// default, and updates active subscriptions. Then the billing tab re-renders
// so the new default becomes the hero card.
// -- Card-action busy state -----------------------------------------------
// Disables ALL Set default / Remove buttons in the Other-cards list while a
// request is in flight (so no sibling can be clicked mid-request), and shows a
// pending label on the one that was clicked. On success the list re-renders
// with fresh enabled buttons; on error/early-return we restore via the flag.
function _billSetCardBtnsBusy(clickedBtn, busy, pendingLabel) {
  var btns = document.querySelectorAll('.bill-cbtn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = busy;
    btns[i].style.opacity = busy ? '0.5' : '';
    btns[i].style.pointerEvents = busy ? 'none' : '';
    btns[i].style.cursor = busy ? 'default' : '';
  }
  if (clickedBtn) {
    if (busy) {
      clickedBtn.dataset.origLabel = clickedBtn.textContent;
      clickedBtn.textContent = pendingLabel || 'Working...';
      clickedBtn.style.opacity = '0.8';
    } else if (clickedBtn.dataset.origLabel) {
      clickedBtn.textContent = clickedBtn.dataset.origLabel;
      delete clickedBtn.dataset.origLabel;
    }
  }
}

async function setDefaultCard(pmId, clickedBtn) {
  if (!pmId || window._billCardBusy) return;
  window._billCardBusy = true;
  _billSetCardBtnsBusy(clickedBtn, true, 'Setting...');
  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/create-setup-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ action: 'setDefault', paymentMethodId: pmId })
    });
    const out = await res.json();
    if (!res.ok) { toast(out.error || 'Could not set default card', 'error'); _billSetCardBtnsBusy(clickedBtn, false); return; }
    toast('Default card updated', 'success');
    _billRefreshCards();
  } catch(e) {
    toast(e.message || 'Could not set default card', 'error');
    _billSetCardBtnsBusy(clickedBtn, false);
  } finally {
    window._billCardBusy = false;
  }
}

// -- Remove a stored card -------------------------------------------------
// Confirms first, then detaches server-side. The server refuses to remove the
// current default (set another default first) or the last card while a
// subscription is active - those errors surface as a toast.
async function removeCard(pmId, last4, clickedBtn) {
  if (!pmId || window._billCardBusy) return;
  const ok = await appConfirm({
    title: 'Remove card',
    message: 'Remove the card ending ' + (last4 || '****') + '? This can\u2019t be undone.',
    confirmLabel: 'Remove',
    confirmClass: 'btn-danger',
    cancelLabel: 'Keep card'
  });
  if (!ok) return;
  window._billCardBusy = true;
  _billSetCardBtnsBusy(clickedBtn, true, 'Removing...');
  try {
    const token = localStorage.getItem('sb_access_token');
    const res = await fetch(SUPABASE_URL + '/functions/v1/create-setup-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ action: 'detach', paymentMethodId: pmId })
    });
    const out = await res.json();
    if (!res.ok) { toast(out.error || 'Could not remove card', 'error'); _billSetCardBtnsBusy(clickedBtn, false); return; }
    toast('Card removed', 'success');
    _billRefreshCards();
  } catch(e) {
    toast(e.message || 'Could not remove card', 'error');
    _billSetCardBtnsBusy(clickedBtn, false);
  } finally {
    window._billCardBusy = false;
  }
}

function applyTheme(hex) {
  try {
    var r = parseInt(hex.slice(1,3),16);
    var g = parseInt(hex.slice(3,5),16);
    var b = parseInt(hex.slice(5,7),16);
    var rl = Math.min(255,r+20); var gl = Math.min(255,g+4); var bl = Math.min(255,b+4);
    document.documentElement.style.setProperty('--red', hex);
    document.documentElement.style.setProperty('--red-light', 'rgb('+rl+','+gl+','+bl+')');
    document.documentElement.style.setProperty('--red-dim', 'rgba('+r+','+g+','+b+',0.08)');
    document.documentElement.style.setProperty('--red-dim-6', 'rgba('+r+','+g+','+b+',0.06)');
    document.documentElement.style.setProperty('--red-border', 'rgba('+r+','+g+','+b+',0.18)');
    window._themeRed = hex;
    window._themeRedDim = 'rgba('+r+','+g+','+b+',0.08)';
    window._themeRedBorder = 'rgba('+r+','+g+','+b+',0.18)';
  } catch(e) {}
}
(function(){ var c = localStorage.getItem('app_theme_color'); if (c) { applyTheme(c); var _ls = document.getElementById('loading-screen'); if (_ls) _ls.classList.add('theme-ready'); } })();

// -- Accent tones -----------------------------------------
// Single source of truth for all banner/stripe/pill colors. Everything is
// derived from the company accent (window._themeRed, set by applyTheme), so
// no hardcoded blues/ambers/greens. Severity varies the INTENSITY, not the hue.
function _accentRGB() {
  var hex = window._themeRed || localStorage.getItem('app_theme_color') || '#1a1a2e';
  if (hex[0] !== '#' || hex.length < 7) hex = '#1a1a2e';
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16), hex: hex };
}
// Returns a tone set for a given severity: 'soft' (setup/info/active) or
// 'strong' (payment/suspended/canceled). Same hue throughout.
function accentTones(severity) {
  var c = _accentRGB();
  var mix = function(v, t, a){ return Math.round(v + (t - v) * a); };
  var rgb = function(rr,gg,bb){ return 'rgb('+rr+','+gg+','+bb+')'; };
  var rgba = function(rr,gg,bb,a){ return 'rgba('+rr+','+gg+','+bb+','+a+')'; };
  // Darker shade of the accent for readable text/fills
  var dk = rgb(mix(c.r,0,0.30), mix(c.g,0,0.30), mix(c.b,0,0.30));
  if (severity === 'strong') {
    return {
      bg:     rgba(c.r,c.g,c.b,0.16),
      border: rgba(c.r,c.g,c.b,0.42),
      text:   dk,
      fill:   c.hex,
      onFill: '#ffffff'
    };
  }
  // soft (default)
  return {
    bg:     rgba(c.r,c.g,c.b,0.08),
    border: rgba(c.r,c.g,c.b,0.20),
    text:   dk,
    fill:   rgba(c.r,c.g,c.b,0.14),
    onFill: dk
  };
}
// Accent gradient for the plan header card (replaces hardcoded maroon).
function accentGradient() {
  var c = _accentRGB();
  var mix = function(v, t, a){ return Math.round(v + (t - v) * a); };
  var dark   = 'rgb('+mix(c.r,0,0.45)+','+mix(c.g,0,0.45)+','+mix(c.b,0,0.45)+')';
  var bright = c.hex;
  return 'linear-gradient(135deg,'+dark+' 0%,'+bright+' 100%)';
}
// -- Luminous Glass hero helpers --
// Wide "aurora" halo built from the live company accent (+ the app blue) so it
// re-tints with the brand exactly like accentGradient(). Sits BEHIND the hero
// card; blurred + low opacity so it reads as ambient light, never as a fill.
function accentHalo() {
  var c = _accentRGB();
  var a = function(al){ return 'rgba('+c.r+','+c.g+','+c.b+','+al+')'; };
  // app blue = #1A4A7A
  var b = function(al){ return 'rgba(26,74,122,'+al+')'; };
  return 'radial-gradient(52% 100% at 14% 24%,'+a(0.55)+',transparent 70%),' +
         'radial-gradient(48% 90% at 90% 28%,'+b(0.42)+',transparent 72%),' +
         'radial-gradient(46% 82% at 62% 104%,'+a(0.30)+',transparent 76%)';
}
// Faint top-edge sheen + tinted glass address panel bg, both from the accent.
function accentSheen() {
  var c = _accentRGB();
  return 'linear-gradient(180deg,rgba('+c.r+','+c.g+','+c.b+',0.07),transparent)';
}
function accentGlassPanel() {
  var c = _accentRGB();
  return 'linear-gradient(135deg,rgba('+c.r+','+c.g+','+c.b+',0.08),var(--bg))';
}
function accentText() {
  var c = _accentRGB();
  var mix = function(v, t, a){ return Math.round(v + (t - v) * a); };
  return 'rgb('+mix(c.r,0,0.30)+','+mix(c.g,0,0.30)+','+mix(c.b,0,0.30)+')';
}

// -- Gated state ------------------------------------------
// A sub is "gated" when the client cannot use the dashboard yet: no access,
// setup still required, or payment/cancellation states. Used to hide the top
// tab bar and the "Back to My Plan" buttons consistently across views.
function _isSubGated(sub) {
  if (!sub) return false;
  return !sub.canAccess || sub.setupRequired === true ||
    sub.locationShutdown === true ||
    sub.accessStatus === 'PAYMENT_REQUIRED' || sub.accessStatus === 'CANCELED';
}
// Small SVG status dot (replaces the * bullet - SVG only, no glyphs).
function _statusDot(color) {
  return '<svg width="8" height="8" viewBox="0 0 8 8" style="margin-right:5px;vertical-align:middle"><circle cx="4" cy="4" r="4" fill="'+color+'"/></svg>';
}

const CACHE_TTL = 5 * 60 * 1000; // 5 minutes

function getCachedAuth(uuid) {
  try {
    const raw = sessionStorage.getItem('auth_' + uuid);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { sessionStorage.removeItem('auth_' + uuid); return null; }
    return data;
  } catch(e) { return null; }
}

function setCachedAuth(uuid, data) {
  try { sessionStorage.setItem('auth_' + uuid, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
}

function clearCachedAuth(uuid) {
  try { sessionStorage.removeItem('auth_' + uuid); } catch(e) {}
}

let _bootRunning = false;
let _pageUnloading = false;
window.addEventListener('beforeunload', () => { _pageUnloading = true; });

// Logout that reliably returns the client to THEIR company's login page.
// Resolves the company from STATE, or fetches it fresh if not yet set, so the
// company param is never dropped regardless of boot timing.
async function _clientLogout() {
  // NOTE: deliberately do NOT call _obExitFullscreen() here. Logout navigates
  // away to the login page, so restoring the dashboard chrome would only flash
  // it on screen for a moment before the redirect. Leave the fullscreen overlay
  // in place; the redirect replaces the page entirely.
  let cid = (window.STATE && STATE.companyId) ? STATE.companyId : '';
  if (!cid) { try { cid = localStorage.getItem('app_company_id') || ''; } catch(e) {} }
  if (!cid) {
    try {
      const token = localStorage.getItem('sb_access_token');
      const authId = localStorage.getItem('sb_auth_id');
      if (token && authId) {
        const r = await fetch(SUPABASE_URL + '/rest/v1/clients?auth_id=eq.' + encodeURIComponent(authId) + '&select=company_id&limit=1', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Accept': 'application/json' }
        });
        const d = await r.json().catch(() => []);
        if (Array.isArray(d) && d.length && d[0].company_id) cid = d[0].company_id;
      }
    } catch(e) {}
  }
  const dest = 'login-client.html' + (cid ? '?company=' + encodeURIComponent(cid) : '');
  _signOut(dest);
}

// Best-effort company id for building a login-client URL after timeout/expiry,
// when STATE may be empty. Order: live STATE -> persisted localStorage -> URL param.
function _resolveCompanyForLogin() {
  if (window.STATE && STATE.companyId) return STATE.companyId;
  try { const c = localStorage.getItem('app_company_id'); if (c) return c; } catch(e) {}
  try { const u = new URLSearchParams(window.location.search).get('company'); if (u) return u; } catch(e) {}
  return '';
}
function _loginClientUrl() {
  const c = _resolveCompanyForLogin();
  return 'login-client.html' + (c ? '?company=' + encodeURIComponent(c) : '');
}

async function boot() {
  if (_bootRunning) return;
  _bootRunning = true;

  // Load branding + stripe key together
  try {
    const br = await getBranding();
    if (br.companyId && br.accentColor) { applyTheme(br.accentColor); localStorage.setItem('app_theme_color', br.accentColor); const _ls = document.getElementById('loading-screen'); if (_ls) _ls.classList.add('theme-ready'); }
    if (br.stripePublishableKey) STATE.stripeKey = br.stripePublishableKey;
    const headerLogo = document.getElementById('header-logo-img');
    const headerLogoText = document.getElementById('header-logo-text');
    const loadingLogo = document.getElementById('loading-logo-img');
    const loadingSkeleton = document.getElementById('loading-brand-skeleton');
    const _revealLoadName = () => {
      if (loadingSkeleton) loadingSkeleton.style.display = 'none';
      const lt = document.getElementById('loading-logo-text');
      if (lt) lt.style.display = 'block';
    };
    // Only paint branding on this first pass when getBranding resolved a REAL
    // company (via ?company= or a stored app_company_id) - i.e. the returning-
    // user fast path. With no company, br carries generic platform defaults
    // (default logo/name); painting them here causes a default-logo flash that
    // the identity-scoped getBranding() below immediately overwrites. So when
    // companyId is null we hold the shimmer skeleton and paint nothing - the
    // post-identity call does the one and only branding paint.
    if (br.companyId) {
      STATE.companyName = br.companyName || 'Your Company';
      document.title = STATE.companyName + ' - My Mailbox';
      const _headerText = document.getElementById('header-logo-text'); if (_headerText) _headerText.textContent = STATE.companyName;
      const _loadText = document.getElementById('loading-logo-text'); if (_loadText) _loadText.textContent = STATE.companyName;
      if (br.logoEnabled && br.logoUrl) {
        if (headerLogo) { headerLogo.src = br.logoUrl; headerLogo.style.display = 'block'; }
        if (headerLogoText) headerLogoText.style.display = 'none';
        if (loadingLogo) {
          // Cross-fade from the shimmer skeleton only once the image truly loads;
          // fall back to the company name if it fails - never an empty slot.
          loadingLogo.onload = () => {
            if (loadingSkeleton) loadingSkeleton.style.display = 'none';
            loadingLogo.style.display = 'block';
          };
          loadingLogo.onerror = _revealLoadName;
          loadingLogo.src = br.logoUrl;
        } else {
          _revealLoadName();
        }
      } else {
        if (headerLogo) headerLogo.style.display = 'none';
        if (headerLogoText) headerLogoText.style.display = 'inline';
        if (loadingLogo) loadingLogo.style.display = 'none';
        _revealLoadName();
      }
    }
    // else: no company yet - keep the shimmer skeleton; identity-scoped
    // getBranding() further down performs the real branding paint.
  } catch(e) {
    // Branding failed - show text fallback
    const headerLogoText = document.getElementById('header-logo-text');
    if (headerLogoText) headerLogoText.style.display = 'inline';
  }

  // Resolve identity - Auth session takes priority over URL UUID
  const authSession = await _resolveAuthSession();
  if (authSession) {
    STATE.uuid = authSession.type === 'client' ? authSession.record.id : authSession.authId;
    if (authSession.type === 'client' && authSession.record.company_id) {
      STATE.companyId = authSession.record.company_id;
    }
  } else {
    STATE.uuid = getUUID();
  }

  if (!STATE.uuid || STATE.uuid === '__auth__') {
    hideLoading();
    showBlocked('Session Expired', 'Please log in to access your portal.', 'Sign In', _loginClientUrl());
    return;
  }

  // Now that we know the client, re-resolve branding for THEIR company
  // (the earlier getBranding ran before identity was known) and capture
  // the company id so logout can return them to their branded login page.
  try {
    const _cbr = await getBranding(STATE.uuid, true);
    STATE.companyId = _cbr.companyId || null;
    // Persist so post-timeout redirects can return the user to THEIR branded
    // login page even after the session (and STATE) is gone.
    if (STATE.companyId) { try { localStorage.setItem('app_company_id', STATE.companyId); } catch(e) {} }
    // Hydrate the shared COMPANY_DEFAULT_TZ for company-zone (billing) displays.
    if (STATE.companyId) {
      try {
        const { data: _tzRow } = await sb.from('config').select('value')
          .eq('company_id', STATE.companyId).eq('key', 'default_timezone').maybeSingle();
        if (_tzRow && _tzRow.value) { COMPANY_DEFAULT_TZ = _tzRow.value; }
      } catch(e) {}
    }
    if (_cbr.accentColor) { applyTheme(_cbr.accentColor); localStorage.setItem('app_theme_color', _cbr.accentColor); const _ls2 = document.getElementById('loading-screen'); if (_ls2) _ls2.classList.add('theme-ready'); }
    STATE.companyName = _cbr.companyName || STATE.companyName || 'Your Company';
    if (_cbr.stripePublishableKey) STATE.stripeKey = _cbr.stripePublishableKey;
    document.title = STATE.companyName + ' - My Mailbox';
    const _ht = document.getElementById('header-logo-text'); if (_ht) _ht.textContent = STATE.companyName;
    const _lt = document.getElementById('loading-logo-text'); if (_lt) _lt.textContent = STATE.companyName;
    const _hl = document.getElementById('header-logo-img');
    const _htx = document.getElementById('header-logo-text');
    if (_cbr.logoEnabled && _cbr.logoUrl) {
      if (_hl) { _hl.src = _cbr.logoUrl; _hl.style.display = 'block'; }
      if (_htx) _htx.style.display = 'none';
    } else {
      if (_hl) _hl.style.display = 'none';
      if (_htx) _htx.style.display = 'inline';
    }
  } catch(e) {}

  // If no auth session and no UUID - redirect to login
  if (!authSession && !new URLSearchParams(window.location.search).get('uuid')) {
    window.location.href = _loginClientUrl();
    return;
  }

  // Check session cache first - instant load on refresh
  const cached = getCachedAuth(STATE.uuid);
  // Skip cache if any subscription is CANCELED_WITH_ACCESS - always re-fetch to get latest date
  const cachedHasCanceling = cached && (cached.subscriptions || []).some(s => s.accessStatus === 'CANCELED_WITH_ACCESS');
  // Skip cache if any subscription is PAYMENT_REQUIRED - the block clears the moment
  // payment is restored server-side, so a manual refresh must revalidate from the
  // network rather than replay a stale blocked state from the 5-min cache.
  const cachedHasPaymentIssue = cached && (cached.subscriptions || []).some(s => s.accessStatus === 'PAYMENT_REQUIRED');
  if (cached && cached.status === 'client' && !cachedHasCanceling && !cachedHasPaymentIssue) {
    STATE.access = cached;
    hideLoading();
    renderClient(cached);
    startClientNotifPoll();
    // Silently refresh cache in background
    api('uuid=' + encodeURIComponent(STATE.uuid)).then(fresh => {
      if (!_pageUnloading && fresh && fresh.status === 'client') {
        setCachedAuth(STATE.uuid, fresh);
        // If must-change-password flag just became true, gate immediately
        if (fresh.mustChangePassword && !STATE.access?.mustChangePassword) {
          STATE.access = fresh;
          renderClient(fresh);
          return;
        }
        // If any plan's location-shutdown state changed (shut down OR reopened),
        // re-render so the gate appears/clears without needing a manual refresh.
        const _sdSig = a => (a && a.subscriptions || []).map(s => s.subscriptionId + ':' + (s.locationShutdown === true ? '1' : '0')).sort().join(',');
        if (_sdSig(fresh) !== _sdSig(STATE.access)) {
          STATE.access = fresh;
          renderClient(fresh);
        }
      } else if (!_pageUnloading && fresh && fresh.status === 'blocked') { clearCachedAuth(STATE.uuid); location.reload(); }
    }).catch(() => {});
    return;
  }

  // No cache - brief minimum loading-bar display (prevents flicker on fast loads), then fetch
  await new Promise(r => setTimeout(r, 250));

  try {
    const data = await api('uuid=' + encodeURIComponent(STATE.uuid));
    STATE.access = data;
    hideLoading();

    if (data.status === 'blocked' || data.status === 'error') {
      showBlocked(
        data.status === 'error' ? 'Error' : 'Access Unavailable',
        data.message, null, null
      );
      return;
    }
    if (data.status === 'staff') {
      showBlocked('Wrong Portal', 'Please use the staff portal to access your dashboard.', null, null);
      return;
    }
    if (data.status === 'client') {
      setCachedAuth(STATE.uuid, data);
      renderClient(data);
      startClientNotifPoll();
    }

  } catch (err) {
    hideLoading();
    showBlocked('Connection Error', 'Could not connect to the server. Please try again.', null, null);
  }
}

function hideLoading() {
  const ls = qs('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => { ls.style.display = 'none'; }, 400);
  qs('app').classList.add('visible');
}

  window._fcpClearErr = function(id) {

  window._fcpOnInput = function(pw) {
    var bar = document.getElementById('fcp-bar');
    var lbl = document.getElementById('fcp-strength');
    if (!bar) return;
    var red = 'var(--red)', amber = '#D97706', green = 'var(--green)';
    if (!pw) {
      bar.style.width = '0'; bar.style.background = red;
      if (lbl) { lbl.style.color = red; lbl.textContent = ''; }
    } else if (pw.length < 8) {
      bar.style.width = '33%'; bar.style.background = red;
      if (lbl) { lbl.style.color = red; lbl.textContent = 'Too short \u2014 min 8 characters'; }
    } else {
      var strong = pw.length >= 12 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
      var medium = pw.length >= 8 && ((/[A-Z]/.test(pw) && /[0-9]/.test(pw)) || pw.length >= 10);
      if (strong) {
        bar.style.width = '100%'; bar.style.background = green;
        if (lbl) { lbl.style.color = green; lbl.textContent = 'Strong'; }
      } else if (medium) {

      } else {

      }
    }
  };

    var acc  = window._fcpAccess;

      return;

      return;

    if (nw !== conf) {

      toast('Passwords do not match.', 'error');
      return;

      renderClient(acc);

      toast(err.message || 'Something went wrong.', 'error');
      if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = 'Set Password & Continue'; }
    }
  };
}


// -- Client Render -----------------------------------------
async function renderClient(access) {
  // "Add a Plan" checkout return (Plans & Pricing page). Show a one-time toast
  // and strip the param so a refresh doesn't repeat it. The new plan's row is
  // created server-side by the webhook; it appears once subs refresh.
  try {
    const _ppp = new URLSearchParams(window.location.search).get('pp');
    if (_ppp === 'success' || _ppp === 'cancel') {
      const _u = new URL(window.location.href);
      _u.searchParams.delete('pp');
      window.history.replaceState({}, '', _u.toString());
      setTimeout(() => {
        if (_ppp === 'success') toast('Payment received - your new plan is being set up.', 'success');
        else toast('Checkout cancelled - nothing was charged.');
      }, 400);
    }
  } catch(e) {}

  // Leaving any full-account blocked screen -> restore the portal chrome.
  document.body.classList.remove('blocked-mode');
  const _hn = access.name || access.email || 'Client';
  const _initials = _hn.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  _setUserChip(_initials, _hn);

  // Pre-emptively hide portal chrome BEFORE any async gating, so first-time
  // clients (no live plan yet) never see a flash of the dashboard header/tabs
  // before the fullscreen setup takeover engages.
  const _subsAtLoad = (access.subscriptions || []).filter(s => s.subscriptionId);
  const _noLivePlan = _subsAtLoad.length > 0 && !_subsAtLoad.some(s => !s.setupRequired);
  if (!access.mustChangePassword && _noLivePlan) { try { _obEnterFullscreen(); } catch(e) {} }

  // -- Must-change-password gate (staff reset) --
  if (access.mustChangePassword) {
    renderForcePasswordChange(access);
    return;
  }

  // -- ID Verification Gate --
  try {
    const vRes = await apiPost({ action: 'getIdVerification', uuid: STATE.uuid });
    if (vRes.status === 'ok') {
      STATE.idVerification = vRes.verification;
      const vs = vRes.verification.verificationStatus;
      // Add badge to header
      _setUserChip(_initials, _hn);
      if (vs === 'not_submitted' || vs === 'rejected') {
        renderIdVerificationUpload(access, vRes.verification);
        return;
      }
      // pending or approved - continue (pending can set up, approved is fully clear)
    }
  } catch(e) { /* ID verification check failed - continue */ }

  // Start payment poll if any subscription is PAYMENT_REQUIRED
  const hasPaymentIssue = (access.subscriptions || []).some(s => s.accessStatus === 'PAYMENT_REQUIRED');
  if (hasPaymentIssue) startPaymentPoll();
  else stopPaymentPoll();

  _renderClientInner(access);
}

function _renderClientInner(access) {

  const subs = (access.subscriptions || []).filter(s => s.subscriptionId);
  if (!subs.length) {
    showBlocked('No Subscription', 'No subscription found for your account.', null, null);
    return;
  }

  // Pick best sub: prefer fully set-up ACTIVE, then any ACTIVE, then CANCELED_WITH_ACCESS, then first.
  // Within each tier, prefer a plan whose location is NOT shut down so the client
  // lands on a usable plan when they have a mix of open + shut-down locations.
  const best = subs.find(s => s.accessStatus === 'ACTIVE' && !s.setupRequired && !s.locationShutdown)
    || subs.find(s => s.accessStatus === 'CANCELED_WITH_ACCESS' && !s.setupRequired && !s.locationShutdown)
    || subs.find(s => s.accessStatus === 'ACTIVE' && !s.locationShutdown)
    || subs.find(s => s.accessStatus === 'CANCELED_WITH_ACCESS' && !s.locationShutdown)
    || subs.find(s => s.accessStatus === 'ACTIVE' && !s.setupRequired)
    || subs.find(s => s.accessStatus === 'CANCELED_WITH_ACCESS' && !s.setupRequired)
    || subs.find(s => s.accessStatus === 'ACTIVE')
    || subs.find(s => s.accessStatus === 'CANCELED_WITH_ACCESS')
    || subs[0];

  STATE.allSubs  = subs;
  STATE.activeSub = best;

  renderSubscriptionSwitcher(access);

  // If best sub is fully live, go straight to dashboard - never hijack into another plan's setup
  if (!best.setupRequired) {
    loadAndRenderSub(best, access);
    return;
  }

  // All accessible subs still need setup - figure out where to send them
  const pendingSetup   = subs.filter(s => s.canAccess && s.setupRequired);
  const needsSelection = pendingSetup.filter(s => s.setupStep === 'plan_setup');

  if (needsSelection.length > 1) {
    renderPlanSelection(access);
  } else {
    // One plan to set up or resume mid-flow
    const priority   = ['add_recipients', 'plan_setup'];
    const resumeSub  = pendingSetup.slice().sort((a, b) =>
      priority.indexOf(a.setupStep) - priority.indexOf(b.setupStep)
    )[0] || best;
    loadAndRenderSub(resumeSub, access);
  }
}

function handleIdFile(file, side) {
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('File too large - max 5MB', 'error'); return; }
  if (!file.type.startsWith('image/')) { toast('Please upload an image file', 'error'); return; }

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxDim = 2000;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.85);
      _idImages[side] = compressed;

      // Update zone to show preview
      const zone = document.getElementById('id-' + side + '-zone');
      if (zone) {
        zone.classList.add('has-file');
        zone.innerHTML = _idFilledHtml(side, compressed);
      }
      updateUploadStatus();
      vValidate();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearIdImage(side) {

    el.innerHTML = '';
  }
}

function renderSubscriptionSwitcher(access) {
  const area = qs('sub-switcher-area');
  const subs = STATE.allSubs || [];

  // Only show switcher if more than 1 subscription
  if (subs.length <= 1) { area.innerHTML = ''; return; }

  area.innerHTML = `
    <div class="sub-switcher-wrap">
      <div class="sub-switcher">
        ${subs.map(s => {
          const isActive  = s.subscriptionId === (STATE.activeSub || {}).subscriptionId;
          const isBlocked = !s.canAccess;
          const needsSetup = s.canAccess && s.setupRequired;
          const label = getPlanFriendlyName(s);
          const pc = STATE.allPlanCards && STATE.allPlanCards[s.subscriptionId];
          let badge = '';
          if (s.locationShutdown === true) {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:#FFEBEE;color:#C62828;letter-spacing:0.03em">Shut Down</span>';
          } else if (needsSetup) {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--blue-bg);color:var(--blue);letter-spacing:0.03em;text-transform:uppercase">Setup</span>';
          } else if (s.accessStatus === 'CANCELED') {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:#FFEBEE;color:#C62828;letter-spacing:0.03em">Cancelled</span>';
          } else if (s.accessStatus === 'CANCELED_WITH_ACCESS') {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:#FFF3E0;color:#E65100;letter-spacing:0.03em">Ending Soon</span>';
          } else if (s.accessStatus === 'PAYMENT_REQUIRED') {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:#FFEBEE;color:#C62828;letter-spacing:0.03em">Payment Due</span>';
          } else if (pc && pc.hasPendingCancellation) {
            badge = '<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:#FFF3E0;color:#E65100;letter-spacing:0.03em">Pending Cancel</span>';
          }
          return `<div class="sub-pill ${isActive ? 'active' : ''} ${isBlocked && !isActive ? 'blocked' : ''}"
            onclick="switchSubscription('${s.subscriptionId}')">${label}${badge}</div>`;
        }).join('')}

    </div>`;
}

async function switchSubscription(subscriptionId) {
  const sub = (STATE.allSubs || []).find(s => s.subscriptionId === subscriptionId);
  if (!sub) return;
  STATE.activeSub = sub;
  // Reset mail filters to defaults
  _cmStatus = 'active';
  _cmType = 'all';
  // Reset to the Mail tab. The dashboard shell rebuilds with Mail hardcoded as the active
  // tab + visible pane; _activeTab persists across a sub switch, so without this the tab
  // highlight/thumb/refresh button would stay on the old tab (e.g. My Plan) while the
  // content shows Mail - leaving the highlight and the visible page out of sync.
  _activeTab = 'mail';
  _activeTab_prev = 'mail';
  // Clear per-sub data but preserve allPlanCards so friendlyNames stay visible in switcher
  STATE.mailLog      = [];
  STATE.planCard     = null;
  STATE.recipients   = [];
  STATE.agents       = [];
  // Keep allPlanCards intact - it holds friendlyNames for the switcher labels
  _plansTabActiveSub = subscriptionId; // reset plan tab to new sub
  renderSubscriptionSwitcher(STATE.access);
  // Show shimmer in content area while loading
  const dc = qs('dashboard-content');
  if (dc) dc.innerHTML = `<div style="padding:20px"><div class="shimmer-line"></div><div class="shimmer-line med"></div><div class="shimmer-line short"></div><div style="margin-top:20px"><div class="shimmer-line"></div><div class="shimmer-line med"></div></div></div>`;
  loadAndRenderSub(sub, STATE.access);
}

async function loadAndRenderSub(sub, access) {
  // Location shutdown gate: this plan's location has been shut down by an admin.
  // The client keeps their login and other plans, but this plan is fully gated
  // with a clear notice. Reversible - clears instantly when the admin reopens.
  if (sub && sub.locationShutdown === true) {
    const ba = qs('banner-area'); if (ba) ba.innerHTML = '';
    _applyTabVisibility(sub.accessStatus, true);
    renderLocationShutdownSub(sub);
    return;
  }
  // Don't show banner during onboarding - it's redundant noise
  // Don't show top banner for blocked/payment/canceled states - the blocked
  // screen already shows the full message (avoids the duplicate suspended banner).
  if (sub.canAccess && !sub.setupRequired && sub.accessStatus !== 'PAYMENT_REQUIRED' && sub.accessStatus !== 'CANCELED') renderBanner(sub);
  else { const b = qs('banner-area'); if (b) b.innerHTML = ''; }

  if (!sub.canAccess) {
    // Blocked - hide the top tab bar; only the blocked screen shows.
    _applyTabVisibility(sub.accessStatus, true);
    renderBlockedSub(sub);
    return;
  }
  if (sub.setupRequired) {
    // Setup not finished - hide the top tab bar so Mail/My Plan can't be
    // reached mid-onboarding (this was the bug: the bar showed on billing/docs).
    _applyTabVisibility(sub.accessStatus, true);
    await renderSetup(sub, access);
    return;
  }
  await renderDashboard(sub, access);
  _obExitFullscreen();
  // Apply tab visibility based on this sub's access status
  _applyTabVisibility(sub.accessStatus);
  loadBroadcasts();
  // Show verification status banner
  renderVerificationBanner();

}

// -- Banner ------------------------------------------------
function renderBanner(sub) {
  const area = qs('banner-area');
  if (!sub.banner) { area.innerHTML = ''; return; }
  const b = sub.banner;

  // Severity -> intensity of the SAME accent hue. Soft for setup/info/ending,
  // strong for payment/suspended/canceled. No second color.
  const severity = {
    setup_required:       'soft',
    canceled_with_access: 'soft',
    pending_payment:      'soft',
    payment_required:     'strong',
    suspended:            'strong',
    canceled:             'strong'
  }[b.type] || 'soft';
  const t = accentTones(severity);

  // SVG icons only (no emoji). 18px line icons, colored by accent text tone.
  const ICONS = {
    setup_required:       '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    canceled_with_access: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',

    suspended:            '<rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
    canceled:             '<circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/>'
  };
  const iconPath = ICONS[b.type] || '<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>';
  const iconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="' + t.text + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + iconPath + '</svg>';

  // Accent-tinted action button (fill intensity follows severity).
  const btnStyle = 'border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;white-space:nowrap;flex-shrink:0;background:' + t.fill + ';color:' + t.onFill + ';transition:opacity .15s' + (severity==='soft' ? ';border:1px solid ' + t.border : '');
  const btnHtml = b.actionLabel
    ? b.setupStep === 'billing'
      ? `<button style="${btnStyle}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'" onclick="goToBillingFromBlocked()">${b.actionLabel}</button>`
      : b.setupStep === 'plans'
      ? `<button style="${btnStyle}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'" onclick="goToPlansFromBlocked()">${b.actionLabel}</button>`
      : b.actionUrl
      ? `<button style="${btnStyle}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'" onclick="b.actionUrl==='__BILLING_PORTAL__'?goToBillingFromBlocked():window.open('${b.actionUrl}','_blank')">${b.actionLabel}</button>`
      : `<button style="${btnStyle}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'" onclick="handleBannerAction('${b.setupStep}')">${b.actionLabel}</button>`
    : '';

  // For setup banners on multi-plan dashboards, show which plan needs setup
  const pendingSetupSubs = (STATE.allSubs || []).filter(s =>
    s.canAccess && s.setupRequired && s.subscriptionId !== (STATE.activeSub || {}).subscriptionId
  );
  const ot = accentTones('soft');
  const outlineStyle = 'margin-left:6px;background:transparent;border:1px solid ' + ot.border + ';color:' + ot.text + ';cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;white-space:nowrap;flex-shrink:0';
  const pendingBanners = pendingSetupSubs.length > 0 && b.type !== 'setup_required' && b.type !== 'payment_required' && b.type !== 'canceled' && b.type !== 'canceled_with_access' && b.type !== 'suspended'
    ? pendingSetupSubs.map(s => {
        const label = getPlanFriendlyName(s);
        return `<button style="${outlineStyle}" onclick="switchSubscription('${s.subscriptionId}')">${label} - Finish Setup -></button>`;
      }).join('')
    : '';

  area.innerHTML =
    '<div style="display:flex;align-items:center;gap:11px;padding:13px 16px;border-radius:12px;margin-bottom:16px;background:' + t.bg + ';border:1px solid ' + t.border + '">' +
      '<span style="flex-shrink:0;display:flex;align-items:center">' + iconSvg + '</span>' +
      '<div style="flex:1;min-width:0;font-size:13px;line-height:1.45;color:' + t.text + '">' +
        '<strong style="font-weight:600;display:block;margin-bottom:1px">' + (b.title || '') + '</strong>' +
        (b.message || '') +
      '</div>' +
      btnHtml + pendingBanners +
    '</div>';
}

function handleBannerAction(step) {
  if (step === 'billing') {
    switchTab('billing');
    return;
  }
  if (step === 'plans') {
    goToPlansFromBlocked();
    return;

// -- Blocked Sub Screen ------------------------------------
function _applyTabVisibility(accessStatus, forceGated) {
  // Show or hide Mail/My Plan tabs based on subscription state.
  // Gated (hide tab bar) when: PAYMENT_REQUIRED, CANCELED, or forceGated=true
  // (blocked / setup-not-finished). All other states - show tabs normally.
  const tabMail    = qs('tab-mail');
  const tabPlans   = qs('tab-plans');
  const tabsBar    = qs('tabs-bar');
  const tabsInner  = document.querySelector('.tabs');
  const isGated    = forceGated === true || accessStatus === 'PAYMENT_REQUIRED' || accessStatus === 'CANCELED';
  if (tabMail)   tabMail.style.display   = isGated ? 'none' : '';
  if (tabPlans)  tabPlans.style.display  = isGated ? 'none' : '';
  if (tabsBar)   tabsBar.style.display   = isGated ? 'none' : '';
  if (tabsInner) tabsInner.style.pointerEvents = isGated ? 'none' : '';
}

          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${_pt.text}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>

// ==========================================================================

const _PP = { plans: [], locations: [], loc: null, plan: null, hasLocStep: false, promoValid: false };

// Icons (self-contained, mirroring signup's set).

const _PP_SHIP = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v5"/><path d="M3 7.5l7.6 5.1a2 2 0 0 0 2.2 0L18 9.5"/><path d="M3 12v5a2 2 0 0 0 2 2h7"/><path d="M16 19h6"/><path d="M19 16l3 3-3 3"/></svg>';
const _PP_XMARK = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

const _PP_BACKARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>';

// -- Helpers (mirroring signup) --
function _ppEsc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function _ppLocIds(p) { return String(p.locations || '').split(',').map(s => s.trim()).filter(Boolean); }
function _ppPriceNum(p) { const n = parseFloat(String(p.price_display || '').replace(/[^0-9.]/g, '')); return isFinite(n) ? n : Infinity; }
function _ppPer(p) { return p.billing_cycle === 'yearly' ? 'yr' : 'mo'; }
function _ppPerWord(p) { return p.billing_cycle === 'yearly' ? 'per year' : 'per month'; }
function _ppMoney(n) { const v = Number(n); if (!isFinite(v) || v <= 0) return null; return '$' + (v % 1 === 0 ? v.toFixed(0) : v.toFixed(2)); }
function _ppRecip(p) { return p.max_recipients ? (p.max_recipients + ' recipient' + (p.max_recipients > 1 ? 's' : '')) : ''; }
function _ppRecipShort(p) { return p.max_recipients ? (p.max_recipients + ' recip.') : ''; }
// City eyebrow + street headline + province/postal sub - NEVER the location name.
function _ppFullAddr(l) { return [l.address, l.city, l.province, l.postal_code].filter(Boolean).join(', ') || (l.city || ''); }
function _ppShortAddr(l) { return [l.address, l.city].filter(Boolean).join(', ') || (l.city || ''); }

function _ppVisible() {
  let list = _PP.plans.filter(p => p.archived !== true);
  if (_PP.loc) {
    list = list.filter(p => { const ids = _ppLocIds(p); return ids.length === 0 || ids.includes(_PP.loc.location_id); });
  } else if (_PP.locations.length > 0) {
    list = [];
  }
  list = list.slice().sort((a, b) => {
    const fa = a.is_featured ? 0 : 1, fb = b.is_featured ? 0 : 1;
    if (fa !== fb) return fa - fb;
    return _ppPriceNum(a) - _ppPriceNum(b);
  });
  return list;
}

// -- Stage shell (card + top band with company brand + segmented progress) --
function _ppAccent() {
  try { return window._themeRed || localStorage.getItem('app_theme_color') || '#2b2f36'; } catch (e) { return '#2b2f36'; }
}
function _ppBrandHtml() {
  const nm = STATE.companyName || 'Plans';
  // Reuse the header logo already loaded during boot, if it's visible.
  let logoUrl = '';
  try {
    const hl = document.getElementById('header-logo-img');
    if (hl && hl.src && hl.style.display !== 'none') logoUrl = hl.src;
  } catch (e) {}
  if (logoUrl) return '<img src="' + _ppEsc(logoUrl) + '" alt="' + _ppEsc(nm) + '">';
  const initial = (String(nm).trim()[0] || 'A').toUpperCase();
  return '<span class="pp-dot">' + _ppEsc(initial) + '</span><span class="pp-nm">' + _ppEsc(nm) + '</span>';
}
function _ppSegs(step) {
  // step: 1..3 (or 1..2 when there's no location step)
  const total = _PP.hasLocStep ? 3 : 2;
  let out = '';
  for (let i = 1; i <= total; i++) out += '<span class="' + (i <= step ? 'on' : '') + '"></span>';
  return out;
}
function _ppShell(step, headHtml, bodyHtml) {
  const area = qs('content-area');
  if (!area) return;
  // step === 0 hides the segmented progress bar entirely (matches signup's
  // setSteps(0) for terminal screens like the no-plans state).
  const segsHtml = step > 0 ? '<div class="pp-segs">' + _ppSegs(step) + '</div>' : '';
  area.innerHTML =
    '<div id="pp-scroll" style="--pp-accent:' + _ppAccent() + '"><div id="pp-stage" style="--pp-accent:' + _ppAccent() + '">' +
      '<button class="pp-exit" onclick="_ppExit()" aria-label="Back to my plan"><span class="pp-exit-circ">' + _PP_BACKARROW + '</span><span class="pp-exit-lbl">Back to my plan</span></button>' +
      '<div class="pp-card">' +
        '<div class="pp-topband">' +
          '<div class="pp-lock-row"><div class="pp-lock">' + _ppBrandHtml() + '</div></div>' +
          segsHtml +
        '</div>' +
        headHtml +
        '<div class="pp-bodywrap">' + bodyHtml + '</div>' +
      '</div>' +

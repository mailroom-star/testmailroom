        </div>
      </div>
      <div class="cl-pcstats">
        ${(pc.mailInStorage||0)>0?`<span class="cl-pcstat${(pc.mailOverdue||0)>0?' danger':' neutral'}">${pc.mailInStorage} in storage</span>`:''}
        ${(pc.mailOverdue||0)>0?`<span class="cl-pcstat danger">${pc.mailOverdue} overdue</span>`:''}
        ${(pc.mailFwdQueue||0)>0?`<span class="cl-pcstat warn">${pc.mailFwdQueue} fwd</span>`:''}
      </div>
      <div class="cl-chev${isOpen?' open':''}" id="${chevId}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;

    // Card body
    h += `<div class="cl-pcb${isOpen?' open':''}" id="${bodyId}">`;

    // Plan-level lock only
    h += '<div class="cl-lkrow">';
    const _powerOffSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>';
    if(planByAdmin){ h+=`<button class="btn btn-sm" disabled style="display:inline-flex;align-items:center;gap:5px;background:#B8B8B8;border:1px solid #B8B8B8;color:#fff;cursor:not-allowed;opacity:.6">${_powerOffSvg} Locked by Admin</button>`; }
    else if(planLocked){ h+=`<button class="btn btn-primary btn-sm" style="display:inline-flex;align-items:center;gap:5px;background:#1A6B3C;border-color:#1A6B3C" onclick="togglePlanLock('${pc.planCardId}',true)">${_powerOffSvg} Unlock Plan</button>`; }
    else{ h+=`<button class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:5px" onclick="togglePlanLock('${pc.planCardId}',false)">${_powerOffSvg} Suspend Plan</button>`; }
    if(STATE.access&&STATE.access.canTerminate&&pc.accessStatus!=='CANCELED'){ h+=`<button class="btn btn-sm" style="background:transparent;color:#C62828;border:1.5px solid #C62828;transition:all .15s" onmouseover="this.style.background='#C62828';this.style.color='#fff';this.style.boxShadow='0 2px 8px rgba(198,40,40,.3)'" onmouseout="this.style.background='transparent';this.style.color='#C62828';this.style.boxShadow=''" onclick="openStaffTerminationModal('${pc.clientId}','${pc.planCardId}','${(cl.clientName||'').replace(/'/g,"\\'")}')">Terminate</button>`; }
    h+='</div>';
    if(planLocked){
      const _pRaw = pc.overrideReason || '';
      const _pComment = _pRaw.replace(/\s*\u2014?\s*(?:Suspended\s+)?by\s+(?:staff|admin)\s*\([^)]+\)/i,'').replace(/^Suspended\s*/i,'').trim();
      const _pByMatch = _pRaw.match(/by\s+(?:staff|admin)\s*\(([^)]+)\)/i);
      const _pByLabel = pc.overrideBy===STATE.uuid ? 'by you' : (_pByMatch ? 'by '+(_pByMatch[0].match(/\(([^)]+)\)/)?.[1]||'staff') : 'by staff');
      const _pDisplay = 'Suspended ' + _pByLabel + (_pComment ? ' \u2014 ' + _pComment : '');
      h+=`<div class="cl-lkrsn"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-right:4px;vertical-align:middle"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>${_pDisplay}</div>`;
    }

    // Business / Source rows only (Name/Email/Phone live in the profile header up top).
    // No "Client Info" heading; section omitted entirely if neither field is present.
    const infoRows=[];
    if(pc.businessDescription) infoRows.push({k:'Business',v:pc.businessDescription});
    if(pc.activatedAt){
      const _sd = fmtDate(pc.activatedAt, COMPANY_DEFAULT_TZ);
      const _sdur = _planDur(pc.activatedAt);
      if(_sd) infoRows.push({k:'Started', v:_sd + (_sdur?' \u00B7 '+_sdur:'')});
    }
    if(infoRows.length){
      h += '<div class="cl-igrid" style="margin-top:12px">';
      infoRows.forEach(function(row,ri){
        const isLast = ri===infoRows.length-1;
        const edge = isLast?'border-bottom:none':'';
        h += `<div class="cl-igrow" style="${edge}">`
           + `<span class="cl-igl" style="${edge}">${row.k}</span>`
           + `<span class="cl-igv" style="${edge}"><span class="cl-igvt">${row.v}</span></span>`
           + '</div>';
      });
      h += '</div>';
    }


    // Plan memo
    if(pc.planMemo){ h+=`<div class="cl-memo"><div class="cl-memolbl">Plan Memo</div><div style="font-size:11.5px;color:#3A2800;line-height:1.55;font-weight:400;margin-top:0">${pc.planMemo}</div></div>`; }

    // Billing & Usage
    h += '<div class="cl-seclbl">Billing &amp; Usage</div>';
    const dl=pc.currentPeriodEnd?Math.max(0,Math.round((new Date(pc.currentPeriodEnd+'T00:00:00')-new Date(new Date().toLocaleDateString('en-CA',{timeZone:COMPANY_DEFAULT_TZ||'America/Toronto'})+'T00:00:00'))/86400000)):null;
    h += `<div class="cl-bilrow">
      <div class="cl-bilcel"><div class="cl-bill">Period</div><div class="cl-bilv">${fmtP(pc.currentPeriodStart,pc.currentPeriodEnd)}</div></div>
      <div class="cl-bilcel"><div class="cl-bill">Remaining</div><div class="cl-bilv">${dl!==null?dl+' day'+(dl===1?'':'s'):'\u2014'}</div></div>
    </div>`;
    h += '<div class="cl-usage">';
    const _uRows=[['Mail',pc.mailsUsed||0,pc.mailLimit||0],pc.parcelLimit>0?['Parcels',pc.parcelsUsed||0,pc.parcelLimit||0]:null].filter(Boolean);_uRows.forEach(function(u,ui){
      const pct=u[2]>0?Math.min(100,Math.round(u[1]/u[2]*100)):0, ov=u[2]>0&&u[1]>u[2];
      const last=ui===_uRows.length-1?' last':'';
      h+=`<div class="cl-urow"><span class="cl-ulbl">${u[0]}</span><span class="cl-unum${ov?' ov':''}">${u[1]} / ${u[2]}</span></div>
          <div class="cl-ubar${last}"><div class="cl-ufill${ov?' ov':''}" style="width:${pct}%"></div></div>`;
    });
    h += '</div>';
    // Create Charge — opens the one-time charge modal (staff need canCreateCharge)
    const _canCharge = STATE.access?.canCreateCharge;
    const _ccEscA = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const _ccData = _canCharge
      ? ' data-client-id="'+_ccEscA(pc.clientId)+'" data-plan-card-id="'+_ccEscA(pc.planCardId)+'"'
        + ' data-location-id="'+_ccEscA(pc.locationId||'')+'" data-client-name="'+_ccEscA(cl.clientName||pc.clientName||'')+'"'
        + ' data-plan-name="'+_ccEscA(pc.planName||'')+'" data-tax-name="'+_ccEscA(pc.taxName||'Tax')+'"'
        + ' data-tax-rate="'+_ccEscA(pc.taxRate!=null?pc.taxRate:0)+'"'
      : '';
    h += '<button'
      + _ccData
      + (_canCharge
          ? ' onmouseover="_ccHover(this)" onmouseout="_ccOut(this)" onclick="_ccClick(this)"'
          : ' title="Permission required" onclick="_ccClickLocked()"')
      + ' style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;font-size:11px;font-weight:600;cursor:'
      + (_canCharge ? 'pointer' : 'not-allowed')
      + ';font-family:inherit;margin-top:9px;margin-bottom:12px;transition:all .15s;opacity:'
      + (_canCharge ? '1' : '.55')
      + ';background-color:' + (_canCharge ? 'var(--danger-dim)' : 'var(--bg)')
      + ';color:' + (_canCharge ? 'var(--required)' : 'var(--ink-4)')
      + ';border:1px solid ' + (_canCharge ? 'var(--danger-border)' : 'var(--border)')
      + '"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Create Charge</button>';

    // Forwarding
    if(pc.forwardingAddress){
      const _esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const _fwdParts = [pc.forwardingAddress, pc.forwardingCity, pc.forwardingProvince, pc.forwardingPostalCode].filter(Boolean);
      const _fwdShow = _esc(_fwdParts.join(', '));
      const _fwdCopy = _esc([..._fwdParts, pc.forwardingCountry].filter(Boolean).join(', '));
      h += `<div class="cl-fwd" data-addr="${_fwdCopy}" onclick="_cpyFwd(this,this.dataset.addr)">`
         + `<div style="flex:1;min-width:0">`
         + `<div class="cl-fwdl">Forwarding Address</div>`
         + `<div class="cl-fwdv">${_fwdShow}</div>`
         + `</div>`
         + `<div class="cl-fwdico"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"/><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"/></svg></div>`
         + `</div>`;
    }

    // Recipients
    h += `<div class="cl-rech">
      <div class="cl-seclbl" style="margin:0">Recipients (${actR.length})</div>
      <button class="btn btn-secondary btn-sm" onclick="openAddTempRecipient('${pc.planCardId}',${i})">+ Add Temporary</button>
    </div>`;

    // Add temp form
    h += `<div class="cl-atf" id="add-temp-${i}">
      <div style="font-size:12px;font-weight:600;color:var(--amber);margin-bottom:12px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Temporary Recipient (staff only)</div>
      <div id="tmp-grid-${i}" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label id="tmp-fname-label-${i}" style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px">First Name *</label><input type="text" id="tmp-fname-${i}" placeholder="Jane" oninput="tmpCheckName(${i})" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px"></div>
        <div id="tmp-lname-wrap-${i}"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px">Last Name *</label><input type="text" id="tmp-lname-${i}" placeholder="Smith" oninput="tmpCheckName(${i})" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px"></div>
        <div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px">Type</label><select id="tmp-type-${i}" onchange="tmpTypeChange(${i})" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px"><option value="individual">Individual</option><option value="company">Company</option></select></div>
      </div>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:10px">
        <div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px">Language</label><select id="tmp-lang-${i}" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px"><option value="en">English</option><option value="fr">Fran\u00E7ais</option></select></div>
        <div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px">Notes</label><input type="text" id="tmp-notes-${i}" placeholder="e.g. Guest, courier, etc." style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px"></div>
      </div>
      <div id="tmp-hint-${i}" style="display:none;font-size:11px;color:var(--required);margin-bottom:8px">Please enter both first and last name.</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="submitAddTempRecipient('${pc.planCardId}',${i})">Add</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('add-temp-${i}').style.display='none';tmpReset(${i})">Cancel</button>
      </div>
    </div>`;

    // Recipient rows
    function clRec(r, isTmp) {
      const nm=[r.givenName||r.given_name,r.familyName||r.family_name].filter(Boolean).join(' ')||r.companyName||r.company_name||r.name||'Unknown';
      const ty=(r.recipientType||r.recipient_type||r.type||'individual');
      const on=r.status==='active';
      const used=(pc.usedRecipients||[]).includes(r.recipientId||r.id);
      const enc=encodeURIComponent(nm).replace(/'/g,'%27');
      const btn=on?`deactivateRecipient('${r.recipientId||r.id}','${enc}')`:`reactivateRecipient('${r.recipientId||r.id}','${enc}')`;
      return `<div class="cl-recr" data-rid="${r.recipientId||r.id||''}">
        <div class="cl-recav${isTmp?' tmp':''} ${on?'':'off'}">${isTmp?'T':(nm[0]||'?').toUpperCase()}</div>
        <div class="cl-recinfo">
          <div class="cl-recnm${on?'':' off'}">${nm}${(r.recipientId||r.id)?`<span class="cl-icp" title="Copy recipient ID" data-val="${r.recipientId||r.id}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`:''}${isTmp?'<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:5px;font-weight:600">TEMP</span>':''}${used?'<span style="font-size:10px;color:var(--ink-4)">\u00B7 Been used</span>':''}${r.language==='fr'?'<span class="lp-fr">FR</span>':''}</div>
          <div class="cl-recst">${(() => {
            const rawNote = r.notes||r.description||'';
            const note = rawNote.startsWith('TEMP:') ? rawNote.slice(5).trim() : rawNote;
            const typeLabel = ty.charAt(0).toUpperCase()+ty.slice(1);
            return note ? typeLabel + '  \u00B7 ' + note : typeLabel;
          })()}</div>
        </div>
        <span class="cl-rst ${on?'on':'off'}">${on?'active':'inactive'}</span>
        <button class="btn btn-secondary btn-xs" style="color:${on?'#C62828':'var(--green)'};flex-shrink:0" onclick="${btn}">${on?'Deactivate':'Re-activate'}</button>
      </div>`;
    }
    regR.concat(inactR).forEach(r=>{ h+=clRec(r,false); });
    if(tmpR.length){
      h+='<div class="cl-tdiv"><div class="cl-tdivl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Temporary</div>';
      tmpR.forEach(r=>{ h+=clRec(r,true); });
      h+='</div>';
    }

    h += '</div></div>'; // end cl-pcb + cl-pc
  });

  h += '</div>'; // end cl-dpb

  // Footer — only show View Mail when client has mail history
  const hasMail = pcs.some(pc => pc.lastMailDate);
  h += '<div class="cl-dpf">';
  if (hasMail) {
    const clientLabel = (cl.clientName||cl.clientEmail||'').replace(/'/g,"\\'");
    h += `<button class="cl-fpb pr" onclick="_goToClientMail('${cl.clientId}')">View Pending Mail</button>`;
  }
  h += '</div>';

  pane.innerHTML = h;
  const body = pane.querySelector('.cl-dpb');
  if (body) body.scrollTop = 0;
}

function _clStat(val, label, color) {
  return '<div style="flex:1;background:var(--bg-2);border-radius:9px;padding:9px 8px;text-align:center">'
       + '<div style="font-size:18px;font-weight:700;color:'+color+';line-height:1">'+val+'</div>'
       + '<div style="font-size:9px;color:var(--ink-4);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px">'+label+'</div>'
       + '</div>';
}

function _clStat2(val, label, mod) {
  return '<div class="cl-stat">'
       + '<div class="cl-statv'+(mod?' '+mod:'')+'">'+val+'</div>'
       + '<div class="cl-statl">'+label+'</div>'
       + '</div>';
}

function closeClientPane() {
  window._currentOpenClientId = null;
  window._currentOpenPaneClientId = null;
  const pane = document.getElementById('cl-detail-pane');
  if (pane) pane.classList.remove('open');
  document.querySelectorAll('.clr').forEach(r => r.classList.remove('cl-sel'));
}

function _cpyFwd(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const lbl = el.querySelector('.cl-fwdl');
    const ico = el.querySelector('.cl-fwdico');
    const origLbl = lbl ? lbl.textContent : '';
    if (lbl) { lbl.textContent = 'Copied \u2713'; lbl.style.color = 'var(--green)'; }
    if (ico) { ico.style.opacity = '1'; ico.style.color = 'var(--green)'; }
    setTimeout(() => {
      if (lbl) { lbl.textContent = origLbl; lbl.style.color = ''; }
      if (ico) { ico.style.opacity = ''; ico.style.color = ''; }
    }, 1500);
  }).catch(() => {});
}

function _cpyIcon(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const svg = el.querySelector('svg');
    if (svg) svg.style.stroke = 'var(--green)';
    el.style.opacity = '1';
    setTimeout(() => {
      if (svg) svg.style.stroke = '';
      el.style.opacity = '';
    }, 1500);
  }).catch(() => {});
}

function _goToClientMail(clientId) {
  setView('maillog');
  // After navigation, set search to clientId and filter to active/pending
  setTimeout(function() {
    var srch = document.getElementById('ml-search');
    if (srch) { srch.value = clientId; }
    setMailView('active');
    filterStaffMailLog(clientId);
  }, 80);
}

function _clPcToggle(bodyId, chevId) {
  const b = document.getElementById(bodyId);
  const c = document.getElementById(chevId);
  const w = document.getElementById('clpch-wrap-' + bodyId);
  if (!b||!c) return;
  const open = b.classList.contains('open');
  // Collapse all other open plan cards in this pane
  if (!open) {
    const pane = document.getElementById('cl-detail-pane');
    if (pane) {
      pane.querySelectorAll('.cl-pcb.open').forEach(ob => {
        if (ob.id !== bodyId) {
          ob.classList.remove('open');
          const oc = document.getElementById(ob.id.replace('clpcb','clpch'));
          const ow = document.getElementById('clpch-wrap-' + ob.id);
          if (oc) oc.classList.remove('open');
          if (ow) ow.classList.remove('open');
        }
      });
    }
  }
  b.classList.toggle('open', !open);
  c.classList.toggle('open', !open);
  if(w) w.classList.toggle('open', !open);
}


function openAddTempRecipient(planCardId, i) {
  const wrap = qs('add-temp-' + i);
  if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

async function submitAddTempRecipient(planCardId, i) {
  const fnameEl = document.getElementById('tmp-fname-' + i);
  const lnameEl = document.getElementById('tmp-lname-' + i);
  const typeEl  = document.getElementById('tmp-type-'  + i);
  const langEl  = document.getElementById('tmp-lang-'  + i);
  const notesEl = document.getElementById('tmp-notes-' + i);
  const hintEl  = document.getElementById('tmp-hint-'  + i);
  const type    = typeEl ? typeEl.value : 'individual';
  const fname   = fnameEl ? fnameEl.value.trim() : '';
  const lname   = lnameEl ? lnameEl.value.trim() : '';
  const name    = type === 'company' ? fname : [fname, lname].filter(Boolean).join(' ');

  if (!fname) { toast('First name is required.', 'error'); if (fnameEl) fnameEl.focus(); return; }
  if (type === 'individual' && !lname) {
    if (hintEl) hintEl.style.display = 'block';
    toast('Please enter both first and last name.', 'error');
    if (lnameEl) lnameEl.focus();
    return;
  }
  if (hintEl) hintEl.style.display = 'none';

  try {
    const result = await apiPost({
      action:     'addTempRecipient',
      uuid:       STATE.uuid,
      planCardId,
      name,
      type,
      language:   langEl ? langEl.value : 'en',
      notes:      notesEl ? notesEl.value.trim() : ''
    });
    if (result.status === 'ok') {
      toast('Temporary recipient added', 'success');
      // ── Smooth in-place: append new row without reloading ────────────────
      const newRid   = result.recipientId;
      const newNm    = name;
      const newType  = type;
      const newNotes = notesEl ? notesEl.value.trim() : '';
      const enc      = encodeURIComponent(newNm).replace(/'/g,'%27');
      const bodyId   = 'clpcb' + planCardId.replace(/[^a-z0-9]/gi,'');
      const body     = document.getElementById(bodyId);
      if (body) {
        // Find or create the temp section
        let tdiv = body.querySelector('.cl-tdiv');
        if (!tdiv) {
          tdiv = document.createElement('div');
          tdiv.className = 'cl-tdiv';
          tdiv.innerHTML = '<div class="cl-tdivl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Temporary</div>';
          body.appendChild(tdiv);
        }
        const noteDisp = newNotes ? '  \u00B7 ' + newNotes : '';
        tdiv.insertAdjacentHTML('beforeend',
          '<div class="cl-recr" data-rid="' + newRid + '">' +
          '<div class="cl-recav tmp">T</div>' +
          '<div class="cl-recinfo">' +
            '<div class="cl-recnm">' + newNm +
              '&nbsp;<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:5px;font-weight:600">TEMP</span>' +
            '</div>' +
            '<div class="cl-recst">' + newType.charAt(0).toUpperCase() + newType.slice(1) + noteDisp + '</div>' +
          '</div>' +
          '<span class="cl-rst on">active</span>' +
          '<button class="btn btn-secondary btn-xs" style="color:#C62828;flex-shrink:0" ' +
            'onclick="deactivateRecipient(\'' + newRid + '\',\'' + enc + '\')">Deactivate</button>' +
          '</div>'
        );
        // Update _allPlanCards data so subsequent renders are accurate
        if (_allPlanCards[i]) {
          _allPlanCards[i].recipients = (_allPlanCards[i].recipients || []).concat([{
            recipientId: newRid, id: newRid, name: newNm,
            recipientType: newType, status: 'active',
            notes: 'TEMP: ' + newNotes, isTempRecipient: true
          }]);
        }
        qs('add-temp-' + i).style.display = 'none';
        tmpReset(i);
      } else {
        // Fallback — DOM not ready
        qs('add-temp-' + i).style.display = 'none';
        tmpReset(i);
        await loadClientsView();
      }
    } else throw new Error(result.message || 'Failed');
  } catch(err) { toast(err.message, 'error'); }
}

function tmpTypeChange(i) {
  const typeEl  = document.getElementById('tmp-type-'  + i);
  const lWrap   = document.getElementById('tmp-lname-wrap-' + i);
  const lEl     = document.getElementById('tmp-lname-' + i);
  const fLabel  = document.getElementById('tmp-fname-label-' + i);
  const grid    = document.getElementById('tmp-grid-' + i);
  const isComp  = typeEl && typeEl.value === 'company';
  if (lWrap) lWrap.style.display = isComp ? 'none' : '';
  if (grid) grid.style.gridTemplateColumns = isComp ? '1fr 1fr' : '1fr 1fr 1fr';
  // Update first name label and placeholder
  if (fLabel) fLabel.textContent = isComp ? 'Company Name / DBA *' : 'First Name *';
  const fEl = document.getElementById('tmp-fname-' + i);
  if (fEl) fEl.placeholder = isComp ? 'e.g. Acme Corp' : 'Jane';
  // Clear last name if switching to company
  if (isComp && lEl) lEl.value = '';
}

function tmpCheckName(i) {
  const typeEl  = document.getElementById('tmp-type-' + i);
  const fnEl    = document.getElementById('tmp-fname-' + i);
  const lnEl    = document.getElementById('tmp-lname-' + i);
  const hintEl  = document.getElementById('tmp-hint-'  + i);
  if (!hintEl) return;
  const isInd = !typeEl || typeEl.value === 'individual';
  const fn = fnEl ? fnEl.value.trim() : '';
  const ln = lnEl ? lnEl.value.trim() : '';
  hintEl.style.display = (isInd && fn.length > 0 && !ln) ? 'block' : 'none';
}

function tmpReset(i) {
  ['tmp-fname-','tmp-lname-','tmp-notes-'].forEach(p => {
    const el = document.getElementById(p + i);
    if (el) el.value = '';
  });
  const typeEl = document.getElementById('tmp-type-' + i);
  if (typeEl) typeEl.value = 'individual';
  const langEl = document.getElementById('tmp-lang-' + i);
  if (langEl) langEl.value = 'en';
  const hintEl = document.getElementById('tmp-hint-' + i);
  if (hintEl) hintEl.style.display = 'none';
  const lWrap = document.getElementById('tmp-lname-wrap-' + i);
  if (lWrap) lWrap.style.display = '';
  const fLabel = document.getElementById('tmp-fname-label-' + i);
  if (fLabel) fLabel.textContent = 'First Name *';
  const fEl = document.getElementById('tmp-fname-' + i);
  if (fEl) fEl.placeholder = 'Jane';
}


let _openPcCardId = null; // track which plan card is expanded

function togglePcCard(i) {
  const body=qs('pc-body-'+i), chevron=qs('pc-chevron-'+i), header=qs('pc-hdr-'+i);
  if (!body) return;
  const open = body.style.display==='none';
  body.style.display=open?'block':'none';
  if (chevron) chevron.textContent=open?'\u25BE':'\u25B8';
  if (header)  header.classList.toggle('open',open);
  // Track which card is open by planCardId
  const pcId = body.dataset.pcid || null;
  _openPcCardId = open ? pcId : null;
}

function openEditRecipient(recipientId, name, companyName) {
  const editDiv = qs('rec-edit-'+recipientId);
  if (!editDiv) return;
  const isOpen = editDiv.style.display!=='none';
  editDiv.style.display = isOpen?'none':'block';
  if (!isOpen) {
    const nameEl=qs('re-name-'+recipientId), akaEl=qs('re-aka-'+recipientId);
    if (nameEl) nameEl.value=decodeURIComponent(name||'');
    if (akaEl)  akaEl.value=decodeURIComponent(companyName||'');
  }
}

async function saveRecipientEdit(recipientId) {
  const nameEl=qs('re-name-'+recipientId), akaEl=qs('re-aka-'+recipientId), typeEl=qs('re-type-'+recipientId);
  if (!nameEl||!nameEl.value.trim()) { toast('Name is required','error'); return; }
  try {
    const result = await apiPost({ action:'updateRecipient', uuid:STATE.uuid, recipientId, name:nameEl.value.trim(), companyName:akaEl?akaEl.value.trim():'', type:typeEl?typeEl.value:'individual' });
    if (result.status==='ok') {
      toast('Recipient updated','success');
      const d=qs('rec-display-'+recipientId);
      if (d) d.innerHTML=`<div style="font-size:13px;font-weight:500">${nameEl.value.trim()}</div><div style="font-size:11px;color:var(--ink-4)">${akaEl?akaEl.value.trim():''} \u00B7 ${typeEl?typeEl.value:'individual'}</div>`;
      qs('rec-edit-'+recipientId).style.display='none';
    } else throw new Error(result.message||'Failed');
  } catch(err) { toast(err.message,'error'); }
}

async function deactivateRecipient(recipientId, name) {
  const ok = await appConfirm({ title: 'Deactivate Recipient', message: `Deactivate <strong>${decodeURIComponent(name)}</strong>? They will be marked inactive and cannot be selected when logging mail.`, confirmLabel: 'Deactivate', confirmClass: 'btn-danger' });
  if (!ok) return;
  await _setRecipientStatus(recipientId, 'inactive');
}

async function reactivateRecipient(recipientId, name) {
  const ok = await appConfirm({ title: 'Re-activate Recipient', message: `Re-activate <strong>${decodeURIComponent(name)}</strong>?`, confirmLabel: 'Re-activate' });
  if (!ok) return;
  await _setRecipientStatus(recipientId, 'active');
}

async function _setRecipientStatus(recipientId, status) {
  try {
    const result = await apiPost({ action:'updateRecipientStatus', uuid:STATE.uuid, recipientId, status });
    if (result.status==='ok') {
      toast(status === 'active' ? 'Recipient re-activated' : 'Recipient deactivated', 'success');
      // In-place DOM update — preserves open pane and expanded card
      const row = document.querySelector('[data-rid="' + recipientId + '"]');
      if (row) {
        const isNowActive = status === 'active';
        const badge = row.querySelector('.cl-rst');
        if (badge) { badge.textContent = isNowActive ? 'active' : 'inactive'; badge.className = 'cl-rst ' + (isNowActive ? 'on' : 'off'); }
        const av  = row.querySelector('.cl-recav');  if (av)  av.style.opacity = isNowActive ? '1' : '0.45';
        const nm  = row.querySelector('.cl-recnm');  if (nm)  nm.classList.toggle('off', !isNowActive);
        const btn = row.querySelector('.btn-xs');
        if (btn) {
          const curOnclick = btn.getAttribute('onclick') || '';
          const nameMatch  = curOnclick.match(/,'([^']+)'\)/);
          const encodedName = nameMatch ? nameMatch[1] : '';
          const fn = isNowActive ? 'deactivateRecipient' : 'reactivateRecipient';
          btn.textContent = isNowActive ? 'Deactivate' : 'Re-activate';
          btn.style.color = isNowActive ? '#C62828' : 'var(--green)';
          btn.setAttribute('onclick', fn + "('" + recipientId + "','" + encodedName + "')");
        }
      } else {
        await loadClientsView(); // fallback
      }
    } else throw new Error(result.message||'Failed');
  } catch(err) { toast(err.message,'error'); }
}

// \u2500\u2500 Plan / Account Lock \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function togglePlanLock(planCardId, isCurrentlyLocked) {
  let reason = '';
  if (!isCurrentlyLocked) {
    reason = await appPrompt({ title: '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Suspend Plan</span>', message: 'The client will lose access to this plan. Mail logging will continue normally.', placeholder: 'Reason (optional)', confirmLabel: 'Suspend Plan', confirmClass: 'btn-danger' });
    if (reason === null) return;
  } else {
    const ok = await appConfirm({ title: '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Unlock Plan</span>', message: 'The client will regain access to this plan immediately.', confirmLabel: 'Unlock Plan' });
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action: 'togglePlanLock', uuid: STATE.uuid, planCardId, reason });
    if (result.status === 'ok') {
      const nowLocked = result.locked;
      toast(nowLocked ? 'Plan suspended' : 'Plan unlocked', 'success');
      // ── In-place DOM update — keep pane open and card expanded ────────
      const _san  = planCardId.replace(/[^a-z0-9]/gi,'');
      const _bodyEl   = document.getElementById('clpcb' + _san);
      const _hdrEl    = document.getElementById('clpch-wrap-clpcb' + _san);
      const _pcEl     = _hdrEl ? _hdrEl.closest('.cl-pc') : null;
      if (_pcEl && _bodyEl && _hdrEl) {
        // 1. Update plan card wrapper border colour
        const _pcData = (_allPlanCards||[]).find(p => p.planCardId===planCardId);
        const _baseStatus = _pcData ? (_pcData.accessStatus||'ACTIVE') : 'ACTIVE';
        if (nowLocked) {
          _pcEl.classList.remove('pay','can'); _pcEl.classList.add('sus');
        } else {
          _pcEl.classList.remove('sus');
          if (_baseStatus==='PAYMENT_REQUIRED'||_baseStatus==='CANCELED_WITH_ACCESS') _pcEl.classList.add('pay');
          else if (_baseStatus==='CANCELED') _pcEl.classList.add('can');
        }
        // 2. Update dot colour
        const _dot = _hdrEl.querySelector('.cl-pcdot');
        if (_dot) _dot.style.background = nowLocked ? '#C62828'
          : (_baseStatus==='PAYMENT_REQUIRED'||_baseStatus==='CANCELED_WITH_ACCESS') ? 'var(--amber)'
          : (_baseStatus==='CANCELED') ? 'var(--ink-4)'
          : 'var(--green)';
        // 3. Update status pill text + class
        const _pill = _hdrEl.querySelector('.cl-pcpill .pill');
        if (_pill) {
          const _smap = {ACTIVE:{cls:'active-plan',lbl:'Active'},CANCELED_WITH_ACCESS:{cls:'warning',lbl:'Cancelling'},PAYMENT_REQUIRED:{cls:'payment_req',lbl:'Payment Required'},CANCELED:{cls:'expired',lbl:'Cancelled'}};
          const _si = nowLocked ? {cls:'payment_req',lbl:'Plan Suspended'} : (_smap[_baseStatus]||_smap['ACTIVE']);
          _pill.className = 'pill ' + _si.cls; _pill.textContent = _si.lbl; _pill.style.fontSize='9px';
        }
        // 4. Update lock/unlock button
        const _lkrow = _bodyEl.querySelector('.cl-lkrow');
        if (_lkrow) {
          const _lb = _lkrow.querySelector('.btn:first-child');
          if (_lb && !_lb.disabled) {
            if (nowLocked) {
              _lb.className = 'btn btn-primary btn-sm';
              _lb.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:#1A6B3C;border-color:#1A6B3C';
              _lb.setAttribute('onclick',`togglePlanLock('${planCardId}',true)`);
              _lb.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg> Unlock Plan';
            } else {
              _lb.className = 'btn btn-secondary btn-sm';
              _lb.style.cssText = 'display:inline-flex;align-items:center;gap:5px';
              _lb.setAttribute('onclick',`togglePlanLock('${planCardId}',false)`);
              _lb.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg> Suspend Plan';
            }
          }
        }
        // 5. Update lock reason row
        let _lkrsn = _bodyEl.querySelector('.cl-lkrsn');
        if (nowLocked) {
          const _dispReason = 'Suspended by you' + (reason ? ' \u2014 ' + reason : '');
          const _svgPow = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-right:4px;vertical-align:middle"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>';
          if (_lkrsn) { _lkrsn.innerHTML = _svgPow + _dispReason; }
          else { _lkrsn = document.createElement('div'); _lkrsn.className='cl-lkrsn'; _lkrsn.innerHTML=_svgPow+_dispReason; if(_lkrow) _lkrow.after(_lkrsn); }
        } else {
          if (_lkrsn) _lkrsn.remove();
        }
        // 6. Sync _allPlanCards data
        const _pcIdx = (_allPlanCards||[]).findIndex(p=>p.planCardId===planCardId);
        if (_pcIdx>=0) {
          _allPlanCards[_pcIdx].accessOverride = nowLocked ? 'suspended' : null;
          _allPlanCards[_pcIdx].overrideReason = nowLocked ? (reason||null) : null;
        }
        // 7. Update client list row left border colour
        const _clientId = _pcData ? _pcData.clientId : null;
        if (_clientId) {
          const _clRow = document.getElementById('clrow-'+_clientId);
          if (_clRow && nowLocked) _clRow.style.borderLeftColor='#C62828';
          else if (_clRow && !nowLocked) _clRow.style.borderLeftColor='';
        }
      } else {
        // Fallback: full reload if DOM elements not found
        await loadClientsView();
      }
    } else throw new Error(result.message || 'Failed');
  } catch(err) { toast(err.message, 'error'); }
}

async function toggleAccountLock(clientId, clientName, isCurrentlyLocked) {
  let reason = '';
  if (!isCurrentlyLocked) {
    reason = await appPrompt({ title: '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock Account</span>', message: `This will block <strong>ALL plans</strong> for <strong>${clientName || clientId}</strong>. The client cannot access their portal. Mail logging will continue normally.`, placeholder: 'Reason (optional)', confirmLabel: 'Lock Account', confirmClass: 'btn-danger' });
    if (reason === null) return;
  } else {
    const ok = await appConfirm({ title: '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Unlock Account</span>', message: `Unlock the entire account for <strong>${clientName || clientId}</strong>? All plans will be accessible again.`, confirmLabel: 'Unlock Account' });
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action: 'toggleAccountLock', uuid: STATE.uuid, clientId, reason });
    if (result.status === 'ok') {
      toast(result.locked ? 'Account locked' : 'Account unlocked', 'success');
      // Optimistically update the local cache so the open pane reflects the new
      // state immediately, regardless of any read-after-write delay on reload.
      (_allPlanCards || []).forEach(function(pc){
        if (pc.clientId === clientId) {
          pc.clientAccessOverride = result.locked ? 'suspended' : null;
          pc.clientOverrideBy     = result.locked ? STATE.uuid : null;
          pc.clientOverrideReason = result.locked ? (reason || 'Suspended by you') : null;
        }
      });
      if (window._currentOpenClientId === clientId) openClientPane(clientId);
      // Then refresh from server to pick up authoritative values (reason label, etc.).
      await loadClientsView();
    } else throw new Error(result.message || 'Failed');
  } catch(err) { toast(err.message, 'error'); }
}

// \u2500\u2500 Edit Mail Item \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _editTarget = null;

async function openEditMailModal(mailIdEnc) {
  const mailId = decodeURIComponent(mailIdEnc);
  // Find item in cache
  const item = (_allStaffMail || []).find(m => m.mailId === mailId);
  if (!item) { toast('Item not found in current view \u2014 refresh first', 'error'); return; }
  _editTarget = item;

  // Remove any existing modal
  const existing = document.getElementById('edit-mail-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'edit-mail-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
  modal.innerHTML = `

function onEditTypeChange() {
  if (!_editTarget) return;
  const typeEl = document.getElementById('em-type');
  if (!typeEl) return;
  const isParcel = typeEl.value === 'parcel';
  const scanInput = document.getElementById('em-scan');

  // Scan is letter/mail-only \u2014 hide the scan field for parcels (mirrors the log flow)
  if (scanInput) scanInput.closest('div').style.display = isParcel ? 'none' : '';

  // Confidential toggle: shown for mail, hidden for parcels. Reset to a clean OFF state
  // on every type change so switching parcel\u2192mail (or back) never leaves a stuck knob.
  const confWrap = document.getElementById('em-conf-wrap');
  const confTog  = document.getElementById('em-confidential');
  if (confTog) confTog.classList.remove('on');
  if (confWrap) {
    confWrap.style.display = isParcel ? 'none' : 'flex';
    // Re-enable the special-case toggle (confidential being forced off un-disables it)
    const specWrap = document.getElementById('em-spec-wrap');
    if (specWrap) { specWrap.style.opacity = ''; specWrap.style.pointerEvents = ''; }
  }
}

function onEditConfidentialToggle() {
  const confTog = document.getElementById('em-confidential');
  if (!confTog) return;
  confTog.classList.toggle('on');
  const isOn = confTog.classList.contains('on');

  // Clear scan URL when confidential is turned on
  const scanInput = document.getElementById('em-scan');
  if (isOn) {
    if (scanInput) { scanInput.value = ''; scanInput.closest('div').style.display = 'none'; }
    // Turn off special case
    const specTog = document.getElementById('em-special-case');
    if (specTog && specTog.classList.contains('on')) {
      specTog.classList.remove('on');
      const nameWrap = document.getElementById('em-spec-name-wrap');
      if (nameWrap) nameWrap.style.display = 'none';
      const recSection = document.getElementById('em-rec-section');
      if (recSection) recSection.style.display = '';
    }
    // Disable special case toggle
    const specWrap = document.getElementById('em-spec-wrap');
    if (specWrap) { specWrap.style.opacity = '0.4'; specWrap.style.pointerEvents = 'none'; }
  } else {
    // Show scan URL field again
    if (scanInput) scanInput.closest('div').style.display = '';
    // Re-enable special case toggle
    const specWrap = document.getElementById('em-spec-wrap');
    if (specWrap) { specWrap.style.opacity = ''; specWrap.style.pointerEvents = ''; }
  }
}

function onEditSpecialCaseToggle() {
  const tog = document.getElementById('em-special-case');
  if (!tog) return;
  tog.classList.toggle('on');
  const isOn = tog.classList.contains('on');

  // Show/hide name field and recipient section
  const nameWrap = document.getElementById('em-spec-name-wrap');
  if (nameWrap) nameWrap.style.display = isOn ? 'block' : 'none';
  const recSection = document.getElementById('em-rec-section');
  if (recSection) recSection.style.display = isOn ? 'none' : '';

  if (isOn) {
    _editRecipient = null;
    // Turn off confidential
    const confTog = document.getElementById('em-confidential');
    if (confTog && confTog.classList.contains('on')) {
      confTog.classList.remove('on');
      const scanInput = document.getElementById('em-scan');
      if (scanInput) scanInput.closest('div').style.display = '';
    }
    // Disable confidential toggle
    const confWrap = document.getElementById('em-conf-wrap');
    if (confWrap) { confWrap.style.opacity = '0.4'; confWrap.style.pointerEvents = 'none'; }
  } else {
    // Re-enable confidential toggle
    const confWrap = document.getElementById('em-conf-wrap');
    if (confWrap) { confWrap.style.opacity = ''; confWrap.style.pointerEvents = ''; }
  }
}

let _editRecipient = null;

function searchEditRecipient(query) {
  if (!query || query.length < 2) { qs('em-rec-results').style.display='none'; return; }
  const q = query.toLowerCase();
  const hits = (_recipientCache || []).filter(r =>
    [r.name, r.companyName, r.planCardId, r.planName].join(' ').toLowerCase().includes(q)
  ).slice(0, 6);
  const el = qs('em-rec-results');
  if (!hits.length) { el.style.display='block'; el.innerHTML='<div class="recipient-result-item" style="color:var(--ink-4)">No matches</div>'; return; }
  el.style.display = 'block';
  el.innerHTML = hits.map(r => {
    const payload = JSON.stringify(r).replace(/"/g,'&quot;');
    return `<div class="recipient-result-item" onclick="selectEditRecipient(${payload})">
      <div class="rri-name">${r.name}</div>
      <div class="rri-sub" style="font-size:10px">${r.planName||r.planCardId}</div>
    </div>`;
  }).join('');
}

function selectEditRecipient(data) {
  _editRecipient = data;
  const el = qs('em-rec-search');
  if (el) el.value = data.name;
  const cur = qs('em-rec-current');
  if (cur) cur.innerHTML = `Current: <strong>${(_editTarget||{}).recipientName||'(none)'}</strong> \u2192 <strong style="color:var(--green)">${data.name}</strong>`;
  const res = qs('em-rec-results');
  if (res) res.style.display = 'none';
}

async function saveEditMail() {
  if (!_editTarget) return;
  const emConf = qs('em-confidential');
  const emSpec = qs('em-special-case');
  const isConf = emConf && emConf.classList.contains('on');
  const isSpec = emSpec && emSpec.classList.contains('on');
  const newType = qs('em-type')?.value || _editTarget.type;

  // Safety net: block changing to parcel if plan doesn't support it
  if (newType === 'parcel' && !isSpec && _editTarget.planCardId) {
    const recMatch = (_recipientCache || []).find(x => x.planCardId === _editTarget.planCardId);
    if (recMatch && (!recMatch.parcelLimit || parseInt(recMatch.parcelLimit) === 0)) {
      toast('This plan does not include parcel handling \u2014 cannot change type to parcel.', 'error');
      return;
    }
  }

  const updates = {
    action:           'editMailItem',
    uuid:             STATE.uuid,
    mailId:           _editTarget.mailId,
    senderName:       qs('em-sender')?.value?.trim()        || _editTarget.senderName || '',
    type:             newType,
    physicalLocation: qs('em-location')?.value?.trim()      || '',
    pieceCount:       parseInt(qs('em-pieces')?.value) || 1,
    scanImageUrl:     qs('em-scan')?.value?.trim()          || '',
    noteToClient:     qs('em-note-client')?.value?.trim()   || '',
    noteInternal:     qs('em-note-internal')?.value?.trim() || '',
    confidential:     isConf ? 'TRUE' : 'FALSE',
    specialCase:      isSpec ? 'TRUE' : 'FALSE'
  };
  // If confidential, force clear scan URL
  if (isConf) {
    updates.scanImageUrl = '';
    updates.scanExpiresAt = '';
  }
  // Scan is letter/mail-only \u2014 clear any scan URL when the item is a parcel
  if (newType === 'parcel') {
    updates.scanImageUrl = '';
    updates.scanExpiresAt = '';
  }
  // If special case toggled ON, clear recipient
  if (isSpec) {
    updates.recipientId    = '';
    updates.recipientName  = qs('em-spec-name')?.value?.trim() || 'SPECIAL CASE';
    updates.planCardId     = '';
    updates.clientId       = '';
    updates.subscriptionId = '';
  }
  if (_editRecipient) {
    updates.recipientId    = _editRecipient.recipientId;
    updates.recipientName  = _editRecipient.name;
    updates.planCardId     = _editRecipient.planCardId;
    updates.clientId       = _editRecipient.clientId;
    updates.subscriptionId = _editRecipient.subscriptionId;
  }
  try {
    const result = await apiPost(updates);
    if (result.status === 'ok') {
      toast('Mail item updated', 'success');
      document.getElementById('edit-mail-modal')?.remove();
      _editTarget = null; _editRecipient = null;
      await loadStaffMailLog();
    } else throw new Error(result.message || 'Failed');
  } catch(e) { toast(e.message, 'error'); }
}

    var bars = ['rp-sb1','rp-sb2','rp-sb3','rp-sb4'].map(function(id) { return document.getElementById(id); });
    if (!pw) { wrap.style.opacity = '0'; this.style.borderColor = 'var(--border)'; return; }
    wrap.style.opacity = '1';
    var score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var levels = [
      { n:1, c:'#C62828', l:'Weak' },
      { n:2, c:'#E65100', l:'Fair' },
      { n:3, c:'#F9A825', l:'Good' },
      { n:4, c:'#1A6B3C', l:'Strong' }

    var btn = document.getElementById('rp-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Setting\u2026'; }
    try {
      var result = await apiPost({ action: 'resetClientPassword', uuid: STATE.uuid, clientId: clientId, newPassword: finalPw, notifyEmail: _rpNotify });
      if (result.status === 'ok') {
        overlay.remove();
        toast('Password updated successfully', 'success');
      } else {
        throw new Error(result.message || 'Failed to reset password');
      }
    } catch(err) {
      toast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg> Set Password'; }
    }
  });
}

async function submitStaffTermination(clientId, planCardId) {
  const reason  = document.getElementById('staff-term-reason')?.value;
  const notes   = document.getElementById('staff-term-notes')?.value || '';
  const timing  = document.querySelector('input[name="staff-term-timing"]:checked')?.value;
  const isFraud = reason === 'Fraud';
  if (!reason) { toast('Please select a termination reason', 'error'); return; }
  const btn = document.getElementById('staff-term-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
  try {
    const result = await apiPost({ action: 'terminateAccount', uuid: STATE.uuid, clientId, planCardId, reason, notes, immediate: timing === 'immediate' || isFraud, isFraud });
    if (result.status !== 'ok') throw new Error(result.message);
    document.querySelector('.modal-overlay')?.remove();
    toast(isFraud ? 'Account terminated (Fraud)' : 'Account terminated successfully', 'success');
    loadClientsView();
  } catch(e) {
    toast(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm Termination'; }
  }
}

  const notes = document.getElementById('staff-react-notes')?.value || '';
  const btn = document.getElementById('staff-react-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
  try {
    const result = await apiPost({ action: 'reactivateAccount', uuid: STATE.uuid, clientId, notes, forceReactivate: !!forceReactivate });

    // Payment warning \u2014 unpaid invoice detected
    if (result.status === 'payment_warning') {
      if (btn) { btn.disabled = false; btn.textContent = 'Confirm Reactivation'; }
      const modal = document.querySelector('.modal-overlay .modal');
      if (modal) {
        modal.innerHTML = `
          <div style="background:linear-gradient(135deg,#E65100,#F57C00);padding:20px 24px;border-radius:12px 12px 0 0">
            <div style="font-size:16px;font-weight:700;color:#fff"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Unpaid Invoice Detected</div>
          </div>
          <div style="padding:20px 24px">
            <p style="font-size:13px;color:var(--ink-2);margin:0 0 16px;line-height:1.6">${result.message}</p>
            ${result.invoiceUrl ? '<a href="' + result.invoiceUrl + '" target="_blank" class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:16px">View Invoice in Stripe \u2197</a>' : ''}
            <div style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:8px;padding:12px 14px;font-size:12px;color:#E65100;margin-bottom:20px">
              Proceeding will restore access without collecting payment. Only do this if payment has been arranged outside of Stripe.
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
              <button class="btn" style="background:#E65100;border-color:#E65100;color:#fff" onclick="submitStaffReactivation('${clientId}', true)">Proceed Anyway</button>
            </div>
          </div>`;
      }
      return;
    }

    if (result.status !== 'ok') throw new Error(result.message);
    document.querySelector('.modal-overlay')?.remove();
    toast('Account reactivated successfully', 'success');
    loadClientsView();
  } catch(e) {
    toast(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm Reactivation'; }
  }
}

async function confirmDeleteMail(mailIdEnc, recipNameEnc) {
  const mailId    = decodeURIComponent(mailIdEnc);
  const recipName = decodeURIComponent(recipNameEnc);
  const confirmed = await appConfirm({ title: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Delete Mail Item', message: 'Permanently delete item for <strong>' + recipName + '</strong>? This cannot be undone.', confirmLabel: 'Delete', confirmClass: 'btn-danger' });
  if (!confirmed) return;
  try {
    const result = await apiPost({ action: 'deleteMailItem', uuid: STATE.uuid, mailId });

function ntSelectChip(btn, groupId) {
  document.querySelectorAll('#'+groupId+' .nt-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Toggle recurring config
  if (groupId === 'nt-type-btns') {
    const v = btn.dataset.v;
    const rc = document.getElementById('nt-recurring-config');
    if (rc) rc.style.display = v === 'recurring' ? '' : 'none';
  }
}

function _safeDate(str) {
  if (!str) return null;
  // Date-only strings (YYYY-MM-DD) parsed as UTC midnight shift a day back in Toronto
  // Appending T12:00:00 (noon) keeps the correct calendar day in any timezone
  return new Date(str.includes('T') ? str : str + 'T12:00:00');
}

function ntSetDue(btn, days) {
  document.querySelectorAll('#nt-due-btns .nt-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const _tp = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ(), year:'numeric', month:'2-digit', day:'2-digit' }).split('-').map(Number);
  const d = new Date(Date.UTC(_tp[0], _tp[1]-1, _tp[2] + days));
  const dateStr = d.toISOString().split('T')[0];
  qs('nt-due').value = dateStr;
  const label = document.getElementById('nt-due-label');
  if (label) { label.querySelector('span').textContent = d.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'}); label.style.display = 'inline-flex'; }
}

// \u2500\u2500 Plan card search (inline-expanding results + selected chip) \u2500\u2500
let _ntPcCache = null;
async function searchPlanCardForTask(query) {
  const results = qs('nt-pc-results');
  if (!results) return;
  if (!_ntPcCache) {
    try {
      const data = await api('uuid='+encodeURIComponent(STATE.uuid)+'&action=getPlanCardsStaff');
      _ntPcCache = data.planCards || [];
    } catch(e) { _ntPcCache = []; }
  }
  const q = (query||'').toLowerCase().trim();
  if (!q) { results.style.display = 'none'; results.innerHTML = ''; return; }
  const matches = _ntPcCache.filter(c => (c.clientName||'').toLowerCase().includes(q) || (c.planName||'').toLowerCase().includes(q) || (c.planCardId||'').toLowerCase().includes(q)).slice(0, 6);
  if (!matches.length) {
    results.style.display = 'block';
    results.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--ink-4);text-align:center">No matching plan cards</div>';
    return;
  }
  results.style.display = 'block';
  results.innerHTML = matches.map((c, i) => {
    const ini = (c.clientName||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase() || '\u00b7';
    const safeLabel = ((c.clientName||'') + ' \u2014 ' + (c.planName||'')).replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const border = i < matches.length-1 ? 'border-bottom:0.5px solid var(--border);' : '';
    return '<div style="padding:9px 12px;cursor:pointer;'+border+'display:flex;align-items:center;gap:10px;transition:background .1s" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'" onclick="selectPlanCardForTask(\''+c.planCardId+'\',\''+safeLabel+'\')">'
      + '<span style="width:28px;height:28px;border-radius:50%;background:var(--ink-3);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">'+ini+'</span>'

  }).join('');
}

  if (input) { input.value = mailId; if (input.parentElement) input.parentElement.style.display = 'none'; }
  if (results) { results.style.display = 'none'; results.innerHTML = ''; }
  if (chip) {
    const m = (_ntMailCache || []).find(x => x.mailId === mailId) || {};
    const st = _NT_MAIL_STATUS[m.status] || {l:(m.status||''),bg:'#EFEDE9',c:'#72727D'};
    const typeLabel = m.type === 'parcel' ? 'Parcel' : 'Letter';
    const fromStr = m.senderName ? ' \u00b7 from '+m.senderName : '';
    const accent = window._themeRed || 'var(--red)';
    chip.style.display = 'block';
    chip.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--red-dim);border:1px solid var(--red-border);border-radius:10px">'
      + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+accent+'" stroke-width="2" style="flex-shrink:0"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 5L2 7"/></svg>'
      + '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--ink)">'+typeLabel+fromStr+'</div>'
      + '<div style="font-size:11px;color:var(--ink-3)"><span style="font-family:monospace">'+mailId+'</span></div></div>'
      + '<span style="flex-shrink:0;font-size:9px;font-weight:600;padding:2px 8px;border-radius:100px;background:'+st.bg+';color:'+st.c+'">'+st.l+'</span>'
      + '<button onclick="clearMailForTask()" style="background:none;border:none;cursor:pointer;color:'+accent+';font-size:16px;line-height:1;flex-shrink:0;padding:2px" title="Remove">\u2715</button>'
      + '</div>';
  }
}

function clearMailForTask() {
  const input = qs('nt-mail');
  const chip = qs('nt-mail-chip');
  if (chip) { chip.style.display = 'none'; chip.innerHTML = ''; }
  if (input) { if (input.parentElement) input.parentElement.style.display = ''; input.value = ''; setTimeout(()=>input.focus(), 0); }
}

async function saveNewTask() {
  if (window._ntSaving) return; // guard against double-submit
  const title = qs('nt-title')?.value?.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const type = document.querySelector('#nt-type-btns .nt-chip.active')?.dataset?.v || 'manual';
  const priority = document.querySelector('#nt-pri-btns .nt-chip.active')?.dataset?.v || 'medium';
  const body = {
    action: 'createTask', uuid: STATE.uuid,
    title, description: qs('nt-desc')?.value || null,
    type, priority,
    dueDate: qs('nt-due')?.value || null,
    mailId: qs('nt-mail')?.value?.trim() || null,
    planCardId: qs('nt-plancard')?.value?.trim() || null
  };
  window._ntSaving = true;
  const _btn = document.querySelector('.modal-overlay .btn-primary');
  if (_btn) { _btn.disabled = true; _btn.style.opacity = '0.6'; _btn.style.pointerEvents = 'none'; _btn.textContent = 'Creating...'; }
  try {
    const result = await apiPost(body);
    if (result.status === 'ok') {
      document.querySelector('.modal-overlay')?.remove();
      toast('Task created');
      await loadTasks();
      if (STATE.view === 'tasks') { renderTasksPane(); renderDetailPane(); }
      else if (STATE.view === 'dashboard') renderDashboard();
    } else throw new Error(result.message);
  } catch(e) {
    toast(e.message, 'error');
    if (_btn) { _btn.disabled = false; _btn.style.opacity = ''; _btn.style.pointerEvents = ''; _btn.textContent = 'Create Task'; }
  } finally {
    window._ntSaving = false;
  }
}

// \u2500\u2500 Task Comments \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function loadTaskTrail(taskId) {
  const el = document.getElementById('task-trail-' + taskId);
  if (!el) return;
  try {
    const { data } = await sb.from('audit_log').select('action, staff_name, staff_id, summary, created_at')
      .eq('entity_id', taskId).order('created_at', { ascending: true });
    if (!data || !data.length) { el.innerHTML = '<div style="font-size:11px;color:var(--ink-4)">No activity recorded yet.</div>'; return; }
    const fDT = d => d ? fmtDateTime(d) : '\u2014';
    const actionLabel = a => a.replace(/^task_/, '').replace(/_/g, ' ').replace(/^./, c => c.toUpperCase());
    const actionColor = a => a.includes('resolved') ? 'var(--green)' : a.includes('created') ? '#1565C0' : a.includes('snoozed') ? '#3949AB' : a.includes('deleted') ? 'var(--red)' : 'var(--ink-3)';
    el.innerHTML = data.map(r => '<div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:flex-start"><div style="color:var(--ink-4);white-space:nowrap;min-width:100px">'+fDT(r.created_at)+'</div><div style="flex:1"><span style="font-weight:600;color:'+actionColor(r.action)+'">'+actionLabel(r.action)+'</span> <span style="color:var(--ink-4)">by '+(r.staff_name||r.staff_id||'System')+'</span></div></div>').join('');
  } catch(e) { el.innerHTML = '<div style="font-size:11px;color:var(--required)">Error loading trail</div>'; }
}

async function loadTaskComments(taskId) {
  const container = document.getElementById('task-comments-' + taskId);
  if (!container) return;
  try {
    const result = await apiPost({ action: 'getTaskComments', uuid: STATE.uuid, taskId });
    const comments = result.comments || [];
    const fD = d => fmtDateTime(d);
    container.innerHTML = (comments.length ? comments.map(c => `
      <div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:11px;font-weight:600;color:var(--ink-2)">${c.staffName}</span>
          <span style="font-size:10px;color:var(--ink-4)">${fD(c.createdAt)}</span>
        </div>
        <div style="font-size:12px;color:var(--ink-3);line-height:1.4">${c.content}</div>
      </div>`).join('') : '<div style="font-size:11px;color:var(--ink-4);padding:8px 0">No comments yet</div>') +
      `${STATE.selectedTask && STATE.selectedTask.status === 'resolved' ? '<div style="font-size:10px;color:var(--ink-4);padding:6px 0;font-style:italic">Task completed \u2014 comments closed.</div>' : STATE.selectedTask && (STATE.selectedTask.assignedTo === STATE.uuid) ? '<div style="display:flex;gap:6px;margin-top:8px"><input class="form-input" id="tc-input-'+taskId+'" placeholder="Add a comment..." style="flex:1;font-size:12px;padding:6px 10px" onkeydown="if(event.key===\'Enter\')addComment(\''+taskId+'\')"><button class="btn btn-primary btn-sm" style="padding:4px 10px;font-size:11px" onclick="addComment(\''+taskId+'\')">Send</button></div>' : '<div style="font-size:10px;color:var(--ink-4);padding:6px 0;font-style:italic">Claim this task to add comments.</div>'}`;
  } catch(e) { container.innerHTML = '<div style="font-size:11px;color:var(--required)">Failed to load comments</div>'; }
}

async function addComment(taskId) {
  const input = document.getElementById('tc-input-' + taskId);
  const content = input?.value?.trim();
  if (!content) return;
  input.value = '';
  try {
    await apiPost({ action: 'addTaskComment', uuid: STATE.uuid, taskId, content });
    loadTaskComments(taskId);
  } catch(e) { toast(e.message, 'error'); }
}

async function claimTask(taskId) {
  try {
    await apiPost({ action: 'claimTask', uuid: STATE.uuid, taskId });
    toast('Task claimed');
    // Inline: _claimTask sets assigned_to + status='in_progress'. Patch locally
    // and re-render in place so the card stays open and we keep the user's place.
    _tlInlineUpdate(taskId, { assignedTo: STATE.uuid, status: 'in_progress' });
  } catch(e) { toast(e.message, 'error'); }
}

async function unsnoozeTask(taskId) {
  try {
    const result = await apiPost({ action: 'unsnoozeTask', uuid: STATE.uuid, taskId });
    if (result.status !== 'ok') throw new Error(result.message);
    toast('Task woken up');
    // Inline: _unsnoozeTask sets status='open', snoozed_until=null. If the user
    // is on the Snoozed filter the card naturally drops out of the list (no jump);
    // otherwise it stays open in place.
    _tlInlineUpdate(taskId, { status: 'open', snoozedUntil: null });
  } catch(e) { toast(e.message, 'error'); }
}

async function dismissStaffBanner(broadcastId) {
  const banner = document.getElementById('bc-' + broadcastId);
  if (banner) { banner.style.transition = 'all 0.3s'; banner.style.opacity = '0'; banner.style.maxHeight = '0'; banner.style.padding = '0'; banner.style.margin = '0'; setTimeout(() => banner.remove(), 300); }
  // Keep the stored signature consistent with the optimistic removal so the next
  // poll's diff doesn't re-add the just-dismissed banner.
  if (_staffBannerSig) _staffBannerSig = _staffBannerSig.split('~~').filter(s => s.split('|')[0] !== broadcastId).join('~~');
  try { await apiPost({ action: 'dismissBroadcast', uuid: STATE.uuid, broadcastId }); } catch(e) {}
}

// \u2500\u2500 Notifications \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _notifLastCount = -1;
let _notifPollTimer = null;

async function loadNotifCount() {
  try {
    const result = await apiPost({ action: 'getUnreadCount', recipientType: 'staff', recipientId: STATE.uuid });
    const count = result.count || 0;
    const badge = qs('notif-badge');
    const btn = qs('vbtn-notif');
    if (badge) { badge.textContent = count; badge.style.display = count > 0 ? '' : 'none'; }
    // Toggle pulse class on bell button
    if (btn) { if (count > 0) btn.classList.add('notif-active'); else btn.classList.remove('notif-active'); }
    if (_notifLastCount >= 0 && count > _notifLastCount) {
      const diff = count - _notifLastCount;
      toast('<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg> ' + diff + ' new notification' + (diff > 1 ? 's' : ''));
      // Bell shake animation
      if (btn) { btn.style.animation = 'bellShake 0.6s ease'; setTimeout(() => btn.style.animation = '', 700); }
    }
    _notifLastCount = count;
  } catch(e) {}
}

function startNotifPoll() {
  if (_notifPollTimer) clearInterval(_notifPollTimer);
  _notifPollTimer = setInterval(async () => {
    await loadNotifCount();
    loadStaffBroadcasts();
    _checkStillActive();
  }, 15000);
}

// Re-validate the staff session each poll. Ejects the tab if the account was
// deactivated (api() no longer resolves to status 'staff') OR an admin issued a
// force sign out after this tab's session began (force_logout_at > session start).
async function _checkStillActive() {
  try {
    const data = await api('uuid=' + encodeURIComponent(STATE.uuid));
    let started = null;
    try { started = sessionStorage.getItem('staff_session_start'); } catch(e) {}
    // Location shutdown: keep the staff signed in but gated. If the gate is
    // already showing, do nothing (re-rendering every poll caused a flash). Only
    // build it if we're not already in blocked mode.
    if (data && data.status === 'location_shutdown') {
      if (!document.body.classList.contains('staff-blocked-mode')) showLocationShutdown(data.message);
      return;
    }
    if (document.body.classList.contains('staff-blocked-mode') && data && data.status === 'staff') {
      window.location.reload();
      return;
    }
    if (!data || (data.status && data.status !== 'staff')) {
      if (_notifPollTimer) clearInterval(_notifPollTimer);
      showBlocked((data && data.message) || 'Your access has been revoked.');
      return;
    }
    if (data && data.forceLogoutAt) {
      if (started && new Date(data.forceLogoutAt) > new Date(started)) {
        if (_notifPollTimer) clearInterval(_notifPollTimer);
        showBlocked('You have been signed out by an administrator.');
      }
    }
  } catch(e) {}
}

  document.body.appendChild(panel);

  setTimeout(() => {

1.7 2.7 3 6 3s6-1.3 6-3v-5"/><ellipse cx="15" cy="11" rx="6" ry="3"/></svg>',mail_received:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 7l10 7 10-7"/></svg>',mail_picked_up:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>',id_reviewed:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',cancellation_request:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" fill="currentColor" opacity="0.16" stroke="none"/><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></svg>',cancellation_withdrawn:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><polyline points="22 4 12 14.1 9 11.1"/></svg>'}[t]||'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>');
    const fAgo = d => { const ms=Date.now()-new Date(d).getTime(); if(ms<60000)return 'just now'; if(ms<3600000)return Math.floor(ms/60000)+'m ago'; if(ms<86400000)return Math.floor(ms/3600000)+'h ago'; return Math.floor(ms/86400000)+'d ago'; };

async function loadStaffMailLog() {
  const el = qs('ml-list');
  if (el) el.innerHTML = _listLoader();
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getMailLogStaff&limit=500`);
    _allStaffMail = data.mailLog || [];
    if (data._planCache) STATE._planCacheMap = data._planCache;
    // Update forward queue badge \u2014 only count READY to ship items (past months)
    const _fwdNowYM = _zoneYM(Date.now());
    const fwdCurMonth = _fwdNowYM.m0;
    const fwdCurYear = _fwdNowYM.y;
    const fwdReadyCount = _allStaffMail.filter(m => {
      if (m.status !== 'forwarding_queued') return false;
      const ld = _zoneYM(m.loggedAt || Date.now());
      return (ld.y < fwdCurYear) || (ld.y === fwdCurYear && ld.m0 < fwdCurMonth);
    }).length;
    const fwdBadge = qs('fwd-queue-badge');
    if (fwdBadge) { fwdBadge.textContent = fwdReadyCount; fwdBadge.style.display = fwdReadyCount > 0 ? 'inline-block' : 'none'; }
    // Update discard queue badge (overdue items)
    const now = new Date();
    const ACTIVE_FOR_DISCARD = ['ready_for_pickup','confidential_pickup','received','pending_assignment'];
    const discardCount = _allStaffMail.filter(m => {
      if (!ACTIVE_FOR_DISCARD.includes(m.status)) return false;
      if (!m.storageDueDate) return false;
      const _bdgToday = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ() });
      return m.storageDueDate < _bdgToday;
    }).length;
    const discBadge = qs('discard-queue-badge');
    if (discBadge) { discBadge.textContent = discardCount; discBadge.style.display = discardCount > 0 ? 'inline-block' : 'none'; }
    // Apply pending client filter from Clients tab deep link
    if (window._pendingClientMailFilter) {
      const _pAdv = document.getElementById('ml-adv-search');
      const _pEl  = document.getElementById('ml-adv-client');
      if (_pAdv) _pAdv.style.display = 'block';
      if (_pEl)  _pEl.value = window._pendingClientMailFilter;
      window._pendingClientMailFilter = null;
    }
    // Client ID deep-link filter handled via _goToClientMail → ml-search input
    if (_mlPage === 'fwdqueue') { renderForwardingView(); } else if (_mlPage === 'discard') { renderDiscardQueue(); } else { setMailView(_mailView); }
    _positionMlSegSlider();
    // Refresh notification count after data load (payment tasks may have been created)
    setTimeout(() => loadNotifCount(), 1000);
  } catch(e) {
    if (qs('ml-list')) qs('ml-list').innerHTML = '<div style="padding:20px;text-align:center;color:var(--required)">Failed to load: ' + e.message + '</div>';
  }
}

function filterStaffMailLog(query) {
  const q = (query || '').toLowerCase();
  const ACTIVE_STATUSES   = ['pending_assignment','ready_for_pickup','confidential_pickup','forwarding_queued','received'];
  const RELEASED_STATUSES = ['picked_up','forwarded','shredded','discarded','returned_to_sender','deleted'];
  const typeFilter = document.getElementById('ml-type-filter')?.value || 'all';
  const statusFilter = document.getElementById('ml-status-filter')?.value || 'all';
  const dateFrom = document.getElementById('ml-date-from')?.value || '';
  const dateTo = document.getElementById('ml-date-to')?.value || '';
  const advClient = (document.getElementById('ml-adv-client')?.value || '').toLowerCase();

  const advRecipient = (document.getElementById('ml-adv-recipient')?.value || '').toLowerCase();

  let filtered = _allStaffMail.filter(m => {
    // Tab filter
    if (_mailView === 'active')   { if (!ACTIVE_STATUSES.includes(m.status))   return false; }
    if (_mailView === 'released') { if (!RELEASED_STATUSES.includes(m.status)) return false; }
    // Type filter
    if (typeFilter === 'letter' && m.type === 'parcel') return false;
    if (typeFilter === 'parcel' && m.type !== 'parcel') return false;
    // Status filter
    if (statusFilter === 'scanned' && !m.scanImageUrl) return false;
    if (statusFilter === 'overdue') {
      if (!m.storageDueDate || m.storageDueDate >= new Date().toLocaleDateString('en-CA',{timeZone:STAFF_TZ()})) return false;
      if (!ACTIVE_STATUSES.includes(m.status)) return false;
    }
    if (statusFilter === 'near-overdue') {
      if (!m.storageDueDate) return false;
      const daysLeft = Math.round((new Date(m.storageDueDate+'T00:00:00')-new Date(new Date().toLocaleDateString('en-CA',{timeZone:STAFF_TZ()})+'T00:00:00'))/86400000);
      if (daysLeft < 0 || daysLeft > 5) return false;
      if (!ACTIVE_STATUSES.includes(m.status)) return false;
    }
    if (statusFilter !== 'all' && statusFilter !== 'scanned' && statusFilter !== 'overdue' && statusFilter !== 'near-overdue' && m.status !== statusFilter) return false;
    // Date range
    if (dateFrom && m.loggedAt) { const d = new Date(m.loggedAt).toLocaleDateString('en-CA',{timeZone:STAFF_TZ()}); if (d < dateFrom) return false; }
    if (dateTo && m.loggedAt) { const d = new Date(m.loggedAt).toLocaleDateString('en-CA',{timeZone:STAFF_TZ()}); if (d > dateTo) return false; }
    // Advanced client filter (name, email, or client ID)
    if (advClient && !(m.clientName||'').toLowerCase().includes(advClient) && !(m.clientEmail||'').toLowerCase().includes(advClient) && !(m.clientId||'').toLowerCase().includes(advClient)) return false;
    // Advanced recipient filter (name or recipient ID)
    if (advRecipient && !(m.recipientName||'').toLowerCase().includes(advRecipient) && !(m.recipientId||'').toLowerCase().includes(advRecipient)) return false;
    // Text search (includes email)
    if (!q) return true;
    return [m.recipientName, m.recipientId||'', m.senderName, m.mailId, m.physicalLocation,
            m.clientName||'', m.clientEmail||'', m.clientId||'', m.planName||'', m.noteToClient||'', m.noteInternal||'',
            m.loggedBy||'', m.loggedByName||'']
      .join(' ').toLowerCase().includes(q);
  });
  // Sort based on dropdown
  const sortBy = qs('ml-sort') ? qs('ml-sort').value : 'urgency';
  const statusPriority = { pending_assignment:0, ready_for_pickup:1, confidential_pickup:1, forwarding_queued:2, received:3, forwarded:4, picked_up:5, shredded:6, returned_to_sender:7, discarded:8, deleted:9 };
  filtered.sort((a, b) => {
    if (sortBy === 'urgency') {
      const pa = statusPriority[a.status] ?? 5, pb = statusPriority[b.status] ?? 5;
      if (pa !== pb) return pa - pb;
      const aDue = a.storageDueDate || '9999', bDue = b.storageDueDate || '9999';
      return aDue.localeCompare(bDue);
    }
    if (sortBy === 'recent-change') return new Date(b.statusChangedAt||b.loggedAt) - new Date(a.statusChangedAt||a.loggedAt);
    if (sortBy === 'newest') return new Date(b.loggedAt) - new Date(a.loggedAt);
    if (sortBy === 'oldest') return new Date(a.loggedAt) - new Date(b.loggedAt);
    if (sortBy === 'due-soon') {
      const aDue = a.storageDueDate || '9999', bDue = b.storageDueDate || '9999';
      return aDue.localeCompare(bDue);
    }
    if (sortBy === 'client-az') return (a.clientName||'').localeCompare(b.clientName||'');
    return 0;
  });
  _mlFilteredCache = filtered;
  _mlRenderedCount = 0;
  const _mlFilterActive = !!(q || advClient || advRecipient || dateFrom || dateTo || typeFilter !== 'all' || statusFilter !== 'all');
  renderStaffMailList(filtered, _mlFilterActive);
}

function renderStaffMailList(mailLog, filterActive) {
  const el = qs('ml-list');
  if (!el) return;

  if (!mailLog.length) {
    if (filterActive) { el.innerHTML = _noMatchSlate('No matching mail', 'No mail matches your search or filters \u2014 try a different term or clear them.'); return; }
    const _mlTitle = _mailView === 'active' ? 'No pending mail' : 'Nothing to show';
    const _mlDesc  = _mailView === 'active' ? "All mail has been processed \u2014 you're all clear." : 'No mail matches this view right now.';
    el.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>', _mlTitle, _mlDesc);
    return;
  }

  // Status display config
  const STATUS_PILL = {
    pending_assignment:  { label:'Pending Assignment', bg:'#FFF3E0', color:'#E65100', border:'#FFCC80' },
    ready_for_pickup:    { label:'Ready for Pickup',   bg:'#E8F5EE', color:'#2E7D4F', border:'#A5D6A7' },
    confidential_pickup: { label:'Confidential',       bg:'#FFEDED', color:'#C62828', border:'#EF9A9A' },
    forwarding_queued:   { label:'Queued for Forward',  bg:'#E3F2FD', color:'#1565C0', border:'#90CAF9' },
    forwarded:           { label:'Forwarded',           bg:'#E3F2FD', color:'#1565C0', border:'#90CAF9' },
    picked_up:           { label:'Picked Up',           bg:'#F5F5F5', color:'#757575', border:'#E0E0E0' },
    shredded:            { label:'Shredded',            bg:'#F5F5F5', color:'#9E9E9E', border:'#E0E0E0' },
    returned_to_sender:  { label:'Returned',            bg:'#F5F5F5', color:'#9E9E9E', border:'#E0E0E0' },
    discarded:           { label:'Discarded',           bg:'#F5F5F5', color:'#9E9E9E', border:'#E0E0E0' },
    received:            { label:'Received',            bg:'#E3F2FD', color:'#1565C0', border:'#90CAF9' },
    deleted:             { label:'Deleted',             bg:'#FFEDED', color:'#C62828', border:'#EF9A9A' },
  };

  // Active statuses (items needing attention)
  const ACTIVE = ['pending_assignment','ready_for_pickup','confidential_pickup','forwarding_queued','received'];
  const CLOSED = ['picked_up','forwarded','shredded','returned_to_sender','discarded','deleted'];

  // Data is already sorted by filterStaffMailLog
  const BATCH = 50;
  const toRender = mailLog.slice(0, BATCH);
  _mlRenderedCount = toRender.length;

  const activeItems = (_mailView === 'released') ? [] : toRender.filter(m => ACTIVE.includes(m.status));
  const closedItems = (_mailView === 'active') ? [] : toRender.filter(m => CLOSED.includes(m.status));
  // For 'all' view: just render everything in order
  const allItems = (_mailView === 'all') ? toRender : null;

  // Store renderRow for virtual scroll
  window._mlRenderRow = renderRow;

  function renderRow(m) {
    const isParcel = m.type === 'parcel';

    const pill = STATUS_PILL[m.status] || { label: m.status, bg:'#F5F5F5', color:'#757575', border:'#E0E0E0' };
    const days = m.storageDueDate ? Math.round((new Date(m.storageDueDate+'T00:00:00')-new Date(new Date().toLocaleDateString('en-CA',{timeZone:STAFF_TZ()})+'T00:00:00'))/86400000) : null;
    const totalDays = m.storageStartDate && m.storageDueDate ? Math.ceil((new Date(m.storageDueDate+'T12:00:00') - new Date(m.storageStartDate+'T12:00:00')) / (1000*60*60*24)) : 30;
    const isSpecialCase = m.specialCase === 'TRUE' || m.specialCase === true;
    const isPendingAssignment = m.status === 'pending_assignment';
    // Storage runway as 4 depleting dots: window / 4 = one dot per quarter.
    // Count = ceil(daysLeft / (window/4)), capped 1-4; overdue = all 4 red.
    // Color follows count: 4|3 green, 2 orange, 1 red, overdue red.
    const dueIsOverdue = days !== null && days < 0;
    const duePer = ((totalDays > 0 ? totalDays : 30) / 4);
    const dueFilled = days === null ? 0 : dueIsOverdue ? 4 : Math.max(1, Math.min(4, Math.ceil(days / duePer)));
    const dueDotColor = dueIsOverdue ? '#F44336' : dueFilled >= 3 ? '#2E9E4F' : dueFilled === 2 ? '#FF9800' : '#F44336';
    const dueTxtColor = dueIsOverdue ? '#C62828' : dueFilled >= 3 ? '#2E7D4F' : dueFilled === 2 ? '#E65100' : '#C62828';
    const dueLabel = days === null ? '' : dueIsOverdue ? (Math.abs(days)+'d overdue') : days === 0 ? 'Due today' : (days+'d left');
    const dueDots = [0,1,2,3].map(i => `<span style="width:7.5px;height:7.5px;border-radius:50%;background:${i < dueFilled ? dueDotColor : '#E4E2DE'}"></span>`).join('');
    const daysBadge = isActive && days !== null && !isPendingAssignment
      ? `<span style="display:inline-flex;align-items:center;gap:7px">
           <span style="display:inline-flex;align-items:center;gap:3.5px">${dueDots}</span>
           <span style="font-size:10px;font-weight:700;color:${dueTxtColor};white-space:nowrap">${dueLabel}</span>
         </span>` : '';
    const confBadge = (m.confidential === 'TRUE' || m.confidential === true) && m.status !== 'confidential_pickup'
      ? `<span style="font-size:10px;background:#FFEDED;color:var(--required);padding:1px 6px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>` : '';
    const isDeleted = m.status === 'deleted';
    const safeMailId   = encodeURIComponent(m.mailId||'');
    const safeRecip    = encodeURIComponent(m.recipientName||'');
    const safePlanCard = encodeURIComponent(m.planCardId||'');
    const safeStatus   = encodeURIComponent(m.accessStatus||'');
    const canRelease = isActive && !isSpecialCase && !isDeleted && !isPendingAssignment && m.recipientId && m.planCardId;
    const canEdit = isActive && !isSpecialCase && !isDeleted;
    const uid = (m.mailId||'').replace(/[^a-zA-Z0-9]/g,'');
    const pcs = (m.pieceCount && m.pieceCount > 1) ? `<span style="font-size:10px;background:var(--bg-2);padding:1px 6px;border-radius:10px;font-weight:600;color:var(--ink-3)">\u00D7${m.pieceCount}</span>` : '';
    const overageBadge = m.overageFlag ? (m.overageBilled ? '<span style="font-size:9px;background:#E8F5E9;color:#2E7D4F;padding:1px 6px;border-radius:10px;font-weight:600;border:1px solid #C8E6C9">Overage \u00B7 Billed</span>' : '<span style="font-size:9px;background:#FFEBEE;color:#C62828;padding:1px 6px;border-radius:10px;font-weight:600;border:1px solid #FFCDD2">Overage</span>') : '';

    const idVBadge = m.idVerificationStatus === 'approved' ? '<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 6px 1px 5px;border-radius:8px;font-size:9px;font-weight:700;line-height:1.4;background:#E8F5E9;color:#2E7D4F;margin-left:4px;vertical-align:middle"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="20 6 9 17 4 12"/></svg>Verified</span>' : m.idVerificationStatus === 'pending' ? '<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 6px 1px 5px;border-radius:8px;font-size:9px;font-weight:700;line-height:1.4;background:#FFF3E0;color:#E65100;margin-left:4px;vertical-align:middle"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M5 22h14M5 2h14M17 22v-4.2a2 2 0 0 0-.6-1.4L12 12l-4.4 4.4a2 2 0 0 0-.6 1.4V22M7 2v4.2a2 2 0 0 0 .6 1.4L12 12l4.4-4.4a2 2 0 0 0 .6-1.4V2"/></svg>Pending</span>' : '<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 6px 1px 5px;border-radius:8px;font-size:9px;font-weight:700;line-height:1.4;background:#FFEBEE;color:#C62828;margin-left:4px;vertical-align:middle"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="display:block"><path d="M12 8v5M12 16.5v.01"/><circle cx="12" cy="12" r="10"/></svg>Unverified</span>';

    // Detail fields
    const staffDisplay = m.loggedByName ? `${m.loggedByName}<span class="cl-icp" title="Copy staff ID" data-val="${m.loggedBy||''}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)" style="margin-left:5px;vertical-align:-3px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>` : (m.loggedBy || '\u2014');
    const copyBtn = `<span class="cl-icp" title="Copy Mail ID" data-val="${m.mailId||''}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)" style="margin-left:5px;vertical-align:-3px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>`;
    const clientLink = clientName ? `<a href="#" onclick="event.preventDefault();event.stopPropagation();setView('plancards');setTimeout(()=>{const s=qs('pc-search');if(s){s.value='${(m.planCardId||'').replace(/'/g,"\\'")}';s.dispatchEvent(new Event('input'))}},200)" style="color:var(--blue);text-decoration:none;font-weight:500">${clientName}</a>${m.clientId ? '<span class="cl-icp" title="Copy client ID" data-val="'+m.clientId+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)" style="margin-left:5px;vertical-align:-3px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>' : ''}${clientEmailDisplay ? '<br><span style="font-size:11px;color:var(--ink-4);display:inline-flex;align-items:center;gap:4px">'+clientEmailDisplay+'<span class="cl-icp" title="Copy email" data-val="'+clientEmailDisplay+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></span>' : ''}` : '\u2014';
    const detailPairs = [
      ['Mail ID', (m.mailId||'') + ' ' + copyBtn],

      <div style="border-bottom:1px solid var(--border);${!isActive ? 'opacity:0.6;background:var(--bg)' : 'background:var(--white)'}">

            <div style="font-size:9px;font-weight:600;color:${isParcel?'var(--amber)':'var(--blue)'};text-transform:uppercase">${isParcel?'Parcel':'Mail'}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              ${isSpecialCase ? '<span style="color:var(--amber)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Unassigned</span>' : (m.recipientName || '\u2014')}
              ${confBadge}${pcs}${overageBadge}${daysBadge}${m.noteInternal ? '<span title="Has an internal note" style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;background:var(--amber-bg);color:var(--amber);padding:1px 7px;border-radius:10px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Note</span>' : ''}
            </div>
            <div style="font-size:11px;color:var(--ink-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${m.senderName ? 'From: '+m.senderName+' \u00B7 ' : ''}${clientName ? clientName + idVBadge + ' \u00B7 ' : ''}${fmtDate(m.loggedAt).replace(/,? \d{4}$/,'')}${m.physicalLocation ? ' \u00B7 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;color:var(--ink-3)"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="2.5" fill="currentColor" stroke="none"/></svg>'+m.physicalLocation : ''}${!isActive ? (() => { const cd = m.forwardedAt || m.pickedUpAt || m.discardedAt || m.returnedAt || m.statusChangedAt; const cl = {forwarded:'Forwarded',picked_up:'Picked up',discarded:'Discarded',shredded:'Shredded',returned_to_sender:'Returned'}[m.status]; return cd && cl ? ' \u00B7 <span style="font-weight:500;color:var(--ink-3)">' + cl + ' ' + fmtDate(cd).replace(/,? \d{4}$/,'') + '</span>' + (m.actionPerformedByName ? ' by ' + m.actionPerformedByName : '') : ''; })() : ''}

  function renderClientPending(currentItem) {
    const RELEASABLE = ['ready_for_pickup', 'confidential_pickup', 'forwarding_queued'];
    const pending = _allStaffMail.filter(x =>
      x.clientId === currentItem.clientId &&
      x.mailId !== currentItem.mailId &&
      RELEASABLE.includes(x.status) &&
      x.recipientId && x.planCardId &&
      !x.specialCase
    );
    if (!pending.length) return '';

    const currentIsReleasable = RELEASABLE.includes(currentItem.status) && currentItem.recipientId && currentItem.planCardId && !currentItem.specialCase;

            <svg class="cpend-chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;transition:transform .15s;transform:rotate(90deg)"><polyline points="9 18 15 12 9 6"/></svg>

              <span style="font-weight:400;color:var(--ink-4)">(${totalItems})</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${currentIsReleasable ? `<button class="btn btn-secondary btn-sm" style="font-size:10px" onclick="event.stopPropagation();toggleAllCpend('${groupId}')">Select All</button>` : ''}
            ${currentIsReleasable ? `<button class="btn btn-success btn-sm" style="font-size:11px" onclick="event.stopPropagation();multiRelease('${groupId}','${encodeURIComponent(currentItem.mailId)}','${encodeURIComponent(currentItem.planCardId)}','${encodeURIComponent(currentItem.accessStatus||'')}')">Release Selected \u2192</button>` : ''}
          </div>
        </div>
        <div id="${listId}" style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">
          <div style="position:relative">
          <div style="max-height:${totalItems > 3 ? '150px' : 'none'};overflow-y:auto">
          ${currentIsReleasable ? `
          <div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);background:#f0fdf4">
            <input type="checkbox" class="cpend-cb" data-group="${groupId}" data-mailid="${currentItem.mailId}" checked

// Virtual scroll \u2014 load more items
function mlLoadMore() {
  const el = qs('ml-rows');
  const btn = qs('ml-loadmore');
  if (!el || !_mlFilteredCache.length || !window._mlRenderRow) return;
  const BATCH = 50;
  _mlRenderedCount = Math.min(_mlRenderedCount + BATCH, _mlFilteredCache.length);
  const allToShow = _mlFilteredCache.slice(0, _mlRenderedCount);
  el.innerHTML = allToShow.map(m => window._mlRenderRow(m)).join('');
  const remaining = _mlFilteredCache.length - _mlRenderedCount;
  if (btn) {
    if (remaining > 0) { btn.textContent = `Load more (${remaining} remaining)`; }
    else { btn.remove(); }
  }
}

// Cursor-safe money sanitizer: digits + single dot, max 2 decimals, without
// destroying caret position on every keystroke.
function _fwdSanitizeCost(el) {
  var start = el.selectionStart;
  var before = el.value;
  var v = before.replace(/[^0-9.]/g, '');
  var firstDot = v.indexOf('.');
  if (firstDot !== -1) {
    v = v.slice(0, firstDot + 1) + v.slice(firstDot + 1).replace(/\./g, '');
    var parts = v.split('.');
    if (parts[1] && parts[1].length > 2) v = parts[0] + '.' + parts[1].slice(0, 2);
  }
  if (v !== before) {
    el.value = v;
    var diff = before.length - v.length;
    var pos = Math.max(0, (start || 0) - diff);
    try { el.setSelectionRange(pos, pos); } catch (e) {}
  }
}

// On blur, pad a partial ship cost to 2 decimals (1.1 -> 1.10, 5 -> 5.00).
// Empty stays empty so the placeholder shows; a lone "." clears.
function _fwdFormatCost(el) {
  var v = (el.value || '').trim();
  if (!v || v === '.') { el.value = ''; _fwdRecalc(); return; }
  var n = parseFloat(v);
  if (isNaN(n)) { el.value = ''; _fwdRecalc(); return; }
  el.value = n.toFixed(2);
  _fwdRecalc();
}

// Live progress: fills the bar, flips per-client Ready pills, and locks the CTA
// until every client has tracking + cost. Existing submit-time validation stays.
function _fwdRecalc() {
  var clients = window._fwdClients || [];
  var done = 0;
  for (var i = 0; i < clients.length; i++) {
    var t = (document.querySelector('.fwd-client-tracking[data-idx="' + i + '"]') || {}).value;
    var co = (document.querySelector('.fwd-client-cost[data-idx="' + i + '"]') || {}).value;
    var ok = (t && t.trim()) && (co && co.trim());
    var card = document.querySelector('.fwd-cl-card[data-idx="' + i + '"]');
    if (card) {
      card.style.borderColor = ok ? '#CDE6D6' : 'var(--border)';
      card.style.background = ok ? '#FBFDFC' : 'var(--card,#FBFAF9)';
      var pill = card.querySelector('.fwd-cl-status');
      var chk = card.querySelector('.fwd-st-check');
      var txt = card.querySelector('.fwd-st-txt');
      if (pill) { pill.style.background = ok ? 'var(--green-bg)' : 'var(--bg)'; pill.style.color = ok ? 'var(--green)' : 'var(--ink-3)'; }
      if (chk) chk.style.display = ok ? 'block' : 'none';
      if (txt) txt.textContent = ok ? 'Ready' : 'Needs info';
    }
    if (ok) done++;
  }
  var total = clients.length, left = total - done;
  var lbl = qs('fwd-prog-lbl'), cnt = qs('fwd-prog-cnt'), fill = qs('fwd-prog-fill');
  if (lbl) lbl.textContent = done + ' of ' + total + ' ready';
  if (cnt) cnt.textContent = left === 0 ? 'All set' : left + ' left';
  if (fill) fill.style.width = (total ? (done / total * 100) : 0) + '%';
  var btn = qs('fwd-submit-btn'), st = qs('fwd-submit-txt');
  var ready = done >= total;
  if (btn) btn.disabled = !ready;
  if (st) st.textContent = ready ? 'Print Packing Slip & Update to Forwarded'
    : (total === 1 ? 'Fill in client to continue' : 'Fill all clients to continue (' + left + ' left)');
}

async function submitMultiClientForward() {
  const clients = window._fwdClients || [];
  // Validate all clients have tracking URL and cost
  for (let i = 0; i < clients.length; i++) {
    const tracking = document.querySelector(`.fwd-client-tracking[data-idx="${i}"]`)?.value?.trim() || '';
    const cost = document.querySelector(`.fwd-client-cost[data-idx="${i}"]`)?.value?.trim() || '';
    if (!tracking) { toast(`Tracking URL is required for ${clients[i].clientName}`, 'error'); return; }
    if (!cost) { toast(`Shipping cost is required for ${clients[i].clientName}`, 'error'); return; }
  }
  const btn = qs('fwd-submit-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="btn-spinner"></span> Processing...'; }

  try {
    let totalOk = 0, totalErr = 0;
    for (let i = 0; i < clients.length; i++) {
      const c = clients[i];
      const tracking = document.querySelector(`.fwd-client-tracking[data-idx="${i}"]`)?.value?.trim() || '';
      const cost = document.querySelector(`.fwd-client-cost[data-idx="${i}"]`)?.value?.trim() || '';
      const note = document.querySelector(`.fwd-client-note[data-idx="${i}"]`)?.value?.trim() || '';
      const ids = c.items.map(m => m.mailId);
      c._tracking = tracking;
      c._cost = cost;
      c._note = note;

      // Determine batch period \u2014 use the month range of the earliest item
      const dates = c.items.map(m => new Date(m.loggedAt));
      const earliest = new Date(Math.min(...dates));
      const batchStart = new Date(earliest.getFullYear(), earliest.getMonth(), 1);
      const batchEnd = new Date(earliest.getFullYear(), earliest.getMonth() + 1, 0);
      const monthName = batchStart.toLocaleDateString('en-CA',{month:'long',year:'numeric'});
      const startStr = batchStart.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
      const endStr = batchEnd.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
      c._period = monthName + ' Batch (' + startStr + ' \u2013 ' + endStr + ')';

      const result = await apiPost({ action:'bulkForwardMail', uuid:STATE.uuid, staffName:STATE.access.name,
        mailIds: JSON.stringify(ids), trackingNumber: tracking, noteToClient: note
      });
      const ok = (result.results||[]).filter(r=>r.status==='ok').length;
      const err = (result.results||[]).filter(r=>r.status==='error').length;
      totalOk += ok; totalErr += err;

      // Save forwarding batch record
      try {
        await apiPost({ action:'saveForwardingBatch', uuid:STATE.uuid,
          clientId: c.items[0]?.clientId || '', clientName: c.clientName,
          trackingUrl: tracking, shippingCost: cost, noteToClient: note,
          batchPeriod: c._period, forwardingAddress: c.fwdAddress,
          mailIds: JSON.stringify(ids), itemCount: ids.length,
          totalPieces: c.items.reduce((s,m)=>s+(m.pieceCount||1),0)
        });
      } catch(e) { /* batch history save non-critical */ }
    }

    generatePackingSlips(clients);

    qs('forward-modal').remove();
    toast(`${totalOk} item${totalOk>1?'s':''} forwarded${totalErr?', '+totalErr+' failed':''}`, totalOk>0?'success':'error');
    await loadStaffMailLog();
  } catch(err) {
    toast(err.message,'error');
    if (btn) { btn.disabled=false; btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg><span id="fwd-submit-txt">Print Packing Slip &amp; Update to Forwarded</span>'; }
  }
}

function filterForwardQueue() {
  const q = (qs('fwd-search')?.value || '').toLowerCase().trim();
  // Determine the active (visible) Forward-area panel
  const panels = Array.from(document.querySelectorAll('.fwd-panel'));
  const active = panels.find(p => p.offsetParent !== null && getComputedStyle(p).display !== 'none') || panels.find(p => getComputedStyle(p).display !== 'none');
  if (!active) return;
  const isQueue = active.id === 'fwd-queue-panel';
  const rows = active.querySelectorAll('[data-search]');
  if (!q) {
    // Reveal all rows (removes hide class only; leaves each row's own inline display intact)
    rows.forEach(el => el.classList.remove('fwd-hidden'));
    // On clear: re-collapse any queue batches we auto-expanded
    if (isQueue) {
      (window._fwdAutoExpanded || []).forEach(bid => {
        const body = document.getElementById(bid);
        if (body) body.style.display = 'none';
        const chev = document.getElementById(bid.replace('fwd-batch-body-','fwd-batch-chev-'));
        if (chev) chev.style.transform = '';
      });
      window._fwdAutoExpanded = [];
    }
    _fwdSyncNoMatch(active, '');
    return;
  }
  rows.forEach(el => { el.classList.toggle('fwd-hidden', !el.dataset.search.includes(q)); });
  // Queue-specific: auto-expand batch bodies that contain a visible match
  if (isQueue) {
    window._fwdAutoExpanded = window._fwdAutoExpanded || [];
    active.querySelectorAll('[id^="fwd-batch-body-"]').forEach(body => {
      const hasMatch = Array.from(body.querySelectorAll('[data-search]')).some(r => !r.classList.contains('fwd-hidden'));
      if (hasMatch && getComputedStyle(body).display === 'none') {
        body.style.display = 'block';
        const chev = document.getElementById(body.id.replace('fwd-batch-body-','fwd-batch-chev-'));
        if (chev) chev.style.transform = 'rotate(90deg)';
        if (!window._fwdAutoExpanded.includes(body.id)) window._fwdAutoExpanded.push(body.id);
      }
    });
  }
  _fwdSyncNoMatch(active, q);
}

// Show/hide a "no match" slate for the active Forward-area panel.
// When a search hides every row, HIDE the panel's real content and show ONLY the slate.
// If the panel has no rows to begin with (already showing its own empty slate), do nothing.
function _fwdSyncNoMatch(panel, q) {
  if (!panel) return;
  const allRows = panel.querySelectorAll('[data-search]');
  const totalRows = allRows.length;
  const visible = Array.from(allRows).some(el => !el.classList.contains('fwd-hidden'));
  // The panel's real content = its first element child that isn't the slate.
  const content = Array.from(panel.children).find(c => !c.classList.contains('fwd-nomatch'));
  let slate = panel.querySelector('.fwd-nomatch');
  const showNoMatch = !!q && totalRows > 0 && !visible;
  if (showNoMatch) {
    if (!slate) {
      slate = document.createElement('div');
      slate.className = 'fwd-nomatch';
      slate.innerHTML = _noMatchSlate('No matching items', 'Nothing in this tab matches your search \u2014 try a different term or clear it.');
      panel.appendChild(slate);
    }
    slate.style.display = 'block';
    if (content) content.style.display = 'none';
  } else {
    if (slate) slate.style.display = 'none';
    if (content) content.style.display = '';
  }
}

function switchFwdTab(btn) {
  const targetId = btn.dataset.tab;
  document.querySelectorAll('.fwd-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.fwd-subtab').forEach(b => {
    b.style.color = 'var(--ink-4)';
    b.style.fontWeight = '500';
    b.style.borderBottomColor = 'transparent';
  });
  const target = document.getElementById(targetId);
  if (target) target.style.display = 'block';
  btn.style.color = window._themeRed || '#8B1A1A';
  btn.style.fontWeight = '600';
  btn.style.borderBottomColor = window._themeRed || '#8B1A1A';
  // Load batch history when switching to slips tab
  if (targetId === 'fwd-slips-panel') loadBatchHistory();
  // Re-apply (or clear) the shared search box against the newly-active panel
  const sb = qs('fwd-search');
  if (sb) filterForwardQueue();
}

function toggleClientSelect(checkbox) {
  const clientId = checkbox.dataset.clientid;
  const batchKey = checkbox.dataset.batch;
  const checked = checkbox.checked;
  document.querySelectorAll(`.fwd-checkbox[data-clientid="${clientId}"][data-batch="${batchKey}"]`).forEach(cb => {
    cb.checked = checked;
  });
  onForwardCheckChange();
}

function selectAllReadyBatch() {
  document.querySelectorAll('.fwd-checkbox').forEach(cb => {
    const batchDiv = cb.closest('[data-ready]');
    if (batchDiv && batchDiv.dataset.ready === 'true') cb.checked = true;
    else cb.checked = false;
  });
  // Also check all client-level select-alls for ready batches
  document.querySelectorAll('.fwd-client-selectall').forEach(cb => {
    const batchDiv = cb.closest('[data-ready]');
    cb.checked = batchDiv && batchDiv.dataset.ready === 'true';
  });
  onForwardCheckChange();
}

function deselectAllForward() {
  document.querySelectorAll('.fwd-checkbox').forEach(cb => cb.checked = false);
  document.querySelectorAll('.fwd-client-selectall').forEach(cb => cb.checked = false);
  onForwardCheckChange();
}

function exportForwardedCSV() {
  const forwarded = _allStaffMail.filter(m => m.status === 'forwarded');
  if (!forwarded.length) { toast('No forwarded items to export', 'error'); return; }

  const headers = ['Mail ID','Type','Recipient','Client','Sender','Plan','Logged Date','Forwarded Date','Tracking URL','Shipping Cost','Pieces','Note to Client','Internal Note'];
  const rows = forwarded.map(m => [
    m.mailId, m.type, m.recipientName||'', m.clientName||'', m.senderName||'',
    m.planName||'',
    m.loggedAt ? fmtDate(m.loggedAt) + ' ' + STAFF_TZ_LABEL() : '',
    m.forwardedAt ? fmtDate(m.forwardedAt) + ' ' + STAFF_TZ_LABEL() : '',
    m.trackingNumber||'', m.noteInternal||'', m.pieceCount||1, m.noteToClient||'', m.noteInternal||''
  ]);

  const csv = [headers, ...rows].map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'forwarded-mail-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('CSV downloaded', 'success');
}

async function loadBatchHistoryCSV() {
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getForwardingBatches&limit=200`);
    const batches = data.batches || [];
    if (!batches.length) { toast('No batch records', 'error'); return; }
    const headers = ['Date','Client','Period','Items','Pieces','Tracking URL','Shipping Cost (incl. applicable taxes)','Ship To','Note','Mail IDs'];
    const rows = batches.map(b => [
      fmtDate(b.createdAt) + ' ' + STAFF_TZ_LABEL(),
      b.clientName||'', b.batchPeriod||'', b.itemCount||0, b.totalPieces||0,
      b.trackingUrl||'', '$'+(b.shippingCost||'0'), b.forwardingAddress||'',
      b.noteToClient||'', (b.mailIds||[]).join('; ')
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'forwarding-batches-' + new Date().toISOString().split('T')[0] + '.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('Batch CSV downloaded', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

          ${STATE.access?.canExtendStorage ? `<button class="btn btn-sm dqh-neutral" onclick="bulkExtendStorage()">+7 Days Selected</button>` : ''}
          <button class="btn btn-sm dqh-neutral" onclick="bulkDiscardAction('returned_to_sender')">Return Selected</button>

  window._discardItems = allOverdue;

}

function onDiscardCheckChange() {
  const checked = document.querySelectorAll('.dq-checkbox:checked');
  const count = document.getElementById('dq-sel-count');
  if (count) count.textContent = checked.length;
}

function selectAllDiscard() {
  document.querySelectorAll('.dq-checkbox').forEach(cb => cb.checked = true);
  onDiscardCheckChange();
}

function deselectAllDiscard() {
  document.querySelectorAll('.dq-checkbox').forEach(cb => cb.checked = false);
  onDiscardCheckChange();
}

function getSelectedDiscardIds() {
  return Array.from(document.querySelectorAll('.dq-checkbox:checked')).map(cb => cb.dataset.mailid);
}

async function bulkDiscardAction(newStatus) {
  const ids = getSelectedDiscardIds();
  if (!ids.length) return;
  let noteInternal = '';
  if (newStatus === 'returned_to_sender') {
    const cost = await appPrompt({ title: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg> Return ' + ids.length + ' Items', message: 'Enter internal return shipping cost for all items. Leave blank if none.', placeholder: 'e.g. 15.00', confirmLabel: 'Return All', confirmClass: 'btn-danger' });
    if (cost === null) return;
    noteInternal = cost ? 'Return cost: $' + cost : '';
  } else {
    const ok = await appConfirm({ title: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> Discard ' + ids.length + ' Items', message: 'This will permanently discard ' + ids.length + ' item(s). This cannot be undone.', confirmLabel: 'Discard All', confirmClass: 'btn-danger' });
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action:'updateMailStatus', uuid:STATE.uuid, staffName:STATE.access.name, mailIds: JSON.stringify(ids), newStatus, noteInternal });
    if (result.status === 'ok') {
      const okCount = (result.results||[]).filter(r=>r.status==='ok').length;
      toast(okCount + ' item(s) ' + (newStatus === 'discarded' ? 'discarded' : 'returned'), 'success');
      await loadStaffMailLog();
    } else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

async function bulkExtendStorage() {
  const ids = getSelectedDiscardIds();
  if (!ids.length) return;
  const _td = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ(), year:'numeric', month:'2-digit', day:'2-digit' }).split('-').map(Number);
  const newDue = new Date(Date.UTC(_td[0], _td[1]-1, _td[2] + 7));
  const newDueStr = newDue.toISOString().split('T')[0];
  let okCount = 0;
  for (const mailId of ids) {
    try {
      const result = await apiPost({ action:'editMailItem', uuid:STATE.uuid, mailId, storageDueDate: newDueStr });
      if (result.status === 'ok') okCount++;
    } catch(e) {}
  }
  toast(okCount + ' item(s) extended 7 days from today', 'success');
  await loadStaffMailLog();
}

function filterDiscardQueue() {
  const q = (document.getElementById('dq-search')?.value || '').toLowerCase();
  const typeF = document.getElementById('dq-type')?.value || 'all';
  const now = new Date();
  let items = (window._discardItems || []).filter(m => {
    if (typeF === 'letter' && m.type === 'parcel') return false;
    if (typeF === 'parcel' && m.type !== 'parcel') return false;
    if (!q) return true;
    return [m.recipientName, m.senderName, m.mailId, m.clientName||'', m.clientId||'', m.recipientId||'', m.physicalLocation||''].join(' ').toLowerCase().includes(q);
  });

  const container = document.getElementById('dq-items');
  if (!container) return;

  // Re-filtering rebuilds rows (clears selection) — reset the header count
  const _selCount = document.getElementById('dq-sel-count');
  if (_selCount) _selCount.textContent = '0';

  const _dqCard = document.getElementById('dq-card');
  const _dqEmpty = document.getElementById('dq-empty');
  const _filterActive = !!q || typeF !== 'all';
  const _hasAnyOverdue = (window._discardItems || []).length > 0;

  if (!items.length) {
    // Collapse the whole card and show a bare slate (matches the other tabs) — no boxed wrapper
    if (_dqCard) _dqCard.style.display = 'none';
    container.innerHTML = '';
    if (_dqEmpty) _dqEmpty.innerHTML = (_filterActive && _hasAnyOverdue)
      ? _noMatchSlate('No matching items', 'No overdue items match your search or filter \u2014 try a different term or clear it.')
      : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>', 'No overdue items', 'All mail is within its storage period.');
    return;
  }
  // Rows present — show the card, clear any slate
  if (_dqCard) _dqCard.style.display = 'block';
  if (_dqEmpty) _dqEmpty.innerHTML = '';

  const _canExt = !!(STATE.access && STATE.access.canExtendStorage);
  const _todayStr = new Date().toLocaleDateString('en-CA',{timeZone:STAFF_TZ()});

  const _dqRow = (m) => {
    const daysOver = Math.abs(Math.round((new Date(m.storageDueDate+'T00:00:00')-new Date(_todayStr+'T00:00:00'))/86400000));

      : '<span style="font-size:10px;font-weight:700;color:var(--required);background:var(--danger-dim);border:1px solid var(--danger-border);padding:1px 7px;border-radius:10px;white-space:nowrap">'+daysOver+'d overdue</span>';
    return `

            <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px" onclick="toggleDetail('dq-${uid}')">
              <div class="dq-avatar">${m.type==='parcel'?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>':'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg>'}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap">${m.recipientName||'\u2014'} ${ovdPill}${m.noteInternal ? '<span title="Has an internal note" style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;background:var(--amber-bg);color:var(--amber);padding:1px 7px;border-radius:10px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Note</span>' : ''}</div>
                <div style="font-size:11px;color:var(--ink-4)">${m.clientName ? m.clientName+' \u00B7 ' : ''}${m.senderName ? 'From: '+m.senderName+' \u00B7 ' : ''}Due: ${dueDate} \u00B7 <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/></svg>${m.physicalLocation||'\u2014'}</div>
              </div>

            </div>
          </div>
          <div id="dq-${uid}" style="display:none;padding:8px 14px 10px 48px;background:var(--bg);border-top:1px dashed var(--border)">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:4px 14px;font-size:11px">
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Mail ID</span><div><span style="display:inline-flex;align-items:center;gap:4px">${m.mailId||'\u2014'}<span class="cl-icp" title="Copy Mail ID" data-val="${m.mailId||''}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></span></div></div>
              ${m.recipientName ? '<div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Recipient</span><div><span style="display:inline-flex;align-items:center;gap:4px">'+m.recipientName+(m.recipientId ? '<span class="cl-icp" title="Copy recipient ID" data-val="'+m.recipientId+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>' : '')+'</span></div></div>' : ''}
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Client</span><div><span style="display:inline-flex;align-items:center;gap:4px">${m.clientName||'\u2014'}${m.clientId ? '<span class="cl-icp" title="Copy client ID" data-val="'+m.clientId+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>' : ''}</span></div></div>
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Plan</span><div>${m.planName||'\u2014'}</div></div>
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Location</span><div>${m.physicalLocation||'\u2014'}</div></div>
              ${m.loggedByName ? '<div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Logged by</span><div><span style="display:inline-flex;align-items:center;gap:4px">'+m.loggedByName+'<span class="cl-icp" title="Copy staff ID" data-val="'+(m.loggedBy||'')+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></span></div></div>' : ''}
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Logged</span><div>${logDate}</div></div>
              <div><span style="font-weight:600;color:var(--ink-4);text-transform:uppercase;font-size:9px">Pieces</span><div>${m.pieceCount||1}</div></div>
              ${m.noteInternal ? '<div style="grid-column:1/-1"><span style="font-weight:600;color:var(--amber);text-transform:uppercase;font-size:9px;display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Internal Note</span><div>'+m.noteInternal+'</div></div>' : ''}
            </div>
          </div>
        </div>`;
  };

  const _dqDaysOver = (m) => Math.abs(Math.round((new Date(m.storageDueDate+'T00:00:00')-new Date(_todayStr+'T00:00:00'))/86400000));
  const critItems = items.filter(m => _dqDaysOver(m) >= 15);
  const warnItems = items.filter(m => _dqDaysOver(m) < 15);
  const _dqPieces = (arr) => arr.reduce((s,m)=>s+(m.pieceCount||1),0);
  const _dqGroup = (arr, cls, color, label) => {
    if (!arr.length) return '';
    const gid = 'dqgrp-' + cls;
    return `
      <div class="dq-group ${cls}">
        <div class="dq-ghead" style="cursor:pointer" onclick="const el=document.getElementById('${gid}');const op=el.style.display==='none';el.style.display=op?'block':'none';const c=document.getElementById('${gid}-chev');if(c)c.style.transform=op?'rotate(90deg)':''">
          <svg id="${gid}-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;color:var(--ink-4);transform:rotate(90deg);transition:transform .18s"><polyline points="9 18 15 12 9 6"/></svg>

  container.innerHTML = `
      ${_dqGroup(critItems, 'crit', 'var(--required)', '15+ Days Overdue')}

async function discardAction(mailId, newStatus) {
  let noteInternal = '';
  if (newStatus === 'returned_to_sender') {
    const cost = await appPrompt({ title: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg> Return to Sender', message: 'Enter internal return shipping cost. Leave blank if none.', placeholder: 'e.g. 5.00', confirmLabel: 'Return to Sender', confirmClass: 'btn-danger' });
    if (cost === null) return;
    noteInternal = cost ? 'Return cost: $' + cost : '';
  } else {
    const ok = await appConfirm({ title: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> Discard Item', message: 'This will permanently mark the item as discarded. This cannot be undone.', confirmLabel: 'Discard', confirmClass: 'btn-danger' });
    if (!ok) return;
  }
  try {
    const result = await apiPost({ action:'updateMailStatus', uuid:STATE.uuid, staffName:STATE.access.name, mailId, newStatus, noteInternal });
    if (result.status === 'ok') {
      toast(newStatus === 'discarded' ? 'Item discarded' : 'Item marked for return', 'success');
      await loadStaffMailLog();
    } else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

async function extendStorage(mailId) {
  const _td = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ(), year:'numeric', month:'2-digit', day:'2-digit' }).split('-').map(Number);
  const newDue = new Date(Date.UTC(_td[0], _td[1]-1, _td[2] + 7));
  const newDueStr = newDue.toISOString().split('T')[0];
  try {
    const result = await apiPost({ action:'editMailItem', uuid:STATE.uuid, mailId, storageDueDate: newDueStr });
    if (result.status === 'ok') {
      toast('Storage extended 7 days from today (new due: ' + fmtDate(newDue.toISOString()) + ')', 'success');
      await loadStaffMailLog();
    } else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

function multiRelease(groupId, encodedCurrentMailId, encodedPlanCardId, encodedAccessStatus) {

async function openReleaseModalMulti(mailIds, planCardId, accessStatus) {
  planCardId = decodeURIComponent(planCardId || '');
  accessStatus = decodeURIComponent(accessStatus || '');
  const existing = qs('release-modal');
  if (existing) existing.remove();

  // Block if payment issue
  if (accessStatus && !['ACTIVE','CANCELED_WITH_ACCESS'].includes(accessStatus)) {
    const modal = document.createElement('div');
    modal.id = 'release-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px';
    modal.innerHTML = `<div style="background:var(--white);border-radius:var(--radius);padding:24px;max-width:400px;width:100%;box-shadow:var(--shadow-md)">
      <div style="font-size:18px;font-family:'Inter',sans-serif;font-weight:700;margin-bottom:12px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Release Blocked</div>
      <div style="font-size:13px;color:var(--ink-2);margin-bottom:16px">
        ${accessStatus === 'CANCELED'
          ? 'This plan has been <strong>cancelled</strong>. Mail cannot be released.<br><br>Please decide how to handle remaining items (return to sender, hold, or discard).'
          : 'This mailbox has an outstanding <strong>payment issue</strong> (' + accessStatus.replace(/_/g,' ') + ').<br>Mail cannot be released until payment is resolved.<br><br>Please notify the client.'}
      </div>
      <button class="btn btn-secondary btn-full" onclick="qs('release-modal').remove()">Close</button>
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    return;
  }

  // Look up item details for display
  const items = mailIds.map(id => _allStaffMail.find(x => x.mailId === id)).filter(Boolean);
  const clientName = items[0]?.clientName || 'Client';
  const totalPieces = items.reduce((s, m) => s + (m.pieceCount || 1), 0);

  // Fetch agents
  let agents = [];
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getAgentsForPlanCard&planCardId=${planCardId}`);
    agents = data.agents || [];
  } catch(e) {}

  const modal = document.createElement('div');
  modal.id = 'release-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--white);border-radius:var(--radius);padding:20px 22px;max-width:440px;width:100%;box-shadow:var(--shadow-md);max-height:88vh;overflow-y:auto">

async function submitMultiRelease() {
  const selected = document.querySelector('input[name="release-agent"]:checked');
  if (!selected) { toast('Please select a pickup agent', 'error'); return; }

  const btn = document.querySelector('#release-modal .btn-success');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Releasing...'; }

  try {
    const result = await apiPost({
      action:       'releaseMail',
      uuid:         STATE.uuid,
      staffName:    STATE.access.name,
      mailIds:      JSON.stringify(window._pendingReleaseMailIds),
      agentId:      selected.value,
      releaseNotes: qs('release-notes') ? qs('release-notes').value : ''
    });

    if (result.status === 'ok') {
      qs('release-modal').remove();
      toast(`${result.count || window._pendingReleaseMailIds.length} item${(result.count || window._pendingReleaseMailIds.length) > 1 ? 's' : ''} released`, 'success');
      window._pendingReleaseMailIds = null;
      window._pendingReleasePlanCardId = null;
      await loadStaffMailLog();
      await loadTasks();
      if (STATE.view === 'split') renderTasksPane();
    } else {
      throw new Error(result.message || 'Release failed');
    }
  } catch(err) {
    toast(err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '\u2713 Confirm Release'; }
  }
}

async function submitRelease(mailId, planCardId) {
  const selected = document.querySelector('input[name="release-agent"]:checked');
  if (!selected) { toast('Please select a pickup agent', 'error'); return; }

  const btn = document.querySelector('#release-modal .btn-success');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Releasing...'; }

  try {
    const result = await apiPost({
      action:       'releaseMail',
      uuid:         STATE.uuid,
      staffName:    STATE.access.name,
      mailId:       mailId,
      agentId:      selected.value,
      releaseNotes: qs('release-notes') ? qs('release-notes').value : ''
    });

    if (result.status === 'ok') {
      qs('release-modal').remove();
      toast('Mail released successfully', 'success');
      // Refresh mail log
      await loadStaffMailLog();
      // Refresh tasks
      await loadTasks();
      if (STATE.view === 'split') renderTasksPane();
    } else {
      throw new Error(result.message || 'Release failed');
    }
  } catch(err) {
    toast(err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '\u2713 Confirm Release'; }
  }
}

async function loadExceptions() {
  const el = qs('exc-list');
  if (!el) return;
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getExceptions&limit=500`);
    const items = data.exceptions || [];
    // Store globally so openMailDetail can find them even if Mail Log hasn't been visited
    window._excItems = items;
    items.forEach(exc => {
      if (!_allStaffMail.find(m => m.mailId === exc.mailId)) _allStaffMail.push(exc);
    });
    renderExcChips(items);
    renderExceptionsList(items);
    updateExceptionsBadge(items.length);
  } catch(e) {
    if (el) el.innerHTML = `<div style="color:var(--required);padding:20px">Error loading exceptions: ${e.message}</div>`;
  }
}

function renderExcChips(items) {
  const el = document.getElementById('exc-chips');
  if (!el) return;
  const _torDay = d => new Date(new Date(d).toLocaleDateString('en-CA', {timeZone:STAFF_TZ()}) + 'T00:00:00');
  const daysOld = (m) => Math.floor((_torDay(new Date()) - _torDay(m.loggedAt)) / (1000*60*60*24));
  const counts = {
    all:       items.length,
    urgent:    items.filter(m => daysOld(m) >= 20).length,
    noMatch:   items.filter(m => !m.specialCaseReason).length,
    hasReason: items.filter(m => !!m.specialCaseReason).length,
    letters:   items.filter(m => m.type !== 'parcel').length,
    parcels:   items.filter(m => m.type === 'parcel').length,
  };
  const chips = [
    { val: '',          label: 'All',            count: counts.all,       color: null },
    { val: 'urgent',    label: '20+ Days',       count: counts.urgent,    color: 'var(--required)' },
    { val: 'noMatch',   label: 'No Match',       count: counts.noMatch,   color: 'var(--amber)' },
    { val: 'hasReason', label: 'Has Reason',     count: counts.hasReason, color: 'var(--required)' },
    { val: 'letters',   label: 'Letters',        count: counts.letters,   color: null },
    { val: 'parcels',   label: 'Parcels',        count: counts.parcels,   color: null },
  ];
  const cur = window._excChipFilter || '';
  el.innerHTML = chips.map(c => {
    const active = c.val === cur;
    const base = active
      ? 'background:var(--ink);color:#fff;border-color:var(--ink)'
      : c.color
        ? `background:rgba(0,0,0,0);color:${c.color};border-color:${c.color}33`
        : 'background:var(--white);color:var(--ink-3);border-color:var(--border)';
    return `<button onclick="setExcChip('${c.val}')" style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all .15s;${base}">${c.label}${c.count > 0 ? ' <span style="opacity:.7">('+c.count+')</span>' : ''}</button>`;
  }).join('');
}

function setExcChip(val) {
  window._excChipFilter = val;
  filterExceptions();
}

function filterExceptions() {
  const search = (qs('exc-search')?.value || '').toLowerCase();
  const chip   = window._excChipFilter || '';
  let items    = (window._excItems || []);

  // Apply chip filter — use Toronto calendar days for consistency
  const _torDay = d => new Date(new Date(d).toLocaleDateString('en-CA', {timeZone:STAFF_TZ()}) + 'T00:00:00');
  const daysOld = (m) => Math.floor((_torDay(new Date()) - _torDay(m.loggedAt)) / (1000*60*60*24));
  if      (chip === 'urgent')    items = items.filter(m => daysOld(m) >= 20);
  else if (chip === 'noMatch')   items = items.filter(m => !m.specialCaseReason);
  else if (chip === 'hasReason') items = items.filter(m => !!m.specialCaseReason);
  else if (chip === 'letters')   items = items.filter(m => m.type !== 'parcel');
  else if (chip === 'parcels')   items = items.filter(m => m.type === 'parcel');

  // Apply text search on top of chip filter
  if (search) {
    items = items.filter(m =>
      (m.senderName||'').toLowerCase().includes(search) ||
      (m.recipientName||'').toLowerCase().includes(search) ||
      (m.mailId||'').toLowerCase().includes(search) ||
      (m.clientName||'').toLowerCase().includes(search) ||
      (m.noteInternal||'').toLowerCase().includes(search) ||
      (m.specialCaseReason||'').toLowerCase().includes(search)
    );
  }

  renderExcChips(window._excItems || []);
  renderExceptionsList(items, !!(search || chip));
}

function renderExceptionsList(items, filterActive) {
  const el = qs('exc-list');
  if (!el) return;
  if (!items.length) {

  }

  const hasReason = items.filter(m => !!m.specialCaseReason).length;
  const urgent    = items.filter(m => Math.floor((_torDay(new Date()) - _torDay(m.loggedAt)) / (1000*60*60*24)) >= 20).length;

      </div>
      <div style="flex:1;padding:13px 10px;text-align:center;border-left:1px solid var(--border)">
        <div style="font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1;color:${hasReason>0?'var(--required)':'var(--ink-4)'}">${hasReason}</div>
        <div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Has Reason</div>
      </div>
      <div style="flex:1;padding:13px 10px;text-align:center;border-left:1px solid var(--border)">
        <div style="font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1;color:${urgent>0?'var(--required)':'var(--ink-4)'}">${urgent}</div>
        <div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:4px">20+ Days</div>
      </div>
      <div style="flex:1;padding:13px 10px;text-align:center;border-left:1px solid var(--border)">
        <div style="font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1;color:var(--ink)">${letters}</div>
        <div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Letters</div>
      </div>
      <div style="flex:1;padding:13px 10px;text-align:center;border-left:1px solid var(--border)">

        <div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:4px">Parcels</div>
      </div>
    </div>`;

  const cards = items.map(m => {
    const isParcel = m.type === 'parcel';

    // Type pill
    const typePillColor = isParcel ? 'var(--amber)' : 'var(--blue)';
    const typePillBg    = isParcel ? 'var(--amber-bg)' : 'var(--blue-bg)';
    const typeIcon = isParcel
      ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`

    // Status pill
    const statusText = (m.status || 'exception').replace(/_/g, ' ');

    // Reason tag
    const reasonTag = m.specialCaseReason
      ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--red-dim);color:var(--red)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>${m.specialCaseReason}</span>`
      : `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--amber-bg);color:var(--amber)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>No recipient matched</span>`;

    // Location tag
    const locationTag = m.physicalLocation
      ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--bg-2);color:var(--ink-3)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${m.physicalLocation}</span>`
      : '';

    // Logged-by tag — click copies staff ID
    const loggedTag = staffName

        <div style="width:4px;flex-shrink:0;background:${accentColor}"></div>
        <div style="flex:1;padding:14px 16px;min-width:0">

          <!-- Row 1: mail ID (copy) + type + status + age -->

            <button onclick="(function(el,id){navigator.clipboard.writeText(id).catch(()=>{});var orig=el.innerHTML;el.innerHTML='<svg width=9 height=9 viewBox=\\'0 0 24 24\\' fill=none stroke=currentColor stroke-width=3><polyline points=\\'20 6 9 17 4 12\\'/></svg> Copied!';el.style.background='var(--green-bg)';el.style.color='var(--green)';el.style.borderColor='var(--green)';setTimeout(function(){el.innerHTML=orig;el.style.background='';el.style.color='';el.style.borderColor=''},1800)})(this,'${m.mailId}')" style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:monospace;background:var(--bg-2);color:var(--ink-2);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>${m.mailId}</button>
            <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:${typePillBg};color:${typePillColor};flex-shrink:0">${typeIcon}${isParcel ? 'Parcel' : 'Letter'} &middot; ${pieces}</span>
            <span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:${isSpecial?'var(--red-dim)':'var(--bg-2)'};color:${isSpecial?'var(--red)':'var(--ink-3)'}">${isSpecial ? 'Special Case' : statusText}</span>

          </div>

          <!-- Row 2: sender → recipient -->
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:5px;font-size:13px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
              <span style="font-weight:600;color:var(--ink)">${m.senderName || '\u2014'}</span>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <div style="display:flex;align-items:center;gap:5px;font-size:13px">

              ${recipientHtml}
            </div>
          </div>

          <!-- Row 3: reason + location + logged by -->
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;${m.noteInternal ? 'margin-bottom:8px' : 'margin-bottom:12px'}">

          <!-- Internal note (if set) -->
          ${m.noteInternal ? `<div style="display:flex;align-items:flex-start;gap:6px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--ink-3);line-height:1.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>${m.noteInternal}</span></div>` : ''}

          <!-- Actions -->
          <div style="display:flex;align-items:center;gap:6px;padding-top:10px;border-top:1px solid var(--border)">
            <button class="btn btn-primary btn-sm" onclick="openAssignModal('${m.mailId}')">

  }).join('');

  el.innerHTML = summary + cards;
}

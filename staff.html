let _assignTarget = null;

function searchForAssign(query) {
  const results = qs('assign-results');
  if (!results || !query) { if(results) results.style.display='none'; return; }
  const q = query.toLowerCase();
  const isParcel = window._assignMailType === 'parcel';
  let hits = (_recipientCache||[]).filter(r => [r.name,r.companyName,r.planCardId].join(' ').toLowerCase().includes(q));
  // Filter out cancelled plans
  hits = hits.filter(r => r.accessStatus !== 'CANCELED');
  if (isParcel) hits = hits.filter(r => (r.parcelLimit || 0) > 0);
  hits = hits.slice(0,8);
  results.style.display = 'block';
  if (!hits.length) { results.innerHTML=`<div style="padding:10px 12px;color:var(--ink-4);font-size:13px">${isParcel ? 'No recipients with parcel support found' : 'No matches'}</div>`; return; }
  results.innerHTML = hits.map(r => {
    const parcelOk = (r.parcelLimit || 0) > 0;
    const data = JSON.stringify({recipientId:r.recipientId,name:r.name,companyName:r.companyName||'',planCardId:r.planCardId,clientId:r.clientId,subscriptionId:r.subscriptionId||'',parcelLimit:r.parcelLimit||0,planName:r.planName||'',autoFeature:r.autoFeature||'',accessStatus:r.accessStatus||''}).replace(/"/g,'&quot;');
    return `<div style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''" onclick="selectForAssign(${data})">
      <div style="font-weight:500">${r.name}${r.companyName?' \u00b7 <span style="color:var(--ink-4)">'+r.companyName+'</span>':''}</div>
      <div style="font-size:11px;color:var(--ink-4)">${r.planName||r.planCardId}${parcelOk ? ' \u00b7 <span style="color:var(--green)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg> Parcels OK</span>' : ' \u00b7 <span style="color:var(--ink-4)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg> Mail only</span>'}${r.accessStatus==='PAYMENT_REQUIRED'?' \u00b7 <span style="color:var(--red)">\u26a0\ufe0f Payment Required</span>':''}</div>
    </div>`;
  }).join('');
}

let _assignScanMode = 'url';
let _assignScanFile = null;
let _assignExpiryDays = 30;

function setAssignScanMode(mode) {
  _assignScanMode = mode;
  const urlBtn = document.getElementById('assign-scan-mode-url');
  const uploadBtn = document.getElementById('assign-scan-mode-upload');
  const urlInput = document.getElementById('assign-scan-url-input');
  const uploadInput = document.getElementById('assign-scan-upload-input');
  if (urlBtn) { urlBtn.style.background = mode==='url'?'var(--ink)':'var(--white)'; urlBtn.style.color = mode==='url'?'#fff':'var(--ink-3)'; }
  if (uploadBtn) { uploadBtn.style.background = mode==='upload'?'var(--ink)':'var(--white)'; uploadBtn.style.color = mode==='upload'?'#fff':'var(--ink-3)'; }
  if (urlInput) urlInput.style.display = mode==='url' ? '' : 'none';
  if (uploadInput) uploadInput.style.display = mode==='upload' ? '' : 'none';
}

function handleAssignScanFile(file) {
  if (!file) return;
  if (file.size > 5*1024*1024) { toast('File too large \u2014 max 5 MB','error'); return; }
  const allowed = ['image/jpeg','image/png','image/webp','application/pdf'];
  if (!allowed.includes(file.type)) { toast('Unsupported file type \u2014 use JPG, PNG, or PDF','error'); return; }
  _assignScanFile = file;
  const sizeStr = file.size < 1024*1024 ? (file.size/1024).toFixed(0)+' KB' : (file.size/1024/1024).toFixed(1)+' MB';
  const icon = file.type === 'application/pdf' ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>' : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
  const label = document.getElementById('assign-scan-drop-label');
  const preview = document.getElementById('assign-scan-file-preview');
  if (label) label.style.display = 'none';
  if (preview) {
    preview.style.display = 'block';
    preview.innerHTML = `<div class="scan-file-info"><span style="font-size:18px">${icon}</span><span class="file-name">${file.name}</span><span class="file-size">${sizeStr}</span><button class="remove-btn" onclick="event.stopPropagation();clearAssignScanFile()">\u2715 Remove</button></div>`;
  }
}

function clearAssignScanFile() {
  _assignScanFile = null;
  const label = document.getElementById('assign-scan-drop-label');
  const preview = document.getElementById('assign-scan-file-preview');
  const input = document.getElementById('assign-scan-file-input');
  if (label) label.style.display = 'flex';
  if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
  if (input) input.value = '';
}

function setAssignExpiry(days, btn) {
  _assignExpiryDays = days;
  document.querySelectorAll('.assign-expiry-chip').forEach(c => {
    c.classList.remove('active');
    c.style.background = 'var(--white)';
    c.style.color = 'var(--ink-4)';
  });
  if (btn) { btn.classList.add('active'); btn.style.background = 'var(--ink)'; btn.style.color = '#fff'; }
}

async function resolveAssignScanValue() {
  if (_assignScanMode === 'url') {
    return document.getElementById('assign-scan-url')?.value?.trim() || '';
  }
  if (!_assignScanFile) return '';
  try {
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(_assignScanFile);
    });
    const result = await apiPost({
      action: 'uploadScanImage', uuid: STATE.uuid, staffId: STATE.uuid,
      fileData: base64, fileName: _assignScanFile.name, mimeType: _assignScanFile.type
    });
    if (result.status === 'ok' && result.url) return result.url;
    throw new Error(result.message || 'Upload failed');
  } catch(err) {
    toast('Scan upload failed: ' + err.message, 'error');
    return null;
  }
}

function selectForAssign(data) {
  _assignTarget = data;
  _assignScanMode = 'url';
  _assignScanFile = null;
  _assignExpiryDays = 30;
  const results = qs('assign-results'); if (results) results.style.display='none';
  const search  = qs('assign-search');  if (search)  search.value = data.name;
  const sel = qs('assign-selected');
  if (sel) {
    sel.style.display = 'block';
    const n = qs('assign-sel-name'), sub = qs('assign-sel-sub');
    if (n) n.textContent = data.name + (data.companyName?' \u2014 '+data.companyName:'');
    const parcelOk = (data.parcelLimit || 0) > 0;
    if (sub) sub.innerHTML = (data.planName || data.planCardId) + (parcelOk ? ' \u00B7 <span style="color:var(--green)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M21 8 12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg> Parcels OK</span>' : ' \u00B7 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg> Mail only');
  }
  // Show scan field only for scan plans on non-parcel items
  const isScanPlan = data.autoFeature === 'scan';
  const isParcel = window._assignMailType === 'parcel';
  const scanWrap = document.getElementById('assign-scan-wrap');
  if (scanWrap) scanWrap.style.display = (isScanPlan && !isParcel) ? '' : 'none';
}

async function submitAssign(mailId) {
  if (!_assignTarget) { toast('Please select a recipient first','error'); return; }

  const isScanPlan = _assignTarget.autoFeature === 'scan';
  const isParcel = (() => { const m = (_allStaffMail||[]).find(x => x.mailId === mailId) || (window._excItems||[]).find(x => x.mailId === mailId); return m?.type === 'parcel'; })();
  const needsScan = isScanPlan && !isParcel;

  let scanUrl = null;
  let scanExpiresAt = null;

  if (needsScan) {
    const urlVal = document.getElementById('assign-scan-url')?.value?.trim();
    const hasScan = _assignScanMode === 'url' ? !!urlVal : !!_assignScanFile;
    if (!hasScan) {
      toast('Scan required \u2014 paste a URL or upload a file above', 'error');
      return;
    }
    const btn = qs('assign-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = _assignScanFile ? 'Uploading scan...' : 'Assigning...'; }
    scanUrl = await resolveAssignScanValue();
    if (scanUrl === null) {
      if (btn) { btn.disabled = false; btn.textContent = 'Assign'; }
      return;
    }
    const exp = new Date();
    exp.setDate(exp.getDate() + (_assignExpiryDays || 30));
    scanExpiresAt = exp.toISOString();
  }

  const btn = qs('assign-submit-btn');
  if (btn) { btn.disabled=true; btn.textContent='Assigning...'; }
  try {
    const payload = { action:'assignMailRecipient', uuid:STATE.uuid, mailId,
      recipientId:_assignTarget.recipientId, recipientName:_assignTarget.name,
      planCardId:_assignTarget.planCardId, clientId:_assignTarget.clientId,
      subscriptionId:_assignTarget.subscriptionId };
    if (scanUrl) { payload.scanImageUrl = scanUrl; payload.scanExpiresAt = scanExpiresAt; }
    const result = await apiPost(payload);
    if (result.status==='ok') {
      qs('assign-modal').remove();
      _assignTarget = null;
      _assignScanFile = null;
      toast('Mail assigned \u2014 now in main mail log', 'success');
      await loadExceptions();
      await loadStaffMailLog();
    } else throw new Error(result.message||'Failed');
  } catch(err) { toast(err.message,'error'); if (btn) { btn.disabled=false; btn.textContent='Assign'; } }
}


async function openDiscardModal(mailId) {
  const reason = await appPrompt({ title: 'Discard Item', message: 'Enter a reason for discarding this mail item:', placeholder: 'e.g. Junk mail, undeliverable...', confirmLabel: 'Discard', confirmClass: 'btn-danger' });
  if (reason === null) return;
  try {
    const r = await apiPost({ action:'updateMailStatus', uuid:STATE.uuid, staffName:STATE.access.name, mailId, status:'discarded', note:reason });
    if (r.status === 'ok') { toast('Item discarded', 'success'); await loadExceptions(); }
    else toast(r.message || 'Failed', 'error');
  } catch(e) { toast(e.message, 'error'); }
}

let _billActiveTab = 'ready';

async function loadBillingView() {
  const el = qs('bill-list'); if (!el) return;
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getOverageSummary`);
    _billingReadyToBill = data.readyToBill || [];
    _billingCurrentOverage = data.currentOverage || [];
    _billingHistory = data.billedHistory || [];

    const rc = qs('bill-tab-ready-count'); if (rc) rc.textContent = _billingReadyToBill.length ? '(' + _billingReadyToBill.length + ')' : '';
    const cc = qs('bill-tab-current-count'); if (cc) cc.textContent = _billingCurrentOverage.length ? '(' + _billingCurrentOverage.length + ')' : '';
    const hc = qs('bill-tab-history-count'); if (hc) hc.textContent = _billingHistory.length ? '(' + _billingHistory.length + ')' : '';
    filterBilling();
  } catch(e) { if(el) el.innerHTML=`<div style="color:var(--required);padding:20px">Error: ${e.message}</div>`; }

function switchBillTab(tab) {
  _billActiveTab = tab;
  ['ready','current','history'].forEach(t => {
    const btn = qs('bill-tab-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  filterBilling();
}

function filterBilling() {
  const q = (qs('bill-search')?.value || '').toLowerCase();
  const match = b => {
    if (!q) return true;
    const mailIds = [...(b.mailOverageItems||[]), ...(b.parcelOverageItems||[])]
      .map(m => [m.mailId, m.recipientName, m.senderName].filter(Boolean).join(' ')).join(' ');
    return [b.clientName, b.clientEmail, b.planName, b.planCardId, b.clientId, mailIds]
      .join(' ').toLowerCase().includes(q);
  };

  if (_billActiveTab === 'ready') {
    const items = _billingReadyToBill.filter(match);
    renderBillingList(items, [], [], !!q);
  } else if (_billActiveTab === 'current') {
    const items = _billingCurrentOverage.filter(match);
    renderBillingList([], items, [], !!q);
  } else {
    const items = (_billingHistory || []).filter(match);
    renderBillingList([], [], items, !!q);
  }
}

          <span class="bv-cg-email">\u00B7 ${g.clientEmail} \u00B7 ${g.plans.length} plan${g.plans.length>1?'s':''}</span>

          ${g.plans.map((b,pi) => buildPlanCard(b, uid+'-'+pi, showCb)).join('')}

    }).join('');
  }

  let html = '';

  const _recalcBtn = `<button class="bv-btn bv-btn-recalc bv-push" id="bill-recalc-btn" onclick="recalculateOverage()" title="Recalculate overage flags"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> <span class="bv-recalc-lbl">Recalculate</span></button>`;
  const _exportBtn = scope => `<button class="bv-btn" onclick="doExportCSV('${scope}')" title="Export CSV"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export CSV</button>`;

  // Ready to Bill section
  if (readyItems.length > 0) {
    const unbilledCount = readyItems.filter(b=>!b.isBilled).length;
    html += `<div class="bv-card">
      <div class="bv-card-head">
        <span class="bv-lead"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l2-8 4 16 2-8h4"/></svg></span>
        <span class="bv-h-title">Ready to Bill</span>
        ${unbilledCount>0?`<span class="bv-h-meta"><strong>${unbilledCount}</strong> owing</span>`:''}
        ${_recalcBtn}
        ${_exportBtn('ready')}
      </div>
      ${unbilledCount>0?`<div class="bv-bulkbar">
        <label class="bv-bulk-check"><input type="checkbox" id="bill-select-all" onchange="toggleAllBillCb(this.checked)"> Select all (${unbilledCount})</label>
        <button class="bv-markbulk" onclick="markSelectedBilled()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Mark Selected as Billed</button>
      </div>`:''}
      ${buildClientGroup(readyItems, 'r', true)}
    </div>`;
  }

  // Current Period section
  if (currentItems.length > 0) {
    html += `<div class="bv-running-note"><span class="bv-dot"></span> Overage is running \u2014 billing available after the period ends</div>
    <div class="bv-card">
      <div class="bv-card-head">
        <span class="bv-lead"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></span>
        <span class="bv-h-title">Current period</span>
        <span class="bv-h-meta"><strong>${currentItems.length}</strong> accruing</span>
        ${_recalcBtn}
        ${_exportBtn('current')}
      </div>
      ${buildClientGroup(currentItems, 'c', false)}
    </div>`;
  }

  // History section
  if (historyItems.length > 0) {
    html += `<div class="bv-card">
      <div class="bv-card-head">
        <span class="bv-lead"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></span>
        <span class="bv-h-title">Billing history</span>
        <span class="bv-h-meta" style="color:var(--ink-4)">${historyItems.length} billed period${historyItems.length > 1 ? 's' : ''}</span>
        <span class="bv-push"></span>
        ${_exportBtn('history')}
      </div>
      ${buildClientGroup(historyItems, 'h', false)}
    </div>`;
  }

  el.innerHTML = html || (searchActive ? _noMatchSlate('No matching billing items', 'No billing items match your search \u2014 try a different term or clear it.') : _blankSlate(
    (_billActiveTab === 'history'
      ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>'
      : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'),
    (_billActiveTab === 'ready' ? 'Nothing to bill' : _billActiveTab === 'current' ? 'No current period overage' : 'No billing history yet'),
    (_billActiveTab === 'history' ? 'Past overage charges will be listed here.' : 'No overage charges are waiting for this period.')
  ));
}


async function recalculateOverage() {
  const btn = document.querySelector('[onclick*="recalculateOverage"]');
  if (btn) { btn.disabled = true; const svg = btn.querySelector('svg'); if (svg) svg.style.animation = 'refresh-spin 0.8s linear infinite'; }
  try {
    const result = await apiPost({ action: 'recalculateOverage', uuid: STATE.uuid });
    toast(`Overage recalculated: ${result.flagged || 0} flagged, ${result.unflagged || 0} unflagged`, 'success');
    await loadBillingView();
  } catch(e) { toast(e.message, 'error'); }
  const btn2 = document.querySelector('[onclick*="recalculateOverage"]');
  if (btn2) { btn2.disabled = false; const svg2 = btn2.querySelector('svg'); if (svg2) svg2.style.animation = ''; }
}

function toggleAllBillCb(checked) {
  document.querySelectorAll('.bill-plan-cb').forEach(cb => cb.checked = checked);
}
function updateBillSelectAll() {
  const all = document.querySelectorAll('.bill-plan-cb');
  const checked = document.querySelectorAll('.bill-plan-cb:checked');
  const selectAll = qs('bill-select-all');
  if (selectAll) selectAll.checked = all.length > 0 && all.length === checked.length;
}
async function markSelectedBilled() {
  const checked = document.querySelectorAll('.bill-plan-cb:checked');
  const selectedCount = checked.length;
  const pcIds = [...new Set(Array.from(checked).map(cb => cb.dataset.pcid))];
  if (!pcIds.length) { toast('No plans selected', 'error'); return; }
  const confirmed = await appConfirm({ title: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2.5 2 0 0 1 5 0c0 1.4-1.1 1.8-2.5 2-1.4.2-2.5.6-2.5 2a2.5 2 0 0 0 5 0"/></svg> Mark as Billed', message: 'Mark <strong>' + selectedCount + ' item' + (selectedCount > 1 ? 's' : '') + '</strong> (' + pcIds.length + ' plan card' + (pcIds.length > 1 ? 's' : '') + ') as billed for their current period?', confirmLabel: 'Mark as Billed', confirmClass: 'btn-primary' });
  if (!confirmed) return;
  let ok = 0;
  for (const pcId of pcIds) {
    try {
      const r = await apiPost({ action: 'markOverageBilled', uuid: STATE.uuid, planCardId: pcId });
      if (r.status === 'ok') ok++;
    } catch(e) {}
  }
  toast(ok + ' plan' + (ok > 1 ? 's' : '') + ' marked as billed', 'success');
  await loadBillingView();
}

async function markOverageBilled(planCardId) {
  try {
    const result = await apiPost({ action: 'markOverageBilled', uuid: STATE.uuid, planCardId });
    if (result.status === 'ok') {
      toast('Marked as billed', 'success');
      await loadBillingView();
    } else throw new Error(result.message);
  } catch(e) { toast(e.message, 'error'); }
}

async function exportOverageCSV() {
  const scope = await appConfirm({ title: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.7 4H7.3a2 2 0 0 0-1.8 1.5z"/></svg> Export Overage CSV', message: 'Which data would you like to export?<br><br><button id="csv-ready" class="btn btn-sm btn-primary" style="margin-right:6px">Ready to Bill only</button><button id="csv-current" class="btn btn-sm btn-secondary" style="margin-right:6px">Current period only</button><button id="csv-both" class="btn btn-sm btn-secondary">Both</button>', confirmLabel: '', cancelLabel: 'Cancel' });
  // appConfirm doesn't support 3 buttons natively \u2014 use a simpler approach
  return; // placeholder
}
function doExportCSV(scope) {
  let items = [];
  if (scope === 'ready') items = _billingReadyToBill.filter(b => b.hasOverage);
  else if (scope === 'current') items = _billingCurrentOverage.filter(b => b.hasOverage);
  else if (scope === 'history') items = (_billingHistory || []).filter(b => b.hasOverage);
  else items = [..._billingReadyToBill, ..._billingCurrentOverage].filter(b => b.hasOverage);
  if (!items.length) { toast('No overage data to export', 'error'); return; }
  const headers = ['Client Name','Client Email','Plan Name','Plan Card ID','Period Start','Period End','Period Status','Mail Used','Mail Limit','Mail Overage','Mail Fee','Mail Total','Parcels Used','Parcel Limit','Parcel Overage','Parcel Fee','Parcel Total','Subtotal','Billed','Overage Mail IDs','Overage Parcel IDs'];
  const rows = items.map(b => [
    b.clientName, b.clientEmail, b.planName, b.planCardId, b.periodStart, b.periodEnd,
    b.isCurrent ? 'Current' : 'Completed',
    b.mailUsed, b.mailLimit, b.mailOverageCount, '$'+b.mailOverageFee.toFixed(2), '$'+b.mailOverageTotal.toFixed(2),
    b.parcelUsed, b.parcelLimit, b.parcelOverageCount, '$'+b.parcelOverageFee.toFixed(2), '$'+b.parcelOverageTotal.toFixed(2),
    '$'+b.subtotal.toFixed(2),
    b.isBilled ? 'Yes' : 'No',
    b.mailOverageItems.map(m=>m.mailId).join('; '), b.parcelOverageItems.map(m=>m.mailId).join('; ')
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => '"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'overage-report-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('Overage CSV exported', 'success');
}

// ── Create Charge — one-time charge to the client's card on file ─────────────
// Opens a two-step modal (enter items → review → charge). Tax is the plan card
// location's saved rate (display only; the server recomputes it). Caps: 5 items,
// $500 tax-inclusive total. On confirm the createCharge action calls the
// create-charge edge function, which charges the card or leaves an open invoice.
var _CC = null;
function _ccClick(el) {
  // Pull the plan card context off the button's data-* attributes.
  var d = (el && el.dataset) ? el.dataset : {};
  _CC = {
    clientId:   d.clientId   || '',
    planCardId: d.planCardId || '',
    locationId: d.locationId || '',
    clientName: d.clientName || 'Client',
    planName:   d.planName   || '',
    taxName:    d.taxName    || 'Tax',
    taxRate:    parseFloat(d.taxRate || '0') || 0,
    rows: [{ desc:'', qty:'1.00', unit:'' }],
    step: 1,
  };
  _ccRender();
}

var _CC_MAX_ROWS = 5, _CC_MAX_TOTAL = 500;
var _CC_PRESETS = ['Key/fob','Extra mail handling','Scan / copy','Shredding','Custom'];

function _ccMoney(n){ return '$' + (Math.round(n*100)/100).toFixed(2); }
function _ccClean(v){ return String(v).replace(/[^0-9.]/g,'').replace(/(\..*)\./g,'$1'); }
function _ccFmt2(v){ var n=parseFloat(v); return isNaN(n)?'':n.toFixed(2); }
function _ccLineAmt(r){ var q=parseFloat(r.qty)||0, u=parseFloat(r.unit)||0; return q*u; }
function _ccRowStarted(r){ return r.desc.trim()!=='' || (String(r.unit).trim()!=='' && parseFloat(r.unit)>0); }
function _ccRowComplete(r){ return r.desc.trim()!=='' && (parseFloat(r.qty)||0)>0 && (parseFloat(r.unit)||0)>0; }
function _ccValidRows(){ return _CC.rows.filter(_ccRowComplete); }
function _ccAllComplete(){ var s=_CC.rows.filter(_ccRowStarted); return s.length>0 && s.every(_ccRowComplete); }
function _ccCalc(){
  var sub=0; _ccValidRows().forEach(function(r){ sub+=_ccLineAmt(r); });
  var tax=Math.round(sub*(_CC.taxRate/100)*100)/100;
  return { sub:sub, tax:tax, tot:Math.round((sub+tax)*100)/100 };
}

function _ccClose(){ if(_CC && _CC.busy) return; var ov=document.getElementById('cc-ov'); if(ov) ov.remove(); _CC=null; }

function _ccRender(){
  var ov=document.getElementById('cc-ov');
  if(!ov){
    ov=document.createElement('div');
    ov.id='cc-ov'; ov.className='modal-overlay';
    ov.addEventListener('mousedown',function(e){ ov._d=(e.target===ov); });
    ov.addEventListener('mouseup',function(e){ if(e.target===ov && ov._d) _ccClose(); ov._d=false; });
    document.body.appendChild(ov);
  }
  ov.innerHTML = (_CC.step===1) ? _ccEntryHTML() : _ccReviewHTML();
  if(_CC.step===1){ _ccBindRows(); _ccRecalc(); }
}

function _ccEntryHTML(){

    + '<div style="padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px">'
      + '<div class="cc-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>'
      + '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:var(--ink)">Create Charge</div>'
      + '<div style="font-size:12px;color:var(--ink-3);margin-top:2px">'+_ccEsc(_CC.clientName)+(_CC.planName?' \u00B7 '+_ccEsc(_CC.planName):'')+'</div></div>'
      + '<button type="button" onclick="_ccClose()" style="background:none;border:none;font-size:20px;line-height:1;color:var(--ink-4);cursor:pointer;padding:2px">\u00D7</button>'
    + '</div>'
    + '<div style="padding:16px 20px;max-height:64vh;overflow-y:auto">'
      + '<div style="margin-bottom:15px"><div class="cc-lbl">Quick add</div><div style="display:flex;flex-wrap:wrap;gap:7px">'+chips+'</div></div>'
      + '<div style="margin-bottom:15px"><div class="cc-lbl">Items <span style="float:right;color:var(--ink-4);text-transform:none;letter-spacing:0;font-weight:500">Max 5 \u00B7 total up to $500</span></div>'
        + '<div class="cc-lihead"><span>Description</span><span>Qty</span><span>Unit $</span><span style="text-align:right">Amount</span><span></span></div>'
        + '<div id="cc-rows"></div>'
        + '<button type="button" id="cc-add" class="cc-addrow" onclick="_ccAddRow()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add item</button>'
        + '<div id="cc-capnote" style="font-size:11px;color:var(--ink-4);margin-top:4px"></div>'
      + '</div>'
      + '<div class="cc-taxbox">'
        + '<div class="cc-taxrow"><span>Subtotal</span><span id="cc-sub">$0.00</span></div>'
        + '<div class="cc-taxrow" style="color:var(--ink-3)"><span id="cc-taxl">'+_ccEsc(_CC.taxName)+' ('+_CC.taxRate+'%)</span><span id="cc-tax">$0.00</span></div>'
        + '<div class="cc-taxrow cc-grand" id="cc-grandrow"><span>Total</span><span id="cc-tot">$0.00</span></div>'
      + '</div>'
      + '<div class="cc-warn" id="cc-over"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> A single charge can\u2019t exceed $500. Reduce the total to continue.</div>'
      + '<div class="cc-warn" id="cc-inc"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Each item needs a description, quantity, and unit price. Complete or remove the highlighted rows.</div>'
    + '</div>'
    + '<div style="padding:14px 20px 18px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--border);background:var(--bg)">'
      + '<button type="button" class="cc-btn-ghost" onclick="_ccClose()">Cancel</button>'
      + '<button type="button" class="cc-btn-go" id="cc-review" onclick="_ccGoReview()">Review \u2192</button>'
    + '</div>'
  + '</div>';
}

function _ccBindRows(){
  var wrap=document.getElementById('cc-rows'); if(!wrap) return;
  wrap.innerHTML='';
  _CC.rows.forEach(function(r,i){
    var row=document.createElement('div'); row.className='cc-lirow';
    row.innerHTML =
      '<input class="cc-inp desc" placeholder="Description" value="'+_ccEsc(r.desc)+'">'+
      '<input class="cc-inp q" inputmode="decimal" placeholder="1.00" value="'+_ccEsc(r.qty)+'">'+
      '<input class="cc-inp u" inputmode="decimal" placeholder="0.00" value="'+_ccEsc(r.unit)+'">'+
      '<span class="cc-liamt">'+_ccMoney(_ccLineAmt(r))+'</span>'+
      '<button type="button" class="cc-lidel" title="Remove">\u00D7</button>';
    var ins=row.querySelectorAll('input');
    ins[0].oninput=function(){ r.desc=this.value; };
    ins[1].oninput=function(){ this.value=_ccClean(this.value); r.qty=this.value; _ccRecalc(); };
    ins[1].onblur =function(){ this.value=_ccFmt2(this.value); r.qty=this.value; _ccRecalc(); };
    ins[2].oninput=function(){ this.value=_ccClean(this.value); r.unit=this.value; _ccRecalc(); };
    ins[2].onblur =function(){ this.value=_ccFmt2(this.value); r.unit=this.value; _ccRecalc(); };
    row.querySelector('.cc-lidel').onclick=function(){ _ccDelRow(i); };
    wrap.appendChild(row);
  });
  var add=document.getElementById('cc-add'); if(add) add.disabled=_CC.rows.length>=_CC_MAX_ROWS;
  var cn=document.getElementById('cc-capnote'); if(cn) cn.textContent=_CC.rows.length>=_CC_MAX_ROWS?'Maximum of 5 items reached.':(_CC.rows.length+' of 5 items');
}

function _ccQuickAdd(i){
  var label=_CC_PRESETS[i], custom=(label==='Custom');
  var t=-1;
  for(var k=0;k<_CC.rows.length;k++){ if(!_CC.rows[k].desc.trim()){ t=k; break; } }
  if(t===-1){ if(_CC.rows.length>=_CC_MAX_ROWS) return; _CC.rows.push({desc:'',qty:'1.00',unit:''}); t=_CC.rows.length-1; }
  _CC.rows[t].desc = custom?'':label;
  _ccBindRows(); _ccRecalc();
  var d=document.querySelectorAll('#cc-rows .desc'); if(d[t]) d[t].focus();
}
function _ccAddRow(){
  if(_CC.rows.length>=_CC_MAX_ROWS) return;
  _CC.rows.push({desc:'',qty:'1.00',unit:''}); _ccBindRows(); _ccRecalc();

async function _ccDoCharge(){
  if(_CC && _CC.busy) return;            // guard against double-submit
  _CC.busy = true;                        // lock: no back / no exit while charging
  var btn=document.getElementById('cc-charge');
  var backBtn=document.getElementById('cc-back');
  var xBtn=document.getElementById('cc-x');
  if(btn){ btn.disabled=true; btn.textContent='Charging\u2026'; }
  if(backBtn){ backBtn.disabled=true; backBtn.style.opacity='.45'; backBtn.style.cursor='not-allowed'; }
  if(xBtn){ xBtn.disabled=true; xBtn.style.opacity='.45'; xBtn.style.cursor='not-allowed'; }
  var t=_ccCalc();
  var items=_ccValidRows().map(function(r){ return { desc:r.desc.trim(), qty:parseFloat(r.qty)||0, unit:parseFloat(r.unit)||0 }; });
  var _unlock=function(){
    _CC.busy=false;
    if(btn){ btn.disabled=false; btn.textContent='Charge '+_ccMoney(t.tot); }
    if(backBtn){ backBtn.disabled=false; backBtn.style.opacity=''; backBtn.style.cursor=''; }
    if(xBtn){ xBtn.disabled=false; xBtn.style.opacity=''; xBtn.style.cursor=''; }
  };
  try{
    var res=await apiPost({
      action:'createCharge', uuid:STATE.uuid,
      clientId:_CC.clientId, planCardId:_CC.planCardId, locationId:_CC.locationId,
      items:items,
    });
    if(res && res.status==='ok'){
      var paid=(res.outcome==='paid');
      _CC.busy=false;                     // allow close now that we're done
      _ccClose();
      if(paid){
        var _cardTxt='';
        if(res.card && res.card.last4){
          var _b=(res.card.brand||'card'); _b=_b.charAt(0).toUpperCase()+_b.slice(1);
          _cardTxt=' to '+_b+' \u00B7\u00B7\u00B7\u00B7 '+res.card.last4;
        }
        toast('Charge paid \u2014 '+_ccMoney(res.total||t.tot)+_cardTxt);
      } else {
        // Card declined \u2014 invoice was created for the client to pay. They're notified.
        toast('Payment failed \u2014 open invoice created for '+_ccMoney(res.total||t.tot)+'. The client has been notified to pay it.');
      }
      try{ var _cf=(typeof qs==='function')?qs('clients-full'):document.getElementById('clients-full'); if(_cf && typeof renderClientsView==='function') renderClientsView(_cf); }catch(_e){}
    } else {
      _unlock();
      toast((res && res.message) ? res.message : 'Charge failed','error');
    }
  }catch(e){
    _unlock();
    toast('Charge failed','error');
  }
}

async function loadClientsView() {
  const el = qs('pc-list'); if (!el) return;
  try {
    const data = await api(`uuid=${STATE.uuid}&action=getPlanCardsStaff`);
    _allPlanCards = data.planCards || [];
    // Merge pending-setup clients (paid, onboarding incomplete, no plan card yet).
    // Isolated so a failure here can never break the main Clients list. The
    // adapter returns pending clients company-wide; scope them to this staff
    // member's location (matching how their plan-card list is scoped). A pending
    // client with no location_id is shown so none are lost.
    try {
      const pend = await api(`uuid=${STATE.uuid}&action=getPendingSetupClients`);
      const _staffLoc = STATE.access && STATE.access.locationId;
      const pendingClients = ((pend && pend.pendingClients) || [])
        .filter(p => !_staffLoc || !p.locationId || p.locationId === _staffLoc);
      if (pendingClients.length) _allPlanCards = _allPlanCards.concat(pendingClients);
    } catch (pe) { /* pending fetch failed — main list still renders */ }
    // Populate plan name filter
    const planFilter = qs('pc-plan-filter');
    if (planFilter) {
      const planNames = [...new Set(_allPlanCards.map(pc => pc.planName).filter(Boolean))].sort();
      planFilter.innerHTML = '<option value="">All Plans</option>' + planNames.map(n => `<option value="${n}">${n}</option>`).join('');
    }
    filterPlanCards(qs('pc-search') ? qs('pc-search').value : '');
    if (window._currentOpenClientId) setTimeout(() => {
      // Always re-render the open detail pane with the freshly-loaded data so
      // state changes (lock/unlock, plan edits) and manual refresh are reflected.
      // (openClientPane rebuilds the pane HTML from _allPlanCards.)
      if (_allPlanCards.some(pc => pc.clientId === window._currentOpenClientId)) {
        openClientPane(window._currentOpenClientId);
      }
    }, 0);
  } catch(e) { if(el) el.innerHTML=`<div style="color:var(--required);padding:20px">Error: ${e.message}</div>`; }
}

function setPcStatus(btn, val) {
  document.querySelectorAll('#pc-chip-row .chip-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

}

// Over-limit predicate: a card is over if mail OR parcel usage strictly exceeds its limit.
// (limit must be > 0 to count — a 0 limit means the feature isn't included, not "over".)
function _pcOverLimit(pc) {
  const mailOver   = (pc.mailLimit   || 0) > 0 && (pc.mailsUsed   || 0) > (pc.mailLimit   || 0);
  const parcelOver = (pc.parcelLimit || 0) > 0 && (pc.parcelsUsed || 0) > (pc.parcelLimit || 0);
  return mailOver || parcelOver;
}

function filterPlanCards(query) {
  const q      = (query||'').toLowerCase();
  const status = qs('pc-status-filter') ? qs('pc-status-filter').value : '';
  const planName = qs('pc-plan-filter') ? qs('pc-plan-filter').value : '';
  const custType = qs('pc-type-filter') ? qs('pc-type-filter').value : '';
  const sort   = qs('pc-sort') ? qs('pc-sort').value : 'newest';
  let filtered = _allPlanCards;

  // Status filter
  if (status === 'SUSPENDED') {
    filtered = filtered.filter(pc => pc.accessOverride === 'suspended' || pc.clientAccessOverride === 'suspended');
  } else if (status === 'OVER_LIMIT') {
    filtered = filtered.filter(_pcOverLimit);
  } else if (status === 'ID_VERIFIED') {
    filtered = filtered.filter(pc => pc.idVerificationStatus === 'approved');
  } else if (status === 'ID_UNVERIFIED') {
    filtered = filtered.filter(pc => pc.idVerificationStatus !== 'approved');
  } else if (status) {
    filtered = filtered.filter(pc => (pc.accessStatus||'') === status && pc.accessOverride !== 'suspended' && pc.clientAccessOverride !== 'suspended');
  }

  // Plan name filter
  if (planName) {
    filtered = filtered.filter(pc => pc.planName === planName);
  }

  // Customer type filter
  if (custType) {
    filtered = filtered.filter(pc => (pc.customerType||'') === custType);
  }

  // Text search
  if (q) filtered = filtered.filter(pc =>
    [pc.planCardId,pc.planName,pc.clientId,pc.clientName,pc.clientEmail||'',pc.clientPhone||'',...(pc.recipients||[]).map(r=>r.name+' '+(r.companyName||'')+' '+(r.email||'')+' '+(r.recipientId||r.id||'')),pc.businessDescription||'',(pc.notes||''),(pc.referralSource||''),(pc.subscriptionId||'')].join(' ').toLowerCase().includes(q)
  );

  // Sort
  filtered = [...filtered].sort((a, b) => {
    switch (sort) {
      case 'name-asc':  return (a.clientName||'').localeCompare(b.clientName||'');
      case 'name-desc': return (b.clientName||'').localeCompare(a.clientName||'');
      case 'plan-asc':  return (a.planName||'').localeCompare(b.planName||'');
      case 'recipients-desc': return (b.recipients||[]).filter(r=>r.status==='active').length - (a.recipients||[]).filter(r=>r.status==='active').length;
      case 'recipients-asc':  return (a.recipients||[]).filter(r=>r.status==='active').length - (b.recipients||[]).filter(r=>r.status==='active').length;
      case 'newest': return (b.memberSince||b.createdAt||'').localeCompare(a.memberSince||a.createdAt||'');
      case 'oldest': return (a.memberSince||a.createdAt||'').localeCompare(b.memberSince||b.createdAt||'');
      default: return 0;
    }
  });

  // Over-limit chip count badge (always reflects the full set, not the active filter)
  const olCountEl = qs('pc-overlimit-count');
  if (olCountEl) {
    const olN = _allPlanCards.filter(_pcOverLimit).length;
    if (olN > 0) { olCountEl.textContent = ' (' + olN + ')'; olCountEl.style.display = ''; }
    else { olCountEl.textContent = ''; olCountEl.style.display = 'none'; }
  }

  // Count
  const countEl = qs('pc-count');
  if (countEl) {
    const uniqueClients = new Set(filtered.map(pc => pc.clientId)).size;
    const suspended = _allPlanCards.filter(pc => pc.accessOverride === 'suspended' || pc.clientAccessOverride === 'suspended').length;
    const parts = [`${uniqueClients} client${uniqueClients!==1?'s':''} \u00B7 ${filtered.length} plan card${filtered.length!==1?'s':''}`];
    if (suspended > 0) parts.push(`${suspended} suspended`);
    countEl.textContent = parts.join(' \u00B7 ');
  }

  renderClientsList(filtered, !!(q || status || planName || custType), status === 'OVER_LIMIT' && !q && !planName && !custType);
}

          </div>
          <div class="cl-sub" style="color:var(--ink-4)">Awaiting setup</div>
        </div>
        <div style="color:var(--ink-4);font-size:12px;flex-shrink:0">\u203A</div>
      </div>`;
    }
    const eff = pcs.some(pc=>pc.clientAccessOverride==='suspended') ? 'ACCOUNT_LOCKED'
      : pcs.some(pc=>pc.accessOverride==='suspended') ? 'SUSPENDED'
      : pcs.reduce((w,pc)=>{ const s=pc.accessStatus||'ACTIVE'; return (sp[s]??9)<(sp[w]??9)?s:w; },'ACTIVE');
    const s = si[eff]||si['ACTIVE'];
    const rowCls = 'clr' + (eff==='ACCOUNT_LOCKED'||eff==='SUSPENDED'?' cl-sus':eff==='PAYMENT_REQUIRED'||eff==='CANCELED_WITH_ACCESS'?' cl-pay':eff==='CANCELED'?' cl-can':'')
                 + (window._currentOpenClientId===cid?' cl-sel':'');
    const mail = pcs.reduce((n,pc)=>n+(pc.mailInStorage||0),0);
    const ini  = (cl.clientName||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const idPill = cl.idVerificationStatus==='approved'
      ? '<span style="display:inline-flex;align-items:center;gap:3px;color:var(--green);font-size:10px;font-weight:600"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/></svg> ID Verified</span>'
      : cl.idVerificationStatus==='submitted'
      ? '<span class="pill warning" style="font-size:9px">ID Pending</span>'
      : '';
    const multiPill = pcs.length>1?'<span class="pill" style="background:var(--blue-bg);color:var(--blue);font-size:9px">'+pcs.length+' plan cards</span>':'';
    const planLbl = pcs.length===1?(pcs[0].planName||'')+(pcs[0].friendlyName?' \u00B7 '+pcs[0].friendlyName:''):pcs.map(p=>p.planName||'').filter(Boolean).join(' + ');
    // Build styled tags — country + features use their own CSS classes
    const recCount = pcs.reduce((n,pc)=>n+(pc.recipients||[]).filter(r=>r.status==='active').length,0);
    const ct = pcs[0] ? pcs[0].customerType : null;
    const hasFwd  = pcs.some(pc=>pc.autoFeature==='forwarding'||pc.autoFeature==='ship');
    const hasScan = pcs.some(pc=>pc.autoFeature==='scan');
    const tagParts = [
      `<span class="cl-tg">${recCount} recipient${recCount!==1?'s':''}</span>`,
      hasFwd  ? '<span class="cl-feat-fwd"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"/><polygon points=\"22 2 15 22 11 13 2 9 22 2\"/></svg> Forwarding</span>' : null,
      hasScan ? '<span class="cl-feat-scan"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M1 4.5A2.5 2.5 0 0 1 3.5 2h3M1 19.5A2.5 2.5 0 0 0 3.5 22h3M22.9 4.5A2.5 2.5 0 0 0 20.4 2h-3M22.9 19.5A2.5 2.5 0 0 1 20.4 22h-3M7 12h10\"/></svg> Scanning</span>' : null,
      ct==='canadian'   ? '<span class="cl-tg-ca">CA</span>'   : null,
      ct==='us'         ? '<span class="cl-tg-us">US</span>'   : null,
      ct&&ct!=='canadian'&&ct!=='us' ? '<span class="cl-tg-intl">INTL</span>' : null,
      cl.lastMailDate   ? `<span class="cl-tg">Last mail ${fDS(cl.lastMailDate)}</span>` : null
    ].filter(Boolean);

    return `<div class="${rowCls}" onclick="openClientPane('${cid}')" id="clrow-${cid}">
      <div class="cl-av">${ini}</div>
      <div class="cl-info">
        <div class="cl-nr">
          <span class="cl-nm">${cl.clientName||'\u2014'}</span>
          <span class="pill ${s.cls}" style="font-size:10px">${s.lbl}</span>
          ${idPill}${multiPill?'&nbsp;'+multiPill:''}
        </div>
        <div class="cl-sub">${planLbl}</div>
        <div class="cl-tgs">${tagParts.join('')}</div>
      </div>
      <div class="cl-st">
        <div class="cl-sv ${mail>5?'al':mail===0?'mu':''}">${mail}</div>
        <div class="cl-sl">In Storage</div>
      </div>
      <div style="color:var(--ink-4);font-size:12px;flex-shrink:0">\u203A</div>
    </div>`;
  };

  // Partition: pending-setup clients float to the top under their own heading,
  // normal clients below. Headings only render when both groups are non-empty
  // (or to label the pending group when it exists). Order within each group
  // preserves clientOrder (already sorted by filterPlanCards).
  const pendingIds = clientOrder.filter(cid => clientMap[cid].planCards.every(pc => pc.pendingSetup));
  const nonPending = clientOrder.filter(cid => !clientMap[cid].planCards.every(pc => pc.pendingSetup));
  const attentionIds = nonPending.filter(_needsAttention);
  const normalIds    = nonPending.filter(cid => !_needsAttention(cid));
  const secLbl = (txt, count) => `<div class="cl-grp-lbl" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-4);padding:14px 4px 7px">${txt}${count!=null?' \u00B7 '+count:''}</div>`;
  const attnLbl = (count) => `<div class="cl-grp-lbl" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--required);padding:14px 4px 7px;display:flex;align-items:center;gap:5px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Needs Attention${count!=null?' \u00B7 '+count:''}</div>`;

  let out = '';
  if (pendingIds.length) {
    out += secLbl('Awaiting Setup', pendingIds.length);
    out += pendingIds.map(renderRow).join('');
  }
  if (attentionIds.length) {
    out += attnLbl(attentionIds.length);
    out += attentionIds.map(renderRow).join('');
  }
  if (normalIds.length) {
    if (pendingIds.length || attentionIds.length) out += secLbl('Clients', normalIds.length);
    out += normalIds.map(renderRow).join('');
  }
  el.innerHTML = out;
}

// Clients pane: name chip copies the client ID; small "Copied" feedback
function _clNameCopy(el, val){
  if(!val) return;
  navigator.clipboard.writeText(val).catch(function(){});
  var label = el.querySelector('.cl-nm-label');
  if(!label) return;
  var orig = label.textContent;
  el.classList.add('cl-namecopied');
  label.textContent = 'Copied';
  setTimeout(function(){ label.textContent = orig; el.classList.remove('cl-namecopied'); }, 1100);
}

// Clients pane: contact pill chip (email/phone) — copies the value, small "Copied" flash
function _clCopyChip(el, val){
  if(!val) return;
  navigator.clipboard.writeText(val).catch(function(){});
  var label = el.querySelector('.cl-cc-label');
  if(!label) return;
  var orig = label.textContent;
  el.classList.add('cl-cc-copied');
  label.textContent = 'Copied';
  setTimeout(function(){ label.textContent = orig; el.classList.remove('cl-cc-copied'); }, 1100);
}

function openClientPane(clientId) {
  window._currentOpenClientId = clientId;
  window._currentOpenPaneClientId = clientId;
  // Highlight row
  document.querySelectorAll('.clr').forEach(r => r.classList.toggle('cl-sel', r.id==='clrow-'+clientId));

  const pane = document.getElementById('cl-detail-pane');
  if (!pane) return;
  pane.classList.add('open');

  const pcs = _allPlanCards.filter(pc => pc.clientId === clientId);
  if (!pcs.length) return;
  const cl = pcs[0];
  // Last mail across ALL of this client's plan cards (pcs[0].lastMailDate alone
  // would only reflect one card). Kept in a separate var to avoid mutating the cache.
  const _clLastMail = pcs.reduce((mx, pc) => (pc.lastMailDate && (!mx || pc.lastMailDate > mx)) ? pc.lastMailDate : mx, null);
  // Reusable "how long ago" for a date string (per-plan-card "Started" row).
  const _planDur = (ds) => {
    if(!ds) return '';
    const now=new Date(), then=new Date(ds);
    if(isNaN(then.getTime())) return '';
    let y=now.getFullYear()-then.getFullYear(), m=now.getMonth()-then.getMonth();
    if(m<0){y--;m+=12;}
    if(y===0&&m===0) return 'this month';
    if(y===0) return m+' month'+(m!==1?'s':'');
    if(m===0) return y+' year'+(y!==1?'s':'');
    return y+' year'+(y!==1?'s':'')+' '+m+' mo';
  };

  const fDS = d => { if(!d)return''; try{return fmtDate(d).replace(/,? \d{4}$/,'');}catch(e){return '';} };
  const fDL = d => { if(!d)return'\u2014'; try{return fmtDate(d);}catch(e){return '\u2014';} };
  const fmtP = (s,e) => s&&e?fDS(s)+' \u2013 '+fDS(e):'\u2014';

  const dur = (() => {
    if(!cl.memberSince)return'';
    const now=new Date(),then=new Date(cl.memberSince);
    let y=now.getFullYear()-then.getFullYear(),m=now.getMonth()-then.getMonth();
    if(m<0){y--;m+=12;}
    if(y===0&&m===0)return'just joined';
    if(y===0)return m+' month'+(m!==1?'s':'');
    if(m===0)return y+' year'+(y!==1?'s':'');
    return y+' year'+(y!==1?'s':'')+' '+m+' mo';
  })();

  const acctLocked=cl.clientAccessOverride==='suspended';
  const byAdmin=acctLocked&&cl.clientOverrideBy&&cl.clientOverrideBy!==STATE.uuid;
  const inStore=pcs.reduce((n,pc)=>n+(pc.mailInStorage||0),0);
  const overdue=pcs.reduce((n,pc)=>n+(pc.mailOverdue  ||0),0);
  const fwdQ   =pcs.reduce((n,pc)=>n+(pc.mailFwdQueue ||0),0);
  const ini=(cl.clientName||'??').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const idBadge=cl.idVerificationStatus==='approved'
    ?'<span style="display:inline-flex;align-items:center;gap:3px;color:var(--green);font-size:10px;font-weight:600"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/></svg> ID Verified</span>'
    :cl.idVerificationStatus==='submitted'
    ?'<span class="pill warning" style="font-size:9px">ID Pending</span>'
    :'';
  const sinfo={'ACTIVE':{cls:'active-plan',lbl:'Active'},'CANCELED_WITH_ACCESS':{cls:'warning',lbl:'Cancelling'},'PAYMENT_REQUIRED':{cls:'payment_req',lbl:'Payment Required'},'CANCELED':{cls:'expired',lbl:'Cancelled'},'SUSPENDED':{cls:'payment_req',lbl:'Plan Suspended'}};

  // ── Build pane HTML using CSS classes ─────────────────────────────────────
  let h = '';

  // ── Fix 4: Rich sticky header — name, id badge, email, phone, member since ──
  // ── Design 1: Large avatar · stacked info right ──────────────────────────────
  // Pre-compute lock reason banner (avoids SVG escaping hell inside template literals)
  const _acctLockBanner = (() => {
    if (!acctLocked || !cl.clientOverrideReason) return '';
    const _raw = cl.clientOverrideReason;
    const _comment = _raw.replace(/\s*\u2014?\s*(?:Suspended\s+)?by\s+(?:staff|admin)\s*\([^)]+\)/i,'').replace(/^Suspended\s*/i,'').trim();
    const _byMatch = _raw.match(/by\s+(?:staff|admin)\s*\(([^)]+)\)/i);
    const _byLabel = cl.clientOverrideBy===STATE.uuid ? 'by you' : (_byMatch ? 'by '+_byMatch[1] : 'by staff');
    const _txt = 'Locked ' + _byLabel + (_comment ? ' \u2014 ' + _comment : '');
    return '<div class="cl-lkrsn" style="margin-bottom:10px">'
      + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;margin-right:4px;vertical-align:middle">'
      + '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>'
      + '<circle cx="9" cy="7" r="4"/>'
      + '<line x1="17" y1="8" x2="23" y2="14"/>'
      + '<line x1="23" y1="8" x2="17" y2="14"/>'
      + '</svg>' + _txt + '</div>';
  })();
  const _lockSvg = '<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><line x1=\"17\" y1=\"8\" x2=\"23\" y2=\"14\"/><line x1=\"23\" y1=\"8\" x2=\"17\" y2=\"14\"/></svg>';
  const _unlockSvg = '<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><polyline points=\"16 11 18 13 22 9\"/></svg>';
  const _msgSvg = '<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M21 2H3v16h5v4l4-4h5l4-4V2z\"/><line x1=\"9\" y1=\"8\" x2=\"15\" y2=\"8\"/><line x1=\"9\" y1=\"12\" x2=\"13\" y2=\"12\"/></svg>';
  let _lockBtn = '';
  if (byAdmin) {
    _lockBtn = `<button class="btn btn-sm" disabled style="display:inline-flex;align-items:center;gap:5px;background:#B8B8B8;border:1px solid #B8B8B8;color:#fff;cursor:not-allowed;opacity:.6">${_lockSvg} Account Locked by Admin</button>`;
  } else if (acctLocked) {
    _lockBtn = `<button class="btn btn-primary btn-sm" style="display:inline-flex;align-items:center;gap:5px;background:#1A6B3C;border-color:#1A6B3C" onclick="toggleAccountLock('${cl.clientId}','${(cl.clientName||'').replace(/'/g,"\\'")}',true)">${_unlockSvg} Unlock Account</button>`;
  } else {
    _lockBtn = `<button class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:5px" onclick="toggleAccountLock('${cl.clientId}','${(cl.clientName||'').replace(/'/g,"\\'")}',false)">${_lockSvg} Lock Account</button>`;
  }
  h += `<div class="cl-dph" style="padding:20px 18px 12px;gap:0">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(140deg,#E4DFF5,#D8D3EE);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#5B3FBF;flex-shrink:0">${ini}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span class="cl-namechip" title="Copy Client ID" onclick="_clNameCopy(this,'${cl.clientId}')"><span class="cl-nm-label">${cl.clientName||'\u2014'}</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>
              ${idBadge}
            </div>
            <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;color:var(--ink-4);margin-bottom:3px;min-width:0">${cl.clientEmail?`<span style="display:inline-flex;align-items:center;gap:4px;min-width:0;max-width:100%"><a href="mailto:${cl.clientEmail}" style="color:var(--red);text-decoration:underline;text-underline-offset:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cl.clientEmail}</a><span class="cl-icp" title="Copy email" data-val="${cl.clientEmail}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></span>`:''}${cl.clientEmail&&cl.clientPhone?`<span style="color:var(--ink-4);flex-shrink:0">&middot;</span>`:''}${cl.clientPhone?`<span style="display:inline-flex;align-items:center;gap:4px;flex-shrink:0"><a href="tel:${cl.clientPhone.replace(/\D/g,'')}" style="color:var(--red);text-decoration:underline;text-underline-offset:2px;white-space:nowrap">${cl.clientPhone}</a><span class="cl-icp" title="Copy phone" data-val="${cl.clientPhone}" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></span>`:''}</div>
            <div style="font-size:10px;color:var(--ink-4)">${cl.memberSince?'Member since '+fDS(cl.memberSince)+(dur?' \u00B7 '+dur:''):''}${_clLastMail?(cl.memberSince?' \u00B7 ':'')+' Last mail '+fDS(_clLastMail):''}</div>
          </div>
          <button class="btn btn-secondary btn-sm" style="padding:3px 8px;font-size:12px;flex-shrink:0;align-self:flex-start" onclick="closeClientPane()">\u2715</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${cl.idVerificationStatus==='approved'
        ? `<span class="vid-pill vp-ok" data-cid="${cl.clientId}" data-cname="${cl.clientName||''}" onclick="_vcid(this)"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/></svg> View Verified ID</span>`
        : cl.idVerificationStatus==='submitted'
        ? `<span class="vid-pill vp-pend" data-cid="${cl.clientId}" data-cname="${cl.clientName||''}" onclick="_vcid(this)"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"/></svg> Review Submitted ID</span>`
        : ''}
      ${_lockBtn}
      <button class="btn btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:5px${STATE.access?.canResetPassword?'':';opacity:.55;cursor:not-allowed'}" ${STATE.access?.canResetPassword?`onclick="openResetPasswordModal('${cl.clientId}')"`:` title="Permission required" onclick="toast('Reset Password permission required','error')"`}>${_msgSvg} Reset Password</button>
    </div>
    ${_acctLockBanner}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;margin:0 -18px;border-top:1px solid var(--border)">
      <div style="padding:11px 10px;text-align:center;border-right:1px solid var(--border)"><div style="font-size:18px;font-weight:800;line-height:1;color:${inStore>0?'var(--ink)':'var(--ink-4)'}">${inStore}</div><div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">In Storage</div></div>
      <div style="padding:11px 10px;text-align:center;border-right:1px solid var(--border)"><div style="font-size:18px;font-weight:800;line-height:1;color:${overdue>0?'#C62828':'var(--ink-4)'}">${overdue}</div><div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">Overdue</div></div>
      <div style="padding:11px 10px;text-align:center"><div style="font-size:18px;font-weight:800;line-height:1;color:${fwdQ>0?'var(--amber)':'var(--ink-4)'}">${fwdQ}</div><div style="font-size:9px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">Fwd Queue</div></div>
    </div>
  </div>`;

  h += '<div class="cl-dpb">';

  // Client-level acquisition source (asked once at signup, stored on the client).
  // Shown once here above the plan cards — not per card. Hidden when absent.
  if (cl.referralSource) {
    h += `<div style="margin-bottom:12px"><span style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:980px;padding:5px 12px;font-size:11px;color:var(--ink-3)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.75"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>Source: <span style="font-weight:600;color:var(--ink)">${cl.referralSource}</span></span></div>`;
  }

  // Pending-setup client: paid but onboarding incomplete, no plan card yet.
  // Render a greyed/dashed skeleton of the plan they signed up for.
  if (pcs.every(pc => pc.pendingSetup)) {
    const p = pcs[0];
    const featLbl = p.pendingAutoFeature === 'forwarding' || p.pendingAutoFeature === 'ship' ? 'Auto-forwarding'
                  : p.pendingAutoFeature === 'scan' ? 'Auto-scanning' : 'None';
    const lim = (v, unit) => v == null ? '\u2014' : (v + (unit ? ' ' + unit : ''));
    const fee = (v, unit) => v == null ? '\u2014' : ('$' + Number(v).toFixed(2) + (unit ? ' / ' + unit : ''));
    // Date-only safe formatter: append T00:00:00 so a 'YYYY-MM-DD' string parses
    // as local midnight (not UTC), avoiding a Toronto-timezone off-by-one day.
    const fDSd = d => { if(!d) return '\u2014'; try { return fmtDate(d).replace(/,? \d{4}$/,''); } catch(e){ return '\u2014'; } };
    const fmtPd = (s,e) => (s && e) ? fDSd(s) + ' \u2013 ' + fDSd(e) : '\u2014';
    const rows = [
      ['Plan', p.pendingPlanName || '\u2014'],
      ['Price', (p.pendingPlanAmount || '\u2014') + (p.pendingPlanAmount && p.pendingBillingCycle ? ' \u00B7 ' + p.pendingBillingCycle : '')],
      ['Billing period', fmtPd(p.pendingPeriodStart, p.pendingPeriodEnd)],
      ['Mail allowance', lim(p.pendingMailLimit, 'items')],
      ['Parcel allowance', lim(p.pendingParcelLimit, 'items')],
      ['Recipients', lim(p.pendingMaxRecipients)],
      ['Auto feature', featLbl],
      ['Mail storage', lim(p.pendingMailStorageDays, 'days')],
      ['Parcel storage', lim(p.pendingParcelStorageDays, 'days')],

  // Lock/stats/ID are now in the sticky header (Design 1)

  h += `<div class="cl-seclbl">${pcs.length===1?'Plan Card':pcs.length+' Plan Cards'}</div>`;

    const isOpen = false;  // all collapsed on open

    h += `<div class="${pcCls}">`;

    h += `<div class="cl-pch${isOpen?' open':''}" id="clpch-wrap-${bodyId}" onclick="_clPcToggle('${bodyId}','${chevId}')">

        <div class="cl-pcpill">

async function handleNotifClick(notifId, action, linkId) {
  await apiPost({ action: 'markNotificationRead', notificationId: notifId });
  document.getElementById('notif-panel')?.remove();
  loadNotifCount();
  if (action === 'tasks') {
    // Relax the task filter BEFORE rendering so the target task is present even
    // if it's filtered out of the default "open" view (e.g. resolved tasks).
    if (linkId) STATE._currentTaskFilter = 'all';
    await loadTasks();
    await setView('tasks'); // builds the tasks view + tl-feed using the relaxed filter
    if (linkId) {
      // Deterministically wait for the card to render, then open + scroll.
      _waitForTaskCard(linkId, () => selectTask(linkId));
    }
  }
  else if (action === 'idverify') {
    if (!(STATE.access && STATE.access.canVerifyId)) {
      toast('You don\u2019t have permission to verify IDs. Ask an admin if you need access.', 'error');
      return;
    }
    setView('idverify');
  }
  else if (action === 'mail') setView('maillog');
  else if (action === 'plancards') { setView('plancards'); if (linkId) setTimeout(() => { const s = qs('pc-search'); if (s) { s.value = linkId; filterPlanCards(linkId); } }, 500); }
}

async function markAllNotifRead() {
  await apiPost({ action: 'markNotificationRead', recipientType: 'staff', recipientId: STATE.uuid, notificationId: 'all' });
  loadNotifCount();
  loadNotifList();
}

async function clearReadNotifs() {
  await apiPost({ action: 'deleteReadNotifications', recipientType: 'staff', recipientId: STATE.uuid });
  loadNotifCount();
  loadNotifList();
  toast('Read notifications cleared');
}

// \u2500\u2500 ID Verification Review \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500

// Shared U1 verification card (used by Verify, History, and Not-Submitted-derived states)
function _idvEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _idvCopy(el, val){
  if(!val) return;
  navigator.clipboard.writeText(val).catch(function(){});
  var orig = el.innerHTML;
  el.innerHTML = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2"><polyline points="20 6 9 17 4 12"/></svg> copied';
  el.style.color = 'var(--green)'; el.style.borderColor = 'var(--green)';
  setTimeout(function(){ el.innerHTML = orig; el.style.color=''; el.style.borderColor=''; }, 1200);
}
// Name chip: copies client id; flips the inner .idv-nm label to "Copied" briefly
function _idvNameCopy(el, val){
  if(!val) return;
  navigator.clipboard.writeText(val).catch(function(){});
  var label = el.querySelector('.idv-nm');
  if(!label) return;
  var orig = label.textContent;
  el.classList.add('idv-copied');
  label.textContent = 'Copied';
  setTimeout(function(){ label.textContent = orig; el.classList.remove('idv-copied'); }, 1100);
}
// View Client -> go to Clients view and open this client's detail pane.
// loadClientsView() auto-opens the pane for window._currentOpenClientId once data loads.
function _idvGoClient(clientId){
  if(!clientId) return;
  window._currentOpenClientId = clientId;
  window._currentOpenPaneClientId = null;
  setView('clients');
}
// Build a U1-style card. opts: {showActions, reviewedBy, reviewedAt, rejectionReason, phone}
function _idvBuildCard(c, showActions, fD, typeLabel) {
  var st = c.status==='approved' ? 'approved' : c.status==='rejected' ? 'rejected' : (c.frontUrl||c.backUrl||showActions) ? 'pending' : 'none';
  // accent + avatar tint + pill
  var accent = st==='approved'?'var(--green)':st==='rejected'?'var(--required)':st==='pending'?'var(--amber)':'var(--ink-4)';
  var avBg, avFg;
  if(st==='approved'){avBg='var(--green-bg)';avFg='var(--green)';}
  else if(st==='rejected'){avBg='#FEE8E8';avFg='var(--required)';}
  else if(st==='pending'){avBg='var(--amber-bg)';avFg='var(--amber)';}
  else {avBg='var(--bg-2)';avFg='var(--ink-3)';}
  var pill = st==='approved'
      ? '<span class="pill active-plan" style="font-size:9.5px;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0"></span>Verified</span>'
    : st==='rejected'
      ? '<span class="pill payment_req" style="font-size:9.5px">\u2717 Rejected</span>'
    : st==='pending'
      ? '<span class="pill warning" style="font-size:9.5px;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0"></span>Pending</span>'
      : '<span class="pill payment_req" style="font-size:9.5px">No ID</span>';
  var initials = (c.name||'?').split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
  var nm = _idvEsc(c.name||'\u2014');
  var nmJs = (c.name||'').replace(/'/g,"\\'");
  // copy-id chip glyph (used by reviewer chip)
  var copyIco = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.45"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  // name as a copy-chip: name + always-visible copy icon, click copies client id
  var nameCopyIco = '<svg class="idv-nm-ico" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ink-4);opacity:.55;flex-shrink:0;transition:all .14s"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var nameChip = '<span class="idv-namechip" title="Copy Client ID" onclick="event.stopPropagation();_idvNameCopy(this,\''+_idvEsc(c.clientId)+'\')" style="display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;letter-spacing:-.015em;color:var(--ink);cursor:pointer;border-radius:7px;padding:2px 8px 2px 7px;margin-left:-7px;border:1px solid transparent;transition:all .14s"><span class="idv-nm">'+nm+'</span>'+nameCopyIco+'</span>';
  // meta line 1: email + small copy icon
  var meta = '<div class="idv-meta-row" style="font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px;min-width:0"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_idvEsc(c.email||'')+'</span>'+(c.email?'<span class="cl-icp" title="Copy email" data-val="'+_idvEsc(c.email)+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>':'')+'</div>';
  // meta line 2: phone (wherever available) + small copy icon
  if(c.phone){
    meta += '<div class="idv-meta-row" style="font-size:11.5px;color:var(--ink-4);margin-top:2px;display:flex;align-items:center;gap:6px;min-width:0"><a href="tel:'+_idvEsc(String(c.phone).replace(/\D/g,''))+'" style="color:var(--ink-3);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="event.stopPropagation()">'+_idvEsc(c.phone)+'</a><span class="cl-icp" title="Copy phone" data-val="'+_idvEsc(c.phone)+'" onclick="event.stopPropagation();_cpyIcon(this,this.dataset.val)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span></div>';
  }
  // document previews
  var imgStyle = 'width:56px;aspect-ratio:1.58;object-fit:cover;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);cursor:pointer;display:block';
  var tagS = 'position:absolute;top:5px;left:5px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;background:rgba(20,20,24,.5);padding:1px 6px;border-radius:4px';
  var docs = '';
  if(c.frontUrl || c.backUrl){
    docs = '<div class="idv-docs" style="display:flex;gap:7px;flex-shrink:0">';
    if(c.frontUrl) docs += '<div class="idv-doc" style="position:relative"><span style="'+tagS+'">F</span><img src="'+_idvEsc(c.frontUrl)+'" style="'+imgStyle+'" onclick="openIdImage(\''+_idvEsc(c.frontUrl)+'\')"></div>';
    if(c.backUrl)  docs += '<div class="idv-doc" style="position:relative"><span style="'+tagS+'">B</span><img src="'+_idvEsc(c.backUrl)+'" style="'+imgStyle+'" onclick="openIdImage(\''+_idvEsc(c.backUrl)+'\')"></div>';
    docs += '</div>';
  } else {
    docs = '<div class="idv-docs idv-docs-empty" style="display:flex;gap:7px;flex-shrink:0"><div class="idv-noimg" style="width:70px;aspect-ratio:1.58;border-radius:8px;border:1.5px dashed #D6D3CD;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-4);font-size:9px;font-weight:600;background:repeating-linear-gradient(135deg,var(--bg),var(--bg) 6px,#F1EFEB 6px,#F1EFEB 12px)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 15l-5-5L5 19"/></svg><span class="idv-noimg-lbl" style="display:none">No ID uploaded</span></div></div>';
  }
  // View Client button -> switch to Clients view and open this client's pane
  var viewBtn = '<button class="idv-view btn btn-sm btn-secondary" style="font-size:10.5px;font-weight:600;padding:5px 10px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;gap:5px;flex-shrink:0" onclick="_idvGoClient(\''+_idvEsc(c.clientId)+'\')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>View Client</button>';
  // actions (verify tab only)
  var actions = '';
  if(showActions){
    actions = '<div class="idv-actions" style="display:flex;gap:6px;flex-shrink:0">'
      + '<button class="idv-act-btn" title="Approve" style="width:40px;height:40px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s" onmouseover="this.style.background=\'var(--green-bg)\';this.style.borderColor=\'rgba(26,107,60,.2)\'" onmouseout="this.style.background=\'transparent\';this.style.borderColor=\'transparent\'" onclick="reviewId(\''+_idvEsc(c.clientId)+'\',\'approved\',\''+_idvEsc(c.idType)+'\')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="20 6 9 17 4 12"/></svg><span class="idv-act-lbl">Approve</span></button>'
      + '<button class="idv-act-btn" title="Reject" style="width:40px;height:40px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--required);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s" onmouseover="this.style.background=\'#FEE8E8\';this.style.borderColor=\'rgba(198,40,40,.2)\'" onmouseout="this.style.background=\'transparent\';this.style.borderColor=\'transparent\'" onclick="promptRejectId(\''+_idvEsc(c.clientId)+'\',\''+_idvEsc(c.idType)+'\')"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="idv-act-lbl">Reject</span></button>'
      + '</div>';
  }
  var sep = '<div class="idv-sep" style="width:1px;align-self:stretch;background:var(--border);margin:0 2px"></div>';
  // top row
  var topRow = '<div class="idv-top" style="display:flex;align-items:center;gap:14px">'
    + '<div class="idv-av" style="width:42px;height:42px;border-radius:50%;background:'+avBg+';color:'+avFg+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">'+_idvEsc(initials)+'</div>'
    + '<div class="idv-id" style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:9px;margin-bottom:3px;flex-wrap:wrap">'+nameChip+pill+'<span style="font-size:10px;font-weight:600;color:var(--ink-3);background:var(--bg);padding:2px 8px;border-radius:6px">'+_idvEsc(typeLabel(c.idType))+'</span></div>'+meta+'</div>'

  // extra footer line (reason / reviewer w/ staff name, click copies client id)
  var extra = '';
  if(st==='approved' || st==='rejected'){
    var revName = c.reviewedByName || c.reviewedBy;
    var revChip = revName ? ' by <span class="cl-cpid" title="Copy Client ID" style="font-size:9.5px" onclick="event.stopPropagation();_idvCopy(this,\''+_idvEsc(c.clientId)+'\')">'+copyIco+'<span>'+_idvEsc(revName)+'</span></span>' : '';

    + '<div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:'+accent+'"></div>'
    + '<div style="padding:16px 18px">'+topRow+extra+'</div></div>';
}

async function renderIdVerifyView(container) {
  // Auth gate \u2014 entire ID Verify view requires password once per browser session
  if (!STATE._idVerifyUnlocked) {
    _showIdVerifyGate(container);
    return;
  }
  // Store data for tabs
  STATE._idVerifyData = null;
  STATE._idVerifyTab = STATE._idVerifyTab || 'verify';

// Data-only reload: re-fetch verifications + setups and re-render tabs WITHOUT rebuilding
// the header (keeps #idv-refresh-btn alive so the spin animation shows, like Exceptions).
async function _idvLoadData() {
  STATE._idVerifyData = null;
  STATE._idVerifyTab = STATE._idVerifyTab || 'verify';
  try {
    const [result, setupData] = await Promise.all([
      apiPost({ action: 'getPendingVerifications', uuid: STATE.uuid }),
      api('uuid='+encodeURIComponent(STATE.uuid)+'&action=getPendingSetups')
    ]);
    const pending = result.pending || [];
    const history = result.history || [];
    const notSubmitted = (setupData.setups || []).filter(s => s.idStatus === 'not_submitted');
    updateIdVerifyBadge(pending.length);

    STATE._idVerifyData = { pending, history, notSubmitted };

    // Group not submitted by unique client
    const clientMap = {};
    notSubmitted.forEach(s => {
      if (!clientMap[s.clientId]) clientMap[s.clientId] = { name: s.clientName, email: s.clientEmail, phone: s.clientPhone || '', clientId: s.clientId, plans: [] };
      clientMap[s.clientId].plans.push({ planName: s.planName, planCardId: s.planCardId, createdAt: s.createdAt });
    });
    STATE._idVerifyClients = Object.values(clientMap);

    // Render tabs \u2014 use unique client count for Not Submitted
    const tabs = qs('id-verify-tabs');
    if (tabs) {
      tabs.innerHTML = '<div class="nav-tab '+(STATE._idVerifyTab==='verify'?'active':'')+'" id="idtab-verify" onclick="switchIdTab(\'verify\')">Verify ('+pending.length+')</div><div class="nav-tab '+(STATE._idVerifyTab==='notsub'?'active':'')+'" id="idtab-notsub" onclick="switchIdTab(\'notsub\')">Not Submitted ('+STATE._idVerifyClients.length+')</div><div class="nav-tab '+(STATE._idVerifyTab==='history'?'active':'')+'" id="idtab-history" onclick="switchIdTab(\'history\')">History ('+history.length+')</div>';
    }
    renderIdTab(STATE._idVerifyTab);
  } catch(e) { toast(e.message, 'error'); }
}

function switchIdTab(tab) {
  STATE._idVerifyTab = tab;
  ['verify','notsub','history'].forEach(t => {
    const el = qs('idtab-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  renderIdTab(tab);
}

async function renderIdTab(tab) {
  const content = qs('id-verify-content');
  if (!content || !STATE._idVerifyData) return;
  const { pending, history, notSubmitted } = STATE._idVerifyData;
  const search = (qs('staff-id-search')?.value || '').toLowerCase();
  const fD = d => d ? fmtDateTime(d) : '\u2014';
  const typeLabel = t => t==='drivers_license'?"Driver's License":t==='passport'?'Passport':t==='national_id'?'National ID':t==='pr_card'?'PR Card':t||'\u2014';
  const matchSearch = c => !search || (c.name||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search) || (c.clientId||'').toLowerCase().includes(search) || (c.reviewedBy||'').toLowerCase().includes(search);

  function idCard(c, showActions) {
    return _idvBuildCard(c, showActions, fD, typeLabel);
  }

  if (tab === 'verify') {
    const filtered = pending.filter(matchSearch);
    if (!filtered.length) {
      content.innerHTML = search ? _noMatchSlate('No matching clients', 'No clients match your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>', 'All caught up', 'No client IDs are waiting for review.');
    } else {
      content.innerHTML = filtered.map(c => idCard(c, true)).join('');
    }
  } else if (tab === 'notsub') {
    const clients = (STATE._idVerifyClients || []).filter(matchSearch);
    if (!clients.length) {
      content.innerHTML = search ? _noMatchSlate('No matching clients', 'No clients match your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>', 'All clients submitted', 'Every client at your location has uploaded their ID.');
    } else {
      content.innerHTML = clients.map(c => idCard(c, false)).join('');
    }
  } else if (tab === 'history') {
    STATE._idHistoryUnlocked = true;
    renderIdHistory();
  }
}

function renderIdHistory() {
  const content = qs('id-verify-content');
  if (!content || !STATE._idVerifyData) return;
  const { history } = STATE._idVerifyData;
  const search = (qs('staff-id-search')?.value || '').toLowerCase();
  const fD = d => d ? fmtDateTime(d) : '\u2014';
  const typeLabel = t => t==='drivers_license'?"Driver's License":t==='passport'?'Passport':t==='national_id'?'National ID':t==='pr_card'?'PR Card':t||'\u2014';

  function idCard(c) {
    return _idvBuildCard(c, false, fD, typeLabel);
  }

  const filtered = history.filter(c => !search || (c.name||'').toLowerCase().includes(search) || (c.email||'').toLowerCase().includes(search) || (c.clientId||'').toLowerCase().includes(search) || (c.reviewedBy||'').toLowerCase().includes(search));
  if (!filtered.length) {
    content.innerHTML = search ? _noMatchSlate('No matching history', 'No verification history matches your search \u2014 try a different term or clear it.') : _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="12 8 12 12 14 13"></polyline></svg>', 'No verification history', 'Reviewed IDs will be listed here.');
  } else {
    content.innerHTML = filtered.map(c => idCard(c)).join('');
  }
}

async function unlockIdHistory() {
  STATE._idHistoryUnlocked = true;
  renderIdHistory();
}

async function saveStaffPassword() {
  const current = document.getElementById('stf-pw-current')?.value?.trim();

  if (nw !== confirm) { toast('Passwords do not match', 'error'); return; }
  const btn = document.querySelector('.modal-overlay .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Updating...'; }
  try {
    const result = await apiPost({ action: 'changePassword', uuid: STATE.uuid, userEmail: STATE.access?.email || '', currentPassword: current, newPassword: nw });

    toast('Password updated successfully');
  } catch(e) {
    toast(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Update password'; }
  }
}

async function _submitIdVerifyGate(container, pwEl, btn, errEl) {
  const password = pwEl ? pwEl.value.trim() : '';
  if (!password) {
    if (errEl) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; }
    return;
  }
  btn.disabled = true; btn.textContent = 'Verifying...';
  if (errEl) errEl.style.display = 'none';
  try {
    const email = STATE.access && STATE.access.email ? STATE.access.email : '';
    if (!email) throw new Error('Could not determine your staff email.');
    // Use a throw-away Supabase client so the main sb session is never touched
    const sbCheck = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: false, autoRefreshToken: false }
    });
    const { error } = await sbCheck.auth.signInWithPassword({ email, password });
    if (error) throw new Error('Incorrect password \u2014 please try again.');
    // Password verified \u2014 unlock without touching the main sb session
    STATE._idVerifyUnlocked = true;
    renderIdVerifyView(container);
  } catch(e) {
    if (errEl) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    btn.disabled = false; btn.textContent = 'Unlock ID Verify';
    if (pwEl) { pwEl.value = ''; pwEl.focus(); }
  }
}

    '</div>'
  ].join('');
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const pwEl  = card.querySelector('#idgate2-pw');
  const btn   = card.querySelector('#idgate2-btn');
  const errEl = card.querySelector('#idgate2-error');
  const eyeEl = card.querySelector('#idgate2-eye');
  const cancelBtn = card.querySelector('#idgate2-cancel');

  const submit = async () => {
    const password = pwEl.value.trim();
    if (!password) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Verifying…';
    errEl.style.display = 'none';
    try {
      const email = STATE.access?.email || '';
      if (!email) throw new Error('Could not determine your staff email.');
      const sbCheck = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: false, autoRefreshToken: false }
      });
      const { error } = await sbCheck.auth.signInWithPassword({ email, password });
      if (error) throw new Error('Incorrect password \u2014 please try again.');
      STATE._idVerifyUnlocked = true;
      overlay.remove();
      onSuccess();
    } catch(e) {
      errEl.textContent = e.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Unlock';
      pwEl.value = ''; pwEl.focus();
    }
  };

  btn.onclick = submit;
  cancelBtn.onclick = () => overlay.remove();
  pwEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  eyeEl.addEventListener('click', () => { pwEl.type = pwEl.type === 'password' ? 'text' : 'password'; });
  pwEl.addEventListener('focus', () => { pwEl.style.borderColor = 'var(--ink-2)'; });
  pwEl.addEventListener('blur',  () => { pwEl.style.borderColor = 'var(--border)'; });
  setTimeout(() => pwEl.focus(), 100);
}

async function promptRejectId(clientId, idType) {
  const reason = await requestTextInput('Reject ID', 'Provide a reason for rejection:', 'e.g. Image is blurry, name does not match');
  if (reason === null) return;
  try {
    const result = await apiPost({ action: 'reviewIdVerification', uuid: STATE.uuid, clientId, decision: 'rejected', reason, idType });

      toast('ID rejected');
      _idvLoadData();

  } catch(e) { toast(e.message, 'error'); }

function requestTextInput(title, message, placeholder) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal"><div class="modal-title">'+title+'</div><div style="font-size:13px;color:var(--ink-2);margin-bottom:12px">'+message+'</div><textarea class="form-input" id="reject-reason-input" rows="3" placeholder="'+(placeholder||'')+'" style="resize:vertical;margin-bottom:16px"></textarea><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" id="reject-cancel">Cancel</button><button class="btn btn-primary" id="reject-ok" style="background:#C62828;border-color:#C62828">Reject</button></div></div>';
    overlay.querySelector('#reject-cancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.querySelector('#reject-ok').onclick = () => { const v = overlay.querySelector('#reject-reason-input').value; if (!v.trim()) { toast('Reason is required','error'); return; } overlay.remove(); resolve(v); };
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve(null); } });
    document.body.appendChild(overlay);
    overlay.querySelector('#reject-reason-input').focus();
  });
}

async function _sfSilentRefresh() {
  const locId = STATE.access?.locationId;

function _sfRenderList() {
  const el = document.getElementById('sf-list');
  if (!el) return;
  let data = [...(window._sfReports || [])].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const search = (window._sfSearch || '').toLowerCase();
  const catF   = window._sfFilter || 'all';
  if (search) data = data.filter(r => (r.title||'').toLowerCase().includes(search) || (r.description||'').toLowerCase().includes(search));
  if (catF !== 'all') data = data.filter(r => r.category === catF);

  if (!data.length) {
    el.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>', 'No feedback yet', 'Submit a bug report, feature request, or question with New.');
    return;
  }

  const fDT = d => {
    if (!d) return '\u2014';
    return fmtDate(d);
  };
  const fAge = d => {
    if (!d) return '\u2014';
    const diff = Date.now() - new Date(d).getTime();
    const hrs = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
    if (hrs < 1) return 'Just now';
    if (hrs < 24) return hrs + 'h ago';
    if (days === 1) return 'Yesterday';
    if (days < 30) return days + 'd ago';
    return Math.floor(days/30) + 'mo ago';
  };

  el.innerHTML = data.map(r => {
    const cat  = STAFF_REPORT_CATEGORIES[r.category]  || STAFF_REPORT_CATEGORIES.other;
    const stat = STAFF_REPORT_STATUSES[r.status]       || STAFF_REPORT_STATUSES.open;
    const pri  = STAFF_REPORT_PRIORITIES[r.priority]   || STAFF_REPORT_PRIORITIES.normal;
    const isResolved = r.status === 'resolved' || r.status === 'closed';
    return `
      <div onclick="openSfDetail('${r.report_id}')"
        style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;${isResolved?'opacity:0.65':''}"
        onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(0,0,0,0.07)';this.style.borderColor='#D5D2CC'"
        onmouseout="this.style.transform='';this.style.boxShadow='';this.style.borderColor='var(--border)'">
        <!-- Row 1: badges + age -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span style="padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;background:${cat.bg};color:${cat.color};border:1px solid ${cat.border}">${cat.label}</span>
            <span style="padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;background:${stat.bg};color:${stat.color}">${stat.label}</span>
            ${r.priority && r.priority !== 'normal' ? `<span style="font-size:10px;font-weight:600;color:${pri.color}">${r.priority === 'high' ? '\u2191 High' : '\u2193 Low'}</span>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:var(--ink-3);font-weight:500">${fDT(r.created_at)}</div>
            <div style="font-size:10px;color:var(--ink-4);margin-top:1px">${fAge(r.created_at)}</div>
          </div>
        </div>
        <!-- Row 2: title -->
        <div style="font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:${r.description?'6px':'0'}">${r.title}</div>
        <!-- Row 3: description preview -->
        ${r.description ? `<div style="font-size:12px;color:var(--ink-3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px">${r.description}</div>` : ''}

          <span style="font-size:11px;color:var(--ink-4)">${r.staff_name||'Staff'}</span>

  }).join('');
}

              ${i > 0 ? `<div style="position:absolute;top:9px;left:calc(-50% + 10px);right:calc(50% + 10px);height:2px;background:${lineColor}"></div>` : ''}

                ${done?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`:active?`<div style="width:7px;height:7px;border-radius:50%;background:var(--red)"></div>`:''}
              </div>
              <div style="font-size:9px;font-weight:${active?'700':'500'};color:${lblColor};margin-top:4px;text-align:center;line-height:1.2">${si.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Scrollable body -->
      <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch" id="sf-detail-body">

        ${report.description ? `
        <div style="padding:14px 20px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Description</div>
          <div style="font-size:13px;color:var(--ink-2);line-height:1.65;white-space:pre-wrap;background:var(--bg);padding:10px 12px;border-radius:8px">${report.description}</div>
        </div>` : ''}

        <div style="padding:14px 20px">
          <div style="font-size:10px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Activity</div>

          <!-- Opened node -->
          <div style="display:flex;gap:10px;margin-bottom:12px">
            <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
              </div>
              ${comments.length > 0 ? `<div style="width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px"></div>` : ''}
            </div>
            <div style="flex:1;padding-top:5px;font-size:12px;color:var(--ink-3)">
              <strong style="color:var(--ink-2)">${report.staff_name||'You'}</strong> opened this \u00B7 <span style="color:var(--ink-4)">${fAge(report.created_at)}</span>
            </div>
          </div>

          <!-- Thread -->
          <div id="sf-thread">
            ${_sfRenderThread(comments, fAge)}
          </div>

          <!-- Reply -->
          <div style="display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
            <div style="width:28px;flex-shrink:0">
              <div style="width:28px;height:28px;border-radius:50%;background:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${myInitials}</div>
            </div>
            <div style="flex:1;min-width:0">
              <div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);transition:border-color .2s" id="sf-reply-wrap">
                <textarea id="sf-reply-input" placeholder="Add a comment\u2026 (Enter to send)" rows="2"
                  style="width:100%;padding:9px 12px;border:none;font-family:inherit;font-size:13px;color:var(--ink);resize:none;line-height:1.5;background:transparent;box-sizing:border-box;outline:none"
                  onfocus="document.getElementById('sf-reply-wrap').style.borderColor='var(--red)'"
                  onblur="document.getElementById('sf-reply-wrap').style.borderColor='var(--border)'"
                  oninput="this.style.height='auto';this.style.height=Math.max(40,this.scrollHeight)+'px'"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sfPostComment('${reportId}')}"></textarea>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-top:1px solid var(--border)">
                  <span style="font-size:10px;color:var(--ink-4)">Enter to send \u00B7 Shift+Enter for new line</span>
                  <button id="sf-send-btn" onclick="sfPostComment('${reportId}')" class="btn btn-primary btn-sm">Send</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  })();
}

function _sfRenderThread(comments, fAge) {
  if (!comments.length) return `<div style="text-align:center;padding:20px;color:var(--ink-4);font-size:12px;background:var(--bg);border-radius:12px">No replies yet \u2014 admin will respond soon</div>`;
  return comments.map((c, ci) => {
    const isAdmin = c.author_role === 'admin';
    const isMe    = c.author_id === STATE.uuid;
    const isLast  = ci === comments.length - 1;
    const initials = (c.author_name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div style="display:flex;gap:10px;margin-bottom:${isLast?'0':'12px'}">
      <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">
        <div style="width:28px;height:28px;border-radius:50%;background:${isAdmin?'var(--red)':'var(--ink-3)'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${initials}</div>
        ${!isLast?`<div style="width:2px;flex:1;background:var(--border);margin-top:4px;min-height:10px"></div>`:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="border:1px solid ${isAdmin?'var(--red-border)':'var(--border)'};border-radius:0 10px 10px 10px;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:${isAdmin?'var(--red-dim)':'var(--bg)'};border-bottom:1px solid ${isAdmin?'var(--red-border)':'var(--border)'}">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:12px;font-weight:600;color:var(--ink-2)">${c.author_name||c.author_id}</span>
              ${isAdmin?`<span style="font-size:9px;padding:1px 6px;background:var(--red);color:#fff;border-radius:4px;font-weight:700">Admin</span>`:isMe?`<span style="font-size:9px;padding:1px 6px;background:var(--ink-3);color:#fff;border-radius:4px">you</span>`:''}
            </div>
            <span style="font-size:10px;color:var(--ink-4)">${fAge(c.created_at)}</span>
          </div>
          <div style="padding:10px 12px;font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-wrap">${c.content}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function sfPostComment(reportId) {
  const input = document.getElementById('sf-reply-input');
  const content = (input?.value || '').trim();
  if (!content) return;
  const btn = document.getElementById('sf-send-btn');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    const result = await apiPost({
      action: 'addReportComment',
      reportId,
      authorId: STATE.uuid,
      authorName: STATE.access?.name || 'Staff',
      authorRole: 'staff',
      content,
    });
    if (result.status !== 'ok') throw new Error(result.message);
    if (input) { input.value = ''; input.style.height = 'auto'; }
    // Silently refresh thread only
    const updated = await apiPost({ action: 'getReportComments', reportId });
    const fAge = d => {
      if (!d) return '';
      const diff = Date.now() - new Date(d).getTime();
      const hrs = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
      if (hrs < 1) return 'Just now'; if (hrs < 24) return hrs + 'h ago';
      if (days === 1) return '1d ago'; return days + 'd ago';
    };
    const threadEl = document.getElementById('sf-thread');
    if (threadEl) threadEl.innerHTML = _sfRenderThread(updated.comments || [], fAge);
    const body = document.getElementById('sf-detail-body');
    if (body) body.scrollTop = body.scrollHeight;
  } catch(e) { toast(e.message, 'error'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Send'; } }
}

async function sfSubmitNew() {
  if (window._sfSubmitting) return;
  const category    = document.getElementById('sf-new-cat')?.value || 'bug';
  const title       = (document.getElementById('sf-new-title')?.value || '').trim();
  const description = (document.getElementById('sf-new-desc')?.value  || '').trim();
  if (!title) { toast('Title is required', 'error'); return; }
  window._sfSubmitting = true;
  const submitBtn = document.getElementById('sf-new-submit-btn');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting...'; }
  try {
    const locId = STATE.access?.locationId;
    const result = await apiPost({
      action: 'submitReport',
      staffId:   STATE.uuid,
      staffName: STATE.access?.name || 'Staff',
      locationId: locId || null,
      category, title, description,
    });
    if (result.status !== 'ok') throw new Error(result.message);
    // Refresh the list first so it's ready underneath, then tear down the modal.
    const refreshResult = await apiPost({ action: 'getReports', locationId: locId || null });
    if (refreshResult.status === 'ok') {
      window._sfReports = refreshResult.reports || [];
      _sfRenderList();
    }
    document.getElementById('sf-new-modal')?.remove();
    toast('Report submitted', 'success');
  } catch(e) {
    toast(e.message, 'error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit Report'; }
  } finally {
    window._sfSubmitting = false;
  }
}

// \u2500\u2500 User Chip Dropdown \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _setUserChip(initials, name, role) {
  const av = document.getElementById('user-chip-avatar');
  const nm = document.getElementById('user-chip-name');
  const rl = document.getElementById('user-chip-role');
  if (av) av.textContent = initials;
  if (nm) nm.textContent = name;
  if (rl) rl.textContent = role;
}

async function _sfOpenFromDropdown() {
  // Close dropdown first
  const dd = document.getElementById('user-dropdown');
  const btn = document.getElementById('user-chip-btn');
  if (dd) dd.remove();
  if (btn) btn.classList.remove('open');
  // Check enabled before navigating
  const result = await apiPost({ action: 'getSystemFeedbackEnabled' });
  if (result.status === 'ok' && !result.enabled) {
    toast('System Feedback is currently disabled', 'error');
    return;
  }
  // Navigate to feedback page, then open modal
  setView('reports');
  setTimeout(() => openSfNewModal(), 300);
}

function toggleUserDropdown() {
  const wrap = document.getElementById('user-chip-wrap');
  const btn  = document.getElementById('user-chip-btn');
  const existing = document.getElementById('user-dropdown');
  if (existing) { existing.remove(); btn.classList.remove('open'); return; }

  btn.classList.add('open');
  const name  = document.getElementById('user-chip-name')?.textContent || '';
  const role  = document.getElementById('user-chip-role')?.textContent || '';

  if (!STATE.companyId && STATE.access && STATE.access.companyId) STATE.companyId = STATE.access.companyId;
  const _idChip = function(label, val) {
    if (!val) return '';
    const safe = String(val).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return '<span title="Copy ' + label + '" onclick="event.stopPropagation();_tlCC(this,\'' + safe + '\')" onmouseover="this.style.background=\'var(--red-dim)\';this.style.borderColor=\'var(--red-border)\';this.style.color=\'var(--red)\'" onmouseout="this.style.background=\'var(--white)\';this.style.borderColor=\'var(--border)\';this.style.color=\'var(--ink-3)\'" style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:10.5px;color:var(--ink-3);cursor:pointer;white-space:nowrap;transition:background 0.12s,border-color 0.12s,color 0.12s">' +
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
      label + '</span>';
  };
  const _ccChip = _idChip('Company ID', STATE.companyId);
  const _uuChip = _idChip('User ID', STATE.uuid);
  const _idChipRow = (_ccChip || _uuChip)
    ? '<div style="display:flex;gap:6px;margin-top:8px">' + _ccChip + _uuChip + '</div>'
    : '';

  const dd = document.createElement('div');
  dd.id = 'user-dropdown';
  dd.className = 'user-dropdown';
  dd.innerHTML =
    '<div class="user-dropdown-header">' +
      '<div class="user-dropdown-name">' + name + '</div>' +
      '<div class="user-dropdown-email">' + role + '</div>' +
      _idChipRow +
    '</div>' +
    '<button class="user-dropdown-item" onclick="openStaffAccountSettings()" style="display:flex;align-items:center;gap:8px">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>' +
      'Account settings' +
    '</button>' +
    '<div style="height:1px;background:var(--border);margin:4px 0"></div>' +
    '<button class="user-dropdown-item" onclick="_sfOpenFromDropdown()" style="display:flex;align-items:center;gap:8px">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
      'Send Feedback' +
    '</button>' +
    '<div style="height:1px;background:var(--border);margin:4px 0"></div>' +
    '<button class="user-dropdown-item danger" onclick="_signOut(\'login.html\')">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>' +
      'Sign out' +
    '</button>';

  wrap.appendChild(dd);

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function _close(e) {
      if (!wrap.contains(e.target)) {
        dd.remove();
        btn.classList.remove('open');
        document.removeEventListener('click', _close);
      }
    });
  }, 0);
}

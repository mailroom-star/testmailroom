// \u2500\u2500 Tasks Pane \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderTasksPane() {
  STATE._openTaskId = null;
  if (document.getElementById('tl-feed')) {
    renderTasksTimeline();
  } else if (qs('tasks-full')) {
    renderTasksFull();
  }
}

function applyTaskSearch() {
  STATE._openTaskId = null;
  renderTasksTimeline();
}

function filterTasks(filter) {
  STATE._currentTaskFilter = filter;
  STATE._openTaskId = null;
  renderTasksTimeline();
}

function renderTaskList(filter) {
  if (filter) STATE._currentTaskFilter = filter;
  if (document.getElementById('tl-feed')) {
    renderTasksTimeline();
  } else {
    renderTasksFull();
  }
}


// Waits (via requestAnimationFrame) for a task card to exist in the DOM, then
// runs cb. Replaces fragile fixed setTimeouts so opening a task from a
// notification is deterministic regardless of render timing.
function _waitForTaskCard(taskId, cb, attempt) {
  attempt = attempt || 0;
  if (document.querySelector('[data-taskid="' + taskId + '"]')) { cb(); return; }
  if (attempt >= 60) { cb(); return; } // ~1s budget; let cb's own bail logic run
  requestAnimationFrame(function(){ _waitForTaskCard(taskId, cb, attempt + 1); });
}

function selectTask(taskId) {
  STATE.selectedTask = STATE.tasks.find(function(t){ return t.taskId === taskId; });
  var wasOpen = STATE._openTaskId === taskId;

  // Close previously open card
  if (STATE._openTaskId) {
    var prev = document.querySelector('[data-taskid="' + STATE._openTaskId + '"]');
    if (prev) {
      prev.classList.remove('tl-open');
      var pb = prev.querySelector('.tl-frow-body');
      if (pb) pb.remove();
      var pch = prev.querySelector('.tl-chevron');
      if (pch) pch.style.transform = '';
    }
  }

  STATE._openTaskId = wasOpen ? null : taskId;
  if (wasOpen) return;

  // Open this card
  var card = document.querySelector('[data-taskid="' + taskId + '"]');
  if (!card) {
    // Card not in the current view (e.g. filtered out). Relax the filter to
    // show-all, re-render, and try once more rather than silently bailing.
    if (STATE._currentTaskFilter !== 'all') {
      STATE._currentTaskFilter = 'all';
      renderTasksTimeline();
      card = document.querySelector('[data-taskid="' + taskId + '"]');
      // selectedTask may not have resolved if it wasn't in the prior filtered set
      if (!STATE.selectedTask) STATE.selectedTask = STATE.tasks.find(function(t){ return t.taskId === taskId; });
    }
    if (!card) { renderTasksTimeline(); return; }
  }

  card.classList.add('tl-open');
  var chev = card.querySelector('.tl-chevron');
  if (chev) chev.style.transform = 'rotate(180deg)';

  // Scroll the opened card into view (e.g. when opened from a notification).
  try { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e) {}

  // Mark as viewed
  if (STATE.selectedTask && STATE.selectedTask.commentCount > 0) {
    sb.from('task_views').upsert({ staff_id: STATE.uuid, task_id: taskId, viewed_at: new Date().toISOString() }, { onConflict: 'staff_id,task_id' }).then(function(){
      if (STATE.selectedTask) STATE.selectedTask.hasUnread = false;
      var dot = document.getElementById('unread-dot-' + taskId);
      if (dot) dot.style.display = 'none';
    });
  }

  // Inject detail body
  var body = document.createElement('div');
  body.className = 'tl-frow-body';
  body.innerHTML = renderTaskDetailBody(STATE.selectedTask);
  card.appendChild(body);

  // Load async content
  loadTaskComments(taskId);
  loadTaskTrail(taskId);

  // Resolve client name async if not already known
  if (STATE.selectedTask && STATE.selectedTask.clientId && !STATE.selectedTask.clientName) {
    (function(tid, cid) {
      sb.from('clients').select('given_name, family_name').eq('id', cid).maybeSingle().then(function(res) {
        if (res.data) {
          var fullName = [res.data.given_name, res.data.family_name].filter(Boolean).join(' ');
          if (fullName) {
            var task = STATE.tasks.find(function(t){ return t.taskId === tid; });
            if (task) task.clientName = fullName;
            var el = document.getElementById('tl-cn-' + tid);
            if (el) el.textContent = fullName;
            var av = document.getElementById('tl-av-' + tid);
            if (av) av.textContent = _tlInitials(fullName);
          }
        }
      });
    })(STATE.selectedTask.taskId, STATE.selectedTask.clientId);
  }

  // Resolve plan name async if not already known
  if (STATE.selectedTask && STATE.selectedTask.planCardId && !STATE.selectedTask.planName) {
    (function(tid, pcid) {
      var _cached = Array.isArray(window._allPlanCards)
        ? _allPlanCards.find(function(pc){ return pc.planCardId === pcid; }) : null;
      if (_cached && _cached.planName) {
        var task = STATE.tasks.find(function(t){ return t.taskId === tid; });
        if (task) task.planName = _cached.planName;
        var el = document.getElementById('tl-pn-' + tid);
        if (el) el.textContent = _cached.planName + (_cached.friendlyName ? ' (' + _cached.friendlyName + ')' : '');
        return;
      }
      sb.from('plan_cards').select('plan_name, friendly_name').eq('plan_card_id', pcid).maybeSingle().then(function(res){
        if (res.data && res.data.plan_name) {
          var task = STATE.tasks.find(function(t){ return t.taskId === tid; });
          if (task) task.planName = res.data.plan_name;
          var el = document.getElementById('tl-pn-' + tid);
          if (el) el.textContent = res.data.plan_name + (res.data.friendly_name ? ' (' + res.data.friendly_name + ')' : '');
        }
      });
    })(STATE.selectedTask.taskId, STATE.selectedTask.planCardId);
  }

  setTimeout(function(){ card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 60);
}

// Re-inject the expanded detail body into an already-open task card after an
// in-place timeline re-render. Does NOT toggle open/closed state and does NOT
// touch STATE._openTaskId. Keeps the user's place: the card stays open and
// (optionally) re-scrolls into view.
function _tlRefreshOpenBody(taskId, opts) {
  opts = opts || {};
  var card = document.querySelector('[data-taskid="' + taskId + '"]');
  if (!card) return;
  card.classList.add('tl-open');
  var chev = card.querySelector('.tl-chevron');
  if (chev) chev.style.transform = 'rotate(180deg)';
  var task = STATE.tasks.find(function(t){ return t.taskId === taskId; });
  if (!task) return;
  STATE.selectedTask = task;
  var existing = card.querySelector('.tl-frow-body');
  if (existing) existing.remove();
  var body = document.createElement('div');
  body.className = 'tl-frow-body';
  body.innerHTML = renderTaskDetailBody(task);
  card.appendChild(body);
  loadTaskComments(taskId);
  loadTaskTrail(taskId);
  if (opts.scroll) {
    try { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e) {}
  }
}

// Inline task update: patch the local task, re-render the timeline IN PLACE
// (preserving STATE._openTaskId and scroll), and — if the open card is still
// present in the current filter — refresh its detail body and keep it open.
// Used by claim/unsnooze/stop-recurring so these actions no longer reload the
// whole pane and lose the user's place. `patch` is a shallow set of camelCase
// task fields. If the patched task drops out of the active filter the card
// simply leaves the list; we don't force a view switch.
function _tlInlineUpdate(taskId, patch) {
  var task = STATE.tasks.find(function(t){ return t.taskId === taskId; });
  if (task && patch) { for (var k in patch) { if (Object.prototype.hasOwnProperty.call(patch, k)) task[k] = patch[k]; } }
  var wasOpen = STATE._openTaskId === taskId;
  renderTasksTimeline(); // reads STATE._openTaskId, so the card stays marked open if still listed
  if (wasOpen && document.querySelector('[data-taskid="' + taskId + '"]')) {
    _tlRefreshOpenBody(taskId, { scroll: true });
  }
  // Background re-sync so any server-side fields we didn't patch stay correct.
  // IMPORTANT: do NOT call loadTasks() here. loadTasks() ends with
  // `if (STATE.view === 'tasks') renderTasksPane()`, and renderTasksPane() sets
  // STATE._openTaskId = null and re-renders the bare list — which collapses the
  // just-opened card and bounces the user out to the overall task list. Instead
  // we fetch fresh data directly, update the badge ourselves, re-render the
  // timeline in place (preserving _openTaskId), and re-open the card.
  api('uuid=' + STATE.uuid + '&action=getTasks').then(function(data){
    STATE.tasks = (data && data.tasks) || [];
    var openCount = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup'; }).length;

// Navigate from a task to the Plan Cards view, open the client's pane,
// and expand + scroll to the exact plan card that was clicked.
// clientId may be missing (e.g. manually-created tasks) - it is resolved from
// the plan card via _allPlanCards once the Plan Cards view has loaded.
function _tlOpenPlanCard(clientId, planCardId) {
  if (!clientId && !planCardId) { setView('plancards'); return; }
  var cid = clientId || null;
  // Pre-set so loadClientsView auto-opens the correct client pane once it loads.
  if (cid) window._currentOpenClientId = cid;
  setView('plancards');

  var san    = (planCardId || '').replace(/[^a-z0-9]/gi, '');
  var bodyId = 'clpcb' + san;
  var chevId = 'clpch' + san;
  var elapsed = 0;
  var STEP = 60;       // ms between attempts
  var BUDGET = 6000;   // total ms - generous so async API load + render can finish
  var stableOpen = 0;  // consecutive ticks the target card has been confirmed open
  var didScroll = false;

  var timer = setInterval(function(){
    elapsed += STEP;

    var dataLoaded = Array.isArray(window._allPlanCards);

    // Resolve clientId from the plan card once data is available (covers tasks
    // that carry a planCardId but no clientId).
    if (!cid && dataLoaded && planCardId) {
      var _match = _allPlanCards.find(function(pc){ return pc.planCardId === planCardId; });
      if (_match && _match.clientId) {
        cid = _match.clientId;
        window._currentOpenClientId = cid;
      }
    }

    var pane = document.getElementById('cl-detail-pane');
    var paneOpen = pane && pane.classList.contains('open');
    var rightClient = cid && window._currentOpenPaneClientId === cid;
    var dataReady = dataLoaded && cid &&
                    _allPlanCards.some(function(pc){ return pc.clientId === cid; });

    // Ensure the correct client's pane is open (covers the case where our poll
    // wins the race before loadClientsView's own auto-open fires).
    if (dataReady && (!paneOpen || !rightClient) && typeof openClientPane === 'function') {
      openClientPane(cid);
      if (elapsed < BUDGET) return; // let it render, re-check next tick
    }

    // No specific card requested - opening the pane is enough.
    if (!san) {
      if (paneOpen && rightClient) clearInterval(timer);
      else if (elapsed >= BUDGET) clearInterval(timer);
      return;
    }

    // Expand the exact plan card once its body is in the DOM. If a late
    // re-render collapsed it, this will re-open it on the next tick.
    var body = document.getElementById(bodyId);
    var hdr  = document.getElementById('clpch-wrap-' + bodyId);
    if (body && hdr) {
      if (!body.classList.contains('open')) {
        _clPcToggle(bodyId, chevId);
        stableOpen = 0;
      } else {
        stableOpen++;
      }
      if (!didScroll) {
        didScroll = true;
        setTimeout(function(){ try { hdr.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e){} }, 90);
      }
      // Stop only once it's been open across a couple of ticks (survives a late re-render).
      if (stableOpen >= 3) { clearInterval(timer); return; }
    }

    if (elapsed >= BUDGET) clearInterval(timer);
  }, STEP);
}

function _renderTlChips() {
  var el = document.getElementById('tasks-chips-tl');
  if (!el) return;
  var filter    = STATE._currentTaskFilter || 'open';
  var todayTor  = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ() });
  var actionable = function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup'; };
  var open      = STATE.tasks.filter(actionable).length;
  var unclaimed = STATE.tasks.filter(function(t){ return !t.assignedTo && (t.status === 'open' || t.status === 'in_progress'); }).length;
  var overdue   = STATE.tasks.filter(function(t){ return actionable(t) && t.dueDate && t.dueDate.split('T')[0] < todayTor; }).length;
  var snoozed   = STATE.tasks.filter(function(t){ return t.status === 'snoozed'; }).length;
  var done      = STATE.tasks.filter(function(t){ return t.status === 'resolved'; }).length;
  // Type chips show actionable (open/in-progress) tasks of that type only.
  var cancellation = STATE.tasks.filter(function(t){ return actionable(t) && t.type === 'cancellation_request'; }).length;
  var payment      = STATE.tasks.filter(function(t){ return actionable(t) && t.type === 'payment_failed'; }).length;
  var idverify     = STATE.tasks.filter(function(t){ return actionable(t) && t.type === 'id_verification'; }).length;
  // "All" count matches the All view scope (everything except pending_setup).
  var allCnt    = STATE.tasks.filter(function(t){ return t.type !== 'pending_setup'; }).length;
  // `alert:true` chips show a red count badge when their count > 0 (attention).
  var chips = [
    { id: 'open',      label: 'Open',         cnt: open },
    { id: 'unclaimed', label: 'Unclaimed',    cnt: unclaimed },
    { id: 'overdue',   label: 'Overdue',      cnt: overdue, alert: true },
    { id: 'snoozed',   label: 'Snoozed',      cnt: snoozed },
    { id: 'cancellation', label: 'Cancellation', cnt: cancellation, alert: true },
    { id: 'payment',      label: 'Payment',      cnt: payment, alert: true },
    { id: 'idverify',     label: 'ID Verify',    cnt: idverify, alert: true },
    { id: 'completed', label: 'Done',         cnt: done },
    { id: 'all',       label: 'All',          cnt: allCnt },
  ];
  el.innerHTML = chips.map(function(c){
    var isActive = filter === c.id;
    var alerting = c.alert && c.cnt > 0 && !isActive; // active state keeps the dark style
    // Soft red tint on the whole chip when alerting; otherwise default chip look.
    var washStyle = alerting
      ? ' style="background:#FFF5F5;border-color:#FFCDD2;color:#C62828"'
      : '';
    var cntHtml = (c.cnt !== null)
      ? ' <span style="opacity:' + (alerting ? '.75' : '.6') + (alerting ? ';font-weight:800' : '') + '">' + c.cnt + '</span>'
      : '';
    return '<button class="tl-chip' + (isActive ? ' tl-chip-active' : '') + '"' + washStyle + ' onclick="filterTasks(\'' + c.id + '\')">'
      + c.label + cntHtml
      + '</button>';
  }).join('');

function _tlTaskCard(task, nodeClass) {

    && task.status !== 'resolved' && task.status !== 'snoozed';

  // Right-side badges
  var badges = '';

  else if (task.status === 'in_progress')              badges += '<span class="tl-badge inprog">Active</span>';
  else if (!task.assignedTo && (task.status === 'open' || task.status === 'in_progress'))

  else if (task.status === 'resolved')                 badges += '<span class="tl-badge done">Done</span>';
  else if (task.status === 'snoozed')                  badges += '<span class="tl-badge snoozed">Snoozed</span>';

    +       '</div>'
    +       '<div class="tl-fr-title">' + (task.title || task.notes || task.recipientName || 'Task') + '</div>'

        + (isAssignedToMe ? '<button class="btn btn-secondary btn-sm" onclick="snoozePrompt(\'' + task.taskId + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 16 14"/></svg> Snooze</button>' : '')
        + (isUnassigned ? '<button class="btn btn-secondary btn-sm" onclick="claimTask(\'' + task.taskId + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Claim</button>' : '')

        + '<textarea id="resolve-note" class="tl-resolve-ta" placeholder="Add a resolution note (optional)\u2026"></textarea>'
        + '</div>'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
        + '<button class="btn btn-success btn-sm" onclick="resolveTask(\'' + task.taskId + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mark Done</button>'
        + '<button class="btn btn-secondary btn-sm" onclick="snoozePrompt(\'' + task.taskId + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 16 14"/></svg> Snooze</button>'
        + '</div>';
    }
  } else if (isSnoozed) {
    actionsHtml = '<div style="padding:12px;background:#E2E5F7;border-radius:13px;font-size:13px;color:#2D3A9E;margin-bottom:12px;display:flex;align-items:center;gap:8px">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 16 14"/></svg>'
      + 'Snoozed \u00b7 Wakes ' + (task.snoozedUntil ? fmtDateTime(task.snoozedUntil) : '\u2014') + '</div>';
    if (isAssignedToMe) {
      // Auto-resolve-only types (id_verification, payment_failed, cancellation_request)

      // snoozed branch must hide Mark Done for them too (the open branch already does).
      // Wake Now stays for every type.
      var _snoozeNoResolve = (task.type === 'id_verification' || task.type === 'payment_failed' || task.type === 'cancellation_request');
      actionsHtml += '<div style="display:flex;gap:8px">'
        + '<button class="btn btn-secondary btn-sm" style="flex:1" onclick="unsnoozeTask(\'' + task.taskId + '\')">Wake Now</button>'
        + (_snoozeNoResolve ? '' : '<button class="btn btn-success btn-sm" style="flex:1" onclick="resolveTask(\'' + task.taskId + '\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mark Done</button>')
        + '</div>';
    }

    actionsHtml = '<div style="padding:12px;background:var(--green-bg);border-radius:13px;font-size:13px;color:var(--green)">'

  }

  // ── Extra jump links ───────────────────────────────────────────────────
  var extraLinks = '';
  if (extraLinks) extraLinks = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">' + extraLinks + '</div>';

  return '<div>'
    + (descHtml || '')
    + detailGrid
    + (checklistHtml || '')
    + (actionsHtml ? '<div class="tl-section-label">Actions</div>' + actionsHtml : '')
    + extraLinks
    + '<div class="tl-section-label">Comments &amp; Notes</div>'
    + '<div id="task-comments-' + task.taskId + '"><div style="font-size:13px;color:var(--ink-4)">Loading\u2026</div></div>'
    + '<div class="tl-section-label">Activity Trail</div>'
    + '<div id="task-trail-' + task.taskId + '"><div style="font-size:13px;color:var(--ink-4)">Loading\u2026</div></div>'
    + '</div>';
}


async function renderTasksTimeline() {
  _renderTlStats();
  _renderTlChips();

  var filter = STATE._currentTaskFilter || 'open';
  var feed   = document.getElementById('tl-feed');
  if (!feed) return;

  var todayTor = new Date().toLocaleDateString('en-CA', { timeZone: STAFF_TZ() });
  var search   = (document.getElementById('task-search') ? document.getElementById('task-search').value : '').toLowerCase();
  var tasks;

  if (filter === 'open')      tasks = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup'; });
  else if (filter === 'unclaimed') tasks = STATE.tasks.filter(function(t){ return !t.assignedTo && (t.status === 'open' || t.status === 'in_progress'); });
  else if (filter === 'overdue')   tasks = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type !== 'pending_setup' && t.dueDate && t.dueDate.split('T')[0] < todayTor; });
  else if (filter === 'snoozed')   tasks = STATE.tasks.filter(function(t){ return t.status === 'snoozed'; });
  else if (filter === 'completed') tasks = STATE.tasks.filter(function(t){ return t.status === 'resolved'; }).sort(function(a, b){
    var ad = a.resolvedAt || a.createdAt || '';
    var bd = b.resolvedAt || b.createdAt || '';
    return ad < bd ? 1 : (ad > bd ? -1 : 0); // most recently resolved first (matches All tab's Done section)
  });
  else if (filter === 'cancellation') tasks = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type === 'cancellation_request'; });
  else if (filter === 'payment')       tasks = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type === 'payment_failed'; });
  else if (filter === 'idverify')      tasks = STATE.tasks.filter(function(t){ return (t.status === 'open' || t.status === 'in_progress') && t.type === 'id_verification'; });
  else tasks = STATE.tasks.filter(function(t){ return t.type !== 'pending_setup'; });

  if (search) {
    tasks = tasks.filter(function(t){
      return [(t.notes||''),(t.description||''),(t.type||''),(t.taskId||''),(t.clientId||''),(t.clientName||''),(t.planCardId||''),(t.title||'')]
        .join(' ').toLowerCase().includes(search);
    });
  }

  var emptyMsgs = { open:'All clear!', unclaimed:'No unclaimed tasks', overdue:'No overdue tasks', snoozed:'No snoozed tasks', completed:'No completed tasks', all:'No tasks', cancellation:'No open cancellation requests', payment:'No open payment tasks', idverify:'No open ID verification tasks' };
  if (!tasks.length) {
    feed.innerHTML = _blankSlate('<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>', (emptyMsgs[filter] || 'No tasks found'), 'Nothing to show for this filter.');
    return;
  }

  var html = '';
  if (filter === 'open' || filter === 'all') {
    var _uc = function(a, b) { return (!a.assignedTo ? -1 : 1) - (!b.assignedTo ? -1 : 1); };
    // Unclaimed (claimable) tasks float to the very top \u2014 both with and without due dates.
    // Sort soonest-due first; no-due-date unclaimed tasks sort last within the group.
    var _byDue = function(a, b) {
      var ad = a.dueDate ? a.dueDate.split('T')[0] : '9999-12-31';
      var bd = b.dueDate ? b.dueDate.split('T')[0] : '9999-12-31';
      return ad < bd ? -1 : (ad > bd ? 1 : 0);
    };
    // On the All tab, resolved/done tasks are split into their own section (rendered last)
    // so completed work isn't mixed into the active Due now / Upcoming / No due date buckets.
    var done   = (filter === 'all') ? tasks.filter(function(t){ return t.status === 'resolved'; }) : [];
    var active = (filter === 'all') ? tasks.filter(function(t){ return t.status !== 'resolved'; }) : tasks;
    done.sort(function(a, b){
      var ad = a.resolvedAt || a.createdAt || '';
      var bd = b.resolvedAt || b.createdAt || '';
      return ad < bd ? 1 : (ad > bd ? -1 : 0); // most recently resolved first
    });
    var unclaimed = active.filter(function(t){ return !t.assignedTo; }).sort(_byDue);
    var claimed   = active.filter(function(t){ return !!t.assignedTo; });
    var dueNow   = claimed.filter(function(t){ return t.dueDate && t.dueDate.split('T')[0] <= todayTor; }).sort(_uc);
    var upcoming = claimed.filter(function(t){ return t.dueDate && t.dueDate.split('T')[0] > todayTor; }).sort(_uc);
    var noDue    = claimed.filter(function(t){ return !t.dueDate; }).sort(_uc);
    if (unclaimed.length) html += _renderTlSection('Unclaimed', unclaimed, 'uc',  'var(--amber)', '#92520A');
    if (dueNow.length)    html += _renderTlSection('Due now',     dueNow,   'due', '#9E2A1E', 'var(--required)');
    if (upcoming.length)  html += _renderTlSection('Upcoming',    upcoming, 'up',  'var(--blue)', '#2E7AC7');
    if (noDue.length)     html += _renderTlSection('No due date', noDue,    'nd',  'var(--ink-3)', 'var(--ink-4)');
    if (done.length)      html += _renderTlSection('Done',        done,     'done','var(--green)', '#1A6B3C');
  } else {
    html = _renderTlSection(null, tasks, null, null, null);
  }
  feed.innerHTML = html;
}

        </div>

        <div id="confidential-notice" style="display:none;padding:8px 12px;background:var(--amber-bg);border-radius:var(--radius-sm);font-size:12px;color:var(--amber);margin-bottom:10px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><strong>Confidential mail</strong> \u2014 Pickup only. No scanning or forwarding. Client will see this notice.
        </div>
        <div id="forwarding-notice" style="display:none;padding:8px 12px;background:var(--blue-bg);border-radius:var(--radius-sm);font-size:12px;color:var(--blue);margin-bottom:10px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.7 4H7.3a2 2 0 0 0-1.8 1.5z"/></svg> <strong>Forwarding scheduled</strong> \u2014 available for pickup until it ships with the next batch.
        </div>

        <div id="special-case-name-wrap" style="display:none" class="form-group">
          <label>Name on Envelope / Package *</label>
          <input type="text" id="log-special-name" placeholder="As written on the mail \u2014 for physical retrieval">
          <div style="font-size:11px;color:var(--ink-4);margin-top:4px">Enter exactly as it appears. Do not search recipients.</div>
        </div>
        <div id="special-case-reason-wrap" style="display:none" class="form-group">
          <label>Special Case Reason</label>
          <input type="text" id="log-special-reason" placeholder="e.g. No matching recipient found">
        </div>

        <div id="parcel-fields" style="display:none">
        </div>

        <button class="btn btn-primary btn-full" id="log-submit-btn" onclick="submitLogMail()" style="margin-top:8px">
          Log Mail
        </button>
      </div>
    </div>`;

  qs('log-type').addEventListener('change', onMailTypeChange);
  loadLogSuggestions();
  _scanMode = 'url';
  _scanFile = null;
  _scanExpiryDays = 30;
}

function onConfidentialToggle() {
  // Called internally by setMailMode
  const tog = qs('tog-confidential');
  const isConf = tog.classList.contains('on');
  const scanWrap  = qs('scan-field-wrap');
  if (scanWrap) {
    scanWrap.style.display = isConf ? 'none' : '';
    // Clear scan value when hiding
    const scanField = qs('log-scan');
    if (scanField && isConf) scanField.value = '';
  }
  const confNotice = qs('confidential-notice');
  if (confNotice) confNotice.style.display = isConf ? 'block' : 'none';
  const fwdNotice = qs('forwarding-notice');
  if (fwdNotice && isConf) fwdNotice.style.display = 'none';
  updateScanUrlRequirement();
}

function onSpecialCaseToggle() {
  // Called internally by setMailMode
  const tog = qs('tog-special');
  const isSpecial = tog.classList.contains('on');

  const recSection   = qs('recipient-section');
  const specialNote  = qs('special-case-note');
  const nameWrap     = qs('special-case-name-wrap');
  const reasonWrap   = qs('special-case-reason-wrap');

  if (recSection)  recSection.style.display  = isSpecial ? 'none' : 'block';
  if (specialNote) specialNote.style.display = 'none';
  if (nameWrap)    nameWrap.style.display    = isSpecial ? 'block' : 'none';
  if (reasonWrap)  reasonWrap.style.display  = isSpecial ? 'block' : 'none';

  const scanWrap    = qs('scan-field-wrap');
  const noteClient  = document.querySelector('#log-note-client')?.closest('.form-group');
  const confNotice  = qs('confidential-notice');
  const fwdNotice   = qs('forwarding-notice');
  if (scanWrap)   scanWrap.style.display   = isSpecial ? 'none' : '';
  if (noteClient) noteClient.style.display = isSpecial ? 'none' : '';
  if (confNotice) confNotice.style.display = 'none';
  if (fwdNotice)  fwdNotice.style.display  = 'none';

  if (!isSpecial) clearRecipient();
}

let _currentMailMode = 'regular';

function setMailMode(mode) {
  _currentMailMode = mode;
  const slider = qs('mail-mode-slider');
  const btnR = qs('mm-btn-regular'), btnC = qs('mm-btn-confidential'), btnS = qs('mm-btn-special');
  const togConf = qs('tog-confidential'), togSpec = qs('tog-special');
  const divider = qs('recipient-divider');
  const blurb = qs('mail-mode-blurb');

  // Reset both toggles
  if (togConf) togConf.classList.remove('on');
  if (togSpec) togSpec.classList.remove('on');

  // Update slider position
  if (slider) slider.className = 'mail-mode-slider' + (mode === 'confidential' ? ' confidential' : mode === 'special' ? ' special' : '');

  // Update button states
  [btnR, btnC, btnS].forEach(b => b && b.classList.remove('active'));
  if (mode === 'regular' && btnR) btnR.classList.add('active');
  if (mode === 'confidential' && btnC) btnC.classList.add('active');
  if (mode === 'special' && btnS) btnS.classList.add('active');

  // Set the hidden toggle states
  if (mode === 'confidential' && togConf) togConf.classList.add('on');
  if (mode === 'special' && togSpec) togSpec.classList.add('on');

  // Hide "Recipient" label on special case
  if (divider) divider.style.display = mode === 'special' ? 'none' : '';

  // Update blurb
  if (blurb) {
    const blurbs = {
      regular: 'Standard mail \u2014 search and select a recipient to log against.',
      confidential: 'Pickup only \u2014 scanning and forwarding are blocked. Client will see a confidential notice.',
      special: 'No recipient needed \u2014 enter the name as written on the envelope for future assignment.'
    };
    blurb.textContent = blurbs[mode];
  }

  // Fire the toggle handlers
  onConfidentialToggle();
  onSpecialCaseToggle();

  // \u2500\u2500 Master scan field visibility \u2500\u2500
  // Scan is HIDDEN when: confidential OR special OR parcel
  const scanWrap = qs('scan-field-wrap');
  const isParcel = qs('log-type') && qs('log-type').value === 'parcel';
  if (scanWrap) {
    scanWrap.style.display = (mode === 'confidential' || mode === 'special' || isParcel) ? 'none' : '';
  }
}

function setMailType(type) {
  const hidden = qs('log-type');
  if (hidden) hidden.value = type;
  const slider = qs('mail-type-slider');
  const btnLetter = qs('mt-btn-letter');
  const btnParcel = qs('mt-btn-parcel');
  if (slider) slider.className = 'mail-type-slider' + (type === 'parcel' ? ' parcel' : '');
  if (btnLetter) { btnLetter.classList.toggle('active', type === 'letter'); }
  if (btnParcel) { btnParcel.classList.toggle('active', type === 'parcel'); }
  onMailTypeChange();
}

function onMailTypeChange() {
  const isParcel = qs('log-type') && qs('log-type').value === 'parcel';

  // Show parcel-specific fields
  const pf = qs('parcel-fields');
  if (pf) pf.style.display = isParcel ? 'block' : 'none';


  // Block parcel selection on Economy plans (parcelLimit = 0)
  const pc = STATE.logPlanCard;
  if (isParcel && pc && (!pc.parcelLimit || parseInt(pc.parcelLimit) === 0)) {
    const hidden = qs('log-type');
    if (hidden) hidden.value = 'letter';
    const slider = qs('mail-type-slider');
    if (slider) slider.className = 'mail-type-slider';
    const btnL = qs('mt-btn-letter'), btnP = qs('mt-btn-parcel');
    if (btnL) btnL.classList.add('active');
    if (btnP) btnP.classList.remove('active');
    if (pf) pf.style.display = 'none';
    toast('This plan does not include parcel handling \u2014 upgrade to log parcels.', 'error');
    return;
  }

  // Hide scan field for parcels (not needed)
  const scanWrap = qs('scan-field-wrap');
  if (scanWrap && _currentMailMode !== 'special') scanWrap.style.display = isParcel ? 'none' : '';

  // Disable confidential mode for parcels \u2014 reset to Regular if active
  const confBtn = qs('mm-btn-confidential');
  if (confBtn) {
    confBtn.disabled = isParcel;
    confBtn.style.opacity = isParcel ? '0.35' : '1';
    confBtn.style.pointerEvents = isParcel ? 'none' : '';
    confBtn.title = isParcel ? 'Confidential not available for parcels' : 'Blocks scan & forward';
  }
  if (isParcel && _currentMailMode === 'confidential') {
    setMailMode('regular');
  }

  // Hide forwarding notice for parcels
  const fwdNotice = qs('forwarding-notice');
  if (fwdNotice && isParcel) fwdNotice.style.display = 'none';

  updateScanUrlRequirement();
}

function updateScanUrlRequirement() {
  const pc           = STATE.logPlanCard;
  const isScanPlan   = pc && pc.autoFeature === 'scan';
  const isConf       = qs('tog-confidential') && qs('tog-confidential').classList.contains('on');
  const isLetter     = qs('log-type') && qs('log-type').value !== 'parcel';
  const mandatory    = isScanPlan && isLetter && !isConf;
  const hint = qs('scan-url-hint');
  if (hint) {
    hint.textContent = mandatory ? '(required for scan plan)' : '(optional)';
    hint.style.color = mandatory ? 'var(--required)' : 'var(--ink-4)';
  }
}

// \u2500\u2500 Scan mode (URL vs Upload) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _scanMode = 'url';
let _scanFile = null;

function setScanMode(mode) {
  _scanMode = mode;
  const urlBtn = qs('scan-mode-url'), uploadBtn = qs('scan-mode-upload');
  const urlInput = qs('scan-url-input'), uploadInput = qs('scan-upload-input');
  if (urlBtn) urlBtn.classList.toggle('active', mode === 'url');
  if (uploadBtn) uploadBtn.classList.toggle('active', mode === 'upload');
  if (urlInput) urlInput.style.display = mode === 'url' ? 'block' : 'none';
  if (uploadInput) uploadInput.style.display = mode === 'upload' ? 'block' : 'none';
}

function handleScanDrop(e) {
  const file = e.dataTransfer.files[0];
  if (file) handleScanFile(file);
}

function handleScanFile(file) {
  if (!file) return;
  const maxSize = 5 * 1024 * 1024;
  if (file.size > maxSize) { toast('File too large \u2014 max 5 MB', 'error'); return; }
  const allowed = ['image/jpeg','image/png','image/webp','application/pdf'];
  if (!allowed.includes(file.type)) { toast('Unsupported file type \u2014 use JPG, PNG, or PDF', 'error'); return; }
  _scanFile = file;
  const sizeStr = file.size < 1024*1024
    ? (file.size/1024).toFixed(0) + ' KB'
    : (file.size/1024/1024).toFixed(1) + ' MB';
  const icon = file.type === 'application/pdf' ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>' : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
  const label = qs('scan-drop-label');
  const preview = qs('scan-file-preview');
  if (label) label.style.display = 'none';
  if (preview) {
    preview.style.display = 'block';
    preview.innerHTML = `
      <div class="scan-file-info">
        <span style="font-size:18px">${icon}</span>
        <span class="file-name">${file.name}</span>
        <span class="file-size">${sizeStr}</span>
        <button class="remove-btn" onclick="event.stopPropagation();clearScanFile()">\u2715 Remove</button>
      </div>`;
  }
}

function clearScanFile() {
  _scanFile = null;
  const label = qs('scan-drop-label');
  const preview = qs('scan-file-preview');
  const input = qs('scan-file-input');
  if (label) label.style.display = 'flex';
  if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
  if (input) input.value = '';
}

async function resolveScanValue() {
  if (_scanMode === 'url') {
    return qs('log-scan') ? qs('log-scan').value.trim() : '';
  }
  if (!_scanFile) return '';

  // Upload file to Supabase Storage via adapter
  try {
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(_scanFile);
    });

    const result = await apiPost({
      action:   'uploadScanImage',
      uuid:     STATE.uuid,
      staffId:  STATE.uuid,
      fileData: base64,
      fileName: _scanFile.name,
      mimeType: _scanFile.type
    });

    if (result.status === 'ok' && result.url) return result.url;
    throw new Error(result.message || 'Upload failed');
  } catch(err) {
    toast('Scan upload failed: ' + err.message, 'error');
    return null; // null = abort the submit
  }
}

function resetScanField() {
  setScanMode('url');
  if (qs('log-scan')) qs('log-scan').value = '';
  clearScanFile();
  _scanExpiryDays = 30;
}

// \u2500\u2500 Scan expiry \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _scanExpiryDays = 30;

function setScanExpiry(days, btnEl) {
  _scanExpiryDays = days;
  document.querySelectorAll('.expiry-chip').forEach(c => c.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
}

function getScanExpiresAt() {
  const d = new Date();
  d.setDate(d.getDate() + _scanExpiryDays);
  return d.toISOString();
}


function toggleSpecial() {
  const tog = qs('tog-special');
  tog.classList.toggle('on');
  const wrap = qs('special-case-reason-wrap');
  if (wrap) wrap.style.display = tog.classList.contains('on') ? 'block' : 'none';
}

// \u2500\u2500 Log suggestions (senders, locations) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _senderCache = [];
let _locationCache = [];
let _suggestionsLoaded = false;

async function loadLogSuggestions() {
  if (!_suggestionsLoaded) {
    try {
      const data = await api(`uuid=${STATE.uuid}&action=getLogSuggestions`);
      _senderCache = data.senders || [];
      _locationCache = data.locations || [];
      _suggestionsLoaded = true;
    } catch(e) { /* silent */ }
  }
  // Always re-render chips (DOM may have been rebuilt)
  renderChips('sender-chips', _senderCache.slice(0, 6), 'log-sender');
  renderChips('location-chips', _locationCache.slice(0, 4), 'log-location');
}

function renderChips(containerId, items, inputId) {
  const el = qs(containerId);
  if (!el || !items.length) return;
  el.innerHTML = items.map(v =>
    `<span class="chip" onclick="document.getElementById('${inputId}').value='${v.replace(/'/g,"\\'")}';hideSuggest('${inputId.replace('log-','')}-suggest')">${v}</span>`
  ).join('');
}

function showSuggestions(inputId, dropdownId, cache, query) {
  const dd = qs(dropdownId);
  if (!dd) return;
  const q = (query || '').toLowerCase();
  if (!q || !cache.length) { dd.style.display = 'none'; return; }
  const hits = cache.filter(v => v.toLowerCase().includes(q) && v.toLowerCase() !== q).slice(0, 6);
  if (!hits.length) { dd.style.display = 'none'; return; }
  dd.style.display = 'block';
  dd.innerHTML = hits.map(v =>
    `<div class="suggest-item" onmousedown="document.getElementById('${inputId}').value='${v.replace(/'/g,"\\'")}';hideSuggest('${dropdownId}')">${v}</div>`
  ).join('');
}

function hideSuggest(id) {
  const el = qs(id);
  if (el) el.style.display = 'none';
}

function appendNote(textareaId, text) {
  const el = document.getElementById(textareaId);
  if (!el) return;
  const cur = el.value.trim();
  el.value = cur ? cur + ' ' + text : text;
  el.focus();
}

// Hide dropdowns on blur
document.addEventListener('click', function(e) {
  ['sender-suggest','location-suggest'].forEach(id => {
    const dd = qs(id);
    if (dd && !dd.contains(e.target)) dd.style.display = 'none';
  });
});

// \u2500\u2500 Recipient search \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
let _searchTimeout = null;

// Recipient cache \u2014 loaded once per session, filtered client-side
// Animated refresh: spinRefreshBtn(id) \u2192 start, stopRefreshBtn(id) \u2192 stop
function spinRefreshBtn(id) {
  const b = document.getElementById(id) || (typeof id === 'object' ? id : null);
  if (b) { b.disabled = true; b.dataset.origHtml = b.innerHTML;
    const svg = b.querySelector('svg');
    if (svg) { svg.style.animation = 'refresh-spin 0.8s linear infinite'; }
    else { const arrow = b.innerHTML.match(/[\u21BB\u27F3\u21BA]/)?.[0] || '\u21BB';
    b.innerHTML = b.innerHTML.replace(/[\u21BB\u27F3\u21BA]/, `<span class="spin-active">${arrow}</span>`); }
  }
}
function animRefresh(btnId, asyncFn) {
  spinRefreshBtn(btnId);
  // Cleanup old notifications on any refresh (non-blocking)
  apiPost({ action: 'cleanupNotifications' }).catch(() => {});
  Promise.resolve(asyncFn()).finally(() => {
    stopRefreshBtn(btnId);
    const b = document.getElementById(btnId);
    if (b && b.dataset.refreshLabel) setLastRefreshed(b.dataset.refreshLabel);
  });
}
function stopRefreshBtn(id) {
  const b = document.getElementById(id) || (typeof id === 'object' ? id : null);
  if (b) { b.disabled = false; if (b.dataset.origHtml) b.innerHTML = b.dataset.origHtml; }
}

function setLastRefreshed(labelId) {
  const el = document.getElementById(labelId);
  if (!el) return;
  const now = new Date();
  el.textContent = 'Last refreshed ' + now.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit' });
}

let _recipientCache = null;
let _recipientCacheTime = 0;
const CACHE_TTL = 5 * 60 * 1000;

async function warmRecipientCache() {
  const now = Date.now();
  if (_recipientCache && (now - _recipientCacheTime) < CACHE_TTL) return;
  try {
    const data = await api(`uuid=${STATE.uuid}&action=searchRecipients&q=`);
    _recipientCache = Array.isArray(data) ? data : (data.recipients || []);
    _recipientCacheTime = now;
  } catch(e) { _recipientCache = _recipientCache || []; }
}

function searchRecipients(query) {
  clearTimeout(_searchTimeout);
  const results = qs('recipient-results');
  if (!results) return;
  if (!query || query.length < 1) { results.style.display = 'none'; return; }

  if (_recipientCache) {
    showRecipientResults(query, results);
    return;
  }
  results.style.display = 'block';
  results.innerHTML = `<div class="recipient-result-item" style="color:var(--ink-4)">Loading...</div>`;
  _searchTimeout = setTimeout(async () => {
    await warmRecipientCache();
    showRecipientResults(query, results);
  }, 80);
}

function showRecipientResults(query, results) {
  if (!results) return;
  const q    = query.toLowerCase();
  const hits = (_recipientCache || []).filter(r =>
    [r.name, r.companyName, r.planCardId, r.planName, r.clientName, r.friendlyName]
      .join(' ').toLowerCase().includes(q)
  ).slice(0, 10);

  if (!hits.length) {
    results.style.display = 'block';
    results.innerHTML = `<div class="recipient-result-item" style="color:var(--ink-4)">No matching recipients</div>`;
    return;
  }

  // Sort: active first, then inactive
  hits.sort((a, b) => {
    if (a.recipientStatus === 'active' && b.recipientStatus !== 'active') return -1;
    if (a.recipientStatus !== 'active' && b.recipientStatus === 'active') return 1;
    return 0;
  });

  results.style.display = 'block';
  results.innerHTML = hits.map(r => {
    const isInactive = r.recipientStatus === 'inactive';
    const isTemp = r.notes && r.notes.startsWith('TEMP:');
    const payload = JSON.stringify({
      recipientId: r.recipientId, name: r.name, companyName: r.companyName,
      planCardId: r.planCardId, clientId: r.clientId, clientName: r.clientName,
      subscriptionId: r.subscriptionId, accessStatus: r.accessStatus,
      notes: r.notes, locationId: r.locationId, status: r.recipientStatus,
      friendlyName: r.friendlyName, planName: r.planName, autoFeature: r.autoFeature,
      parcelLimit: r.parcelLimit
    }).replace(/"/g, '&quot;');
    const statusColor = r.accessStatus === 'ACTIVE' ? 'var(--green)' : r.accessStatus === 'CANCELED_WITH_ACCESS' ? 'var(--amber)' : r.accessStatus === 'PAYMENT_REQUIRED' ? 'var(--red)' : 'var(--ink-4)';
    const statusLabel = r.accessStatus === 'ACTIVE' ? '\u25CF Active' : r.accessStatus === 'CANCELED_WITH_ACCESS' ? (() => {
      const endDate = r.currentPeriodEnd;
      if (endDate) {
        const today = new Date(); today.setHours(0,0,0,0);
        const end = new Date(endDate + 'T12:00:00');
        const days = Math.ceil((end - today) / 86400000);
        const daysStr = days > 0 ? ' \u00B7 ' + days + 'd left' : ' \u00B7 ends today';
        return '\u25CF Ending' + daysStr;
      }
      return '\u25CF Ending';
    })() : r.accessStatus === 'PAYMENT_REQUIRED' ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Payment Required' : r.accessStatus === 'CANCELED' ? '\u2715 Canceled' : r.accessStatus || 'Unknown';

    const tempBadge = isTemp ? '<span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:#FFF3E0;color:#E65100;border:1px solid #FFE0B2;margin-left:4px">TEMP</span>' : '';
    const inactiveBadge = isInactive ? '<span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:#F5F5F5;color:#9E9E9E;border:1px solid #E0E0E0;margin-left:4px">INACTIVE</span>' : '';
    const displayPlan = r.friendlyName && !r.friendlyName.startsWith('TEMP:') ? r.friendlyName : (r.planName || r.planCardId);
    const clientLabel = r.clientName ? `<span style="color:var(--ink-4)">\u00B7 ${r.clientName}</span>` : '';

    if (isInactive) {
      return `<div class="recipient-result-item" style="opacity:0.45;cursor:not-allowed;pointer-events:none">
        <div class="rri-name">${r.name}${r.companyName ? ' <span style="color:var(--ink-4);font-weight:400">\u00B7 ' + r.companyName + '</span>' : ''}${inactiveBadge}</div>
        <div class="rri-sub" style="font-size:10px;color:#9E9E9E">${displayPlan} ${clientLabel} \u00B7 Inactive</div>
      </div>`;
    }

    return `<div class="recipient-result-item" onclick="selectRecipient(${payload})">
      <div class="rri-name">${r.name}${r.companyName ? ' <span style="color:var(--ink-4);font-weight:400">\u00B7 ' + r.companyName + '</span>' : ''}${tempBadge}</div>
      <div class="rri-sub" style="display:flex;gap:8px;align-items:center">
        <span>${displayPlan} ${clientLabel}</span>
        <span style="font-size:10px;font-weight:600;color:${statusColor}">${statusLabel}</span>
      </div>
    </div>`;
  }).join('');
}


function selectRecipient(data) {
  // Block inactive recipients from being selected for mail logging
  if (data.status === 'inactive') {
    toast('\u2298 This recipient is inactive \u2014 re-activate them before logging mail.', 'error');
    return;
  }
  STATE.logPlanCard = data;
  updateScanUrlRequirement();

  // If parcel is selected but this plan doesn't support parcels, revert to letter
  const isParcel = qs('log-type') && qs('log-type').value === 'parcel';
  if (isParcel && (!data.parcelLimit || parseInt(data.parcelLimit) === 0)) {
    const hidden = qs('log-type');
    if (hidden) hidden.value = 'letter';
    const slider = qs('mail-type-slider');
    if (slider) slider.className = 'mail-type-slider';
    const btnL = qs('mt-btn-letter'), btnP = qs('mt-btn-parcel');
    if (btnL) btnL.classList.add('active');
    if (btnP) btnP.classList.remove('active');
    const pf = qs('parcel-fields');
    if (pf) pf.style.display = 'none';
    toast('This plan does not include parcel handling \u2014 switched to letter.', 'error');
    updateScanUrlRequirement();
  }
  const results = qs('recipient-results');
  if (results) results.style.display = 'none';

  const isTemp = data.notes && data.notes.startsWith('TEMP:');

  const search = qs('log-recipient-search');
  if (search) search.value = data.name + (data.companyName ? ' \u2014 ' + data.companyName : '');

  const box = qs('selected-recipient-box');
  if (box) {
    box.style.display = 'block';
    const nameEl  = qs('sel-rec-name');
    const subEl   = qs('sel-rec-sub');
    const displayPlan = data.friendlyName && !data.friendlyName.startsWith('TEMP:') ? data.friendlyName : (data.planName || data.planCardId);
    if (nameEl) nameEl.innerHTML = data.name + (data.companyName ? ' \u2014 ' + data.companyName : '')
      + (isTemp ? ' <span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:#FFF3E0;color:#E65100;border:1px solid #FFE0B2">TEMP</span>' : '');
    if (subEl)  subEl.innerHTML = `${displayPlan}${data.clientName ? ' \u00B7 <strong>' + data.clientName + '</strong>' : ''}`;

    // Build expandable other recipients on same plan card
    const oldOther = box.querySelector('.other-recs-wrap');
    if (oldOther) oldOther.remove();
    const siblings = (_recipientCache || []).filter(r =>
      r.planCardId === data.planCardId && r.recipientId !== data.recipientId
    );
    if (siblings.length > 0) {
      const otherDiv = document.createElement('div');
      otherDiv.className = 'other-recs-wrap';
      otherDiv.innerHTML = `
        <button onclick="const el=this.nextElementSibling;const ch=this.querySelector('span');if(el.style.display==='none'){el.style.display='block';ch.style.transform='rotate(90deg)'}else{el.style.display='none';ch.style.transform='rotate(0deg)'}"
          style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;color:var(--ink-4);padding:6px 0 2px;font-weight:600">
          <span style="display:inline-block;transition:transform .2s;font-size:10px">\u25B8</span>
          Other recipients on this plan (${siblings.length})
        </button>
        <div style="display:none;padding:4px 0 2px">
          ${siblings.map(s => {
            const sTemp = s.notes && s.notes.startsWith('TEMP:');
            const sInactive = s.recipientStatus === 'inactive';
            const badge = sTemp ? '<span style="font-size:8px;font-weight:600;padding:0 4px;border-radius:6px;background:#FFF3E0;color:#E65100;margin-left:4px">TEMP</span>'
              : sInactive ? '<span style="font-size:8px;font-weight:600;padding:0 4px;border-radius:6px;background:#F5F5F5;color:#9E9E9E;margin-left:4px">INACTIVE</span>' : '';
            return '<div style="font-size:12px;color:var(--ink-3);padding:2px 0;'+(sInactive?'opacity:0.5;':'')+'">' + s.name + badge + '</div>';
          }).join('')}
        </div>`;
      box.appendChild(otherDiv);
    }

    // Payment status warning
    const isBlocked = data.accessStatus && data.accessStatus !== 'ACTIVE' && data.accessStatus !== 'CANCELED_WITH_ACCESS' && data.accessStatus !== 'PAYMENT_REQUIRED' && data.accessStatus !== 'CANCELED';
    let statusHtml = '';
    if (isBlocked) {
      statusHtml = `<div style="margin-top:6px;padding:6px 10px;background:var(--danger-dim);border-radius:var(--radius-sm);font-size:11px;color:var(--required);font-weight:500">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> ${data.accessStatus.replace(/_/g,' ')} \u2014 mail release blocked. Do not release items.
      </div>`;
    } else if (data.accessStatus === 'CANCELED_WITH_ACCESS') {
      statusHtml = `<div style="margin-top:6px;padding:6px 10px;background:var(--amber-bg);border-radius:var(--radius-sm);font-size:11px;color:var(--amber)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Cancelling soon \u2014 still has access until billing period ends. Logging allowed.
      </div>`;
    }
    // Show warning for PAYMENT_REQUIRED but allow logging. Block for CANCELED.
    const submitBtn = qs('log-submit-btn');
    if (data.accessStatus === 'PAYMENT_REQUIRED') {
      statusHtml += `<div style="margin-top:6px;padding:8px 10px;background:#FFF3E0;border-radius:var(--radius-sm);font-size:11px;color:#E65100;font-weight:600">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:4px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/><line x1="12" y1="9" x2="12" y2="13"/></svg>Payment Required \u2014 mail can be logged but release is blocked until payment is resolved.
      </div>`;
      if (submitBtn) { submitBtn.disabled = false; submitBtn.title = ''; }
    } else if (data.accessStatus === 'CANCELED') {
      statusHtml += `<div style="margin-top:6px;padding:8px 10px;background:var(--danger-dim);border-radius:var(--radius-sm);font-size:11px;color:var(--required);font-weight:600">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Plan Cancelled \u2014 mail logging is blocked.
      </div>`;
      if (submitBtn) { submitBtn.disabled = true; submitBtn.title = 'Plan cancelled'; }
    } else {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.title = ''; }
    }

    // Remove any old status div
    const old = box.querySelector('.recipient-status-warn');
    if (old) old.remove();
    if (statusHtml) {
      const div = document.createElement('div');
      div.className = 'recipient-status-warn';
      div.innerHTML = statusHtml;
      box.appendChild(div);
    }
  }

  // Auto-set location from recipient's plan card
  const locInput = qs('log-location');
  if (locInput && data.locationId) {
    locInput.dataset.locationId = data.locationId;
  }

  // Forwarding notice
  const fwdNotice = qs('forwarding-notice');
  if (fwdNotice) {
    const hasFwd = data.autoFeature === 'ship';
    const isConf = qs('tog-confidential') && qs('tog-confidential').classList.contains('on');
    const isParcel = qs('log-type') && qs('log-type').value === 'parcel';
    fwdNotice.style.display = (hasFwd && !isConf && !isParcel) ? 'block' : 'none';
  }
  // Block submit for expired plans
  const submitBtn = qs('log-submit-btn');
  if (submitBtn) {
    const isExpired = data.accessStatus === 'CANCELED' || data.accessStatus === 'expired';
    submitBtn.disabled = isExpired;
    submitBtn.title = isExpired ? 'Plan expired \u2014 use Exception instead' : '';
  }
  updateScanUrlRequirement();
}


function clearRecipient() {
  STATE.logPlanCard = null;
  const search = qs('log-recipient-search');

// \u2500\u2500 Submit log mail \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function submitLogMail() {
  if (STATE.submitting) return;
  const btn       = qs('log-submit-btn');
  const isSpecial = qs('tog-special') && qs('tog-special').classList.contains('on');
  const pc        = STATE.logPlanCard;

  if (!pc && !isSpecial) { toast('Please select a recipient first', 'error'); return; }

  // Physical location is mandatory
  const locVal = qs('log-location') ? qs('log-location').value.trim() : '';
  if (!locVal) { toast('Physical location is required \u2014 where is this item stored?', 'error'); return; }

  if (isSpecial) {
    const spName = qs('log-special-name') ? qs('log-special-name').value.trim() : '';
    if (!spName) { toast('Please enter the recipient name from the envelope', 'error'); return; }
  }

  const isConfidential = qs('tog-confidential') && qs('tog-confidential').classList.contains('on');
  const type           = qs('log-type') ? qs('log-type').value : 'letter';

  // Safety net: block parcel on plans with no parcel limit
  if (type === 'parcel' && !isSpecial && pc && (!pc.parcelLimit || parseInt(pc.parcelLimit) === 0)) {
    toast('This plan does not include parcel handling \u2014 cannot log a parcel.', 'error');
    return;
  }

  const isScanPlan     = pc && pc.autoFeature === 'scan';
  const scanMandatory  = !isSpecial && isScanPlan && type === 'letter' && !isConfidential;
  // Quick pre-check before upload: is a scan required but nothing selected?
  const hasScanInput   = _scanMode === 'url' ? !!(qs('log-scan')?.value?.trim()) : !!_scanFile;
  if (scanMandatory && !hasScanInput) {
    toast('Scanned file is required for scan plans \u2014 paste a URL or upload a file', 'error');
    return;
  }


  STATE.submitting = true;
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Logging...'; }

  // Upload scan file now if needed (async \u2014 real upload happens here)
  let scanUrl = null;
  try {
    if (_scanMode === 'upload' && _scanFile) {
      if (btn) btn.innerHTML = '<span class="btn-spinner"></span> Uploading scan...';
    }
    scanUrl = await resolveScanValue();
    if (_scanMode === 'upload' && _scanFile && scanUrl === null) {
      // Upload failed \u2014 toast already shown by resolveScanValue
      STATE.submitting = false;
      if (btn) { btn.disabled = false; btn.innerHTML = 'Log Mail'; }
      return;
    }
    if (btn) btn.innerHTML = '<span class="btn-spinner"></span> Logging...';
  } catch(e) {
    STATE.submitting = false;
    if (btn) { btn.disabled = false; btn.innerHTML = 'Log Mail'; }
    return;
  }

  try {
    const result = await apiPost({
      action:            'logMail',
      uuid:              STATE.uuid,
      planCardId:        isSpecial ? '' : (pc ? pc.planCardId     : ''),
      clientId:          isSpecial ? '' : (pc ? pc.clientId       : ''),
      subscriptionId:    isSpecial ? '' : (pc ? pc.subscriptionId : ''),
      locationId:        STATE.access.locationId,
      recipientId:       isSpecial ? '' : (pc ? pc.recipientId || '' : ''),
      recipientName:     isSpecial ? ((qs('log-special-name') ? qs('log-special-name').value.trim() : '') || 'SPECIAL CASE') : (pc ? pc.name || '' : ''),
      senderName:        qs('log-sender')        ? qs('log-sender').value.trim()        : '',
      type:              type,
      confidential:      isConfidential,
      specialCase:       isSpecial,
      specialCaseReason: isSpecial ? (qs('log-special-reason') ? qs('log-special-reason').value : '') : '',
      physicalLocation:  qs('log-location')      ? qs('log-location').value.trim()      : '',
      scanImageUrl:      scanUrl,
      scanExpiresAt:     scanUrl ? getScanExpiresAt() : null,
      noteToClient:      qs('log-note-client')   ? qs('log-note-client').value          : '',
      noteInternal:      qs('log-note-internal') ? qs('log-note-internal').value        : '',
      pieceCount:        parseInt(qs('log-pieces') ? qs('log-pieces').value : '1') || 1,
    });

    if (result.status === 'ok') {
      toast('Mail logged: ' + result.mailId, 'success');
      renderLogForm(qs('log-full') || qs('workspace'));
      STATE.logPlanCard = null;
      await loadTasks();
      // Refresh exceptions badge
      api(`uuid=${encodeURIComponent(STATE.uuid)}&action=getExceptions&limit=500`).then(d => { updateExceptionsBadge((d.exceptions||[]).length); }).catch(()=>{});
    } else {
      throw new Error(result.message || 'Logging failed');
    }
  } catch(err) {
    toast(err.message, 'error');
  } finally {
    STATE.submitting = false;
    if (btn) { btn.disabled = false; btn.innerHTML = 'Log Mail'; }
  }
}


// \u2500\u2500 Resolve task \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function toggleAuditChecklistItem(taskId, idx, checked) {
  const task = STATE.tasks.find(t => t.taskId === taskId);
  if (!task || !task.checklist) return;
  task.checklist[idx].checked = checked;
  // Update strikethrough
  const labels = document.querySelectorAll('.audit-cb');
  labels.forEach(cb => {
    const i = parseInt(cb.dataset.idx);
    const span = cb.parentElement.querySelector('span');
    if (span) { span.style.textDecoration = cb.checked ? 'line-through' : ''; span.style.opacity = cb.checked ? '0.5' : '1'; }
  });
  // Save to DB
  try {
    await apiPost({ action: 'updateTask', uuid: STATE.uuid, taskId, checklist: task.checklist });
  } catch(e) {}
}

async function loadLiveCancelCounts(planCardId) {
  const el = document.getElementById('cancel-live-counts');
  if (!el) return;
  try {
    const { count: pickup } = await sb.from('mail_log').select('mail_id', { count: 'exact', head: true })
      .eq('plan_card_id', planCardId).eq('company_id', STATE.companyId).in('status', ['ready_for_pickup', 'confidential_pickup', 'received']);
    const { count: fwd } = await sb.from('mail_log').select('mail_id', { count: 'exact', head: true })
      .eq('plan_card_id', planCardId).eq('company_id', STATE.companyId).eq('status', 'forwarding_queued');
    const p = pickup || 0;
    const f = fwd || 0;
    el.innerHTML = (p > 0 ? '<span style="color:#C62828;font-weight:600">' + p + ' pending pickup</span>' : '0 pending pickup') +
      ' \u00B7 ' + (f > 0 ? '<span style="color:#E65100;font-weight:600">' + f + ' in forward queue</span>' : '0 in forward queue');
    el.title = 'Live count';
  } catch(e) { el.textContent = 'Could not load counts'; }
}

async function resolveCancellationTask(taskId, outcome) {
  // In-flight guard: prevent a double-click from firing resolveCancellation
  // twice (which previously produced duplicate audit-trail entries).
  if (!window._resolvingCancellation) window._resolvingCancellation = {};
  if (window._resolvingCancellation[taskId]) return;
  window._resolvingCancellation[taskId] = true;
  const label = outcome === 'processed' ? 'Cancellation Processed' : 'Client Kept Plan';
  try {
    const result = await apiPost({ action: 'resolveCancellation', uuid: STATE.uuid, taskId, outcome });
    if (result.status !== 'ok') throw new Error(result.message);
    toast(label, 'success');
    STATE.selectedTask = null;
    await loadTasks();
    renderTasksPane();
    renderDetailPane();
  } catch(e) { toast(e.message, 'error'); }
  finally { delete window._resolvingCancellation[taskId]; }
}

async function resolveTask(taskId) {
  // Check if checklist is complete
  const task = STATE.tasks.find(t => t.taskId === taskId);
  if (task && task.checklist && task.checklist.length) {
    const unchecked = task.checklist.filter(c => !c.checked);
    if (unchecked.length) {
      toast('Complete all checklist items before resolving (' + unchecked.length + ' remaining)', 'error');
      return;
    }
  }
  const note = qs('resolve-note') ? qs('resolve-note').value : '';
  try {
    const result = await apiPost({
      action:         'resolveTask',
      uuid:           STATE.uuid,
      taskId:         taskId,
      resolutionNote: note
    });
    if (result.status === 'ok') {
      toast('Task resolved', 'success');
      STATE.selectedTask = null;
      await loadTasks();
      renderTasksPane();
      renderDetailPane();
    } else {
      throw new Error(result.message || 'Failed');
    }
  } catch(err) {
    toast(err.message, 'error');
  }
}

async function snoozeFor(taskId, hours, label) {
  // Disable all buttons to prevent double clicks
  document.querySelectorAll('.modal-overlay .nt-chip').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
  const until = new Date(Date.now() + hours * 3600000).toISOString();
  try {
    await apiPost({ action:'snoozeTask', uuid:STATE.uuid, taskId, snoozeUntil:until });
    document.querySelector('.modal-overlay')?.remove();
    toast('Snoozed for ' + label);
    STATE.selectedTask = null;
    await loadTasks();
    if (STATE.view === 'tasks') { renderTasksPane(); renderDetailPane(); }
    else renderWorkspace();
  } catch(e) {
    document.querySelector('.modal-overlay')?.remove();
    toast(e.message, 'error');
  }
}

async function snoozeTask(taskId, until) {
  try {
    await apiPost({ action:'snoozeTask', uuid:STATE.uuid, taskId, snoozeUntil:until });
    toast('Task snoozed');
    await loadTasks();
    renderWorkspace();
  } catch(e) { toast(e.message, 'error'); }
}

function jumpToMailLog(mailId) {
  if (!mailId) { setView('maillog'); return; }
  setView('maillog');
  var elapsed = 0, STEP = 60, BUDGET = 6000, done = false;
  var timer = setInterval(function(){
    elapsed += STEP;
    var srch = document.getElementById('ml-search');
    if (srch && typeof filterStaffMailLog === 'function') {
      srch.value = mailId;
      if (typeof setMailView === 'function') setMailView('all'); // include completed mail
      filterStaffMailLog(mailId);
      done = true;
      clearInterval(timer);
      return;
    }
    if (elapsed >= BUDGET) clearInterval(timer);
  }, STEP);
}

async function renderStaffMailLog(container) {

function toggleDetail(uid) {
  const d = document.getElementById(uid) || document.getElementById('detail-' + uid);

  if (d.style.display === 'none') {
    if (_expandMode === 'single') {

}

function exportMailLogCSV() {
  const items = _mlFilteredCache || [];
  if (!items.length) { toast('No items to export', 'error'); return; }
  const headers = ['Mail ID','Type','Recipient','Client','Client Email','Sender','Plan','Status','Logged Date','Storage Due','Location','Pieces','Tracking','Note to Client','Internal Note','Scanned'];
  const rows = items.map(m => [
    m.mailId, m.type, m.recipientName||'', m.clientName||'', m.clientEmail||'', m.senderName||'',
    m.planName||'', m.status||'',
    m.loggedAt ? fmtDateTime(m.loggedAt) + ' ' + STAFF_TZ_LABEL() : '',
    m.storageDueDate ? fmtDate(m.storageDueDate) + ' ' + STAFF_TZ_LABEL() : '', m.physicalLocation||'', m.pieceCount||1,
    m.trackingNumber||'', m.noteToClient||'', m.noteInternal||'', m.scanImageUrl ? 'Yes' : 'No'
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'mail-log-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exported (' + items.length + ' items)', 'success');
}

function setMlPage(page) {

// Slide the red pill under the active mail segment button (mirrors updateNavSlider).
function _positionMlSegSlider() {
  const apply = () => {
    const seg = document.querySelector('.ml-seg');
    const slider = document.getElementById('ml-seg-slider');
    if (!seg || !slider) return;
    const activeBtn = seg.querySelector('.ml-seg-btn.active');
    if (!activeBtn) { slider.style.width = '0'; return; }
    const segRect = seg.getBoundingClientRect();
    const btnRect = activeBtn.getBoundingClientRect();
    if (!btnRect.width) return;
    slider.style.left  = (btnRect.left - segRect.left) + 'px';
    slider.style.width = btnRect.width + 'px';
  };
  requestAnimationFrame(() => requestAnimationFrame(apply));
}
window.addEventListener('resize', _positionMlSegSlider);

let _allStaffMail = [];
let _mlFilteredCache = [];
let _mailView = 'active'; // 'active' | 'all' | 'released'
let _mlRenderedCount = 0; // for virtual scroll

function _mlSegThumb(_retries) {
  const seg = qs('mlv-seg'), thumb = qs('mlv-seg-thumb');
  if (!seg || !thumb) return;
  const active = seg.querySelector('button.active');
  if (!active) return;
  // If layout hasn't settled yet (re-navigation), offsetWidth is 0 — retry next frame
  // instead of committing a zero-width thumb (which hides the active pill).
  if (active.offsetWidth === 0) {
    if ((_retries || 0) < 10) requestAnimationFrame(() => _mlSegThumb((_retries || 0) + 1));
    return;
  }
  thumb.style.width = active.offsetWidth + 'px';
  thumb.style.transform = 'translateX(' + (active.offsetLeft - 3) + 'px)';
}
if (!window._mlSegResizeBound) { window._mlSegResizeBound = true; window.addEventListener('resize', () => _mlSegThumb()); }
function setMailView(v) {
  _mailView = v;
  document.querySelectorAll('#mlv-seg button').forEach(b => b.classList.remove('active'));
  const btn = qs('mlv-' + v);
